    async function renderPullUps(app) {
      app.appendChild(el('header', { class: 'top' }, [
        el('h1', {}, 'Pull-Ups'),
        el('span', { class: 'date' }, fmtDateLong(new Date())),
      ]));

      let prog = null;
      let today = { pullUpWeek: 1, pullUpPhase: null };
      try { prog = await loadProgram(); } catch (e) {}
      try {
        if (!todayCache && getConfig().scriptUrl && getConfig().token) todayCache = await api('today');
        if (todayCache) today = todayCache;
      } catch (e) {}

      const week = today.pullUpWeek || 1;
      const phase = today.pullUpPhase || phaseForWeek(week);
      const phaseInfo = (prog && prog.pullUpPhases) ? (prog.pullUpPhases.find(p => p.name === phase) || {}) : {};

      app.appendChild(el('div', { class: 'card' }, [
        el('h2', {}, `Week ${week} · ${phase}`),
        el('div', { class: 'muted', style: 'font-size: 14px;' },
          `${phaseInfo.workingReps || ''} per set · ${phaseInfo.sets || 5} sets/day · ${phaseInfo.weight || ''}`),
      ]));

      app.appendChild(el('div', { class: 'card' }, [
        el('div', { class: 'field' }, [el('label', {}, 'Date'), el('input', { id: 'puDate', type: 'date', value: todayISO() })]),
        el('div', { class: 'field' }, [
          el('label', {}, 'Program week (auto)'),
          el('input', { id: 'puWeek', type: 'number', inputmode: 'numeric', min: '1', max: '12', value: String(week) }),
        ]),
        el('div', { class: 'field' }, [
          el('label', {}, 'Reps per set (5 sets)'),
          (() => {
            const grid = el('div', { class: 'set-grid-5' });
            ['S1', 'S2', 'S3', 'S4', 'S5'].forEach((lab, i) => {
              grid.appendChild(el('div', {}, [
                el('div', { style: 'font-size: 10px; text-align: center; color: var(--muted); margin-bottom: 4px;' }, lab),
                el('input', { class: 'inp-s' + (i + 1), type: 'number', inputmode: 'numeric', placeholder: '—' }),
              ]));
            });
            return grid;
          })(),
        ]),
        el('div', { class: 'field' }, [
          el('label', {}, 'Weight (BW, BW+10, etc.)'),
          el('input', { id: 'puWeight', type: 'text', value: phaseInfo.weight || 'BW' }),
        ]),
        el('div', { class: 'field' }, [
          el('label', {}, 'Notes (optional)'),
          el('input', { id: 'puNotes', type: 'text', placeholder: 'felt strong / easy / spread across day' }),
        ]),
        el('button', {
          onclick: async () => {
            const date = $('#puDate').value;
            const weekVal = Number($('#puWeek').value) || week;
            const s = [1, 2, 3, 4, 5].map(n => {
              const v = $('.inp-s' + n, app).value.trim();
              return v === '' ? '' : Number(v);
            });
            const weight = $('#puWeight').value.trim();
            const notes = $('#puNotes').value.trim();
            if (s.every(v => v === '')) return toast('Enter at least one set', true);
            const session = {
              date, week: weekVal,
              s1: s[0], s2: s[1], s3: s[2], s4: s[3], s5: s[4],
              weight, notes,
            };
            try {
              const res = await sbLogPullUps(session);
              if (res.duplicate) toast('Already logged today');
              else toast(`Saved · ${res.total} total reps`);
              setTimeout(() => render('home'), 900);
            } catch (e) {
              toast('Could not save: ' + e.message, true);
            }
          },
        }, 'Save pull-up session'),
      ]));

      // Recent pull-up sessions
      try {
        const recentPullups = await sbRecentPullUps(5);
        if (recentPullups.length) {
          const list = el('div', { class: 'card' }, [el('h2', {}, 'Recent sessions')]);
          recentPullups.forEach(p => {
            list.appendChild(el('div', {
              style: 'padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;',
            }, [
              el('div', {}, [
                el('div', { style: 'font-weight: 600;' }, `${p.total || 0} reps · ${p.weight || 'BW'}`),
                el('div', { class: 'muted', style: 'font-size: 12px;' },
                  `${[p.s1, p.s2, p.s3, p.s4, p.s5].filter(x => x !== '' && x != null).join('/')}`),
              ]),
              el('div', { class: 'muted', style: 'font-size: 13px;' }, `${p.date} · W${p.week}`),
            ]));
          });
          app.appendChild(list);
        }
      } catch (e) {}
    }

    function phaseForWeek(w) {
      if (w <= 3) return 'Phase 1';
      if (w <= 6) return 'Phase 2';
      if (w <= 9) return 'Phase 3';
      return 'Phase 4';
    }

    function renderLastWeek_(ex) {
      // Compact "Last time" footer showing the most recent same-day session's
      // weight × total reps for this exercise. (Was "Last week" — renamed
      // because for A/B-style rotations, "last time" can be in the same week.)
      const w = ex.prevWeight;
      const t = ex.prevTotal != null ? ex.prevTotal : ex.previous;
      const hasW = (w != null && w !== '' && w !== '—');
      const hasT = (t != null && t !== '' && t !== '—' && t !== 0 && t !== '0');
      if (!hasW && !hasT) {
        return el('div', { class: 'prev', style: 'color: #555;' }, 'Last time: no data');
      }
      const parts = [];
      if (hasW) parts.push(String(w) + (typeof w === 'number' ? ' lb' : ''));
      if (hasT) parts.push(String(t) + ' reps');
      return el('div', { class: 'prev' }, [
        el('span', {}, 'Last time: '),
        el('b', {}, parts.join(' · ')),
      ]);
    }

    let analyticsYearFilter = null; // persists across re-renders
    let analyticsTypeFilter = 'all'; // 'all' | 'run' | 'walk' | 'ride' | 'hike' | 'swim' | 'lift' | 'pullups'

    async function renderAnalytics(app) {
      // v28.c reshape: two persistent segment controls (Type, then Year)
      // above a data container that swaps content per selection. Data is
      // fetched once per year change (all modalities in one round-trip)
      // so tapping between type tabs is instant.
      app.appendChild(el('header', { class: 'top' }, [el('h1', {}, 'Analytics')]));

      const typeSeg = el('div', { class: 'seg', style: 'margin-bottom: 8px;' });
      const yearSeg = el('div', { class: 'seg' });
      app.appendChild(typeSeg);
      app.appendChild(yearSeg);

      const dataContainer = el('div', { id: 'analyticsData' });
      app.appendChild(dataContainer);

      // Initial skeleton
      dataContainer.appendChild(el('div', { class: 'card' },
        el('div', { class: 'skeleton', style: 'height: 100px;' })));

      const TYPE_LABELS = {
        all: 'All', run: 'Run', walk: 'Walk', ride: 'Ride',
        hike: 'Hike', swim: 'Swim', lift: 'Lift', pullups: 'Pull-Ups',
      };

      // Cache of latest fetched dataset. Type-tab changes reuse this;
      // year-tab changes trigger a refetch.
      let latest = null;

      const buildTypeSegs = (types) => {
        typeSeg.innerHTML = '';
        // If the persisted filter isn't available (user has no data of that
        // type in this year), fall back to 'all'.
        if (!types.includes(analyticsTypeFilter)) analyticsTypeFilter = 'all';
        types.forEach(t => {
          typeSeg.appendChild(el('button', {
            'data-opt': t,
            class: analyticsTypeFilter === t ? 'active' : '',
            onclick: () => selectType(t),
          }, TYPE_LABELS[t] || t));
        });
      };

      const buildYearSegs = (availableYears) => {
        yearSeg.innerHTML = '';
        const years = (availableYears || []).slice();
        const thisYr = new Date().getFullYear();
        if (!years.includes(thisYr)) years.unshift(thisYr);
        years.sort((a, b) => b - a);
        const options = years.map(String).concat(['all']);
        options.forEach(opt => {
          yearSeg.appendChild(el('button', {
            'data-opt': opt,
            class: analyticsYearFilter === opt ? 'active' : '',
            onclick: () => selectYear(opt),
          }, opt === 'all' ? 'All Time' : opt));
        });
      };

      const selectType = (t) => {
        analyticsTypeFilter = t;
        Array.from(typeSeg.children).forEach(btn => {
          btn.classList.toggle('active', btn.dataset.opt === t);
        });
        if (latest) renderAnalyticsByType_(dataContainer, latest, t);
      };

      const selectYear = async (opt) => {
        analyticsYearFilter = opt;
        Array.from(yearSeg.children).forEach(btn => {
          btn.classList.toggle('active', btn.dataset.opt === opt);
        });
        dataContainer.innerHTML = '';
        dataContainer.appendChild(el('div', { class: 'card' },
          el('div', { class: 'skeleton', style: 'height: 100px;' })));
        try {
          latest = await sbAnalyticsMulti(opt);
        } catch (e) {
          dataContainer.innerHTML = '';
          dataContainer.appendChild(el('div', { class: 'card' }, [
            el('h2', {}, 'Could not load'),
            el('div', { class: 'muted', style: 'font-size: 14px; margin-top: 6px;' },
              'Analytics failed to load: ' + e.message),
          ]));
          return;
        }
        buildTypeSegs(latest.availableTypes);
        renderAnalyticsByType_(dataContainer, latest, analyticsTypeFilter);
      };

      // First load
      const initialYear = analyticsYearFilter || String(new Date().getFullYear());
      analyticsYearFilter = initialYear;
      try {
        latest = await sbAnalyticsMulti(initialYear);
      } catch (e) {
        dataContainer.innerHTML = '';
        dataContainer.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, 'Could not load'),
          el('div', { class: 'muted', style: 'font-size: 14px; margin-top: 6px;' },
            'Analytics failed to load: ' + e.message),
        ]));
        return;
      }
      buildTypeSegs(latest.availableTypes);
      buildYearSegs(latest.availableYears);
      renderAnalyticsByType_(dataContainer, latest, analyticsTypeFilter);
    }

    // Dispatch analytics rendering by selected type. Kept small and boring —
    // each helper below owns its own modality view.
    function renderAnalyticsByType_(container, data, type) {
      container.innerHTML = '';
      // Empty overall (no data of any kind)
      if (data.availableTypes.length <= 1 && !data.all.summary.totalSessions) {
        container.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, 'Nothing to analyze yet'),
          el('p', { class: 'muted', style: 'font-size: 14px; margin-top: 6px; line-height: 1.5;' },
            'Log your first workout to see it come alive.'),
        ]));
        return;
      }
      switch (type) {
        case 'all':     return renderAnalyticsAll_(container, data);
        case 'run':     return renderAnalyticsDistance_(container, data.run, {
                          totalLabel: 'Total miles', countLabel: 'runs',
                          avgDistLabel: 'mi/run',    showPace: true,
                          showTime: true,            unit: 'mi',
                        });
        case 'walk':    return renderAnalyticsDistance_(container, {
                          summary: {
                            miles: data.walk.summary.miles,
                            runs: data.walk.summary.walks,
                            avgDistance: data.walk.summary.avgDistance,
                            avgTimeMinutes: null,
                          },
                          monthly: data.walk.monthly,
                          yearly: data.walk.yearly,
                        }, {
                          totalLabel: 'Total miles', countLabel: 'walks',
                          avgDistLabel: 'mi/walk',   showPace: false,
                          showTime: false,           unit: 'mi',
                          extraCards: [{
                            title: 'Total hours',
                            value: String(data.walk.summary.totalHours),
                            sub: 'across all walks',
                          }],
                        });
        case 'ride':    return renderAnalyticsActivity_(container, data.ride, 'Ride', 'mi');
        case 'hike':    return renderAnalyticsActivity_(container, data.hike, 'Hike', 'mi');
        case 'swim':    return renderAnalyticsActivity_(container, data.swim, 'Swim', 'yd');
        case 'lift':    return renderAnalyticsLift_(container, data.lift);
        case 'pullups': return renderAnalyticsPullups_(container, data.pullups);
      }
    }

    // Cross-modal summary.
    function renderAnalyticsAll_(container, data) {
      const s = data.all.summary;
      container.appendChild(el('div', { class: 'stat-grid' }, [
        el('div', { class: 'card' }, [
          el('h2', {}, 'Total sessions'),
          el('div', { class: 'big' }, String(s.totalSessions)),
          el('div', { class: 'muted', style: 'margin-top: 4px;' }, `${s.activeDays} active days`),
        ]),
        el('div', { class: 'card' }, [
          el('h2', {}, 'Total miles'),
          el('div', { class: 'big' }, String(s.totalMiles)),
          el('div', { class: 'muted', style: 'margin-top: 4px;' }, 'runs + walks + activities'),
        ]),
      ]));
      // Sessions by modality
      const byMod = data.all.byModality;
      if (byMod.length) {
        const maxC = Math.max(1, ...byMod.map(m => m.count));
        const card = el('div', { class: 'card' }, [el('h2', {}, 'Sessions by modality')]);
        byMod.forEach(m => {
          const pct = (m.count / maxC) * 100;
          card.appendChild(el('div', { class: 'bar-row', style: 'padding: 4px 0;' }, [
            el('div', { class: 'label' }, m.label),
            el('div', { class: 'bar-track' }, [el('div', { class: 'bar-fill', style: `width: ${Math.max(2, pct)}%;` })]),
            el('div', { class: 'val' }, String(m.count)),
          ]));
        });
        container.appendChild(card);
      }
    }

    // Distance-based analytics (Run today; Walk uses a shim; activities go
    // through renderAnalyticsActivity_ instead since their fields differ).
    function renderAnalyticsDistance_(container, data, opts) {
      const s = data.summary;
      if (!s.runs && !s.walks) {
        container.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, 'No data for this period'),
          el('p', { class: 'muted', style: 'font-size: 14px; margin-top: 6px;' },
            'Try changing the year filter or logging a session.'),
        ]));
        return;
      }
      const cards1 = [
        el('div', { class: 'card' }, [
          el('h2', {}, opts.totalLabel),
          el('div', { class: 'big' }, String(s.miles)),
          el('div', { class: 'muted', style: 'margin-top: 4px;' }, `${s.runs} ${opts.countLabel}`),
        ]),
      ];
      if (opts.showPace) {
        cards1.push(el('div', { class: 'card' }, [
          el('h2', {}, 'Avg pace'),
          el('div', { class: 'big' }, s.avgPace || '—'),
          el('div', { class: 'muted', style: 'margin-top: 4px;' }, '/mi'),
        ]));
      } else if (opts.extraCards && opts.extraCards[0]) {
        const ec = opts.extraCards[0];
        cards1.push(el('div', { class: 'card' }, [
          el('h2', {}, ec.title),
          el('div', { class: 'big' }, ec.value),
          el('div', { class: 'muted', style: 'margin-top: 4px;' }, ec.sub),
        ]));
      }
      container.appendChild(el('div', { class: 'stat-grid' }, cards1));

      if (opts.showTime && s.avgTimeMinutes != null) {
        container.appendChild(el('div', { class: 'stat-grid' }, [
          el('div', { class: 'card' }, [
            el('h2', {}, 'Avg distance'),
            el('div', { class: 'big' }, String(s.avgDistance)),
            el('div', { class: 'muted', style: 'margin-top: 4px;' }, opts.avgDistLabel),
          ]),
          el('div', { class: 'card' }, [
            el('h2', {}, 'Avg time'),
            el('div', { class: 'big' }, String(s.avgTimeMinutes)),
            el('div', { class: 'muted', style: 'margin-top: 4px;' }, 'min'),
          ]),
        ]));
      }

      // Monthly bars (only for year views)
      if (data.monthly && data.monthly.length) {
        const maxMi = Math.max(1, ...data.monthly.map(m => m.miles));

    let calendarMonth = null; // { year, month }

    let _calendarView = 'cal'; // 'cal' | 'list'

    async function renderCalendar(app) {
      if (!calendarMonth) {
        const n = new Date();
        calendarMonth = { year: n.getFullYear(), month: n.getMonth() + 1 };
      }
      app.appendChild(el('header', { class: 'top' }, [
        el('h1', {}, _calendarView === 'list' ? 'History' : 'Calendar'),
      ]));

      // Cal / List toggle
      const seg = el('div', { class: 'seg', style: 'margin-bottom: 10px;' });
      ['cal', 'list'].forEach(v => {
        seg.appendChild(el('button', {
          class: _calendarView === v ? 'active' : '',
          onclick: () => { _calendarView = v; render('calendar'); },
        }, v === 'cal' ? 'Calendar' : 'List'));
      });
      app.appendChild(seg);

      if (_calendarView === 'list') {
        await renderHistoryList_(app);
        return;
      }

      const headerRow = el('div', { class: 'cal-header' }, [
        el('button', { class: 'cal-nav-btn', onclick: () => {
          if (calendarMonth.month === 1) { calendarMonth.year--; calendarMonth.month = 12; }
          else calendarMonth.month--;
          render('calendar');
        }}, '‹'),
        el('h2', { id: 'calMonthLabel' }, 'Loading…'),
        el('button', { class: 'cal-nav-btn', onclick: () => {
          if (calendarMonth.month === 12) { calendarMonth.year++; calendarMonth.month = 1; }
          else calendarMonth.month++;
          render('calendar');
        }}, '›'),
      ]);
      app.appendChild(headerRow);

      const gridContainer = el('div', { id: 'calGrid' }, el('div', { class: 'skeleton', style: 'height: 280px;' }));
      app.appendChild(gridContainer);

      let data;
      try { data = await sbMonth(calendarMonth.year, calendarMonth.month); }
      catch (e) { gridContainer.innerHTML = ''; gridContainer.appendChild(el('div', { class: 'card' }, 'Could not load calendar: ' + e.message)); return; }

      $('#calMonthLabel').textContent = data.monthLabel;

      const grid = el('div', { class: 'cal-grid' });
      ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => grid.appendChild(el('div', { class: 'cal-dow' }, d)));
      for (let i = 0; i < data.firstDayOfWeek; i++) grid.appendChild(el('div', { class: 'cal-day empty' }));
      const todayISOStr = todayISO();
      data.days.forEach(day => {
        // One dot per logged instance — e.g. two morning+evening walks show
        // two green dots. Order chosen for legibility: lifts first, then runs,
        // walks, activities (ride/hike/etc.), pull-ups.
        const dots = [];
        const nLift = (day.lifts      || []).length;
        const nRun  = (day.runs       || []).length;
        const nWalk = (day.walks      || []).length;
        const nAct  = (day.activities || []).length;
        const nPull = (day.pullupsAll || []).length;
        for (let i = 0; i < nLift; i++) dots.push(el('div', { class: 'cal-dot lift' }));
        for (let i = 0; i < nRun;  i++) dots.push(el('div', { class: 'cal-dot run' }));
        for (let i = 0; i < nWalk; i++) dots.push(el('div', { class: 'cal-dot walk' }));
        for (let i = 0; i < nAct;  i++) dots.push(el('div', { class: 'cal-dot activity' }));
        for (let i = 0; i < nPull; i++) dots.push(el('div', { class: 'cal-dot pull' }));
        const hasAny = dots.length > 0;
        const isToday = day.date === todayISOStr;
        const cls = 'cal-day' + (hasAny ? ' has-activity' : '') + (isToday ? ' today' : '');
        grid.appendChild(el('button', {
          class: cls,
          'data-date': day.date,
          onclick: () => { selectCalendarDay(day); },
        }, [
          el('div', { class: 'cal-num' }, String(day.day)),
          el('div', { class: 'cal-dots' }, dots),
        ]));
      });
      gridContainer.innerHTML = '';
      gridContainer.appendChild(grid);

      // Detail panel
      gridContainer.appendChild(el('div', { id: 'calDetail', class: 'cal-detail' }));

      // Legend
      gridContainer.appendChild(el('div', { class: 'card', style: 'margin-top: 12px; font-size: 12px; padding: 10px 14px;' }, [
        el('div', { style: 'display: flex; gap: 12px; flex-wrap: wrap;' }, [
          el('span', {}, [el('span', { class: 'cal-dot lift',     style: 'display: inline-block; margin-right: 4px; vertical-align: middle;' }), 'Lift']),
          el('span', {}, [el('span', { class: 'cal-dot run',      style: 'display: inline-block; margin-right: 4px; vertical-align: middle;' }), 'Run']),
          el('span', {}, [el('span', { class: 'cal-dot walk',     style: 'display: inline-block; margin-right: 4px; vertical-align: middle;' }), 'Walk']),
          el('span', {}, [el('span', { class: 'cal-dot activity', style: 'display: inline-block; margin-right: 4px; vertical-align: middle;' }), 'Ride/Hike/etc.']),
          el('span', {}, [el('span', { class: 'cal-dot pull',     style: 'display: inline-block; margin-right: 4px; vertical-align: middle;' }), 'Pull-Ups']),
        ]),
      ]));
    }

    // List view: scrollable history of past lift sessions, newest first.
    // Tap a row → existing Session Detail screen.
    async function renderHistoryList_(app) {
      const skel = el('div', { class: 'card' }, el('div', { class: 'skeleton', style: 'height: 200px;' }));
      app.appendChild(skel);

      let rows = [];
      try {
        const uid = currentUser.id;
        const [liftsR, runsR, walksR, pullsR, actsR] = await Promise.all([
          _sb.from('lift_sessions')
            .select('id,date,block_name,week,day,exercises,notes')
            .eq('user_id', uid).order('date', { ascending: false }).limit(200),
          _sb.from('runs')
            .select('id,date,distance,duration_secs,pace,notes,shoe_id')
            .eq('user_id', uid).order('date', { ascending: false }).limit(200),
          _sb.from('walks')
            .select('id,date,distance,duration_secs,notes')
            .eq('user_id', uid).order('date', { ascending: false }).limit(200),
          _sb.from('pullup_sessions')
            .select('id,date,sets,total_reps,notes')
            .eq('user_id', uid).order('date', { ascending: false }).limit(200),
          _sb.from('activities')
            .select('id,date,activity_type,duration_secs,distance,intensity,notes')
            .eq('user_id', uid).order('date', { ascending: false }).limit(200),
        ]);

        (liftsR.data || []).forEach(s => rows.push(normalizeLiftRow_(s)));
        (runsR.data  || []).forEach(r => rows.push(normalizeRunRow_(r)));
        (walksR.data || []).forEach(w => rows.push(normalizeWalkRow_(w)));
        (pullsR.data || []).forEach(p => rows.push(normalizePullupRow_(p)));
        (actsR.data  || []).forEach(a => rows.push(normalizeActivityRow_(a)));

        // Sort: newest date first; ties broken by kind order (lifts before
        // runs before walks etc.) so a day with multiple sessions reads
        // consistently.
        const kindOrder = { lift: 0, run: 1, pullups: 2, walk: 3, activity: 4 };
        rows.sort((a, b) => {
          if (a.date !== b.date) return b.date.localeCompare(a.date);
          return (kindOrder[a.kind] ?? 9) - (kindOrder[b.kind] ?? 9);
        });
      } catch (e) {
        skel.remove();
        app.appendChild(el('div', { class: 'card' }, 'Could not load history: ' + e.message));
        return;
      }
      skel.remove();

      if (!rows.length) {
        app.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, 'No sessions yet'),
          el('p', { class: 'muted', style: 'font-size: 14px; margin-top: 6px;' },
            "Once you log a session — any modality — it'll appear here. Recent first, grouped by month."),
        ]));
        return;
      }

      // Group by month.
      const monthBuckets = {};
      rows.forEach(r => {
        const ym = r.date.slice(0, 7);
        (monthBuckets[ym] = monthBuckets[ym] || []).push(r);
      });
      const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

      Object.keys(monthBuckets).sort().reverse().forEach(ym => {
        const [y, m] = ym.split('-').map(Number);
        const label = `${monthNames[m - 1]} ${y}`;
        app.appendChild(el('h2', { class: 'section-h' }, label));
        monthBuckets[ym].forEach(row => {
          app.appendChild(renderHistoryRow_(row));
        });
      });
    }

    // ── History-row normalizers ─────────────────────────────
    // Each turns a raw Supabase row into { date, kind, tag, tagColor,
    // primary, subtitle, right, onClick } used by renderHistoryRow_.

    function normalizeLiftRow_(s) {
      const exArr = Array.isArray(s.exercises) ? s.exercises : [];
      const exCount = exArr.length;
      const totalReps = exArr.reduce((tot, ex) =>
        tot + [ex.r1, ex.r2, ex.r3, ex.r4].reduce((sum, v) => sum + (Number(v) || 0), 0), 0);
      const preview = exArr.slice(0, 3).map(ex => ex.name).join(' · ') +
                      (exArr.length > 3 ? ` · +${exArr.length - 3} more` : '');
      // Build a clean primary line: only join the pieces that exist.
      // Plan-based sessions often have no block_name and stash the full
      // session label in `day` ("Lift A - Push Strength").
      const bits = [];
      if (s.block_name) bits.push(s.block_name);
      if (s.week)       bits.push(`Wk ${s.week}`);
      if (s.day)        bits.push(s.day);
      return {
        date: s.date,
        kind: 'lift',
        tag: 'LIFT',
        tagColor: 'lift',
        primary: bits.join(' · ') || 'Lift session',
        subtitle: preview,
        right: `${exCount} ex · ${totalReps} reps`,
        onClick: () => {
          _liftSessionRef = { date: s.date, day: s.day };
          render('lift-session');
        },
      };
    }

    function normalizeRunRow_(r) {
      const dist = Number(r.distance) || 0;
      const dur  = Number(r.duration_secs) || 0;
      const time = dur ? `${Math.floor(dur/60)}:${String(dur%60).padStart(2,'0')}` : '';
      return {
        date: r.date,
        kind: 'run',
        tag: 'RUN',
        tagColor: 'run',
        primary: [dist ? `${dist} mi` : '', time].filter(Boolean).join(' · '),
        subtitle: [r.pace ? `${r.pace}/mi` : '', r.notes].filter(Boolean).join(' · '),
        right: '',
        onClick: r.id ? () => { _runEditRef = { id: r.id }; render('run-edit'); } : null,
      };
    }

    function normalizeWalkRow_(w) {
      const dist = Number(w.distance) || 0;
      const dur  = Number(w.duration_secs) || 0;
      const time = dur ? `${Math.floor(dur/60)}:${String(dur%60).padStart(2,'0')}` : '';
      return {
        date: w.date,
        kind: 'walk',
        tag: 'WALK',
        tagColor: 'walk',
        primary: [dist ? `${dist} mi` : '', time].filter(Boolean).join(' · '),
        subtitle: w.notes || '',
        right: '',
        onClick: w.id ? () => { _walkEditRef = { id: w.id }; render('walk-edit'); } : null,
      };
    }

    function normalizePullupRow_(p) {
      const setsArr = Array.isArray(p.sets) ? p.sets.filter(v => v != null && v !== '') : [];
      return {
        date: p.date,
        kind: 'pullups',
        tag: 'PULL-UPS',
        tagColor: 'pullups',
        primary: `${p.total_reps || 0} reps`,
        subtitle: setsArr.length ? setsArr.join(' / ') : (p.notes || ''),
        right: '',
        onClick: p.id ? () => { _pullupsEditRef = { id: p.id }; render('pullups-edit'); } : null,
      };
    }

    function normalizeActivityRow_(a) {
      const activityLabels = {
        cycling: 'RIDE', hiking: 'HIKE', swimming: 'SWIM',
        rowing: 'ROW', yoga: 'YOGA', other: 'OTHER',
      };
      const distUnit = { swimming: 'yd', rowing: 'm' }[a.activity_type] || 'mi';
      const dist = Number(a.distance) || 0;
      const dur  = Number(a.duration_secs) || 0;
      const time = dur ? `${Math.floor(dur/60)}:${String(dur%60).padStart(2,'0')}` : '';
      const parts = [];
      if (dist) parts.push(`${dist} ${distUnit}`);
      if (time) parts.push(time);
      return {
        date: a.date,
        kind: 'activity',
        tag: activityLabels[a.activity_type] || String(a.activity_type || 'ACTIVITY').toUpperCase(),
        tagColor: 'activity',
        primary: parts.join(' · ') || '—',
        subtitle: [a.intensity, a.notes].filter(Boolean).join(' · '),
        right: '',
        onClick: a.id ? () => { _activityEditRef = { id: a.id }; render('activity-edit'); } : null,
      };
    }

    // Render a single history row.
    function renderHistoryRow_(row) {
      const wd = new Date(row.date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short' });
      const card = el('div', {
        class: 'card history-row' + (row.onClick ? ' clickable' : ''),
        onclick: row.onClick || null,
      }, [
        el('div', { class: 'history-head' }, [
          el('div', {}, [
            el('div', { class: 'history-date' }, [
              el('span', { class: `history-tag tag-${row.tagColor}` }, row.tag),
              document.createTextNode(` ${wd} · ${row.date}`),
            ]),
            row.primary ? el('div', { class: 'muted', style: 'font-size: 12px; margin-top: 4px;' }, row.primary) : null,
          ]),
          row.right ? el('div', { class: 'muted', style: 'font-size: 12px; text-align: right; white-space: nowrap;' }, row.right) : null,
        ]),
        row.subtitle ? el('div', { class: 'muted', style: 'font-size: 12px; margin-top: 6px;' }, row.subtitle) : null,
      ]);
      return card;
    }

    function selectCalendarDay(day) {
      document.querySelectorAll('.cal-day.selected').forEach(n => n.classList.remove('selected'));
      const btn = document.querySelector(`.cal-day[data-date="${day.date}"]`);
      if (btn) btn.classList.add('selected');

      const detail = $('#calDetail');
      detail.innerHTML = '';
      const card = el('div', { class: 'card' }, [
        el('h2', {}, day.weekday + ' · ' + day.date),
      ]);
      const items = [];
      const editBtn = (onclick) => el('button', {
        style: 'margin-top: 8px; background: var(--surface-2); color: var(--text); border: 1px solid var(--border); padding: 6px 12px; font-size: 12px; width: auto;',
        onclick,
      }, 'Edit');

      (day.lifts || []).forEach(lift => {
        // Clean description: only include the pieces that are actually set.
        // Plan-based sessions often don't have block/week; they store the
        // full session name in `day`.
        const bits = [];
        if (lift.block) bits.push(lift.block);
        if (lift.week)  bits.push(`Week ${lift.week}`);

    function prettyTime_(s) {

      const m = String(s).match(/^(\d{1,2}):(\d{2}):(\d{2})$/);

      return String(s);

    // Fetch every lift_sessions row that contains an exercise matching this
    // name (case + whitespace-insensitive). Returns one entry per session
    // with the matched exercise's weight + per-set reps.
    async function sbExerciseHistory(name) {
      const uid = currentUser.id;
      const { data, error } = await _sb.from('lift_sessions')
        .select('date,block_name,week,day,exercises,notes')
        .eq('user_id', uid)
        .order('date', { ascending: false })
        .limit(500);
      if (error) throw new Error(error.message);
      const wanted = normalizeExName_(name);
      const out = [];
      (data || []).forEach(s => {
        const arr = Array.isArray(s.exercises) ? s.exercises : [];
        const match = arr.find(ex => normalizeExName_(ex.name) === wanted);
        if (!match) return;
        const setReps = [match.r1, match.r2, match.r3, match.r4]
          .map(v => (v === '' || v == null) ? null : Number(v))
          .filter(v => v !== null);
        out.push({
          date:     s.date,
          block:    s.block_name,
          week:     s.week,
          day:      s.day,
          weight:   match.weight,
          setReps:  setReps,
          totalReps: setReps.reduce((a, b) => a + (b || 0), 0),
          notes:    match.notes || '',
        });
      });
      return out;
    }

    function parseWeightNumber_(w) {
      if (w == null || w === '') return null;
      // Pull the first number out of "135", "BW+25", "55 lb", etc.
      const m = String(w).match(/-?\d+(?:\.\d+)?/);
      return m ? Number(m[0]) : null;
    }

    // Tiny inline SVG line chart. Points: [{ date, weight }] in ascending
    // date order, length ≥ 2. Returns an SVG element sized to fit a card.
    function renderTrendLine_(points) {
      const W = 320, H = 100, PAD_X = 8, PAD_Y = 14;
      const weights = points.map(p => p.weight);
      const minW = Math.min(...weights);
      const maxW = Math.max(...weights);
      const span = (maxW - minW) || 1;
      const xStep = (W - PAD_X * 2) / (points.length - 1);
      const xy = points.map((p, i) => {
        const x = PAD_X + i * xStep;
        const y = PAD_Y + (1 - (p.weight - minW) / span) * (H - PAD_Y * 2);
        return [x, y];
      });
      const path = xy.map(([x, y], i) => (i === 0 ? `M${x},${y}` : `L${x},${y}`)).join(' ');
      const NS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(NS, 'svg');
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
      svg.setAttribute('preserveAspectRatio', 'none');
      svg.style.width = '100%';
      svg.style.height = '100px';
      svg.style.marginTop = '8px';

      // Grid: baseline + top
      const baseline = document.createElementNS(NS, 'line');
      baseline.setAttribute('x1', PAD_X); baseline.setAttribute('x2', W - PAD_X);
      baseline.setAttribute('y1', H - PAD_Y); baseline.setAttribute('y2', H - PAD_Y);
      baseline.setAttribute('stroke', '#333'); baseline.setAttribute('stroke-width', '0.5');
      svg.appendChild(baseline);

      // Line
      const line = document.createElementNS(NS, 'path');
      line.setAttribute('d', path);
      line.setAttribute('fill', 'none');
      line.setAttribute('stroke', 'var(--accent)');
      line.setAttribute('stroke-width', '2');
      line.setAttribute('stroke-linejoin', 'round');
      svg.appendChild(line);

      // Dots
      xy.forEach(([x, y]) => {
        const c = document.createElementNS(NS, 'circle');
        c.setAttribute('cx', x); c.setAttribute('cy', y);
        c.setAttribute('r', '2.5');
        c.setAttribute('fill', 'var(--accent)');
        svg.appendChild(c);
      });

      // Min / max labels
      const minLbl = document.createElementNS(NS, 'text');
      minLbl.textContent = String(minW);
      minLbl.setAttribute('x', PAD_X); minLbl.setAttribute('y', H - 2);
      minLbl.setAttribute('font-size', '9'); minLbl.setAttribute('fill', '#666');
      svg.appendChild(minLbl);
      const maxLbl = document.createElementNS(NS, 'text');
      maxLbl.textContent = String(maxW);
      maxLbl.setAttribute('x', PAD_X); maxLbl.setAttribute('y', 10);
      maxLbl.setAttribute('font-size', '9'); maxLbl.setAttribute('fill', '#666');
      svg.appendChild(maxLbl);

      return svg;
    }

      // the active plan was fetched, so "Save to Library" plans were
      // invisible to the user).
      let programs, allPlans;
      try {
        const uid = currentUser.id;
        const [progsRes, plansRes] = await Promise.all([
          sbListPrograms(),
          _sb.from('training_plans')
            .select('id,name,plan_type,start_date,end_date,structure,notes,active,archived_at')
            .eq('user_id', uid)
            .order('active', { ascending: false })
            .order('created_at', { ascending: false }),
        ]);
        programs = progsRes;
        if (plansRes.error) throw new Error(plansRes.error.message);
        allPlans = plansRes.data || [];
      } catch (e) {
        skel.remove();
        app.appendChild(el('div', { class: 'card' }, 'Could not load: ' + e.message));
        return;
      }
      skel.remove();

      // Split training plans by state. v32.3: multiple plans may be
      // active simultaneously (different plan_types can coexist).
      const activePlans    = allPlans.filter(p => p.active && !p.archived_at);
      const availablePlans = allPlans.filter(p => !p.active && !p.archived_at);
      const archivedPlans  = allPlans.filter(p => !!p.archived_at);
      // For backward-compat with any inline reference to `plan` further
      // down in this function, keep the first-active as a scalar.
      const plan = activePlans[0] || null;

      if (_programsDetailId) {
        const prog = programs.find(p => p.id === _programsDetailId);
        if (!prog) { _programsDetailId = null; return renderPrograms(app); }
        renderProgramDetail_(app, prog);
        return;
      }

      // Bucket programs by state.
      const active = programs.filter(p => p.active && !p.archived);
      const upcoming = programs.filter(p => !p.active && !p.archived);
      const archived = programs.filter(p => p.archived);

      const hasAnyMine = activePlans.length || active.length || upcoming.length || archived.length
                       || availablePlans.length || archivedPlans.length;

      // --- My plans ---
      // Unified list of the user's training plans (date-anchored) + programs
      // (date-agnostic templates). Different underlying tables, one visual
      // language. Card type is tagged (TRAINING PLAN / PROGRAM) so users
      // can tell them apart, but the flow is the same: tap → detail view.
      if (hasAnyMine) {
        const mineWrap = el('div');
        mineWrap.appendChild(el('h2', { class: 'section-h' }, 'My plans'));

        // Active — v32.3: multiple actives can coexist (one per modality
        // OR a single 'general' plan). Sort by plan_type so run/lift/cycle
        // read consistently.
        if (activePlans.length || active.length) {
          mineWrap.appendChild(el('div', { class: 'muted', style: 'font-size: 11px; letter-spacing: 0.6px; text-transform: uppercase; margin: 8px 4px 6px;' }, 'Active'));
          const typeOrder = { run: 0, lift: 1, cycle: 2, general: 3 };
          activePlans.slice().sort((a, b) =>
            (typeOrder[a.plan_type || 'general'] ?? 9) - (typeOrder[b.plan_type || 'general'] ?? 9)
          ).forEach(pl => mineWrap.appendChild(planCard_(pl)));
          active.slice().sort((a, b) =>
            (typeOrder[a.plan_type || 'lift'] ?? 9) - (typeOrder[b.plan_type || 'lift'] ?? 9)
          ).forEach(p => mineWrap.appendChild(programCard_(p)));
        }

        if (upcoming.length || availablePlans.length) {
          mineWrap.appendChild(el('div', { class: 'muted', style: 'font-size: 11px; letter-spacing: 0.6px; text-transform: uppercase; margin: 8px 4px 6px;' }, 'Available'));
          // Training plans first (usually more recent), then programs.
          availablePlans.forEach(pl => mineWrap.appendChild(planCard_(pl)));
          upcoming.forEach(p => mineWrap.appendChild(programCard_(p)));
        }

        const totalArchived = archived.length + archivedPlans.length;
        if (totalArchived) {
          // Collapsible archived section — heavy users may accumulate many
          // archived programs. Header + chevron toggles the group.
          const archHeader = el('button', {
            style: 'background: transparent; border: none; padding: 8px 4px 6px; margin: 0; width: 100%; text-align: left; display: flex; justify-content: space-between; align-items: center; cursor: pointer; color: var(--muted); font-size: 11px; letter-spacing: 0.6px; text-transform: uppercase;',
          }, [
            el('span', {}, `Archived (${totalArchived})`),
            el('span', { id: 'archChevron', style: 'font-size: 12px; transition: transform 0.15s ease;' }, '›'),
          ]);
          const archBody = el('div', { id: 'archBody', style: 'display: none;' });
          archivedPlans.forEach(pl => archBody.appendChild(planCard_(pl)));
          archived.forEach(p => archBody.appendChild(programCard_(p)));
          archHeader.onclick = () => {
            const isOpen = archBody.style.display !== 'none';
            archBody.style.display = isOpen ? 'none' : 'block';
            const chev = archHeader.querySelector('#archChevron');
            if (chev) chev.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(90deg)';
          };
          mineWrap.appendChild(archHeader);
          mineWrap.appendChild(archBody);
        }

        app.appendChild(mineWrap);
      } else {
        // Fresh-user helper card — Build a plan below is the primary CTA.
        app.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, 'No plans yet'),
          el('p', { class: 'muted', style: 'font-size: 14px; margin-top: 6px; line-height: 1.5;' },
            "Build one below to get started — or import your own (coming soon)."),
        ]));
      }

      // --- Build a plan ---
      // Tools that generate NEW plans. First entry: Run Planner (moved from
      // bottom nav in v28.d). Future builders slot in here as siblings.
      const builderWrap = el('div', { style: 'margin-top: 4px;' });
      builderWrap.appendChild(el('h2', { class: 'section-h' }, 'Build a plan'));
      builderWrap.appendChild(el('div', {
        class: 'card',
        style: 'cursor: pointer;',
        onclick: () => render('plan'),
      }, [
        el('div', { style: 'display: flex; justify-content: space-between; align-items: baseline;' }, [
          el('div', { style: 'font-weight: 600; font-size: 15px;' }, 'Run Planner'),
          el('span', { class: 'muted', style: 'font-size: 12px;' }, 'Open →'),
        ]),
        el('div', { class: 'muted', style: 'font-size: 13px; margin-top: 6px; line-height: 1.4;' },
          'Generate a personalized running plan from 1 mile to Half Marathon. Pick a distance, fitness level, and days per week — get a full week-by-week schedule.'),
      ]));
      // v33: Lifting Plan Generator
      builderWrap.appendChild(el('div', {
        class: 'card',
        style: 'cursor: pointer;',
        onclick: () => render('lift-planner'),
      }, [
        el('div', { style: 'display: flex; justify-content: space-between; align-items: baseline;' }, [
          el('div', { style: 'font-weight: 600; font-size: 15px;' }, 'Lifting Plan Generator'),
          el('span', { class: 'muted', style: 'font-size: 12px;' }, 'Open →'),
        ]),
        el('div', { class: 'muted', style: 'font-size: 13px; margin-top: 6px; line-height: 1.4;' },
          'Full Body, Push/Pull/Legs, Upper/Lower — pick a template, tell us your equipment and training days, get a weekly plan with linear progression built in.'),
      ]));
      app.appendChild(builderWrap);

      // --- Import ---
      // Programs + cardio history: working. Lift history + training plans:
      // still deferred (need per-exercise JSONB assembly / dual-CSV merge).
      const importWrap = el('div', { style: 'margin-top: 4px;' });
      importWrap.appendChild(el('h2', { class: 'section-h' }, 'Import'));
      importWrap.appendChild(importProgramCard_());
      importWrap.appendChild(importHistoryCard_());
      importWrap.appendChild(el('div', { class: 'card' }, [
        el('div', { class: 'muted', style: 'font-size: 13px; line-height: 1.5;' },
          "Coming next: Lift Session History CSV and Training Plan CSV upload."),
      ]));
      app.appendChild(importWrap);
    }

    // Program CSV upload card. File picker + name + optional day titles +
    // template download. On success, re-renders Programs to show the new
    // row in the My Plans list.
    function importProgramCard_() {
      const nameInp = el('input', {
        type: 'text', placeholder: 'e.g. Push/Pull Hypertrophy 2026',
        style: 'width: 100%; margin: 0 0 10px;',
      });
      const dayTitlesInp = el('input', {
        type: 'text', placeholder: 'e.g. A=Push,B=Pull,C=Legs (optional)',
        style: 'width: 100%; margin: 0 0 10px;',
      });
      const notesInp = el('input', {
        type: 'text', placeholder: 'Notes (optional)',
        style: 'width: 100%; margin: 0 0 10px;',
      });
      const fileInp = el('input', {
        type: 'file', accept: '.csv,text/csv',
        style: 'width: 100%; margin: 0 0 10px; font-size: 13px;',
      });
      const status = el('div', { class: 'muted', style: 'font-size: 12px; margin-top: 6px; min-height: 16px;' }, '');

      const uploadBtn = el('button', {
        style: 'flex: 1;',
        onclick: async () => {
          const name = (nameInp.value || '').trim();
          if (!name) return toast('Give your program a name first.', true);
          const file = fileInp.files && fileInp.files[0];
          if (!file) return toast('Choose a CSV file first.', true);

          uploadBtn.disabled = true;
          uploadBtn.textContent = 'Importing…';
          status.textContent = 'Parsing CSV…';
          try {
            const parsed = await parseCsvFile_(file);
            if (parsed.errors && parsed.errors.length) {
              const first = parsed.errors[0];
              throw new Error(`CSV parse error (row ${first.row}): ${first.message}`);
            }
            const structure = programStructureFromRows_(parsed.data, dayTitlesInp.value.trim());
            status.textContent = 'Uploading…';
            const result = await sbUpsertProgramFromCsv(name, structure, notesInp.value.trim() || null);
            const exCount = structure.weeks.reduce((sum, w) =>
              sum + Object.values(w.days || {}).reduce((s, arr) => s + arr.length, 0), 0);
            toast(`${result.updated ? 'Updated' : 'Imported'} "${name}" — ${structure.weeks_total} weeks · ${exCount} exercises`);
            setTimeout(() => render('programs'), 700);
          } catch (e) {
            status.textContent = 'Failed: ' + (e.message || String(e));
            toast('Import failed: ' + (e.message || String(e)), true);
          } finally {
            uploadBtn.disabled = false;
            uploadBtn.textContent = 'Import program';
          }
        },
      }, 'Import program');

      const templateBtn = el('button', {
        style: 'flex: 1; background: var(--surface-2); color: var(--text); border: 1px solid var(--border);',
        onclick: () => {
          downloadFile_('program-template.csv', PROGRAM_CSV_TEMPLATE, 'text/csv');
          toast('Template downloaded');
        },
      }, 'Download template');

      return el('div', { class: 'card' }, [
        el('div', { style: 'display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 4px;' }, [
          el('div', { style: 'font-weight: 600; font-size: 14px;' }, 'Program CSV'),
        ]),
        el('div', { class: 'muted', style: 'font-size: 12px; margin-bottom: 12px; line-height: 1.4;' },
          'Reusable lift templates. One row per exercise per week per day. Re-importing with the same name updates the existing program.'),
        nameInp,
        dayTitlesInp,
        notesInp,
        fileInp,
        el('div', { style: 'display: flex; gap: 8px; margin-top: 4px;' }, [templateBtn, uploadBtn]),
        status,
      ]);
    }

    // Cardio history CSV upload card. Single CSV with a Type column;
    // bulk-inserts to runs / walks / activities tables.
    function importHistoryCard_() {
      const fileInp = el('input', {
        type: 'file', accept: '.csv,text/csv',
        style: 'width: 100%; margin: 0 0 10px; font-size: 13px;',
      });
      const status = el('div', { class: 'muted', style: 'font-size: 12px; margin-top: 6px; min-height: 16px;' }, '');

      const uploadBtn = el('button', {
        style: 'flex: 1;',
        onclick: async () => {
          const file = fileInp.files && fileInp.files[0];
          if (!file) return toast('Choose a CSV file first.', true);
          uploadBtn.disabled = true;
          uploadBtn.textContent = 'Importing…';
          status.textContent = 'Parsing CSV…';
          try {
            const parsed = await parseCsvFile_(file);
            if (parsed.errors && parsed.errors.length) {
              const first = parsed.errors[0];
              throw new Error(`CSV parse error (row ${first.row}): ${first.message}`);
            }
            status.textContent = 'Uploading…';
            const result = await sbBulkInsertCardioHistory(parsed.data);
            const total = result.runs + result.walks + result.activities;
            let msg = `Imported ${total} sessions (${result.runs} runs, ${result.walks} walks, ${result.activities} activities)`;
            if (result.skipped) msg += ` · ${result.skipped} skipped`;
            toast(msg);
            status.textContent = msg;
            fileInp.value = '';
          } catch (e) {
            status.textContent = 'Failed: ' + (e.message || String(e));
            toast('Import failed: ' + (e.message || String(e)), true);
          } finally {
            uploadBtn.disabled = false;
            uploadBtn.textContent = 'Import history';
          }
        },
      }, 'Import history');

      const templateBtn = el('button', {
        style: 'flex: 1; background: var(--surface-2); color: var(--text); border: 1px solid var(--border);',
        onclick: () => {
          downloadFile_('workout-history-template.csv', HISTORY_CSV_TEMPLATE, 'text/csv');
          toast('Template downloaded');
        },
      }, 'Download template');

      return el('div', { class: 'card' }, [
        el('div', { style: 'font-weight: 600; font-size: 14px; margin-bottom: 4px;' }, 'Workout History CSV'),
        el('div', { class: 'muted', style: 'font-size: 12px; margin-bottom: 12px; line-height: 1.4;' },
          'Bulk import past runs, walks, rides, hikes, swims, etc. One row per session with a Type column. Analytics reads this data as if you\'d logged it in-app.'),
        fileInp,
        el('div', { style: 'display: flex; gap: 8px; margin-top: 4px;' }, [templateBtn, uploadBtn]),
        status,
      ]);
    }

    function programCard_(p) {
      const s = p.structure || {};
      const weeks = s.weeks_total || (s.weeks ? s.weeks.length : 0);
      const dayLetters = (s.day_letters || []).join('/');
      const exCount = (s.weeks || []).reduce((sum, w) =>
        sum + Object.values(w.days || {}).reduce((s2, arr) => s2 + (arr ? arr.length : 0), 0), 0);
      const meta = [
        weeks ? `${weeks} weeks` : '',
        dayLetters ? `Days ${dayLetters}` : '',
        exCount ? `${exCount} exercises` : '',
      ].filter(Boolean).join(' · ');

      const typeLabels = { run: 'RUN', lift: 'LIFT', cycle: 'CYCLE', general: 'GENERAL' };
      const typeLabel  = typeLabels[p.plan_type] || 'LIFT';
      return el('div', { class: 'card program-card', onclick: () => {
        _programsDetailId = p.id;
        render('programs');
      }}, [
        el('div', { class: 'program-row' }, [
          el('div', {}, [
            el('div', { class: 'muted', style: 'font-size: 10px; letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 4px;' }, `${typeLabel} · PROGRAM`),
            el('div', { class: 'program-name' }, p.name),
            el('div', { class: 'muted', style: 'font-size: 12px; margin-top: 2px;' }, meta || '—'),
            p.notes ? el('div', { class: 'muted', style: 'font-size: 12px; margin-top: 4px; font-style: italic;' }, p.notes) : null,
          ]),
          p.active ? el('span', { class: 'program-badge active' }, 'ACTIVE')
                   : (p.archived ? el('span', { class: 'program-badge archived' }, 'ARCHIVED')
                                 : el('span', { class: 'program-badge' }, '')),
        ]),
      ]);
    }

    // Card for a training_plan row. Same visual shape as programCard_ but
    // distinct data model — training plans are date-anchored, so we show
    // the date range instead of exercise count.
    function planCard_(plan) {
      const s = plan.structure || {};
      const cfg = s.config || {};
      const startDate = cfg.start_date || plan.start_date;
      const endDate   = cfg.end_date   || plan.end_date;
      const totalWeeks = cfg.total_weeks || (Array.isArray(s.days) ? Math.ceil(s.days.length / 7) : 0);
      const meta = [
        totalWeeks ? `${totalWeeks} weeks` : '',
        startDate ? `${startDate} → ${endDate}` : '',
      ].filter(Boolean).join(' · ');

      const isArchived = !!plan.archived_at;
      // Active plans open the training-plan viewer (which shows the schedule).
      // Inactive/archived plans need their own management screen since the
      // training-plan viewer only loads the ACTIVE plan.
      const onClickHandler = plan.active
        ? () => render('training-plan')
        : () => { _trainingPlanDetailId = plan.id; render('training-plan-detail'); };
      const typeLabels = { run: 'RUN', lift: 'LIFT', cycle: 'CYCLE', general: 'GENERAL' };
      const typeLabel  = typeLabels[plan.plan_type] || 'GENERAL';
      return el('div', {
        class: 'card program-card',
        onclick: onClickHandler,
      }, [
        el('div', { class: 'program-row' }, [
          el('div', {}, [
            el('div', { class: 'muted', style: 'font-size: 10px; letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 4px;' }, `${typeLabel} · TRAINING PLAN`),
            el('div', { class: 'program-name' }, plan.name),
            el('div', { class: 'muted', style: 'font-size: 12px; margin-top: 2px;' }, meta || '—'),
            plan.notes ? el('div', { class: 'muted', style: 'font-size: 12px; margin-top: 4px; font-style: italic;' }, plan.notes) : null,
          ]),
          plan.active
            ? el('span', { class: 'program-badge active' }, 'ACTIVE')
            : (isArchived ? el('span', { class: 'program-badge archived' }, 'ARCHIVED') : null),
        ]),
      ]);
    }

    function renderProgramDetail_(app, p) {
      app.appendChild(el('button', {
        class: 'btn-link',
        style: 'background: transparent; color: var(--muted); border: none; padding: 0; margin-bottom: 8px; text-align: left; width: auto; font-size: 13px;',
        onclick: () => { _programsDetailId = null; render('programs'); },
      }, '← All programs'));

      const s = p.structure || {};
      const weeks = s.weeks || [];
      const dayLetters = s.day_letters || [];
      const dayTitles = s.day_titles || {};
      const exCount = weeks.reduce((sum, w) =>
        sum + Object.values(w.days || {}).reduce((s2, arr) => s2 + (arr ? arr.length : 0), 0), 0);

      const progType = p.plan_type || 'lift';
      const progTypeSel = el('select', {
        style: 'width: auto; padding: 4px 24px 4px 8px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;',
      }, [
        el('option', { value: 'run',     ...(progType==='run'?{selected:true}:{}) }, 'RUN'),
        el('option', { value: 'lift',    ...(progType==='lift'?{selected:true}:{}) }, 'LIFT'),
        el('option', { value: 'cycle',   ...(progType==='cycle'?{selected:true}:{}) }, 'CYCLE'),
        el('option', { value: 'general', ...(progType==='general'?{selected:true}:{}) }, 'GENERAL'),
      ]);
      progTypeSel.addEventListener('change', async () => {
        const newType = progTypeSel.value;
        try {
          await sbUpdatePlanType('programs', p.id, newType);
          toast(`Reclassified as ${newType.toUpperCase()}`);
        } catch (e) {
          toast('Could not reclassify: ' + e.message, true);
          progTypeSel.value = progType;
        }
      });
      // Header card
      app.appendChild(el('div', { class: 'card' }, [
        el('div', { class: 'program-row' }, [
          el('div', { style: 'flex: 1;' }, [
            el('div', { class: 'program-name', style: 'font-size: 18px;' }, p.name),
            el('div', { class: 'muted', style: 'font-size: 13px; margin-top: 4px;' },
              `${s.weeks_total || weeks.length} weeks · ${dayLetters.join('/')} · ${exCount} exercises`),
            p.notes ? el('div', { class: 'muted', style: 'font-size: 13px; margin-top: 6px;' }, p.notes) : null,
          ]),
          p.active ? el('span', { class: 'program-badge active' }, 'ACTIVE')
                   : (p.archived ? el('span', { class: 'program-badge archived' }, 'ARCHIVED') : null),
        ]),

        el('div', {
          style: 'display: flex; align-items: center; gap: 10px; margin-top: 12px; padding: 10px 12px; background: var(--surface-2); border-radius: 8px;',
        }, [
          el('span', { class: 'muted', style: 'font-size: 12px; font-weight: 600;' }, 'Program type:'),
          progTypeSel,
        ]),

        // Action buttons
        el('div', { style: 'display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap;' }, [
          !p.active ? el('button', {
            onclick: async () => {
              try {
                // v32.3: type-aware — only show what actually conflicts.
                const type = p.plan_type || 'lift';
                const conflicts = await conflictingActivesFor_(type, p.id, 'programs');
                if (conflicts.length) {
                  const names = conflicts.map(c => `"${c.name}"`).join(', ');
                  const msg = `Activate "${p.name}"?\n\nThis will deactivate ${names} because ${conflicts.length === 1 ? 'it conflicts' : 'they conflict'} with this ${type === 'general' ? 'plan' : type + ' program'}. You can reactivate ${conflicts.length === 1 ? 'it' : 'them'} anytime.`;
                  if (!confirm(msg)) return;
                }
                await sbActivateProgram(p.id);
                toast('Activated');
                render('programs');
              } catch (e) { toast('Could not activate: ' + e.message, true); }
            },
            style: 'flex: 1;',
          }, 'Activate') : null,
          !p.archived ? el('button', {
            onclick: async () => {
              if (!confirm(`Archive "${p.name}"? You can reactivate it later.`)) return;
              try {
                await sbArchiveProgram(p.id);
                invalidateActiveProgramCache();
                toast('Archived');
                render('programs');
              } catch (e) { toast('Could not archive: ' + e.message, true); }
            },
            style: 'flex: 1; background: var(--surface-2); color: var(--text); border: 1px solid var(--border);',
          }, 'Archive') : null,
          el('button', {
            onclick: async () => {
              if (!confirm(`Delete "${p.name}" permanently? Lift sessions logged under it are kept, but the template is gone.`)) return;
              try {
                await sbDeleteProgram(p.id);
                invalidateActiveProgramCache();
                _programsDetailId = null;
                toast('Deleted');
                render('programs');
              } catch (e) { toast('Could not delete: ' + e.message, true); }
            },
            style: 'flex: 1; background: var(--surface-2); color: #d97a7a; border: 1px solid var(--border);',
          }, 'Delete'),
        ]),
      ]));

      // Per-week breakdown
      if (!weeks.length) {
        app.appendChild(el('div', { class: 'card' }, 'No weeks defined.'));
        return;
      }

      let openWeek = null;
      const weeksContainer = el('div');
      weeks.forEach(w => {
        const dayCount = Object.keys(w.days || {}).length;
        const exTotal = Object.values(w.days || {}).reduce((s, arr) => s + (arr ? arr.length : 0), 0);
        const card = el('div', { class: 'card week-card' });
        const headerEl = el('button', {
          class: 'week-header',
          onclick: () => {
            const isOpen = card.classList.contains('open');
            weeksContainer.querySelectorAll('.week-card.open').forEach(c => c.classList.remove('open'));
            if (!isOpen) card.classList.add('open');
          },
        }, [
          el('div', {}, [
            el('div', { class: 'week-num' }, `Week ${w.week}`),
            w.block_name ? el('div', { class: 'muted', style: 'font-size: 11px;' }, w.block_name) : null,
          ]),
          el('div', { class: 'muted', style: 'font-size: 12px;' }, `${dayCount} days · ${exTotal} exercises`),
        ]);
        card.appendChild(headerEl);

        const body = el('div', { class: 'week-body' });
        dayLetters.forEach(letter => {
          const exs = (w.days && w.days[letter]) || [];
          if (!exs.length) return;
          const dayTitle = dayTitles[letter] || `Day ${letter}`;
          body.appendChild(el('div', { class: 'day-block' }, [
            el('div', { class: 'day-title' }, `Day ${letter} — ${dayTitle}`),
            ...exs.map(ex => el('div', { class: 'ex-row' }, [
              el('div', { class: 'ex-name' }, ex.name),
              el('div', { class: 'muted', style: 'font-size: 12px;' },

    async function sbArchiveTrainingPlan(id) {

    // Reclassify a training plan or program between plan_types.
    // v32.4: gives users a way to say "this hybrid plan is really a run
    // plan; let it coexist with a lift program." Doesn't touch the plan's
    // content — only the metadata that drives activation-conflict rules.
    async function sbUpdatePlanType(table, id, newType) {
      const valid = ['run', 'lift', 'cycle', 'general'];
      if (!valid.includes(newType)) throw new Error('Invalid plan type: ' + newType);
      const { error } = await _sb.from(table)
        .update({ plan_type: newType }).eq('id', id);
      if (error) throw new Error(error.message);
      invalidateActiveTrainingPlanCache();
      invalidateActiveProgramCache();
    }

    // Save a training plan generated from a builder (Run Planner, etc.).
    // Returns { id, displacedNames[] }. If activate=true, deactivates any
    // conflicting-type actives first (v32.3 rules) and reports their names.
    async function sbSaveTrainingPlan({ name, structure, notes, activate, planType }) {
      const uid = currentUser.id;
      const type = planType || 'general';
      let displacedNames = [];
      if (activate) {
        // Look up what would be displaced BEFORE we insert.
        const conflicts = await conflictingActivesFor_(type, null, 'training_plans')
          .catch(() => []);
        displacedNames = conflicts.map(c => c.name);
        await deactivateConflictingActives_(type, null, 'training_plans');
      }
      const cfg = structure.config || {};
      const { data, error } = await _sb.from('training_plans').insert({
        user_id:    uid,
        name,
        start_date: cfg.start_date,
        end_date:   cfg.end_date,
        active:     !!activate,
        structure,
        notes:      notes || null,
        plan_type:  type,
      }).select('id').single();
      if (error) throw new Error(error.message);
      invalidateActiveTrainingPlanCache();
      return { id: data.id, displacedNames };
    }

    // Convert a Run Planner in-memory state (from planGenerate) to the
    // training_plans.structure JSONB shape. Slots each week's workouts
    // into the user's selected days-of-week (0=Mon..6=Sun). If no days
    // are selected, uses sensible defaults based on days-per-week.
    function defaultDowsForRunPlanCount_(daysPerWeek) {
      const map = {
        2: [1, 5],           // Tue, Sat
        3: [1, 3, 5],        // Tue, Thu, Sat
        4: [1, 3, 4, 5],     // Tue, Thu, Fri, Sat
        5: [0, 2, 3, 4, 5],  // Mon, Wed, Thu, Fri, Sat
      };
      return map[daysPerWeek] || [1, 3, 5];
    }
    function convertRunPlanToTrainingPlan_(state, planName, startDateISO) {
      // Anchor the plan to the Monday on-or-before startDateISO so
      // week rows line up with a normal week grid.
      const raw = new Date(startDateISO + 'T12:00:00');
      const jsDow = raw.getDay(); // 0=Sun..6=Sat
      const monOffset = (jsDow + 6) % 7; // days to go BACK to reach Mon
      const anchor = new Date(raw);
      anchor.setDate(raw.getDate() - monOffset);

      // Preferred days-of-week to slot into (0=Mon..6=Sun).
      const dows = (Array.isArray(state.dows) && state.dows.length)
        ? [...state.dows].sort((a,b)=>a-b)
        : defaultDowsForRunPlanCount_(state.days);

      const dowNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      const days = [];
      (state.weeks_data || []).forEach((wk, wi) => {
        const wos = wk.wos || [];
        const slotCount = Math.min(wos.length, dows.length);
        for (let i = 0; i < slotCount; i++) {
          const wo = wos[i];
          const dowIdx = dows[i];
          const d = new Date(anchor);
          d.setDate(anchor.getDate() + (wi * 7) + dowIdx);
          days.push({
            date: d.toISOString().slice(0, 10),
            week: wi + 1,
            dow: dowNames[dowIdx],
            sessions: [{
              type: 'run',
              name: wo.name,
              workout_kind: wo.typeLabel || '',
              target_miles: wo.dist,
              main_set: wo.desc || '',
              target_pace_hr: wo.paceOverride || '',
            }],
          });
        }
      });
      const startISO = anchor.toISOString().slice(0, 10);
      const endISO = days.length ? days[days.length - 1].date : startISO;
      return {
        config: {
          start_date: startISO,
          end_date:   endISO,
          total_weeks: state.weeks,
          generator: 'run-planner',
          run_walk_run: !!state.runWalk,
          run_walk_ratio: state.runWalkRatio || null,
        },
        days,
      };
    }

    function findPlanDay_(plan, isoDate) {
      const days = (plan && plan.structure && plan.structure.days) || [];
      return days.find(d => d.date === isoDate) || null;
    }

    function firstUpcomingPlanDay_(plan, fromISO) {
      const days = (plan && plan.structure && plan.structure.days) || [];
      return days.find(d => d.date >= fromISO) || null;
    }

        }, [
