                // v32.3: type-aware confirm — only prompt for real conflicts.
                const type = plan.plan_type || 'general';
                const conflicts = await conflictingActivesFor_(type, plan.id, 'training_plans');
                if (conflicts.length) {
                  const names = conflicts.map(c => `"${c.name}"`).join(', ');
                  const msg = `Activate "${plan.name}"?\n\nThis will deactivate ${names} because ${conflicts.length === 1 ? 'it conflicts' : 'they conflict'} with this ${type === 'general' ? 'plan' : type + ' plan'}. You can reactivate ${conflicts.length === 1 ? 'it' : 'them'} anytime.`;
                  if (!confirm(msg)) return;
                }
                await sbActivateTrainingPlan(plan.id);
                toast(`"${plan.name}" is now active`);
                _trainingPlanDetailId = null;
                setTimeout(() => render('training-plan'), 600);
              } catch (e) { toast('Could not activate: ' + e.message, true); }
            },
          }, 'Activate'),
          !isArchived ? el('button', {
            style: 'flex: 1; background: var(--surface-2); color: var(--text); border: 1px solid var(--border);',
            onclick: async () => {
              if (!confirm(`Archive "${plan.name}"? You can reactivate it later.`)) return;
              try {
                await sbArchiveTrainingPlan(plan.id);
                toast('Archived');
                _trainingPlanDetailId = null;
                setTimeout(() => render('programs'), 500);
              } catch (e) { toast('Could not archive: ' + e.message, true); }
            },
          }, 'Archive') : null,
          el('button', {
            style: 'flex: 1; background: var(--surface-2); color: #d97a7a; border: 1px solid var(--border);',
            onclick: async () => {
              if (!confirm(`Delete "${plan.name}" permanently? Workouts you logged under this plan are kept, but the plan itself is gone.`)) return;
              try {
                await sbDeleteTrainingPlan(plan.id);
                toast('Deleted');
                _trainingPlanDetailId = null;
                setTimeout(() => render('programs'), 500);
              } catch (e) { toast('Could not delete: ' + e.message, true); }
            },
          }, 'Delete'),
        ]),
      ]));

      // Quick preview: first 3 sessions to give the user a sense of the plan.
      if (Array.isArray(s.days) && s.days.length) {
        const preview = el('div', { class: 'card' }, [
          el('div', { style: 'font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px;' }, 'First few sessions'),
        ]);
        s.days.slice(0, 3).forEach(day => {
          (day.sessions || []).forEach(sess => {
            preview.appendChild(el('div', { style: 'padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px;' }, [
              el('div', { class: 'muted', style: 'font-size: 11px;' }, `${day.date} · ${day.dow || ''}`),
              el('div', { style: 'font-weight: 600; margin-top: 2px;' }, sess.name || sess.workout_kind || ''),
              sess.target_miles ? el('div', { class: 'muted', style: 'font-size: 12px; margin-top: 2px;' }, `${sess.target_miles} mi`) : null,
            ]));
          });
        });
        app.appendChild(preview);
      }
    }

    async function renderTrainingPlan(app) {
      app.appendChild(el('header', { class: 'top' }, [el('h1', {}, 'Training plan')]));
      // v32.4.3: Back button routes to whatever view the user came from
      // (Home, Programs, Calendar, etc.) instead of hardcoding Programs.
      const backTo = _previousView && _previousView !== 'training-plan' ? _previousView : 'programs';
      const backLabel = backTo === 'home' ? '← Back to Home'
                      : backTo === 'calendar' ? '← Back to Calendar'
                      : '← Back to Programs';
      app.appendChild(el('button', {
        class: 'btn-link',
        style: 'background: transparent; color: var(--muted); border: none; padding: 0; margin-bottom: 8px; text-align: left; width: auto; font-size: 13px;',
        onclick: () => render(backTo),
      }, backLabel));

      const skel = el('div', { class: 'card' }, el('div', { class: 'skeleton', style: 'height: 200px;' }));
      app.appendChild(skel);

      let plan;
      try { plan = await sbActiveTrainingPlan(); }
      catch (e) {
        skel.remove();
        app.appendChild(el('div', { class: 'card' }, 'Could not load: ' + e.message));
        return;
      }
      skel.remove();

      if (!plan) {
        app.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, 'No active training plan'),
          el('p', { class: 'muted', style: 'font-size: 14px; margin-top: 6px; line-height: 1.5;' },
            "A training plan is a date-anchored schedule that tells you what to do on which day. Different from Programs (date-agnostic templates you can start any time)."),
          el('p', { class: 'muted', style: 'font-size: 13px; margin-top: 10px; line-height: 1.5;' },
            "Head to Programs to generate one with the Run Planner, or import your own from a CSV."),
          el('button', {
            onclick: () => render('programs'),
            style: 'margin-top: 12px;',
          }, 'Go to Programs'),
        ]));
        return;
      }

      const s = plan.structure || {};
      const cfg = s.config || {};
      const today = todayISO();
      const viewDate = _trainingPlanViewDate ||
                       (findPlanDay_(plan, today) ? today
                                                 : (firstUpcomingPlanDay_(plan, today) || { date: today }).date);
      _trainingPlanViewDate = viewDate;

      // Plan header + management buttons (Archive / Delete). Same
      // shape as programs so users don't have to learn two flows.
      const startDate = cfg.start_date || plan.start_date;
      const endDate   = cfg.end_date   || plan.end_date;
      const currentType = plan.plan_type || 'general';
      const typeSelect = el('select', {
        style: 'width: auto; padding: 4px 24px 4px 8px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;',
      }, [
        el('option', { value: 'run',     ...(currentType==='run'?{selected:true}:{}) }, 'RUN'),
        el('option', { value: 'lift',    ...(currentType==='lift'?{selected:true}:{}) }, 'LIFT'),
        el('option', { value: 'cycle',   ...(currentType==='cycle'?{selected:true}:{}) }, 'CYCLE'),
        el('option', { value: 'general', ...(currentType==='general'?{selected:true}:{}) }, 'GENERAL'),
      ]);
      typeSelect.addEventListener('change', async () => {
        const newType = typeSelect.value;
        try {
          await sbUpdatePlanType('training_plans', plan.id, newType);
          toast(`Plan reclassified as ${newType.toUpperCase()}`);
        } catch (e) {
          toast('Could not reclassify: ' + e.message, true);
          typeSelect.value = currentType;
        }
      });
      app.appendChild(el('div', { class: 'card' }, [
        el('h2', { style: 'margin-bottom: 4px;' }, plan.name),
        el('div', { class: 'muted', style: 'font-size: 13px;' },
          `${startDate} → ${endDate}${cfg.total_weeks ? ' · ' + cfg.total_weeks + ' weeks' : ''}`),
        el('div', {
          style: 'display: flex; align-items: center; gap: 10px; margin-top: 12px; padding: 10px 12px; background: var(--surface-2); border-radius: 8px;',
        }, [
          el('span', { class: 'muted', style: 'font-size: 12px; font-weight: 600;' }, 'Plan type:'),
          typeSelect,
          el('span', { class: 'muted', style: 'font-size: 11px; flex: 1;' },
            'Controls what other plans can coexist with this one'),
        ]),
        el('div', { style: 'display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap;' }, [
          el('button', {
            style: 'flex: 1; background: var(--surface-2); color: var(--text); border: 1px solid var(--border);',
            onclick: async () => {
              if (!confirm(`Archive "${plan.name}"? Your logged workouts stay, but the plan stops driving Today's Workout on Home. You can reactivate it later.`)) return;
              try {
                await sbArchiveTrainingPlan(plan.id);
                toast('Plan archived');
                setTimeout(() => render('programs'), 500);
              } catch (e) { toast('Could not archive: ' + e.message, true); }
            },
          }, 'Archive plan'),
          el('button', {
            style: 'flex: 1; background: var(--surface-2); color: #d97a7a; border: 1px solid var(--border);',
            onclick: async () => {
              if (!confirm(`Delete "${plan.name}" permanently? Workouts you logged under this plan are kept, but the plan itself is gone.`)) return;
              try {
                await sbDeleteTrainingPlan(plan.id);
                toast('Plan deleted');
                setTimeout(() => render('programs'), 500);
              } catch (e) { toast('Could not delete: ' + e.message, true); }
            },
          }, 'Delete plan'),
        ]),
      ]));

      // Date navigator — prev / date label / next
      const dateNav = el('div', {
        class: 'card',
        style: 'display: flex; align-items: center; justify-content: space-between; padding: 12px 16px;',
      }, [
        el('button', {
          class: 'cal-nav-btn',
          onclick: () => { _trainingPlanViewDate = shiftDateISO_(viewDate, -1); render('training-plan'); },
        }, '‹'),
        (() => {
          const wd = new Date(viewDate + 'T12:00:00').toLocaleDateString('en-US', {
            weekday: 'long', month: 'long', day: 'numeric', year: 'numeric',
          });
          return el('div', { style: 'text-align: center;' }, [
            el('div', { style: 'font-weight: 600; font-size: 15px;' }, wd),
            viewDate === today
              ? el('div', { style: 'font-size: 11px; color: var(--accent); margin-top: 2px;' }, 'TODAY')
              : el('button', {
                  style: 'background: transparent; color: var(--muted); border: none; padding: 0; margin-top: 2px; font-size: 11px; cursor: pointer; text-decoration: underline; width: auto;',
                  onclick: () => { _trainingPlanViewDate = today; render('training-plan'); },
                }, 'Jump to today'),
          ]);
        })(),
        el('button', {
          class: 'cal-nav-btn',
          onclick: () => { _trainingPlanViewDate = shiftDateISO_(viewDate, 1); render('training-plan'); },
        }, '›'),
      ]);
      app.appendChild(dateNav);

      // Session cards for the selected date
      const dayEntry = findPlanDay_(plan, viewDate);
      if (!dayEntry) {
        const nextDay = firstUpcomingPlanDay_(plan, viewDate);
        app.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, 'Rest day'),
          el('p', { class: 'muted', style: 'font-size: 14px; margin-top: 6px;' },
            viewDate < startDate ? "Plan hasn't started yet."
            : viewDate > endDate ? "Plan is over."
            : "Nothing programmed for this date — take the day."),
          nextDay ? el('p', { class: 'muted', style: 'font-size: 13px; margin-top: 8px;' },
            `Next: ${nextDay.date} — ${(nextDay.sessions[0] || {}).name || ''}`) : null,
        ]));
        return;
      }

      // Meta pill — week / block / cycle / dow
      const metaParts = [];
      if (dayEntry.week) metaParts.push(`Week ${dayEntry.week}`);
      if (dayEntry.block) metaParts.push(`Block ${dayEntry.block}`);
      if (dayEntry.cycle_wk) metaParts.push(`Cycle wk ${dayEntry.cycle_wk}`);
      if (metaParts.length) {
        app.appendChild(el('div', { class: 'muted', style: 'font-size: 12px; text-align: center; margin: -4px 0 4px; letter-spacing: 0.05em; text-transform: uppercase;' },
          metaParts.join(' · ')));
      }

      // Render each session
      (dayEntry.sessions || []).forEach((sess, i) => {
        if (sess.type === 'lift') app.appendChild(renderPlanLiftCard_(sess, viewDate, i, dayEntry));
        else if (sess.type === 'run') app.appendChild(renderPlanRunCard_(sess, viewDate, i, dayEntry));
      });
    }

    function shiftDateISO_(iso, days) {
      const d = new Date(iso + 'T12:00:00');
      d.setDate(d.getDate() + days);
      return d.toISOString().slice(0, 10);
    }

    // Group consecutive identical sets so accessories collapse from
    // "8 reps ... 8 reps ... 8 reps ... 8 reps" into "4 sets · 8 reps".
    // Progressive 5/3/1 sets (each different) stay one row per set.
    function groupIdenticalSets_(sets) {
      const groups = [];
      (sets || []).forEach(set => {
        const key = JSON.stringify([
          set.set_type || '',
          set.target_reps || '',
          set.percent ?? '',
          set.target_weight ?? '',
          set.rest || '',
          set.notes || '',
        ]);
        const last = groups[groups.length - 1];
        if (last && last.key === key) {
          last.count += 1;
        } else {
          groups.push({ key, count: 1, set });
        }
      });
      return groups;
    }

    // Turn a plan exercise's sets into a normalized array where each element
    // is one actual set to log. Handles the "single-row multi-set" convention
    // where the coach's sheet uses Set # to mean "how many sets."
    function expandPlanExerciseSets_(ex) {
      const raw = Array.isArray(ex.sets) ? ex.sets : [];
      if (raw.length === 1 && Number(raw[0].set_num) > 1) {
        const proto = raw[0];
        const n = Number(proto.set_num);
        return Array.from({ length: n }, (_, i) => ({ ...proto, set_num: i + 1 }));
      }
      return raw;
    }

    // The date/session-index being logged from the plan. Set when the user
    // taps "Start logging" on the plan viewer.
    let _planLogRef = null; // { date, sessionIndex, session, dayEntry }

    function renderPlanLiftCard_(sess, planDate, sessionIndex) {
      const card = el('div', { class: 'card' }, [
        el('div', { style: 'display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px;' }, [
          el('h2', { style: 'margin: 0;' }, sess.name),
          el('span', { class: 'history-tag tag-lift' }, 'LIFT'),
        ]),
      ]);
      (sess.exercises || []).forEach(ex => {
        // Detect the "single-row multi-set" convention: if there's only one
        // set entry AND its set_num > 1, the coach's sheet is using Set # to
        // mean "how many sets of this prescription." Expand accordingly.
        const singleRowMulti =
          Array.isArray(ex.sets) && ex.sets.length === 1 &&
          Number(ex.sets[0].set_num) > 1;
        const groups = singleRowMulti
          ? [{ key: 'accessory', count: Number(ex.sets[0].set_num), set: ex.sets[0] }]
          : groupIdenticalSets_(ex.sets);
        const totalSets = singleRowMulti
          ? Number(ex.sets[0].set_num)
          : (ex.sets || []).length;

        const setsWrap = el('div', { class: 'plan-sets' });
        groups.forEach(group => {
          const s = group.set;
          const parts = [];
          // Lead with the set count so "how many" is the first thing you read.
          if (group.count > 1) parts.push(`${group.count} sets`);
          else if (totalSets > 1) parts.push(`Set ${s.set_num || ''}`.trim());
          if (s.set_type) parts.push(s.set_type);
          if (s.target_reps) parts.push(`${s.target_reps} reps`);
          if (s.percent) parts.push(`${s.percent}%`);
          if (s.target_weight) parts.push(`${s.target_weight} lb`);
          if (s.rest) parts.push(`rest ${s.rest}`);
          setsWrap.appendChild(el('div', { style: 'padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px;' }, [
            el('div', {}, parts.filter(Boolean).join(' · ')),
            s.notes ? el('div', { class: 'muted', style: 'font-size: 11px; font-style: italic; margin-top: 2px;' }, s.notes) : null,
          ]));
        });
        // Remove border on last set inside this exercise
        const lastChild = setsWrap.lastChild;
        if (lastChild && lastChild.style) lastChild.style.borderBottom = 'none';

        // Set-count badge on the exercise header for at-a-glance scanning.
        const badgeText = totalSets > 1 ? `${totalSets} sets` : '1 set';
        card.appendChild(el('div', { class: 'plan-exercise' }, [
          el('div', { class: 'plan-exercise-head' }, [
            el('div', { style: 'font-weight: 600;' }, ex.name),
            el('span', { class: 'muted', style: 'font-size: 11px;' },
              ex.muscle ? `${ex.muscle} · ${badgeText}` : badgeText),
          ]),
          setsWrap,
        ]));
      });
      // "Start logging" button at the bottom of the card
      if (planDate != null && sessionIndex != null) {
        card.appendChild(el('button', {
          style: 'margin-top: 12px; width: 100%;',
          onclick: () => {
            _planLogRef = { date: planDate, sessionIndex, session: sess };
            render('plan-log-lift');
          },
        }, 'Start logging →'));
      }
      return card;
    }

    function renderPlanRunCard_(sess, planDate, sessionIndex) {
      const rows = [];
      if (sess.workout_kind) rows.push(['Workout', sess.workout_kind]);
      if (sess.target_miles != null) rows.push(['Target', `${sess.target_miles} mi`]);
      if (sess.target_pace_hr) rows.push(['Pace/HR', sess.target_pace_hr]);
      if (sess.warm_up)   rows.push(['Warm-up', sess.warm_up]);
      if (sess.main_set)  rows.push(['Main set', sess.main_set]);
      if (sess.recovery)  rows.push(['Recovery', sess.recovery]);
      if (sess.cool_down) rows.push(['Cool-down', sess.cool_down]);
      if (sess.notes)     rows.push(['Notes', sess.notes]);

      const card = el('div', { class: 'card' }, [
        el('div', { style: 'display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px;' }, [
          el('h2', { style: 'margin: 0;' }, sess.name),
          el('span', { class: 'history-tag tag-run' }, 'RUN'),
        ]),
        ...rows.map(([k, v]) => el('div', { style: 'padding: 6px 0; border-bottom: 1px solid var(--border);' }, [
          el('div', { class: 'muted', style: 'font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;' }, k),
          el('div', { style: 'font-size: 14px; margin-top: 2px;' }, v),
        ])),
      ]);
      // "Log this run" button — routes to the existing Run logger with the
      // planned target miles + date pre-filled via _planRunPrefill.
      if (planDate != null) {
        card.appendChild(el('button', {
          style: 'margin-top: 12px; width: 100%;',
          onclick: () => {
            _planRunPrefill = {
              date: planDate,
              distance: sess.target_miles,
              notes: sess.name,
            };
            render('run');
          },
        }, 'Log this run →'));
      }
      return card;
    }

    // Pre-fill for run logger when jumping in from a training plan.
    let _planRunPrefill = null;

    // -------- Plan-based lift logger --------
    //
    // Distinct from the Programs-based Lift logger. Renders one card per
    // exercise with per-set inputs (actual weight + actual reps), pre-filled
    // from plan targets. Saves to lift_sessions with a new sets[] JSONB
    // shape alongside the legacy r1-r4 fields for backward compat.
    async function renderPlanLogLift(app) {
      const ref = _planLogRef;
      if (!ref) {
        app.appendChild(el('div', { class: 'card' }, 'No plan session selected. Go to Training Plan first.'));
        return;
      }
      const { session, date } = ref;

      // v32.4.6: check if this session was already logged. If so, route
      // to the read-only session detail regardless of entry point. This
      // is the "single source of truth" version of the check that used
      // to live in renderLift and the Today's Workout row — putting it
      // here means EVERY path into plan-log-lift gets it (session card
      // "Start logging" button, Today's Workout row, Lift pill, etc.).
      try {
        const existing = await sbGetLiftSession(date, session.name);
        if (existing) {
          _liftSessionRef = { date, day: session.name };
          // Preserve auto-route return-to (if set) or fall through to
          // the current _previousView so the session-detail back button
          // routes sensibly.
          if (!_liftAutoRouteReturnTo && _previousView && !['plan-log-lift', 'lift-session'].includes(_previousView)) {
            _liftAutoRouteReturnTo = _previousView;
          }
          return render('lift-session');
        }
      } catch (e) { /* fall through — show the empty log form */ }

      app.appendChild(el('header', { class: 'top' }, [
        el('h1', {}, session.name || 'Log workout'),
        el('span', { class: 'date' }, fmtDateLong(new Date(date + 'T12:00:00'))),
      ]));
      // v32.4.4: Back button prefers the auto-route return-to (real caller
      // when Home → Lift auto-routed through renderLift), then previous
      // view, then plan viewer as fallback. Filters out 'lift' to avoid
      // routing loops through renderLift's auto-route.
      const autoRouteBack = _liftAutoRouteReturnTo;
      _liftAutoRouteReturnTo = null;
      let backTo2 = autoRouteBack
                  || (_previousView && !['plan-log-lift', 'lift'].includes(_previousView) ? _previousView : null)
                  || 'training-plan';
      const backLabel2 = backTo2 === 'home' ? '← Back to Home'
                       : backTo2 === 'calendar' ? '← Back to Calendar'
                       : backTo2 === 'programs' ? '← Back to Programs'
                       : backTo2 === 'training-plan' ? '← Back to plan'
                       : '← Back to plan';
      app.appendChild(el('button', {
        class: 'btn-link',
        style: 'background: transparent; color: var(--muted); border: none; padding: 0; margin-bottom: 8px; text-align: left; width: auto; font-size: 13px;',
        onclick: () => { render(backTo2); },
      }, backLabel2));

      // Escape hatch: log freestyle instead of the scheduled session.
      app.appendChild(el('button', {
        style: 'margin-bottom: 12px; background: var(--surface-2); color: var(--text); border: 1px solid var(--border); font-size: 13px; padding: 8px 14px; width: auto;',
        onclick: () => render('lift-freeform'),
      }, '+ Log a different lift instead'));

      // Date picker (defaults to plan date; user can override e.g. logging late)
      app.appendChild(el('div', { class: 'card', style: 'padding: 12px 16px;' }, [
        el('div', { class: 'field', style: 'margin: 0; display: flex; align-items: center; gap: 12px;' }, [
          el('label', { for: 'planLogDate', style: 'margin: 0; min-width: 70px;' }, 'Date'),
          el('input', { id: 'planLogDate', type: 'date', value: date, style: 'flex: 1; margin: 0;' }),
        ]),
      ]));

      const form = el('div', { id: 'planLogForm' });
      const exerciseInputs = []; // parallel to session.exercises; each { name, category, sets: [{ weightInput, repsInput, rpeInput, target }], notesInput }

      (session.exercises || []).forEach(ex => {
        const sets = expandPlanExerciseSets_(ex);
        const exCard = el('div', { class: 'card' });
        exCard.appendChild(el('div', { class: 'plan-exercise-head', style: 'margin-bottom: 10px;' }, [
          el('div', { style: 'font-weight: 600; font-size: 15px;' }, ex.name),
          el('span', { class: 'muted', style: 'font-size: 11px;' },
            ex.muscle ? `${ex.muscle} · ${sets.length} set${sets.length === 1 ? '' : 's'}` : `${sets.length} set${sets.length === 1 ? '' : 's'}`),
        ]));

        const setInputs = [];
        sets.forEach((set, idx) => {
          const targetBits = [];
          if (set.set_type)         targetBits.push(set.set_type);
          if (set.target_reps)      targetBits.push(`${set.target_reps} reps`);
          if (set.target_weight)    targetBits.push(`${set.target_weight} lb`);
          if (set.percent)          targetBits.push(`${set.percent}%`);
          const targetStr = targetBits.join(' · ');

          const weightInp = el('input', {
            // Text (not number) so users can log bodyweight exercises as
            // "BW" or "BW+25" instead of only decimals.
            type: 'text', inputmode: 'text', autocapitalize: 'characters',
            placeholder: set.target_weight != null ? String(set.target_weight) : 'BW',
            value: set.target_weight != null ? String(set.target_weight) : '',
            style: 'width: 70px;',
          });
          const repsInp = el('input', {
            type: 'number', inputmode: 'numeric', pattern: '[0-9]*',
            placeholder: parsePlanRepDefault_(set.target_reps),
            value: parsePlanRepDefault_(set.target_reps),
            style: 'width: 50px;',
          });
          const rpeInp = el('input', {
            type: 'number', step: '0.5', inputmode: 'decimal',
            placeholder: '—',
            min: '1', max: '10',
            style: 'width: 40px;',
          });
          setInputs.push({ weightInp, repsInp, rpeInp, target: set });

          exCard.appendChild(el('div', { class: 'plan-log-row' }, [
            el('div', { class: 'plan-log-label' }, [
              el('div', { style: 'font-weight: 600; font-size: 13px;' }, `Set ${set.set_num || (idx + 1)}`),
              el('div', { class: 'muted', style: 'font-size: 11px; margin-top: 2px;' }, targetStr || 'target: —'),
            ]),
            el('div', { class: 'plan-log-inputs' }, [
              el('div', { class: 'plan-log-field' }, [
                el('label', {}, 'lb'),
                weightInp,
              ]),
              el('div', { class: 'plan-log-field' }, [
                el('label', {}, 'reps'),
                repsInp,
              ]),
              el('div', { class: 'plan-log-field' }, [
                el('label', {}, 'RPE'),
                rpeInp,
              ]),
            ]),
          ]));

          if (set.notes) {
            exCard.appendChild(el('div', { class: 'muted', style: 'font-size: 11px; font-style: italic; margin-top: -4px; margin-bottom: 8px; padding-left: 4px;' },
              set.notes));
          }
        });

        // Per-exercise notes
        const notesInp = el('input', {
          type: 'text', placeholder: 'Notes (optional)',
        });
        exCard.appendChild(el('div', { class: 'field', style: 'margin-top: 8px;' }, [notesInp]));

        exerciseInputs.push({
          name: ex.name,
          category: ex.muscle,
          sets: setInputs,
          notesInput: notesInp,
        });
        form.appendChild(exCard);
      });

      app.appendChild(form);

      // Session notes
      const sessionNotesInp = el('input', {
        id: 'planLogSessionNotes',
        type: 'text',
        placeholder: 'How did it feel overall?',
      });
      app.appendChild(el('div', { class: 'card' }, [
        el('div', { class: 'field', style: 'margin: 0;' }, [
          el('label', {}, 'Session notes (optional)'),
          sessionNotesInp,
        ]),
      ]));

      // Save button
      app.appendChild(el('button', {
        style: 'margin-top: 16px; width: 100%;',
        onclick: async () => {
          const chosenDate = $('#planLogDate').value || date;
          const entries = exerciseInputs.map(ex => {
            const setsOut = ex.sets.map(setIn => {
              const wRaw = setIn.weightInp.value.trim();
              const rRaw = setIn.repsInp.value.trim();
              const rpeRaw = setIn.rpeInp.value.trim();
              // Weight is stored as a string so "BW" / "BW+25" / "45" all
              // roundtrip cleanly. Downstream chart code already handles
              // text weights via parseWeightNumber_.
              return {
                set_num:       setIn.target.set_num,
                set_type:      setIn.target.set_type || null,
                target_reps:   setIn.target.target_reps || null,
                target_weight: setIn.target.target_weight ?? null,
                target_percent: setIn.target.percent ?? null,
                weight:        wRaw === '' ? null : wRaw,
                reps:          rRaw === '' ? null : Number(rRaw),
                rpe:           rpeRaw === '' ? null : Number(rpeRaw),
              };
            });
            // Legacy compat fields
            const firstWeight = setsOut.find(s => s.weight != null && s.weight !== '');
            return {
              name:     ex.name,
              category: ex.category,
              weight:   firstWeight ? String(firstWeight.weight) : '',
              r1: (setsOut[0] && setsOut[0].reps) || '',
              r2: (setsOut[1] && setsOut[1].reps) || '',
              r3: (setsOut[2] && setsOut[2].reps) || '',
              r4: (setsOut[3] && setsOut[3].reps) || '',
              notes: (ex.notesInput.value || '').trim(),
              sets: setsOut,
            };
          });

          const meta = {
            date:  chosenDate,
            block: null,
            week:  ref.dayEntry ? ref.dayEntry.week : null,
            day:   session.name || 'Plan',
            notes: (sessionNotesInp.value || '').trim(),
          };
          try {
            const res = await sbLogLift(entries, meta);
            if (res.duplicate) toast('Already logged today for this session');
            else toast('Saved to log');
            setTimeout(() => render('training-plan'), 900);
          } catch (e) {
            toast('Could not save: ' + (e.message || e), true);
          }
        },
      }, 'Save session'));
    }

    // Parse a target-reps string like "5", "8-10", "AMRAP", "5+", "8-10/side"
    // → default text for the input. For simple integers, prefill. For ranges
    // or non-numeric, leave the input empty (placeholder shows the target).
    function parsePlanRepDefault_(targetReps) {
      if (!targetReps) return '';
      const s = String(targetReps).trim();
      const m = s.match(/^(\d+)$/);
      if (m) return m[1];
      return '';
    }

    // -------- Edit an already-logged lift session --------
    // The edit view reuses the per-set input UI from the plan-based logger,
    // but pulls existing values from lift_sessions and issues an UPDATE on
    // save instead of inserting a new row.
    let _liftEditRef = null; // { sessionId }

    async function sbGetLiftSessionById(sessionId) {
      const { data, error } = await _sb.from('lift_sessions')
        .select('id,date,block_name,week,day,exercises,notes')
        .eq('id', sessionId).single();
      if (error) throw new Error(error.message);
      return data;
    }

    async function sbUpdateLiftSession(sessionId, patch) {
      const { error } = await _sb.from('lift_sessions')
        .update(patch).eq('id', sessionId);
      if (error) throw new Error(error.message);
      return { ok: true };
    }

    // Convert an existing exercise's legacy r1-r4 shape into a virtual sets[]
    // array. If sets[] already exists, use it as-is.
    function normalizeLoggedSets_(ex) {
      if (Array.isArray(ex.sets) && ex.sets.length) return ex.sets;
      const reps = [ex.r1, ex.r2, ex.r3, ex.r4]
        .map(v => (v === '' || v == null) ? null : Number(v))
        .filter(v => v !== null && !Number.isNaN(v));
      // If no reps recorded at all, keep a single blank row so the user has
      // something to edit rather than a missing exercise.
      if (!reps.length) {
        return [{ set_num: 1, weight: ex.weight || null, reps: null }];
      }
      return reps.map((r, i) => ({
        set_num: i + 1,
        weight: ex.weight || null,
        reps: r,
      }));
    }

    async function renderLiftEdit(app) {
      const ref = _liftEditRef;
      if (!ref || !ref.sessionId) {
        app.appendChild(el('div', { class: 'card' }, 'No session selected for editing.'));
        return;
      }

      app.appendChild(el('header', { class: 'top' }, [
        el('h1', {}, 'Edit session'),
      ]));
      app.appendChild(el('button', {
        class: 'btn-link',
        style: 'background: transparent; color: var(--muted); border: none; padding: 0; margin-bottom: 8px; text-align: left; width: auto; font-size: 13px;',
        onclick: () => {
          _liftEditRef = null;
          if (_liftSessionRef) render('lift-session');
          else render('calendar');
        },
      }, '← Cancel'));

      const skel = el('div', { class: 'card' }, el('div', { class: 'skeleton', style: 'height: 200px;' }));
      app.appendChild(skel);

      let session;
      try { session = await sbGetLiftSessionById(ref.sessionId); }
      catch (e) {
        skel.remove();
        app.appendChild(el('div', { class: 'card' }, 'Could not load: ' + e.message));
        return;
      }
      skel.remove();

      // Session meta card — date + block/week/day label + session notes
      const dateInp = el('input', { id: 'liftEditDate', type: 'date', value: session.date, style: 'flex: 1; margin: 0;' });
      app.appendChild(el('div', { class: 'card', style: 'padding: 12px 16px;' }, [
        el('div', { class: 'field', style: 'margin: 0 0 8px; display: flex; align-items: center; gap: 12px;' }, [
          el('label', { for: 'liftEditDate', style: 'margin: 0; min-width: 70px;' }, 'Date'),
          dateInp,
        ]),
        el('div', { class: 'muted', style: 'font-size: 12px;' },
          `${session.block_name || ''} · ${session.week ? 'Wk ' + session.week + ' · ' : ''}Day ${session.day || '—'}`),
      ]));

      const exerciseInputs = [];
      const exercisesArr = Array.isArray(session.exercises) ? session.exercises : [];

      exercisesArr.forEach(ex => {
        const setsList = normalizeLoggedSets_(ex);
        const exCard = el('div', { class: 'card' });
        exCard.appendChild(el('div', { class: 'plan-exercise-head', style: 'margin-bottom: 10px;' }, [
          el('div', { style: 'font-weight: 600; font-size: 15px;' }, ex.name),
          el('span', { class: 'muted', style: 'font-size: 11px;' },
            ex.category ? `${ex.category} · ${setsList.length} set${setsList.length === 1 ? '' : 's'}` : `${setsList.length} set${setsList.length === 1 ? '' : 's'}`),
        ]));

        const setInputs = [];
        setsList.forEach((set, idx) => {
          const targetBits = [];
          if (set.set_type)      targetBits.push(set.set_type);
          if (set.target_reps)   targetBits.push(`${set.target_reps} reps`);
          if (set.target_weight) targetBits.push(`${set.target_weight} lb`);
          const targetStr = targetBits.join(' · ');

          const weightInp = el('input', {
            type: 'text', inputmode: 'text', autocapitalize: 'characters',
            placeholder: 'BW',
            value: (set.weight != null && set.weight !== '') ? String(set.weight) : '',
            style: 'width: 70px;',
          });
          const repsInp = el('input', {
            type: 'number', inputmode: 'numeric', pattern: '[0-9]*',
            placeholder: '—',
            value: (set.reps != null && set.reps !== '') ? String(set.reps) : '',
            style: 'width: 50px;',
          });
          const rpeInp = el('input', {
            type: 'number', step: '0.5', inputmode: 'decimal',
            placeholder: '—',
            value: (set.rpe != null) ? String(set.rpe) : '',
            min: '1', max: '10',
            style: 'width: 40px;',
          });
          setInputs.push({ weightInp, repsInp, rpeInp, target: set });

          exCard.appendChild(el('div', { class: 'plan-log-row' }, [
            el('div', { class: 'plan-log-label' }, [
              el('div', { style: 'font-weight: 600; font-size: 13px;' }, `Set ${set.set_num || (idx + 1)}`),
              targetStr ? el('div', { class: 'muted', style: 'font-size: 11px; margin-top: 2px;' }, targetStr) : null,
            ]),
            el('div', { class: 'plan-log-inputs' }, [
              el('div', { class: 'plan-log-field' }, [el('label', {}, 'lb'), weightInp]),
              el('div', { class: 'plan-log-field' }, [el('label', {}, 'reps'), repsInp]),
              el('div', { class: 'plan-log-field' }, [el('label', {}, 'RPE'), rpeInp]),
            ]),
          ]));
        });

        const notesInp = el('input', {
          type: 'text', placeholder: 'Exercise notes (optional)',
          value: ex.notes || '',
        });
        exCard.appendChild(el('div', { class: 'field', style: 'margin-top: 8px;' }, [notesInp]));

        exerciseInputs.push({
          name: ex.name, category: ex.category,
          sets: setInputs, notesInput: notesInp,
        });
        app.appendChild(exCard);
      });

      // Session notes
      const sessionNotesInp = el('input', {
        id: 'liftEditNotes', type: 'text',
        placeholder: 'Session notes',
        value: session.notes || '',
      });
      app.appendChild(el('div', { class: 'card' }, [
        el('div', { class: 'field', style: 'margin: 0;' }, [
          el('label', {}, 'Session notes'),
          sessionNotesInp,
        ]),
      ]));

      // Save button
      app.appendChild(el('button', {
        style: 'margin-top: 16px; width: 100%;',
        onclick: async () => {
          const newDate = dateInp.value || session.date;
          const entries = exerciseInputs.map(ex => {
            const setsOut = ex.sets.map(setIn => {
              const wRaw = setIn.weightInp.value.trim();
              const rRaw = setIn.repsInp.value.trim();
              const rpeRaw = setIn.rpeInp.value.trim();
              return {
                ...(setIn.target || {}),
                weight: wRaw === '' ? null : wRaw,
                reps:   rRaw === '' ? null : Number(rRaw),
                rpe:    rpeRaw === '' ? null : Number(rpeRaw),
              };
            });
            const firstWeight = setsOut.find(s => s.weight != null && s.weight !== '');
            return {
              name:     ex.name,
              category: ex.category,
              weight:   firstWeight ? String(firstWeight.weight) : '',
              r1: (setsOut[0] && setsOut[0].reps) || '',
              r2: (setsOut[1] && setsOut[1].reps) || '',
              r3: (setsOut[2] && setsOut[2].reps) || '',
              r4: (setsOut[3] && setsOut[3].reps) || '',
              notes: (ex.notesInput.value || '').trim(),
              sets: setsOut,
            };
          });
          try {
            await sbUpdateLiftSession(session.id, {
              date:      newDate,
              exercises: entries,
              notes:     (sessionNotesInp.value || '').trim(),
            });
            toast('Session updated');
            _liftEditRef = null;
            // If we came from Session Detail, refresh that view with the new date+day
            if (_liftSessionRef) {
              _liftSessionRef = { date: newDate, day: session.day };
              setTimeout(() => render('lift-session'), 600);
            } else {
              setTimeout(() => render('calendar'), 600);
            }
          } catch (e) {
            toast('Could not save: ' + (e.message || e), true);
          }
        },
      }, 'Save changes'));

      // Delete option — hidden behind a confirm to prevent accidents
      app.appendChild(el('div', { style: 'text-align: center; margin-top: 12px;' }, [
        el('button', {
          style: 'background: transparent; color: #d97a7a; border: 1px solid var(--border); padding: 8px 16px; font-size: 13px; width: auto;',
          onclick: async () => {
            if (!confirm('Delete this session permanently? This cannot be undone.')) return;
            try {
              const { error } = await _sb.from('lift_sessions').delete().eq('id', session.id);
              if (error) throw new Error(error.message);
              toast('Session deleted');
              _liftEditRef = null;
              _liftSessionRef = null;
              setTimeout(() => render('calendar'), 600);
            } catch (e) {
              toast('Could not delete: ' + (e.message || e), true);
            }
          },
        }, 'Delete this session'),
      ]));
    }

    // -------- Free-form Lift logger (v27) --------
    // No program, no plan. User types exercise names (autocomplete from their
    // own history), adds sets, saves. Same lift_sessions row shape as
    // programmed sessions so History/Session Detail/Progression all just work.
    async function renderLiftFreeform(app) {
      app.appendChild(el('header', { class: 'top' }, [
        el('h1', {}, 'Log a lift'),
        el('span', { class: 'date' }, fmtDateLong(new Date())),
      ]));
      app.appendChild(el('button', {
        class: 'btn-link',
        style: 'background: transparent; color: var(--muted); border: none; padding: 0; margin-bottom: 8px; text-align: left; width: auto; font-size: 13px;',
        onclick: () => render('home'),
      }, '← Cancel'));

      const skel = el('div', { class: 'card' }, el('div', { class: 'skeleton', style: 'height: 100px;' }));
      app.appendChild(skel);

      let history;
      try { history = await sbLoadExerciseHistory(); }
      catch (e) { history = { names: [], byName: {} }; }
      skel.remove();

      // --- Session meta card: date + title ---
      const dateInp = el('input', {
        id: 'ffDate', type: 'date', value: todayISO(),
        style: 'flex: 1; margin: 0;',
      });
      const titleInp = el('input', {
        id: 'ffTitle', type: 'text',
        placeholder: 'e.g. Push Day, Random Sunday',
        style: 'flex: 1; margin: 0;',
      });
      app.appendChild(el('div', { class: 'card', style: 'padding: 12px 16px;' }, [
        el('div', { class: 'field', style: 'margin: 0 0 10px; display: flex; align-items: center; gap: 12px;' }, [
          el('label', { for: 'ffDate', style: 'margin: 0; min-width: 70px;' }, 'Date'),
          dateInp,
        ]),
        el('div', { class: 'field', style: 'margin: 0; display: flex; align-items: center; gap: 12px;' }, [
          el('label', { for: 'ffTitle', style: 'margin: 0; min-width: 70px;' }, 'Title'),
          titleInp,
        ]),
        el('div', { class: 'muted', style: 'font-size: 11px; margin-top: 6px;' },
          'Optional. Defaults to "Freestyle" — used only for how the session shows up in History.'),
      ]));

      // --- Shared datalist for exercise-name autocomplete ---
      // Populated from user's own history. HTML5 datalist gives native
      // suggestions dropdown on both mobile and desktop.
      const dl = el('datalist', { id: 'ffExerciseNames' });
      history.names.forEach(entry => {
        dl.appendChild(el('option', { value: entry.name }));
      });
      app.appendChild(dl);

      // --- Exercise stack ---
      // State is held in a mutable array. Adding/removing an exercise
      // re-renders just the stack, not the whole page.
      const stackWrap = el('div', { id: 'ffStack' });
      app.appendChild(stackWrap);

      const MUSCLES = ['', 'Chest', 'Back', 'Legs', 'Shoulders', 'Arms', 'Core', 'Other'];
      const exercises = []; // [{ id, nameInp, muscleSel, sets: [{weightInp, repsInp, rpeInp}] }]
      let exCounter = 0;

      function addSetRow(exState, setCard, setNum, prefill) {
        const weightInp = el('input', {
          type: 'text', inputmode: 'text', autocapitalize: 'characters',
          placeholder: 'BW',
          value: (prefill && prefill.weight) || '',
          style: 'width: 70px;',
        });
        const repsInp = el('input', {
          type: 'number', inputmode: 'numeric', pattern: '[0-9]*',
          placeholder: '—',
          value: (prefill && prefill.reps) || '',
          style: 'width: 50px;',
        });
        const rpeInp = el('input', {
          type: 'number', step: '0.5', inputmode: 'decimal',
          placeholder: '—', min: '1', max: '10',
          style: 'width: 40px;',
        });
        const setNumEl = el('div', { style: 'font-weight: 600; font-size: 13px;' }, `Set ${setNum}`);
        const removeBtn = el('button', {
          style: 'background: transparent; color: var(--muted); border: none; padding: 4px 8px; font-size: 16px; width: auto; line-height: 1;',
          title: 'Remove set',
          onclick: () => {
            const idx = exState.sets.findIndex(s => s.weightInp === weightInp);
            if (idx === -1) return;
            exState.sets.splice(idx, 1);
            row.remove();
            // Renumber remaining sets in this exercise
            exState.sets.forEach((s, i) => { s.setNumEl.textContent = `Set ${i + 1}`; });
          },
        }, '×');
        const row = el('div', { class: 'plan-log-row' }, [
          el('div', { class: 'plan-log-label' }, [setNumEl]),
          el('div', { class: 'plan-log-inputs' }, [
            el('div', { class: 'plan-log-field' }, [el('label', {}, 'lb'), weightInp]),
            el('div', { class: 'plan-log-field' }, [el('label', {}, 'reps'), repsInp]),
            el('div', { class: 'plan-log-field' }, [el('label', {}, 'RPE'), rpeInp]),
            removeBtn,
          ]),
        ]);
        setCard.insertBefore(row, setCard.querySelector('.ff-set-actions'));
        exState.sets.push({ weightInp, repsInp, rpeInp, setNumEl });
      }

      function renderExerciseCard(exState) {
        const card = el('div', { class: 'card' });
        exState.card = card;

        // Header: name input + remove
        const nameInp = el('input', {
          type: 'text', placeholder: 'Exercise name (e.g. DB Bench Press)',
          list: 'ffExerciseNames',
          style: 'flex: 1; margin: 0;',
        });
        exState.nameInp = nameInp;

        const removeExBtn = el('button', {
          style: 'background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 4px 10px; font-size: 12px; width: auto;',
          title: 'Remove exercise',
          onclick: () => {
            const idx = exercises.findIndex(e => e === exState);
            if (idx === -1) return;
            exercises.splice(idx, 1);
            card.remove();
          },
        }, 'Remove');

        card.appendChild(el('div', { style: 'display: flex; gap: 8px; align-items: center; margin-bottom: 10px;' }, [
          nameInp, removeExBtn,
        ]));

        // Muscle dropdown
        const muscleSel = el('select', { style: 'width: 100%; margin-bottom: 10px;' },
          MUSCLES.map(m => el('option', { value: m }, m || '— Muscle group (optional) —'))
        );
        exState.muscleSel = muscleSel;
        card.appendChild(muscleSel);

        // Set rows container + action buttons row
        const actionsRow = el('div', { class: 'ff-set-actions', style: 'display: flex; gap: 8px; margin-top: 8px;' }, [
          el('button', {
            style: 'background: var(--surface-2); color: var(--text); border: 1px solid var(--border); padding: 6px 12px; font-size: 12px; width: auto; flex: 1;',
            onclick: () => addSetRow(exState, card, exState.sets.length + 1),
          }, '+ Add set'),
          el('button', {
            style: 'background: var(--surface-2); color: var(--text); border: 1px solid var(--border); padding: 6px 12px; font-size: 12px; width: auto; flex: 1;',
            onclick: () => {
              const key = (nameInp.value || '').trim().toLowerCase();
              const prev = history.byName[key];
              if (!prev || !prev.lastSets.length) {
                toast('No previous session found for "' + (nameInp.value || 'that exercise') + '"', true);
                return;
              }
              // Wipe existing sets, then populate from lastSets
              exState.sets.slice().forEach(s => {
                if (s.setNumEl) s.setNumEl.parentElement.parentElement.remove();
              });
              exState.sets = [];
              prev.lastSets.forEach((set, i) => addSetRow(exState, card, i + 1, set));
              if (prev.muscle) muscleSel.value = prev.muscle;
              toast('Copied from ' + prev.lastDate);
            },
          }, 'Copy last time'),
        ]);
        card.appendChild(actionsRow);

        // Auto-fill muscle when the name matches a historical exercise (once,
        // right after the user stops typing/blurs).
        nameInp.addEventListener('change', () => {
          const key = (nameInp.value || '').trim().toLowerCase();
          const prev = history.byName[key];
          if (prev && prev.muscle && !muscleSel.value) muscleSel.value = prev.muscle;
        });

        exState.sets = [];
        addSetRow(exState, card, 1);
        return card;
      }

      function addExercise() {
        const exState = { id: ++exCounter, sets: [] };
        exercises.push(exState);
        const card = renderExerciseCard(exState);
        stackWrap.appendChild(card);
      }

      // Seed with one empty card so the user has a place to start typing.
      addExercise();

      // --- "Add exercise" button ---
      app.appendChild(el('button', {
        style: 'margin-top: 8px; margin-bottom: 16px; background: var(--surface-2); color: var(--text); border: 1px dashed var(--border); width: 100%;',
        onclick: () => addExercise(),
      }, '+ Add exercise'));

      // --- Session notes ---
      const sessionNotesInp = el('input', {
        type: 'text', placeholder: 'Session notes (optional)',
      });
      app.appendChild(el('div', { class: 'card' }, [
        el('div', { class: 'field', style: 'margin: 0;' }, [
          el('label', {}, 'Session notes'),
          sessionNotesInp,
        ]),
      ]));

      // --- Save ---
      app.appendChild(el('button', {
        style: 'margin-top: 16px; width: 100%;',
        onclick: async () => {
          // Build entries
          const entries = [];
          for (const ex of exercises) {
            const name = (ex.nameInp.value || '').trim();
            if (!name) continue; // silently skip nameless exercises
            const setsOut = ex.sets.map((s) => {
              const wRaw   = s.weightInp.value.trim();
              const rRaw   = s.repsInp.value.trim();
              const rpeRaw = s.rpeInp.value.trim();
              return {
                weight: wRaw === '' ? null : wRaw,
                reps:   rRaw === '' ? null : Number(rRaw),
                rpe:    rpeRaw === '' ? null : Number(rpeRaw),
              };
            }).filter(s => s.reps != null || (s.weight != null && s.weight !== ''));
            if (!setsOut.length) continue; // skip exercises with no actual data

            // Legacy r1..r4 + top-level weight for back-compat with older
            // read paths (Session Detail, analytics that predate sets[]).
            const firstW = setsOut.find(s => s.weight != null && s.weight !== '');
            entries.push({
              name,
              category: ex.muscleSel.value || '',
              weight:   firstW ? String(firstW.weight) : '',
              r1: (setsOut[0] && setsOut[0].reps) || '',
              r2: (setsOut[1] && setsOut[1].reps) || '',
              r3: (setsOut[2] && setsOut[2].reps) || '',

    async function sbGetRowById(table, id, cols) {
      const { data, error } = await _sb.from(table).select(cols).eq('id', id).single();
      if (error) throw new Error(error.message);
      return data;
    }
    async function sbUpdateRow(table, id, patch) {
      const { error } = await _sb.from(table).update(patch).eq('id', id);
      if (error) throw new Error(error.message);
      return { ok: true };
    }
    async function sbDeleteRow(table, id) {
      const { error } = await _sb.from(table).delete().eq('id', id);
      if (error) throw new Error(error.message);
      return { ok: true };
    }

    // -------- Body weight tracking --------
    async function sbLogBodyWeight({ date, weight_lbs, notes }) {
      const uid = currentUser.id;
      const row = {
        user_id: uid,
        date,
        weight_lbs: Number(weight_lbs),
        notes: notes || null,
      };
      // Simple dedup: replace any existing entry for the same date rather
      // than inserting a second one.
      const { data: existing } = await _sb.from('body_weight_log')
        .select('id').eq('user_id', uid).eq('date', date).limit(1);
      if (existing && existing.length) {
        const { error } = await _sb.from('body_weight_log')
          .update(row).eq('id', existing[0].id);
        if (error) throw new Error(error.message);
        return { ok: true, updated: true };
      }
      const { error } = await _sb.from('body_weight_log').insert(row);
      if (error) throw new Error(error.message);
      return { ok: true, inserted: true };
    }

    async function sbGetBodyWeightEntries(limit = 90) {
      const uid = currentUser.id;
      const { data, error } = await _sb.from('body_weight_log')
        .select('id,date,weight_lbs,notes')
        .eq('user_id', uid)
        .order('date', { ascending: false })
        .limit(limit);
      if (error) throw new Error(error.message);
      return data || [];
    }

        const monthDelta = latest.weight_lbs - monthAgoEntry.weight_lbs;

          const sign = d > 0 ? '+' : '';
          return `${sign}${d.toFixed(1)} lb`;

            el('div', { class: 'big' }, deltaLabel(weekDelta)),
            el('div', { class: 'muted', style: 'margin-top: 4px;' }, `vs ${weekAgoEntry.date}`),

          el('h2', {}, '30-day'),
          el('div', { class: 'big' }, deltaLabel(monthDelta)),
          el('div', { class: 'muted', style: 'margin-top: 4px;' }, `vs ${monthAgoEntry.date}`),
        ]));

        // Trend line — reuse the SVG renderer from exercise progression
        const trendPoints = entries.slice().reverse().map(e => ({
          date: e.date,
          weight: Number(e.weight_lbs),
        })).filter(p => isFinite(p.weight));

          app.appendChild(el('div', { class: 'card' }, [

      // Log form

    async function renderStravaCard_(app) {
      const card = el('div', { class: 'card' }, [el('h2', {}, 'Strava')]);

        app.appendChild(card);
        return;
      }

      let conn = null;
      try { conn = await sbStravaConnection(); }
      catch (e) {
        card.appendChild(el('div', { class: 'muted', style: 'font-size: 13px; margin-top: 6px;' },
          'Could not check Strava status: ' + e.message));

          onclick: () => { window.location.href = stravaAuthUrl(); },
        }, 'Connect Strava'));
        app.appendChild(card);
        return;

      const lastSync = conn.last_sync_at ? new Date(conn.last_sync_at).toLocaleString() : 'never';

        el('div', { style: 'font-size: 14px; color: var(--text);' },

    let planEffortMode = 'rpe';
    let planDistSel = null, planLevelSel = null;

    function pRound(n) { return Math.round(n * 4) / 4; }
    function pParseTime(s) {
      if (!s) return null;
      const parts = s.trim().split(':').map(Number);
      if (parts.some(isNaN)) return null;
      if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
      if (parts.length === 2) return parts[0]*60 + parts[1];
      return null;
    }
    function pSecsToMMSS(s) { s = Math.round(s); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
    function pDistMiles(k) { return ({  '1mi':1,'2mi':2,'5k':3.1,'4mi':4,'5mi':5,'10k':6.2,'hm':13.1 })[k]||null; }
    function pPaces(level, rDist, rTime) {
      if (!rDist || !rTime) return null;
      const secs = pParseTime(rTime), miles = pDistMiles(rDist);
      if (!secs || !miles) return null;
      const ppm = secs / miles;
      const eOff = {beginner:150,intermediate:105,advanced:75};
      const tOff = {beginner:45, intermediate:25, advanced:12};
      const iOff = {beginner:5,  intermediate:-10,advanced:-20};
      return {
        easy:     pSecsToMMSS(ppm + (eOff[level]||105)) + '/mi',
        tempo:    pSecsToMMSS(ppm + (tOff[level]||25))  + '/mi',
        interval: pSecsToMMSS(ppm + (iOff[level]||-10)) + '/mi',
      };
    }
    function pLRForBuildWeek(w, totalWeeks, startLR, peakLR) {
      const peak = totalWeeks - 3;
      if (w <= 1) return startLR;
      if (w >= peak) return peakLR;
      return startLR + (peakLR - startLR) * ((w-1)/(peak-1));
    }
    function pMakeEasy(dist)           { return { type:'easy',      typeLabel:'Easy Run',       name:'Easy Run',         dist:Math.max(1.0,pRound(dist)), desc:P_EASY_DESCS[Math.floor(Math.random()*P_EASY_DESCS.length)], effortType:'easy',      paceOverride:null }; }
    function pMakeInterval(dist,ph,isD,paces) {
      const pool = isD ? P_INTERVALS.filter(x=>x.phase==='early') : P_INTERVALS.filter(x=>ph<0.35?x.phase==='early':ph<0.65?x.phase!=='late':true);
      const w = pool[Math.floor(ph*pool.length)%pool.length];
      return { type:'interval', typeLabel:'Intervals', name:w.name, dist:Math.max(1.5,pRound(isD?dist*0.7:dist)), desc:w.desc, effortType:'interval', paceOverride:paces?`Target: ${paces.interval}`:null };
    }
    function pMakeTempo(dist,ph,isD,paces) {
      const pool = isD ? P_TEMPOS.filter(x=>x.phase==='early') : P_TEMPOS.filter(x=>ph<0.35?x.phase==='early':ph<0.65?x.phase!=='late':true);
      const w = pool[Math.floor(ph*pool.length)%pool.length];
      return { type:'tempo', typeLabel:'Tempo', name:w.name, dist:Math.max(1.5,pRound(isD?dist*0.7:dist)), desc:w.desc, effortType:'tempo', paceOverride:paces?`Target: ${paces.tempo}`:null };
    }
    function pMakeLR(dist,ph,isTaper,paces) {
      const pool = isTaper ? [P_LONG_RUNS[0]] : P_LONG_RUNS.filter(x=>ph<0.35?x.phase==='early':ph<0.65?x.phase!=='late':true);
      const lr = pool[Math.floor(ph*pool.length)%pool.length];
      return { type:'longrun', typeLabel:'Long Run', name:lr.name, dist:Math.max(1.5,pRound(dist)), desc:lr.desc, effortType:'longrun', paceOverride:paces?`Easy pace: ${paces.easy}`:null };
    }
    function pMakeTimeTrial() {
      return { type:'timetrial', typeLabel:'Time Trial', name:'2 Mile Time Trial', dist:3.0, desc:'A fitness check — run 2 miles at your best effort to track progress mid-plan.', effortType:'timetrial', paceOverride:null };
    }
    function pMakeTaper(dist,paces) {
      return { type:'interval', typeLabel:'Taper Intervals', name:'Taper 400s', dist:dist||3.0, desc:'6×400m at race pace. Rest: 2–3 min full standing recovery between each rep — the goal is freshness, not fatigue.', effortType:'interval', paceOverride:paces?`Race pace: ${paces.interval}`:null };
    }
    function pMakeRace(distObj) {
      return { type:'race', typeLabel:'Race Day', name:`🏁 ${distObj.label} Race`, dist:pRound(distObj.miles), desc:'Race day! Warm up 10–15 min easy, then trust your training and give it everything.', effortType:'race', paceOverride:null };
    }
    function pBuildWeek(wi, totalWeeks, days, level, peakLR, startLR, paces, distKey) {
      const w = wi+1, buildWeeks = totalWeeks-3;
      let wType = 'build';
      if (w===totalWeeks) wType='race';
      else if (w>=totalWeeks-1) wType='taper';
      else if (w%4===0 && w<totalWeeks-1) wType='deload';
      const ph = Math.min(1,(w-1)/Math.max(buildWeeks-1,1));
      const isD = wType==='deload', isT = wType==='taper', isR = wType==='race';
      let lr = w===1 ? startLR : isR ? null : isT ? pRound(peakLR*0.55) : isD ? pRound(pLRForBuildWeek(w-1,totalWeeks,startLR,peakLR)*0.65) : pRound(pLRForBuildWeek(w,totalWeeks,startLR,peakLR));
      const iDist=pRound(2.0+ph*2.5), tDist=pRound(2.0+ph*3.0), eDist=pRound((lr||0)*0.65), e2Dist=pRound((lr||0)*0.55);
      const wos = [];
      const isTT = !isD&&!isT&&!isR && w===Math.round(totalWeeks*0.55);
      if (w===1) {
        wos.push(pMakeEasy(lr));
      } else if (isR) {
        wos.push(pMakeTaper(null,paces));
        wos.push(pMakeRace(P_DISTS[distKey]));
      } else if (isT) {
        const ti=pRound(Math.max(2.5,peakLR*0.35));
        wos.push(pMakeTaper(ti,paces));
        if(days>=3) wos.push(pMakeEasy(pRound(lr*0.6)));
        wos.push(pMakeLR(lr,ph,true,paces));
      } else if (isTT) {
        const tt=pMakeTimeTrial();
        if(days===2) { wos.push(tt); wos.push(pMakeLR(lr,ph,false,paces)); }
        else if(days===3) { wos.push(tt); wos.push(pMakeEasy(eDist)); wos.push(pMakeLR(lr,ph,false,paces)); }
        else if(days===4) { wos.push(pMakeEasy(eDist)); wos.push(tt); wos.push(pMakeTempo(tDist,ph,isD,paces)); wos.push(pMakeLR(lr,ph,false,paces)); }
        else { wos.push(pMakeInterval(iDist,ph,isD,paces)); wos.push(pMakeEasy(eDist)); wos.push(tt); wos.push(pMakeLR(lr,ph,false,paces)); wos.push(pMakeEasy(e2Dist)); }
      } else {
        if(days===2) { wos.push(pMakeInterval(iDist,ph,isD,paces)); wos.push(pMakeLR(lr,ph,false,paces)); }
        else if(days===3) { wos.push(pMakeInterval(iDist,ph,isD,paces)); wos.push(pMakeEasy(eDist)); wos.push(pMakeLR(lr,ph,false,paces)); }
        else if(days===4) { wos.push(pMakeEasy(eDist)); wos.push(pMakeInterval(iDist,ph,isD,paces)); wos.push(pMakeTempo(tDist,ph,isD,paces)); wos.push(pMakeLR(lr,ph,false,paces)); }
        else { wos.push(pMakeInterval(iDist,ph,isD,paces)); wos.push(pMakeEasy(eDist)); wos.push(pMakeTempo(tDist,ph,isD,paces)); wos.push(pMakeLR(lr,ph,false,paces)); wos.push(pMakeEasy(e2Dist)); }
      }
      const total = pRound(wos.reduce((s,x)=>s+x.dist,0));
      return { wType, label: isR?'Race Week':isT?'Taper Week':isD?`Week ${w} — Recovery`:`Week ${w}`, wos, total };
    }
    function pEffortText(effortType, paceOverride) {
      if (paceOverride) return null; // handled separately
      return P_EFFORT[effortType]?.[planEffortMode] || '';
    }
    function pRenderWo(wo) {
      const effort = paceOverride => paceOverride
        ? `<div class="plan-wo-effort">${paceOverride}</div><div class="plan-wo-effort" data-rpe="${P_EFFORT[wo.effortType]?.rpe||''}" data-zone="${P_EFFORT[wo.effortType]?.zone||''}">${P_EFFORT[wo.effortType]?.[planEffortMode]||''}</div>`
        : `<div class="plan-wo-effort" data-rpe="${P_EFFORT[wo.effortType]?.rpe||''}" data-zone="${P_EFFORT[wo.effortType]?.zone||''}">${P_EFFORT[wo.effortType]?.[planEffortMode]||''}</div>`;
      return `<div class="plan-wo-row ${wo.type}">

          <div class="plan-wo-type">${wo.typeLabel}</div>

    function pSetEffort(mode) {

              ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((d,i) => `
                <button type="button" class="plan-dow-btn${(savedState.dows||[]).includes(i)?' sel':''}" data-dow="${i}" onclick="planToggleDow(${i})">${d}</button>

              <label>Program duration</label>

    // Called when the walk-break checkbox changes. Reveals/hides the

    // Toggle a day-of-week checkbox in the Run Planner form. Mon=0..Sun=6.
    function planToggleDow(i) {
      if (!Array.isArray(window.planSelectedDows)) window.planSelectedDows = [];
      const arr = window.planSelectedDows;
      const idx = arr.indexOf(i);
      if (idx > -1) arr.splice(idx, 1);
      else arr.push(i);
      const btn = document.querySelector(`.plan-dow-btn[data-dow="${i}"]`);
      if (btn) btn.classList.toggle('sel');
    }

    function planGenerate() {
      const errEl = document.getElementById('pErr');
      errEl.classList.remove('vis');
      if (!planDistSel)  { errEl.textContent='Please select a target distance.'; errEl.classList.add('vis'); return; }
      if (!planLevelSel) { errEl.textContent='Please select your fitness level.'; errEl.classList.add('vis'); return; }
      const miles = parseFloat(document.getElementById('pMiles').value);
      if (isNaN(miles)||miles<0) { errEl.textContent='Please enter your current weekly mileage.'; errEl.classList.add('vis'); return; }
      const days  = parseInt(document.getElementById('pDays').value);
      const weeks = parseInt(document.getElementById('pWeeks').value);
      const raceDist = document.getElementById('pRaceDist').value;
      const raceTime = document.getElementById('pRaceTime').value.trim();
      const paces = pPaces(planLevelSel, raceDist, raceTime);
      const distData = P_DISTS[planDistSel];
      const peakLR = distData.peakLR[planLevelSel];
      const estLong = miles * 0.35;
      const startLR = pRound(Math.max(P_START_LR[planLevelSel], Math.min(estLong, peakLR * 0.4)));
      const weeksData = [];
      let totalMi = 0;
      for (let i=0; i<weeks; i++) {
        const wk = pBuildWeek(i, weeks, days, planLevelSel, peakLR, startLR, paces, planDistSel);
        weeksData.push(wk);
        totalMi += wk.total;
      }
      const dows = Array.isArray(window.planSelectedDows) ? window.planSelectedDows.slice().sort() : [];
      const runWalk = !!document.getElementById('pRWRToggle')?.checked;
      const runWalkRatio = runWalk ? (document.getElementById('pRWRRatio')?.value || '4:1') : null;
      const state = { dist:planDistSel, level:planLevelSel, miles, days, weeks, dows, runWalk, runWalkRatio, raceDist, raceTime, paces, peakLR, weeks_data:weeksData, totalMi:Math.round(totalMi) };
      try { localStorage.setItem('runPlanState_v1', JSON.stringify(state)); } catch(e) {}
      pShowOutput(state);
    }

          <div class="plan-stats">

            <div class="plan-stat"><div class="sv">${state.totalMi}</div><div class="sl">Total Miles</div></div>

        <div class="card" style="margin-bottom:12px">
          <div class="spaced" style="margin-bottom:0">
            <span style="font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em">Effort display</span>
            <div class="effort-pill">
              <button id="pEffRPE" class="${planEffortMode==='rpe'?'active':''}" onclick="pSetEffort('rpe')">RPE</button>
              <button id="pEffZone" class="${planEffortMode==='zone'?'active':''}" onclick="pSetEffort('zone')">HR Zones</button>

        ${(state.weeks_data||[]).map((wk,i) => {
          const badge = wk.wType==='deload'?'deload':wk.wType==='taper'?'taper':wk.wType==='race'?'race-wk':'build';
          const badgeText = wk.wType==='deload'?'Recovery':wk.wType==='taper'?'Taper':wk.wType==='race'?'Race':`Wk ${i+1}`;
          return `<div class="plan-week-card">
            <div class="plan-week-hdr" onclick="pToggleWeek(this)">

    // Called by the Save & Activate button on the generated Run Planner
    // output. Wraps the in-memory plan state into a training_plans row,
    // confirms displacement of any currently-active plan, and activates.
    async function pSaveActivate() {
      const state = JSON.parse(localStorage.getItem('runPlanState_v1') || '{}');
      const name  = (document.getElementById('pSaveName')?.value || '').trim();
      const start = (document.getElementById('pSaveDate')?.value || '').trim() || todayISO();
      if (!name) { toast('Give the plan a name first', true); return; }
      if (!state.weeks_data) { toast('Generate a plan first', true); return; }
      try {
        // v32.3: only same-type + general get displaced. A lift program
        // can happily coexist with this run plan.
        const conflicts = await conflictingActivesFor_('run', null, 'training_plans');
        if (conflicts.length) {
          const names = conflicts.map(c => `"${c.name}"`).join(', ');
          const msg = `Activate "${name}"?\n\nThis will deactivate ${names} because ${conflicts.length === 1 ? 'it conflicts' : 'they conflict'} with a new running plan. You can reactivate ${conflicts.length === 1 ? 'it' : 'them'} anytime.`;
          if (!confirm(msg)) return;
        }
        const structure = convertRunPlanToTrainingPlan_(state, name, start);
        await sbSaveTrainingPlan({ name, structure, activate: true, planType: 'run' });
        toast(`"${name}" is now your active run plan`);
        setTimeout(() => render('training-plan'), 700);
      } catch (e) {
        toast('Could not save: ' + (e.message || e), true);
      }
    }
    async function pSaveLibrary() {
      const state = JSON.parse(localStorage.getItem('runPlanState_v1') || '{}');
      const name  = (document.getElementById('pSaveName')?.value || '').trim();
      const start = (document.getElementById('pSaveDate')?.value || '').trim() || todayISO();
      if (!name) { toast('Give the plan a name first', true); return; }
      if (!state.weeks_data) { toast('Generate a plan first', true); return; }
      try {
        const structure = convertRunPlanToTrainingPlan_(state, name, start);
        await sbSaveTrainingPlan({ name, structure, activate: false, planType: 'run' });
        toast(`Saved "${name}" to your library`);
        setTimeout(() => render('programs'), 700);
      } catch (e) {
        toast('Could not save: ' + (e.message || e), true);
      }
    }

    // Given a slot definition + the user's equipment set + a set of already-
    // used exercise ids in this session, pick the best matching exercise.
    function pickExerciseForSlot_(slot, availableEquip, usedIds) {
      const emphasisMap = {
        'squat-compound':   ex => ex.compound && ex.muscle === 'Legs' && /squat|leg press/i.test(ex.name),
        'push-compound':    ex => ex.compound && ex.muscle === 'Chest',
        'pull-compound':    ex => ex.compound && ex.muscle === 'Back' && !/row/i.test(ex.name),
        'row-compound':     ex => ex.compound && ex.muscle === 'Back' && /row/i.test(ex.name),
        'press-compound':   ex => ex.compound && ex.muscle === 'Shoulders',
        'hinge-compound':   ex => ex.compound && (ex.muscle === 'Hamstrings' || /deadlift/i.test(ex.name)),
        'push-accessory':   ex => ex.muscle === 'Chest',
        'pull-accessory':   ex => ex.muscle === 'Back',
        'leg-accessory':    ex => ex.muscle === 'Legs' || ex.muscle === 'Quads',
        'ham-iso':          ex => ex.muscle === 'Hamstrings',
        'lunge-accessory':  ex => /lunge/i.test(ex.name) && ex.muscle === 'Legs',
        'triceps-iso':      ex => ex.muscle === 'Triceps',
        'biceps-iso':       ex => ex.muscle === 'Biceps',
        'shoulder-iso':     ex => ex.muscle === 'Shoulders' && /lateral|raise/i.test(ex.name),
        'rear-delt':        ex => ex.muscle === 'Shoulders' && /rear delt|face pull/i.test(ex.name),
        'accessory-arm':    ex => (ex.muscle === 'Biceps' || ex.muscle === 'Triceps'),
        'core':             ex => ex.muscle === 'Core',
      };
      const matcher = emphasisMap[slot.emphasis] || (() => true);
      const eqSet = new Set(availableEquip);
      eqSet.add('bodyweight'); // always available

      const candidates = LIFT_EXERCISES
        .filter(matcher)
        .filter(ex => ex.equipment.every(e => eqSet.has(e)))
        .filter(ex => !usedIds.has(ex.id))
        .filter(ex => !slot.requireCompound || ex.compound);

      if (!candidates.length) {
        // Relax the "already-used" constraint before giving up.
        const relaxed = LIFT_EXERCISES
          .filter(matcher)
          .filter(ex => ex.equipment.every(e => eqSet.has(e)))
          .filter(ex => !slot.requireCompound || ex.compound);
        return relaxed[0] || null;
      }

      // Prefer barbell compounds when squat/deadlift/bench are requested,
      // fall back to dumbbell/machine variants when barbell isn't picked.
      const barbell = candidates.find(ex => ex.equipment.includes('barbell'));
      return barbell || candidates[0];
    }

    // Given wizard state, produce a weeks_data-style array (matches the
    // shape convertRunPlanToTrainingPlan_ expects when we save).
    function generateLiftPlan_(state) {
      const template = LIFT_TEMPLATES.find(t => t.id === state.templateId) || LIFT_TEMPLATES[0];
      const equipment = state.equipment || [];
      const weeks = state.weeks || 8;

      const sessionsBuilt = template.sessions.map(sess => {
        const usedIds = new Set();
        const exercises = sess.slots.map(slot => {
          const ex = pickExerciseForSlot_(slot, equipment, usedIds);
          if (ex) usedIds.add(ex.id);
          return {
            name: ex ? ex.name : `[${slot.emphasis} — no match]`,
            muscle: ex ? ex.muscle : '',
            sets: slot.sets,
            reps: slot.reps,
          };
        }).filter(x => !x.name.startsWith('['));
        return { name: sess.name, exercises };
      });

      const weeksData = [];
      for (let wi = 0; wi < weeks; wi++) {
        const isDeload = (wi + 1) % 4 === 0; // every 4th week
        const weekLabel = isDeload ? `Week ${wi + 1} — Recovery` : `Week ${wi + 1}`;
        weeksData.push({
          weekIndex: wi,
          label: weekLabel,
          isDeload,
          sessions: sessionsBuilt,
        });
      }
      return { template, weeksData, weeks, sessionsBuilt };
    }

    // Convert a generated lift plan into a training_plans.structure JSONB.
    function convertLiftPlanToTrainingPlan_(state, planName, startDateISO) {
      const gen = generateLiftPlan_(state);
      const raw = new Date(startDateISO + 'T12:00:00');
      const jsDow = raw.getDay();
      const monOffset = (jsDow + 6) % 7;
      const anchor = new Date(raw);
      anchor.setDate(raw.getDate() - monOffset);

      const dows = (Array.isArray(state.dows) && state.dows.length)
        ? [...state.dows].sort((a,b) => a - b)
        : (state.days === 3 ? [1, 3, 5] : state.days === 4 ? [0, 1, 3, 4] : [0, 2, 4, 5]);

      const dowNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      const days = [];

      gen.weeksData.forEach((wk, wi) => {
        const sessionsThisWeek = wk.sessions;
        const slotCount = Math.min(sessionsThisWeek.length, dows.length);
        for (let i = 0; i < slotCount; i++) {
          const sess = sessionsThisWeek[i];
          const dowIdx = dows[i];
          const d = new Date(anchor);
          d.setDate(anchor.getDate() + (wi * 7) + dowIdx);
          days.push({
            date: d.toISOString().slice(0, 10),
            week: wi + 1,
            dow: dowNames[dowIdx],
            sessions: [{
              type: 'lift',
              name: sess.name,
              workout_kind: gen.template.name,
              exercises: sess.exercises,
              deload: wk.isDeload,
            }],
          });
        }
      });

      const startISO = anchor.toISOString().slice(0, 10);
      const endISO = days.length ? days[days.length - 1].date : startISO;
      return {
        config: {
          start_date: startISO,
          end_date: endISO,
          total_weeks: state.weeks,
          generator: 'lift-planner',
          template_id: gen.template.id,
        },
        days,
      };
    }
