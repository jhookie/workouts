    // Pull the user's most recent instance of every exercise they've logged,
    // for autocomplete + "copy last time" prefill in the free-form logger.
    // Returns { names: [{name, muscle, lastDate}], byName: Map<lowerName, {...}> }.
    async function sbLoadExerciseHistory() {
      const uid = currentUser.id;
      const { data, error } = await _sb.from('lift_sessions')
        .select('exercises,date')
        .eq('user_id', uid)
        .order('date', { ascending: false })
        .limit(500);
      if (error || !data) return { names: [], byName: {} };
      const byName = {}; // key: lowercase name
      data.forEach(sess => {
        (sess.exercises || []).forEach(ex => {
          const raw = (ex.name || '').trim();
          if (!raw) return;
          const key = raw.toLowerCase();
          if (byName[key]) return; // already have the most recent
          // Normalize sets from either sets[] or r1..r4 + weight
          let setsList = [];
          if (Array.isArray(ex.sets) && ex.sets.length) {
            setsList = ex.sets.map(s => ({
              reps: s.reps != null ? String(s.reps) : '',
              weight: s.weight != null ? String(s.weight) : '',
            }));
          } else {
            const wt = ex.weight != null ? String(ex.weight) : '';
            for (let i = 1; i <= 4; i++) {
              const r = ex['r' + i];
              if (r == null || r === '') continue;
              setsList.push({ reps: String(r), weight: wt });
            }
          }
          byName[key] = {
            name: raw,
            muscle: ex.category || ex.muscle || '',
            lastDate: sess.date,
            lastSets: setsList,
          };
        });
      });
      const names = Object.values(byName).sort((a, b) => a.name.localeCompare(b.name));
      return { names, byName };
    }

    async function sbAnalytics(yearFilter) {
      const uid = currentUser.id;
      let q = _sb.from('runs').select('date,distance,duration_secs,pace').eq('user_id', uid).order('date');
      if (yearFilter !== 'all') q = q.gte('date', `${yearFilter}-01-01`).lte('date', `${yearFilter}-12-31`);

      // availableYears must span ALL runs the user has, not just the filtered
      // slice — otherwise picking 2024 hides every other year from the
      // segment control. Fetch dates unfiltered in parallel.
      const [filteredR, allDatesR] = await Promise.all([
        q,
        _sb.from('runs').select('date').eq('user_id', uid),
      ]);
      if (filteredR.error) throw new Error(filteredR.error.message);
      const runs = filteredR.data || [];
      const totalMi = runs.reduce((s, r) => s + Number(r.distance), 0);
      const allYearSet = new Set((allDatesR.data || []).map(r => Number(r.date.slice(0, 4))));
      const availableYears = [...allYearSet].sort((a, b) => b - a);
      const pRuns = runs.filter(r => r.pace);
      let avgPaceSecs = null;
      if (pRuns.length) {
        const td = pRuns.reduce((s, r) => s + Number(r.distance), 0);
        const wp = pRuns.reduce((s, r) => { const ps = paceToSecs(r.pace); return s + (ps ? ps * Number(r.distance) : 0); }, 0);
        avgPaceSecs = td > 0 ? wp / td : null;
      }
      const tRuns = runs.filter(r => r.duration_secs);
      const avgTimeMins = tRuns.length ? Math.round(tRuns.reduce((s, r) => s + r.duration_secs, 0) / tRuns.length / 60) : 0;
      const summary = {
        miles: Math.round(totalMi * 10) / 10,
        runs: runs.length,
        avgPace: avgPaceSecs ? secsToMMSS(avgPaceSecs) : '—',
        avgDistance: runs.length ? Math.round((totalMi / runs.length) * 100) / 100 : 0,
        avgTimeMinutes: avgTimeMins,
      };
      const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      let monthly = [];
      if (yearFilter !== 'all') {
        for (let m = 0; m < 12; m++) {
          const mr = runs.filter(r => Number(r.date.slice(5, 7)) - 1 === m);
          const mi = mr.reduce((s, r) => s + Number(r.distance), 0);
          const mpr = mr.filter(r => r.pace);
          let mAvgPace = null;
          if (mpr.length) {
            const md = mpr.reduce((s, r) => s + Number(r.distance), 0);
            const mwp = mpr.reduce((s, r) => { const ps = paceToSecs(r.pace); return s + (ps ? ps * Number(r.distance) : 0); }, 0);
            mAvgPace = md > 0 ? secsToMMSS(mwp / md) : null;
          }
          monthly.push({ label: monthNames[m], miles: Math.round(mi * 10) / 10, runs: mr.length, avgDistance: mr.length ? Math.round((mi / mr.length) * 100) / 100 : 0, avgPace: mAvgPace || '—' });
        }
      }
      const yearMap = {};
      runs.forEach(r => { const y = r.date.slice(0, 4); yearMap[y] = (yearMap[y] || 0) + Number(r.distance); });
      const yearly = Object.entries(yearMap).map(([year, miles]) => ({ year, miles: Math.round(miles * 10) / 10 })).sort((a, b) => Number(a.year) - Number(b.year));
      return { filter: yearFilter, availableYears, summary, monthly, yearly };
    }

    // Multi-modality analytics fetcher for the v28.c refactor. One round-trip
    // that returns data for every modality the user has, so the type-tab
    // switcher can flip instantly without refetching. Year filter same
    // semantics as sbAnalytics.
    async function sbAnalyticsMulti(yearFilter) {
      const uid = currentUser.id;
      const inRange = (q) => yearFilter === 'all'
        ? q
        : q.gte('date', `${yearFilter}-01-01`).lte('date', `${yearFilter}-12-31`);

      // Fetch filtered rows + all-time date lists in parallel. The all-time
      // date lists let us compute availableYears across ALL modalities, not
      // just the currently-filtered one.
      const [
        runsR, walksR, actsR, liftsR, pullsR,
        runDatesR, walkDatesR, actDatesR, liftDatesR, pullDatesR,
      ] = await Promise.all([
        inRange(_sb.from('runs').select('date,distance,duration_secs,pace').eq('user_id', uid)),
        inRange(_sb.from('walks').select('date,distance,duration_secs').eq('user_id', uid)),
        inRange(_sb.from('activities').select('date,activity_type,distance,duration_secs,intensity').eq('user_id', uid)),
        inRange(_sb.from('lift_sessions').select('date,day,exercises').eq('user_id', uid)),
        inRange(_sb.from('pullup_sessions').select('date,total_reps,sets').eq('user_id', uid)),
        _sb.from('runs').select('date').eq('user_id', uid),
        _sb.from('walks').select('date').eq('user_id', uid),
        _sb.from('activities').select('date').eq('user_id', uid),
        _sb.from('lift_sessions').select('date').eq('user_id', uid),
        _sb.from('pullup_sessions').select('date').eq('user_id', uid),
      ]);

      // Compute the set of years across ALL modalities so the year filter
      // shows every year the user has any data for.
      const allYears = new Set();
      [runDatesR, walkDatesR, actDatesR, liftDatesR, pullDatesR].forEach(res => {
        (res.data || []).forEach(r => allYears.add(Number(r.date.slice(0, 4))));
      });
      const availableYears = [...allYears].filter(Boolean).sort((a, b) => b - a);

      const runs  = runsR.data  || [];
      const walks = walksR.data || [];
      const acts  = actsR.data  || [];
      const lifts = liftsR.data || [];
      const pulls = pullsR.data || [];

      // --- Available types (only tabs with actual data) ---
      const availableTypes = ['all'];
      if (runs.length)  availableTypes.push('run');
      if (walks.length) availableTypes.push('walk');
      const actTypeSet = new Set(acts.map(a => a.activity_type));
      if (actTypeSet.has('cycling'))  availableTypes.push('ride');
      if (actTypeSet.has('hiking'))   availableTypes.push('hike');
      if (actTypeSet.has('swimming')) availableTypes.push('swim');
      if (lifts.length) availableTypes.push('lift');
      if (pulls.length) availableTypes.push('pullups');

      // ---- Helpers ----
      const roundTo = (n, d) => Math.round(n * Math.pow(10, d)) / Math.pow(10, d);
      const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      // Build a distance-based monthly array for cardio modalities.
      const monthlyDistance = (rows, distField, showPace) => {
        if (yearFilter === 'all') return [];
        const out = [];
        for (let m = 0; m < 12; m++) {
          const mr = rows.filter(r => Number(r.date.slice(5, 7)) - 1 === m);
          const mi = mr.reduce((s, r) => s + (Number(r[distField]) || 0), 0);
          let mAvgPace = null;
          if (showPace) {
            const mpr = mr.filter(r => r.pace);
            if (mpr.length) {
              const md = mpr.reduce((s, r) => s + Number(r.distance), 0);
              const mwp = mpr.reduce((s, r) => { const ps = paceToSecs(r.pace); return s + (ps ? ps * Number(r.distance) : 0); }, 0);
              mAvgPace = md > 0 ? secsToMMSS(mwp / md) : null;
            }
          }
          out.push({
            label: monthNames[m],
            miles: roundTo(mi, 1),
            runs: mr.length,
            avgDistance: mr.length ? roundTo(mi / mr.length, 2) : 0,
            avgPace: mAvgPace || '—',
          });
        }
        return out;
      };
      const yearlyDistance = (rows, distField) => {
        const yearMap = {};
        rows.forEach(r => {
          const y = r.date.slice(0, 4);
          yearMap[y] = (yearMap[y] || 0) + (Number(r[distField]) || 0);
        });
        return Object.entries(yearMap)
          .map(([year, miles]) => ({ year, miles: roundTo(miles, 1) }))
          .sort((a, b) => Number(a.year) - Number(b.year));
      };
      // Count-based monthly (used for lift + pullups where "distance" doesn't apply).
      const monthlyCount = (rows) => {
        if (yearFilter === 'all') return [];
        const out = [];
        for (let m = 0; m < 12; m++) {
          const count = rows.filter(r => Number(r.date.slice(5, 7)) - 1 === m).length;
          out.push({ label: monthNames[m], count });
        }
        return out;
      };

      // ---- Per-modality analytics ----

      // Run (existing shape — keeps renderAnalyticsData_ compatible)
      const runData = (() => {
        const totalMi = runs.reduce((s, r) => s + Number(r.distance), 0);
        const pRuns = runs.filter(r => r.pace);
        let avgPaceSecs = null;
        if (pRuns.length) {
          const td = pRuns.reduce((s, r) => s + Number(r.distance), 0);
          const wp = pRuns.reduce((s, r) => { const ps = paceToSecs(r.pace); return s + (ps ? ps * Number(r.distance) : 0); }, 0);
          avgPaceSecs = td > 0 ? wp / td : null;
        }
        const tRuns = runs.filter(r => r.duration_secs);
        const avgTimeMins = tRuns.length ? Math.round(tRuns.reduce((s, r) => s + r.duration_secs, 0) / tRuns.length / 60) : 0;
        return {
          summary: {
            miles: roundTo(totalMi, 1),
            runs: runs.length,
            avgPace: avgPaceSecs ? secsToMMSS(avgPaceSecs) : '—',
            avgDistance: runs.length ? roundTo(totalMi / runs.length, 2) : 0,
            avgTimeMinutes: avgTimeMins,
          },
          monthly: monthlyDistance(runs, 'distance', true),
          yearly: yearlyDistance(runs, 'distance'),
        };
      })();

      // Walk
      const walkData = (() => {
        const totalMi = walks.reduce((s, w) => s + Number(w.distance || 0), 0);
        const totalSecs = walks.reduce((s, w) => s + (Number(w.duration_secs) || 0), 0);
        return {
          summary: {
            miles: roundTo(totalMi, 1),
            walks: walks.length,
            avgDistance: walks.length ? roundTo(totalMi / walks.length, 2) : 0,
            totalHours: roundTo(totalSecs / 3600, 1),
          },
          monthly: monthlyDistance(walks, 'distance', false),
          yearly: yearlyDistance(walks, 'distance'),
        };
      })();

      // Activities — one summary per activity_type
      const buildActData = (typeKey) => {
        const rows = acts.filter(a => a.activity_type === typeKey);
        const totalDist = rows.reduce((s, r) => s + (Number(r.distance) || 0), 0);
        const totalSecs = rows.reduce((s, r) => s + (Number(r.duration_secs) || 0), 0);
        return {
          summary: {
            distance: roundTo(totalDist, 1),
            sessions: rows.length,
            avgDistance: rows.length ? roundTo(totalDist / rows.length, 2) : 0,
            totalHours: roundTo(totalSecs / 3600, 1),
          },
          monthly: monthlyDistance(rows, 'distance', false),
          yearly: yearlyDistance(rows, 'distance'),
        };
      };
      const rideData = buildActData('cycling');
      const hikeData = buildActData('hiking');
      const swimData = buildActData('swimming');

      // Lift — different shape (volume + top exercises + session frequency)
      const liftData = (() => {
        // Volume per session = sum over exercises of (per-set weight × reps).
        // Sets can live in ex.sets[] or as legacy r1..r4 + top-level weight.
        // Handles "BW" (string) as 0 for volume math.
        const numeric = (v) => {
          const n = Number(v);
          return Number.isFinite(n) ? n : 0;
        };
        let totalVolume = 0;
        let totalSets = 0;
        const perExercise = {}; // { name: { volume, sessions, maxWeight, mostRecentDate } }
        lifts.forEach(sess => {
          (sess.exercises || []).forEach(ex => {
            const name = (ex.name || '').trim();
            if (!name) return;
            const bucket = perExercise[name] || (perExercise[name] = { volume: 0, sets: 0, sessions: new Set(), maxWeight: 0, lastDate: sess.date });
            bucket.sessions.add(sess.date);
            if (sess.date > bucket.lastDate) bucket.lastDate = sess.date;
            const topW = numeric(ex.weight);
            if (Array.isArray(ex.sets) && ex.sets.length) {
              ex.sets.forEach(s => {
                const w = numeric(s.weight != null ? s.weight : ex.weight);
                const r = numeric(s.reps);
                bucket.volume += w * r;
                totalVolume += w * r;
                bucket.sets += 1;
                totalSets  += 1;
                if (w > bucket.maxWeight) bucket.maxWeight = w;
              });
            } else {
              // Legacy fallback: r1..r4 with a single top-level weight
              for (let i = 1; i <= 4; i++) {
                const r = numeric(ex['r' + i]);
                if (r > 0) {
                  bucket.volume += topW * r;
                  totalVolume += topW * r;
                  bucket.sets += 1;
                  totalSets  += 1;
                }
              }
              if (topW > bucket.maxWeight) bucket.maxWeight = topW;
            }
          });
        });
        // Top 5 exercises by total volume, plus session counts.
        const topExercises = Object.entries(perExercise)
          .map(([name, b]) => ({
            name,
            volume: Math.round(b.volume),
            sessions: b.sessions.size,
            maxWeight: b.maxWeight,
            lastDate: b.lastDate,
          }))
          .sort((a, b) => b.volume - a.volume)
          .slice(0, 5);
        return {
          summary: {
            sessions: lifts.length,
            totalVolume: Math.round(totalVolume),
            totalSets,
            uniqueExercises: Object.keys(perExercise).length,
          },
          monthly: monthlyCount(lifts),
          topExercises,
        };
      })();

      // Pull-Ups
      const pullData = (() => {
        const totalReps = pulls.reduce((s, p) => s + (Number(p.total_reps) || 0), 0);
        let bestSet = 0;
        pulls.forEach(p => {
          const setsArr = Array.isArray(p.sets) ? p.sets : [];
          setsArr.forEach(v => {
            const n = Number(v);
            if (n > bestSet) bestSet = n;
          });
        });
        return {
          summary: {
            sessions: pulls.length,
            totalReps,
            bestSet,
            avgPerSession: pulls.length ? Math.round(totalReps / pulls.length) : 0,
          },
          monthly: monthlyCount(pulls),
        };
      })();

      // All — cross-modal summary
      const dateSet = new Set();
      [runs, walks, acts, lifts, pulls].forEach(arr =>
        arr.forEach(r => dateSet.add(r.date)));
      const allData = {
        summary: {
          totalSessions: runs.length + walks.length + acts.length + lifts.length + pulls.length,
          activeDays: dateSet.size,
          totalMiles: roundTo(
            runs.reduce((s, r) => s + Number(r.distance || 0), 0) +
            walks.reduce((s, r) => s + Number(r.distance || 0), 0) +
            acts.filter(a => a.activity_type !== 'swimming').reduce((s, r) => s + Number(r.distance || 0), 0)
          , 1),
        },
        byModality: [
          { key: 'run',    label: 'Runs',      count: runs.length },
          { key: 'walk',   label: 'Walks',     count: walks.length },
          { key: 'ride',   label: 'Rides',     count: acts.filter(a => a.activity_type === 'cycling').length },
          { key: 'hike',   label: 'Hikes',     count: acts.filter(a => a.activity_type === 'hiking').length },
          { key: 'swim',   label: 'Swims',     count: acts.filter(a => a.activity_type === 'swimming').length },
          { key: 'lift',   label: 'Lifts',     count: lifts.length },
          { key: 'pullups',label: 'Pull-Ups',  count: pulls.length },
        ].filter(m => m.count > 0),
      };

      return {
        filter: yearFilter,
        availableYears,
        availableTypes,
        all: allData,
        run: runData,
        walk: walkData,
        ride: rideData,
        hike: hikeData,
        swim: swimData,
        lift: liftData,
        pullups: pullData,
      };
    }

    async function sbMonth(year, month) {
      const uid = currentUser.id;
      const pad = n => String(n).padStart(2, '0');
      const startDate = `${year}-${pad(month)}-01`;
      const lastDay = new Date(year, month, 0).getDate();
      const endDate = `${year}-${pad(month)}-${pad(lastDay)}`;
      const [runsR, liftsR, pullsR, walksR, actsR] = await Promise.all([
        _sb.from('runs').select('id,date,distance,duration_secs,pace,notes').eq('user_id', uid).gte('date', startDate).lte('date', endDate),
        _sb.from('lift_sessions').select('id,date,block_name,week,day').eq('user_id', uid).gte('date', startDate).lte('date', endDate),
        _sb.from('pullup_sessions').select('id,date,total_reps,sets').eq('user_id', uid).gte('date', startDate).lte('date', endDate),
        _sb.from('walks').select('id,date,distance,duration_secs,notes').eq('user_id', uid).gte('date', startDate).lte('date', endDate),
        _sb.from('activities').select('id,date,activity_type,distance,duration_secs,intensity,notes').eq('user_id', uid).gte('date', startDate).lte('date', endDate),
      ]);
      // Bucket every row by date as an ARRAY, so multiple sessions of the same
      // modality on the same day (e.g. morning + evening walk) are all preserved.
      const push_ = (map, key, val) => { (map[key] = map[key] || []).push(val); };
      const runsByDate  = {}; (runsR.data  || []).forEach(r => push_(runsByDate,  r.date, r));
      const liftsByDate = {}; (liftsR.data || []).forEach(l => push_(liftsByDate, l.date, l));
      const pullsByDate = {}; (pullsR.data || []).forEach(p => push_(pullsByDate, p.date, p));
      const walksByDate = {}; (walksR.data || []).forEach(w => push_(walksByDate, w.date, w));
      const actsByDate  = {}; (actsR.data  || []).forEach(a => push_(actsByDate,  a.date, a));
      const firstDayOfWeek = new Date(year, month - 1, 1).getDay();
      const wdays = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const days = [];
      const fmtTime = secs => secs
        ? `${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')}`
        : '';
      for (let d = 1; d <= lastDay; d++) {
        const ds = `${year}-${pad(month)}-${pad(d)}`;
        const runsArr  = (runsByDate[ds]  || []).map(r => ({
          id: r.id,
          distance: Math.round(Number(r.distance)*100)/100,
          time: r.duration_secs ? `${Math.floor(r.duration_secs/60)}:${String(r.duration_secs%60).padStart(2,'0')}:00` : '',
          pace: r.pace || '',
        }));
        const liftsArr = (liftsByDate[ds] || []).map(l => ({
          id: l.id, block: l.block_name, week: l.week, day: l.day,
        }));
        const pullsArr = (pullsByDate[ds] || []).map(p => ({
          id: p.id, total: p.total_reps, weight: 'BW',
        }));
        const walksArr = (walksByDate[ds] || []).map(w => ({
          id: w.id,
          distance: Math.round(Number(w.distance)*100)/100,
          time: fmtTime(w.duration_secs),
        }));
        const actsArr = (actsByDate[ds] || []).map(a => ({
          id: a.id, type: a.activity_type,
          distance: a.distance != null ? Math.round(Number(a.distance)*100)/100 : null,
          time: fmtTime(a.duration_secs),
          intensity: a.intensity, notes: a.notes,
        }));
        const dow = new Date(year, month - 1, d).getDay();
        days.push({
          date: ds, day: d, weekday: wdays[dow],
          // Full arrays (may be empty). Prefer these in new code.
          runs:       runsArr,
          lifts:      liftsArr,
          pullupsAll: pullsArr,
          walks:      walksArr,
          activities: actsArr,
          // Back-compat singular fields (first entry) so any legacy read-site
          // keeps working unchanged.
          run:     runsArr[0]  || null,
          lift:    liftsArr[0] || null,
          walk:    walksArr[0] || null,
          pullups: pullsArr[0] || null,
        });
      }
      const mNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      return { monthLabel: `${mNames[month-1]} ${year}`, firstDayOfWeek, days };
    }

    async function sbProfile() {
      const uid = currentUser.id;
      const [shoesR, runsR] = await Promise.all([
        _sb.from('shoe_mileage').select('*').eq('user_id', uid),
        _sb.from('runs').select('date,distance,duration_secs,pace').eq('user_id', uid).not('pace', 'is', null),
      ]);
      const shoes = (shoesR.data || []).map(s => ({ id: s.id, name: s.name, active: s.active, totalMiles: Math.round(Number(s.total_miles)*10)/10, newMiles: Math.round(Number(s.logged_miles)*10)/10 }));
      const buckets = [
        { label: '1 Mile',        min: 0.8,  max: 1.2  },
        { label: '5K',            min: 2.8,  max: 3.5  },
        { label: '4 Miles',       min: 3.5,  max: 4.5  },
        { label: '10K',           min: 5.5,  max: 7.0  },
        { label: '10 Miles',      min: 9.0,  max: 11.0 },
        { label: 'Half Marathon', min: 12.5, max: 13.8 },
      ];
      const runs = runsR.data || [];
      const bestEfforts = [];
      buckets.forEach(b => {
        const cands = runs.filter(r => Number(r.distance) >= b.min && Number(r.distance) <= b.max && r.pace);
        if (!cands.length) return;
        cands.sort((a, c) => (paceToSecs(a.pace) || 9999) - (paceToSecs(c.pace) || 9999));
        const best = cands[0];
        bestEfforts.push({ bucket: b.label, pace: best.pace, time: best.duration_secs ? `${Math.floor(best.duration_secs/60)}:${String(best.duration_secs%60).padStart(2,'0')}:00` : '', distance: Math.round(Number(best.distance)*100)/100, date: best.date });
      });
      return { shoes, bestEfforts };
    }

    // -------- Dot colors (calendar) --------
    // User-customizable calendar dot colors, stored per-device in
    // localStorage. Applied via CSS variables so runtime updates take
    // effect immediately without re-render. Server-side sync is a future
    // enhancement (would move to user_profiles.dot_colors JSONB).
    const DOT_COLOR_KEYS = ['lift', 'run', 'walk', 'pull', 'activity'];
    const DOT_COLOR_DEFAULTS = {
      lift:     '#ff6b35',
      run:      '#7ab7ff',
      walk:     '#7ade95',
      pull:     '#ffd77a',
      activity: '#b47aff',
    };
    const DOT_COLOR_LABELS = {
      lift:     'Lift',
      run:      'Run',
      walk:     'Walk',
      pull:     'Pull-Ups',
      activity: 'Ride / Hike / Swim / other',
    };

    function loadDotColors_() {
      try {
        const saved = JSON.parse(localStorage.getItem('dotColors_v1') || '{}');
        return Object.assign({}, DOT_COLOR_DEFAULTS, saved);
      } catch (e) { return { ...DOT_COLOR_DEFAULTS }; }
    }
    function saveDotColors_(colors) {
      try { localStorage.setItem('dotColors_v1', JSON.stringify(colors)); } catch (e) {}
    }
    function applyDotColors_(colors) {
      DOT_COLOR_KEYS.forEach(k => {
        const val = colors[k] || DOT_COLOR_DEFAULTS[k];
        document.documentElement.style.setProperty('--dot-' + k, val);
      });
    }
    // Apply on script boot so calendar renders with the user's colors from
    // the first paint — no flash of default palette.
    applyDotColors_(loadDotColors_());

    async function renderDotColors(app) {
      app.appendChild(el('header', { class: 'top' }, [el('h1', {}, 'Calendar colors')]));
      app.appendChild(el('button', {
        class: 'btn-link',
        style: 'background: transparent; color: var(--muted); border: none; padding: 0; margin-bottom: 8px; text-align: left; width: auto; font-size: 13px;',
        onclick: () => render('profile'),
      }, '← Back to Profile'));

      app.appendChild(el('div', { class: 'card' }, [
        el('div', { class: 'muted', style: 'font-size: 13px; line-height: 1.5;' },
          "Pick a color for each modality's calendar dot. Changes save automatically to this device and update everywhere calendar dots appear."),
      ]));

      const colors = loadDotColors_();
      const rows = el('div', { class: 'card' });
      DOT_COLOR_KEYS.forEach((k, idx) => {
        const swatch = el('div', {
          style: `width: 20px; height: 20px; border-radius: 50%; background: ${colors[k]}; border: 1px solid var(--border); flex-shrink: 0;`,
        });
        const picker = el('input', {
          type: 'color', value: colors[k],
          style: 'width: 44px; height: 28px; padding: 0; margin: 0; border: 1px solid var(--border); border-radius: 4px; background: transparent; cursor: pointer;',
          oninput: (e) => {
            colors[k] = e.target.value;
            swatch.style.background = e.target.value;
            saveDotColors_(colors);
            applyDotColors_(colors);
          },
        });
        rows.appendChild(el('div', {
          style: 'display: flex; align-items: center; gap: 12px; padding: 10px 0;'
                 + (idx < DOT_COLOR_KEYS.length - 1 ? ' border-bottom: 1px solid var(--border);' : ''),
        }, [
          swatch,
          el('div', { style: 'flex: 1; font-size: 14px;' }, DOT_COLOR_LABELS[k]),
          picker,
        ]));
      });
      app.appendChild(rows);

      // Reset button
      app.appendChild(el('button', {
        style: 'margin-top: 12px; background: var(--surface-2); color: var(--text); border: 1px solid var(--border);',
        onclick: () => {
          saveDotColors_(DOT_COLOR_DEFAULTS);
          applyDotColors_(DOT_COLOR_DEFAULTS);
          toast('Reset to defaults');
          render('dot-colors');
        },
      }, 'Reset to defaults'));
    }

    // -------- v32.5: Modalities & Weekly Goals editor --------
    // A unified card in Profile for adding/removing modalities and setting
    // their weekly session goals. Fills the gap of "onboarding picks are
    // permanent" — users can toggle Cycling on later without re-signing up.
    async function renderModalities(app) {
      app.appendChild(el('header', { class: 'top' }, [el('h1', {}, 'Modalities & Goals')]));
      app.appendChild(el('button', {
        class: 'btn-link',
        style: 'background: transparent; color: var(--muted); border: none; padding: 0; margin-bottom: 8px; text-align: left; width: auto; font-size: 13px;',
        onclick: () => render('profile'),
      }, '← Back to Profile'));

      const skel = el('div', { class: 'card' }, el('div', { class: 'skeleton', style: 'height: 200px;' }));
      app.appendChild(skel);

      let profile;
      try { profile = await sbLoadUserProfile(); }
      catch (e) {
        skel.remove();
        app.appendChild(el('div', { class: 'card' }, 'Could not load your profile: ' + e.message));
        return;
      }
      skel.remove();

      const currentMods = new Set(userModalities_(profile));
      const currentGoals = (profile && profile.weekly_goals && typeof profile.weekly_goals === 'object')
        ? { ...profile.weekly_goals }
        : {};

      app.appendChild(el('div', { class: 'card' }, [
        el('div', { class: 'muted', style: 'font-size: 13px; line-height: 1.5;' },
          "Toggle a modality to add or remove its Home tile. Set a weekly session target — 0 means no target, just log freely. Changes save when you tap the button at the bottom."),
      ]));

      // Per-modality row: checkbox + label + goal input
      const wrap = el('div', { class: 'card' });
      const rowRefs = []; // { id, checkbox, goalInput }

      MODALITIES.forEach((m, idx) => {
        const isOn = currentMods.has(m.id);
        const currentGoal = currentGoals[m.id] || 0;

        const checkbox = el('input', {
          type: 'checkbox',
          id: `mod-${m.id}`,
          ...(isOn ? { checked: 'checked' } : {}),
        });
        const goalInput = el('input', {
          type: 'number',
          inputmode: 'numeric',
          min: '0',
          max: '99',
          value: String(currentGoal),
          style: 'width: 56px; text-align: center; padding: 6px 8px; margin: 0;',
        });
        rowRefs.push({ id: m.id, checkbox, goalInput });

        // Whole-row click toggles checkbox (unless clicking the input).
        const row = el('label', {
          for: `mod-${m.id}`,
          style: 'display: flex; align-items: center; gap: 12px; padding: 12px 0;'
               + (idx < MODALITIES.length - 1 ? ' border-bottom: 1px solid var(--border);' : ''),
        }, [
          checkbox,
          el('span', { style: 'font-size: 20px; flex-shrink: 0;' }, m.icon),
          el('div', { style: 'flex: 1;' }, [
            el('div', { style: 'font-weight: 600; font-size: 14px;' }, m.label),
            el('div', { class: 'muted', style: 'font-size: 12px; line-height: 1.3; margin-top: 2px;' }, m.desc),
          ]),
          el('div', { style: 'display: flex; flex-direction: column; align-items: center; gap: 4px;' }, [
            el('span', { class: 'muted', style: 'font-size: 10px; letter-spacing: 0.4px; text-transform: uppercase;' }, '/ week'),
            goalInput,
          ]),

        // Skip null/undefined values so `disabled: null` doesn't become
        // `disabled="null"` (which browsers treat as disabled=true).
        if (v == null) continue;
        if (k === 'class') n.className = v;
        else if (k === 'style') n.style.cssText = v;
        else if (k.startsWith('on')) n.addEventListener(k.slice(2), v);
        else if (k === 'html') n.innerHTML = v;
        else if (v === false) continue; // also skip explicit false for boolean attrs
        else n.setAttribute(k, v);
      }
      (Array.isArray(children) ? children : [children]).forEach(c => {
        if (c == null) return;
        n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      });
      return n;

    // ── Activity sync ─────────────────────────────────────
    // Pulls runs from Strava since last_sync_at (or last 30 days on first
    // run), maps each one to a runs row, upserts by strava_activity_id.
    // Returns { fetched, inserted, skipped } summary.
    async function sbStravaSync({ daysBack = 30 } = {}) {
      const conn = await sbStravaConnection();
      if (!conn) throw new Error('not connected to Strava');
      const accessToken = await stravaGetAccessToken();

      // Watermark: prefer last_sync_at, fall back to N days ago.
      let after = 0;
      if (conn.last_sync_at) {
        after = Math.floor(new Date(conn.last_sync_at).getTime() / 1000);
      } else {
        after = Math.floor(Date.now() / 1000) - daysBack * 86400;
      }

      // Paginate through activities. Strava caps page_size at 200.
      let page = 1;
      const activities = [];
      while (true) {
        const url = `https://www.strava.com/api/v3/athlete/activities?after=${after}&per_page=100&page=${page}`;
        const r = await fetch(url, { headers: { 'Authorization': `Bearer ${accessToken}` } });
        if (!r.ok) throw new Error(`strava /activities ${r.status}`);
        const batch = await r.json();
        if (!Array.isArray(batch) || batch.length === 0) break;
        activities.push(...batch);
        if (batch.length < 100) break;
        page += 1;
        if (page > 20) break; // safety
      }

      const RUN_TYPES = new Set(['Run', 'TrailRun', 'VirtualRun']);
      const runs = activities.filter(a => RUN_TYPES.has(a.type) || RUN_TYPES.has(a.sport_type));

      let inserted = 0, skipped = 0;
      for (const a of runs) {
        const dateISO = (a.start_date_local || a.start_date || '').slice(0, 10);
        if (!dateISO) { skipped++; continue; }
        const distMeters = Number(a.distance) || 0;
        const distMiles = Math.round((distMeters / 1609.344) * 100) / 100;
        if (distMiles <= 0) { skipped++; continue; }
        const durSecs = Number(a.moving_time) || Number(a.elapsed_time) || null;
        const pace = (durSecs && distMiles > 0) ? secsToMMSS(durSecs / distMiles) : null;

        const row = {
          user_id:            currentUser.id,
          date:               dateISO,
          distance:           distMiles,
          duration_secs:      durSecs,
          pace:               pace,
          notes:              a.name || null, // Strava activity title in notes
          strava_activity_id: a.id,
        };

        // Upsert: existing row with same (user_id, strava_activity_id) gets
        // updated; otherwise inserted.
        const { error } = await _sb.from('runs').upsert(row, {
          onConflict: 'user_id,strava_activity_id',
          ignoreDuplicates: false,
        });
        if (error) {
          console.error('strava upsert failed', a.id, error);
          skipped++;
        } else {
          inserted++;
        }
      }

      // Update watermark to now.
      await _sb.from('strava_tokens')
        .update({ last_sync_at: new Date().toISOString() })
        .eq('user_id', currentUser.id);

      return { fetched: runs.length, inserted, skipped };
    }

    // Turn an active program's `structure.weeks` into the { blocks: [...] }
    // shape the lift selector UI expects. Groups consecutive weeks sharing a
    // block_name into a single block span. Falls back to one block named after
    // the program if no weeks have block_name set.
    function deriveBlocksFromProgram_(program) {
      const s = program.structure || {};
      const weeks = s.weeks || [];
      if (!weeks.length) {
        return { blocks: [{ name: program.name, startWeek: 1, endWeek: s.weeks_total || 1 }] };
      }
      const blocks = [];
      let cur = null;
      weeks.forEach(w => {
        const name = w.block_name || program.name;
        if (!cur || cur.name !== name) {
          if (cur) blocks.push(cur);
          cur = { name, startWeek: w.week, endWeek: w.week };
        } else {
          cur.endWeek = w.week;
        }
      });
      if (cur) blocks.push(cur);
      return {
        blocks,
        weeksTotal: s.weeks_total || weeks.length,
        dayLetters: s.day_letters || ['A', 'B', 'C'],
        dayTitles: s.day_titles || {},
      };
    }

    // Returns the exercise template for a given selection, plus prev-week
    // prefill from lift_sessions. Tries the new Programs system first, then

    async function loadLiftTemplate_(sel) {
      // 1) Programs system
      let exercises = null;

      try {
        const ap = await sbActiveProgram();
        if (ap && ap.structure && Array.isArray(ap.structure.weeks)) {

          if (tpl && Array.isArray(tpl.exercises)) {

              name:        ex.name,
              sets:        ex.sets,

              sessionNotes: ex.sessionNotes || '',

            }));

          }
        } catch (e) { /* fall through */ }
      }

      if (!exercises) return { source: 'none', exercises: [] };

      // (regardless of week number) strictly before the session date being
      // logged. Works for week-numbered programs and free-form A/B rotations.
      try {

        const prev = await sbMostRecentSameDaySession_(sel.day, refDate);

          }

      return { source, exercises };

    function normalizeExName_(s) {
      return String(s || '').replace(/\s+/g, ' ').trim().toLowerCase();

    // Look at the most recent lift session and return the NEXT day-letter
    // after it within the given dayLetters array (cycles back to the first
    // after the last). Returns dayLetters[0] if there's no history.
    async function suggestNextLiftDay_(dayLetters) {
      if (!Array.isArray(dayLetters) || !dayLetters.length) return 'A';
      const uid = currentUser.id;
      const { data, error } = await _sb.from('lift_sessions')
        .select('day,date')
        .eq('user_id', uid)
        .order('date', { ascending: false })
        .limit(1);
      if (error || !data || !data.length) return dayLetters[0];
      const lastDay = String(data[0].day || '').toUpperCase();
      const idx = dayLetters.indexOf(lastDay);
      if (idx === -1) return dayLetters[0];
      return dayLetters[(idx + 1) % dayLetters.length];
    }

    // Find the MOST RECENT matching-day session strictly before `beforeDate`
    // and return a map of exercise-name (normalized) → { weight, total }.
    //
    // Was previously keyed on `week = N-1` which assumed a calendar-week
    // structured program. For A/B-rotation programs where the same day
    // letter can recur multiple times in one week, that missed the
    // intra-week case. This is the right shape for both.
    async function sbMostRecentSameDaySession_(day, beforeDate) {
      const uid = currentUser.id;
      let q = _sb.from('lift_sessions')
        .select('date,exercises')
        .eq('user_id', uid).eq('day', day);
      if (beforeDate) q = q.lt('date', beforeDate);
      q = q.order('date', { ascending: false }).limit(1);
      const { data, error } = await q;
      if (error) throw new Error(error.message);
      const session = (data || [])[0];
      if (!session || !Array.isArray(session.exercises)) return {};
      const out = {};
      session.exercises.forEach(ex => {
        const r1 = Number(ex.r1) || 0;
        const r2 = Number(ex.r2) || 0;
        const r3 = Number(ex.r3) || 0;
        const r4 = Number(ex.r4) || 0;
        const total = r1 + r2 + r3 + r4;
        out[normalizeExName_(ex.name)] = {
          weight: (ex.weight === '' || ex.weight == null) ? null : ex.weight,
          total:  total > 0 ? total : null,
        };
      });
      return out;
    }

    async function renderHome(app) {
      app.appendChild(el('header', { class: 'top' }, [
        el('h1', {}, 'Today'),
        el('span', { class: 'date' }, fmtDateLong(new Date())),
      ]));

      // Load the user's profile — drives modalities AND widget selection.
      const profile = await sbLoadUserProfile().catch(() => null);
      const modalities = userModalities_(profile);
      const widgetIds  = getUserWidgets_(profile);

      // Action grid — one or more tiles per chosen modality. Always shown
      // (not a widget) since it's the "how do I log something?" affordance.
      const tiles = [];
      modalities.forEach(id => {
        (MODALITY_TILES[id] || []).forEach(t => {
          tiles.push(actionTile_(t.view, t.label, t.iconKey, false));
        });
      });
      if (!tiles.length) {
        tiles.push(actionTile_('run', 'Run', 'run', false));
      }
      app.appendChild(el('div', { class: 'action-grid' }, tiles));

      // Stats from Supabase (shared context for widget renderers).
      const skel = el('div', { class: 'card' }, el('div', { class: 'skeleton' }));

      let stats = null;
      try { stats = await sbStats(); } catch (e) {}
      skel.remove();

      // Render each configured widget in order. Widget renderers can be
      // async — they may need to do their own fetches.
      const ctx = { app, modalities, stats, profile };
      for (const id of widgetIds) {
        const widget = WIDGET_CATALOG[id];

    async function widgetTrainingStreak_({ app }) {
      try {
        // Fetch a few months of session dates across all modalities.
        const uid = currentUser.id;
        const now = new Date();
        const sixtyDaysAgo = new Date(now); sixtyDaysAgo.setDate(now.getDate() - 60);
        const sinceISO = sixtyDaysAgo.toISOString().slice(0, 10);
        const [liftsR, runsR, walksR, pullsR, actsR] = await Promise.all([
          _sb.from('lift_sessions').select('date').eq('user_id', uid).gte('date', sinceISO),
          _sb.from('runs').select('date').eq('user_id', uid).gte('date', sinceISO),
          _sb.from('walks').select('date').eq('user_id', uid).gte('date', sinceISO),
          _sb.from('pullup_sessions').select('date').eq('user_id', uid).gte('date', sinceISO),
          _sb.from('activities').select('date').eq('user_id', uid).gte('date', sinceISO),
        ]);
        const days = new Set();
        [liftsR, runsR, walksR, pullsR, actsR].forEach(r => {
          (r.data || []).forEach(row => row.date && days.add(row.date));
        });
        // Compute streak — walking back from today. Break if a day has no
        // activity; today itself is allowed to be empty (streak is measured
        // through yesterday if today's not done yet).
        const todayISOStr = todayISO();
        let streak = 0;
        const cursor = new Date(todayISOStr + 'T12:00:00');
        // Skip today if no activity — we count "days trained through today or ended yesterday"
        const cursorISO = () => cursor.toISOString().slice(0, 10);
        if (!days.has(cursorISO())) cursor.setDate(cursor.getDate() - 1);
        while (days.has(cursorISO())) {
          streak += 1;
          cursor.setDate(cursor.getDate() - 1);
        }
        if (streak === 0) return; // don't show a zero streak
        app.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, 'Training streak'),
          el('div', { class: 'big' }, `${streak} day${streak === 1 ? '' : 's'}`),
          el('div', { class: 'muted', style: 'margin-top: 4px;' },
            'consecutive days with at least one session'),
        ]));
      } catch (e) { /* silent */ }
    }

          ]));

        // Remove border on last child for cleanliness

    async function widgetTodaysWorkout_({ app }) {
      try {
        // v32.4.2: iterate over BOTH training plans and active programs.
        // Training plans are date-anchored (specific workout on this date);
        // programs are rotation-based (Day A/B/C) — we surface them as a
        // "log a lift from this program" prompt without guessing which day.
        const items = await sbListActiveWorkoutItems();
        if (!items.length) return; // silent when nothing active

        const today = todayISO();
        const rows = [];

        items.forEach(item => {
          if (item.source === 'training_plan') {
            const day = findPlanDay_(item, today);
            const next = day ? null : firstUpcomingPlanDay_(item, today);
            if (day || next) {
              rows.push({ kind: 'plan', item, shownDay: day || next, isToday: !!day });
            }
          } else if (item.source === 'program') {
            // Programs get a "log a lift" prompt row.
            rows.push({ kind: 'program', item });
          }
        });

        if (!rows.length) return;

        const anyToday = rows.some(r => r.isToday || r.kind === 'program');
        const card = el('div', { class: 'card' });
        card.appendChild(el('div', { style: 'display: flex; justify-content: space-between; align-items: baseline;' }, [
          el('h2', { style: 'margin: 0;' }, anyToday ? "Today's workout" : 'Next workout'),
          el('span', { class: 'muted', style: 'font-size: 12px;' }, ''),
        ]));

        rows.forEach((row, i) => {
          const isFirst = i === 0;
          const baseStyle = 'padding: 10px 0; border-top: 1px solid var(--border); cursor: pointer;'
                         + (isFirst ? ' border-top-color: transparent; padding-top: 0;' : '');

          if (row.kind === 'plan') {
            const { item: plan, shownDay, isToday } = row;
            const wd = new Date(shownDay.date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            const summary = (shownDay.sessions || []).map(s => {
              if (s.type === 'lift') return s.name;
              if (s.type === 'run') {
                const bits = [s.name];
                if (s.target_miles) bits.push(`${s.target_miles} mi`);
                return bits.join(' · ');
              }
              return s.name || '';
            }).join(' + ');
            const typeLabel = (plan.plan_type || 'general').toUpperCase();
            // v32.4.3: route DIRECTLY to the appropriate logger for today's
            // session — saves a tap and matches the "one tap to log" flow
            // users expect from the Today's Workout tile. Only fall back
            // to the plan viewer when there's no obvious logger (unknown
            // session type or future-dated).
            const rowClick = async () => {
              if (!isToday) {
                _trainingPlanViewDate = shownDay.date;
                return render('training-plan');
              }
              const sessions = shownDay.sessions || [];
              const liftIdx = sessions.findIndex(s => s.type === 'lift');
              const runIdx  = sessions.findIndex(s => s.type === 'run');
              if (liftIdx !== -1) {
                // v32.4.5: same "already logged?" check as renderLift so
                // the Today's Workout row and the Lift tile behave the
                // same way — route to the completed session view when
                // the workout is already logged.
                const sessionName = sessions[liftIdx].name;
                try {
                  const existing = await sbGetLiftSession(shownDay.date, sessionName);
                  if (existing) {
                    _liftSessionRef = { date: shownDay.date, day: sessionName };
                    _liftAutoRouteReturnTo = 'home';
                    return render('lift-session');
                  }
                } catch (e) { /* fall through to log form */ }
                _planLogRef = {
                  date: shownDay.date,
                  sessionIndex: liftIdx,
                  session: sessions[liftIdx],
                  dayEntry: shownDay,
                };
                _liftAutoRouteReturnTo = 'home';
                return render('plan-log-lift');
              }
              if (runIdx !== -1) return render('run');
              _trainingPlanViewDate = shownDay.date;
              return render('training-plan');
            };
            card.appendChild(el('div', {
              style: baseStyle,
              onclick: rowClick,
            }, [
              el('div', { class: 'muted', style: 'font-size: 10px; letter-spacing: 0.6px; text-transform: uppercase;' },
                `${typeLabel} · ${plan.name}${isToday ? '' : ' · ' + wd}`),
              el('div', { style: 'margin-top: 4px; font-size: 15px; font-weight: 600;' }, summary || '—'),
              shownDay.week ? el('div', { class: 'muted', style: 'font-size: 12px; margin-top: 2px;' }, `Week ${shownDay.week}`) : null,
            ]));
          } else if (row.kind === 'program') {
            const { item: prog } = row;
            const s = prog.structure || {};
            const dayLetters = s.day_letters || [];
            const weekCount = s.weeks_total || (Array.isArray(s.weeks) ? s.weeks.length : 0);
            const typeLabel = (prog.plan_type || 'lift').toUpperCase();
            card.appendChild(el('div', {
              style: baseStyle,
              onclick: () => {
                // v32.4.3: bypass the training plan auto-route so the
                // program row actually opens the PROGRAM'S logger even
                // when a training plan has a lift scheduled for today.
                _bypassPlanAutoRouteForLift = true;
                render('lift');
              },
            }, [
              el('div', { class: 'muted', style: 'font-size: 10px; letter-spacing: 0.6px; text-transform: uppercase;' },
                `${typeLabel} · ${prog.name}`),
              el('div', { style: 'margin-top: 4px; font-size: 15px; font-weight: 600;' },
                'Log a lift from this program →'),
              el('div', { class: 'muted', style: 'font-size: 12px; margin-top: 2px;' },
                `${weekCount} weeks · Days ${dayLetters.join('/')}`),
            ]));
          }
        });

        card.appendChild(el('div', { class: 'muted', style: 'font-size: 11px; margin-top: 10px; text-align: right;' },
          'Tap a row to open →'));
        app.appendChild(card);
      } catch (e) { /* silent */ }
    }

    // Fallback weekly targets — used only if user_profiles row doesn't have
    // explicit values set yet. Editable from Home tap-to-edit (saves to
    // user_profiles.weekly_*_count_goal).
    const WEEKLY_RUN_GOAL_DEFAULT  = 4;
    const WEEKLY_LIFT_GOAL_DEFAULT = 3;

    // Persisted selection for the YTD card filter.
    let _ytdFilterMod = 'total';

    // Renders the "YTD" card with a segmented filter across the user's
    // picked distance-having modalities. Falls back to a single unfiltered
    // card when the user only has one distance modality.
    //
    // When the user taps a segment, we swap the card's inner contents in
    // place rather than triggering a full render('home') round-trip. That
    // makes the filter feel instant.
    function renderYtdCard_(app, modalities, stats) {
      const mileMods = ['running', 'walking', 'cycling', 'hiking'];
      const otherUnitMods = { swimming: 'yd', rowing: 'm' };
      const availableMileMods = mileMods.filter(m => modalities.includes(m));
      const availableOtherUnit = Object.keys(otherUnitMods).filter(m => modalities.includes(m));
      const allDistanceMods = [...availableMileMods, ...availableOtherUnit];
      if (allDistanceMods.length === 0) return;

      const labels = { running: 'Run', walking: 'Walk', cycling: 'Ride', hiking: 'Hike', swimming: 'Swim', rowing: 'Row' };
      const nounPlural = { running: 'runs', walking: 'walks', cycling: 'rides', hiking: 'hikes', swimming: 'swims', rowing: 'rows' };
      const unitFor = (m) => otherUnitMods[m] || 'mi';

      // Reset filter if the currently-selected mod isn't available anymore.
      if (_ytdFilterMod !== 'total' && !allDistanceMods.includes(_ytdFilterMod)) {
        _ytdFilterMod = 'total';
      }

      // Single distance modality → skip the filter, show a simple card.
      if (allDistanceMods.length === 1) {
        const only = allDistanceMods[0];
        const dist = stats.yearDistances[only] || 0;
        const count = stats.yearCounts[only] || 0;
        app.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, `${labels[only]} YTD`),
          el('div', { class: 'big' }, String(dist) + ' ' + unitFor(only)),
          el('div', { class: 'muted', style: 'margin-top: 4px;' }, `${count} ${nounPlural[only]}`),
        ]));
        return;
      }

      const segments = [];
      if (availableMileMods.length > 1) segments.push({ key: 'total', label: 'Total' });
      allDistanceMods.forEach(m => segments.push({ key: m, label: labels[m] }));

      // Compute values for a given filter key.
      const valuesFor = (filterKey) => {
        if (filterKey === 'total') {
          const sumMiles = availableMileMods.reduce((s, m) => s + (stats.yearDistances[m] || 0), 0);
          return {
            title: 'Distance YTD',
            big: String(Math.round(sumMiles * 10) / 10) + ' mi',
            subtitle: availableMileMods
              .map(m => `${stats.yearCounts[m] || 0} ${nounPlural[m]}`)
              .join(' · '),
          };
        }
        const m = filterKey;
        return {
          title: `${labels[m]} YTD`,
          big: String(stats.yearDistances[m] || 0) + ' ' + unitFor(m),
          subtitle: `${stats.yearCounts[m] || 0} ${nounPlural[m]}`,
        };
      };

      // Build the card shell + inner elements we'll update on tap.
      const titleEl    = el('h2', {}, '');
      const segEl      = el('div', { class: 'seg' });
      const bigEl      = el('div', { class: 'big' }, '');
      const subtitleEl = el('div', { class: 'muted', style: 'margin-top: 4px;' }, '');

      const applyFilter = (key) => {
        _ytdFilterMod = key;
        const v = valuesFor(key);
        titleEl.textContent    = v.title;
        bigEl.textContent      = v.big;
        subtitleEl.textContent = v.subtitle;
        // Update active class on segment buttons — no full DOM rebuild.
        Array.from(segEl.children).forEach(btn => {
          btn.classList.toggle('active', btn.dataset.key === key);
        });
      };

      segments.forEach(s => {
        const btn = el('button', {
          'data-key': s.key,
          onclick: () => applyFilter(s.key),
        }, s.label);
        segEl.appendChild(btn);
      });

      const card = el('div', { class: 'card' }, [titleEl, segEl, bigEl, subtitleEl]);
      app.appendChild(card);

      // Set initial state.
      applyFilter(_ytdFilterMod);
    }

    // Renders a single modality's weekly goal row.
    // - kind: modality id ('running', 'strength', 'cycling', etc.)
    // - goal = 0 means "not set" — bar shows empty + target reads "—"
    function goalRow_(label, done, goal, kind) {
      const goalNum = Number(goal) || 0;
      const hasGoal = goalNum > 0;
      const pct = hasGoal ? Math.min(100, Math.round((done / goalNum) * 100)) : 0;
      const isHit = hasGoal && done >= goalNum;

      const countEl = el('span', { class: 'goal-count' + (isHit ? ' hit' : '') });
      const renderRead = () => {
        countEl.innerHTML = '';
        countEl.appendChild(document.createTextNode(`${done} / `));
        const goalSpan = el('span', {
          class: 'goal-target',
          title: hasGoal ? 'Tap to edit target' : 'Tap to set weekly target',
        }, hasGoal ? String(goalNum) : '—');
        goalSpan.addEventListener('click', startEdit);
        countEl.appendChild(goalSpan);
      };
      const startEdit = () => {
        countEl.innerHTML = '';
        countEl.appendChild(document.createTextNode(`${done} / `));
        const input = el('input', {
          type: 'number',
          inputmode: 'numeric',
          pattern: '[0-9]*',
          class: 'goal-edit-input',
          min: '0',
          max: '99',
          placeholder: hasGoal ? '' : 'e.g. 3',
          value: hasGoal ? String(goalNum) : '',
        });
        countEl.appendChild(input);
        input.focus();
        input.select();
        const commit = async () => {
          input.disabled = true;
          try {
            const newVal = await sbUpdateGoal(kind, input.value);
            toast(newVal > 0 ? `${label} goal: ${newVal}` : `${label} goal cleared`);
            render('home');
          } catch (e) {
            toast('Could not save: ' + e.message, true);
            renderRead();
          }
        };
        let committed = false;
        input.addEventListener('blur', () => { if (!committed) { committed = true; commit(); } });
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { committed = true; input.blur(); commit(); }
          if (e.key === 'Escape') { committed = true; renderRead(); }
        });
      };
      renderRead();

      return el('div', { class: 'goal-row' }, [
        el('div', { class: 'goal-head' }, [
          el('span', { class: 'goal-label' }, label),
          countEl,
        ]),
        el('div', { class: 'goal-bar' }, [
          el('div', { class: 'goal-fill' + (isHit ? ' hit' : ''), style: `width: ${pct}%;` }),
        ]),
      ]);
    }

    function dayTitle(d) {
      if (d === 'A') return 'Push Day';
      if (d === 'B') return 'Pull Day';
      if (d === 'C') return 'Full Upper';
      return 'Lift';
    }

    function actionTile_(view, label, iconKeyOrIsToday, maybeIsToday) {
      // Signature is a little permissive so old call-sites still work.
      // New: actionTile_('lift', 'Lift', 'lift', false)  → 4 args, iconKey given
      // Old: actionTile_('lift', 'Lift', false)          → 3 args, isToday given
      let iconKey, isToday;
      if (typeof iconKeyOrIsToday === 'string') {
        iconKey = iconKeyOrIsToday;
        isToday = !!maybeIsToday;
      } else {
        iconKey = view; // derive icon from view name (legacy)
        isToday = !!iconKeyOrIsToday;
      }
      const icons = {
        lift: '<path d="M5 8v8M3 10v4M19 8v8M21 10v4M5 12h14"/>',
        run: '<circle cx="13" cy="4" r="2"/><path d="M6 22l3-6 3 2 2-4 3 2M9 16l-1-5 4-3 3 3 2 2"/>',
        pullups: '<path d="M3 4h18M6 4v4a6 6 0 0 0 12 0V4"/><circle cx="12" cy="13" r="2"/><path d="M12 15v4M9 19h6"/>',
        walk: '<circle cx="13" cy="4" r="2"/><path d="M9 22l2-6 2.5 2 2-7M7.5 12.5l1.5-4 4 1 1.5 2.5 3-1"/>',
        bike: '<circle cx="6" cy="17" r="3"/><circle cx="18" cy="17" r="3"/><path d="M6 17l4-7h6l2 7M10 10l3-4h4M13 17h5"/>',
        boot: '<path d="M6 4v10M6 14h6l3 3v3H4v-6zM9 14v-4h3l2 2"/>',
        swim: '<path d="M2 10c2 0 3-2 5-2s3 2 5 2 3-2 5-2 3 2 5 2M2 16c2 0 3-2 5-2s3 2 5 2 3-2 5-2 3 2 5 2M2 22c2 0 3-2 5-2s3 2 5 2 3-2 5-2 3 2 5 2"/>',
        row: '<circle cx="12" cy="5" r="2"/><path d="M4 14l8-2 8 2M6 20l6-4 6 4"/>',
        yoga: '<circle cx="12" cy="5" r="2"/><path d="M12 7v6M6 13c2 0 4 2 6 2s4-2 6-2M8 21l4-6 4 6"/>',
        star: '<path d="M12 3l2.5 6 6.5.5-5 4.5 1.5 6.5L12 17l-5.5 3.5L8 14l-5-4.5 6.5-.5z"/>',

    // v32.4.3: set by Today's Workout program row so renderLift skips
    // the training plan auto-route and uses the program's lift logger
    // instead. Cleared after one use.
    let _bypassPlanAutoRouteForLift = false;
    // v32.4.4: remembers where the user came from BEFORE renderLift
    // auto-routed to plan-log-lift, so plan-log-lift's back button can
    // return there instead of routing back to renderLift and looping.
    let _liftAutoRouteReturnTo = null;

    async function renderLift(app) {
      // Capture the real caller before any auto-routes fire. renderLift
      // gets called via render('lift'), which has already updated
      // _previousView to whatever was current before Lift (usually 'home').
      const preLiftView = _previousView;

      // If a training plan is active and today has a lift session, route the
      // user straight into the plan-based logger. BUT: when the user tapped
      // a specific PROGRAM row on Home, we bypass this and let them log
      // against that program.
      const bypass = _bypassPlanAutoRouteForLift;
      _bypassPlanAutoRouteForLift = false;
      if (!bypass) {
        try {
          const plan = await sbActiveTrainingPlan();
          if (plan) {
            const today = todayISO();
            const dayEntry = findPlanDay_(plan, today);
            if (dayEntry) {
              const liftSessIdx = (dayEntry.sessions || []).findIndex(s => s.type === 'lift');
              if (liftSessIdx !== -1) {
                const sessionName = dayEntry.sessions[liftSessIdx].name;
                // v32.4.4: if the user ALREADY logged this session today,
                // route to the read-only session detail (with an Edit CTA)
                // instead of the empty log form. Better matches the mental
                // model — "I already did that."
                let existing = null;
                try { existing = await sbGetLiftSession(today, sessionName); }
                catch (e) { existing = null; }
                if (existing) {
                  _liftSessionRef = { date: today, day: sessionName };
                  _liftAutoRouteReturnTo = preLiftView;
                  return render('lift-session');
                }
                _planLogRef = {
                  date: today,
                  sessionIndex: liftSessIdx,
                  session: dayEntry.sessions[liftSessIdx],
                  dayEntry,
                };
                _liftAutoRouteReturnTo = preLiftView;
                return render('plan-log-lift');
              }
            }
          }
        } catch (e) { /* fall through to legacy program-based lift logger */ }
      }
      _liftAutoRouteReturnTo = null;

      app.appendChild(el('header', { class: 'top' }, [
        el('h1', {}, 'Log Lift'),
        el('span', { class: 'date' }, fmtDateLong(new Date())),
      ]));
      // v32.4.4: Back button when the user came here directly (e.g. from
      // the Home Push/Pull program row, which bypasses the plan auto-route).
      const backToLift = preLiftView && !['lift'].includes(preLiftView) ? preLiftView : 'home';
      const backLiftLabel = backToLift === 'home' ? '← Back to Home'
                          : backToLift === 'calendar' ? '← Back to Calendar'
                          : backToLift === 'programs' ? '← Back to Programs'
                          : '← Back';
      app.appendChild(el('button', {
        class: 'btn-link',
        style: 'background: transparent; color: var(--muted); border: none; padding: 0; margin-bottom: 8px; text-align: left; width: auto; font-size: 13px;',
        onclick: () => render(backToLift),
      }, backLiftLabel));

      const skel = el('div', { class: 'card' }, el('div', { class: 'skeleton', style: 'height: 80px;' }));
      app.appendChild(skel);

      // Load program config (cached) + today (for auto defaults)
      let prog = null;
      let today = { liftDay: 'A', blockName: null, programWeek: 1 };
      try { prog = await loadProgram(); } catch (e) {}
      try {
        if (!todayCache && getConfig().scriptUrl && getConfig().token) todayCache = await api('today');
        if (todayCache) today = todayCache;
      } catch (e) {}
      skel.remove();

      if (!prog) {
        app.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, 'No active program'),
          el('p', { class: 'muted', style: 'font-size: 14px;' },
            'Log a lift on the fly, or activate a program in the Programs tab for guided templates.'),
          el('button', {
            onclick: () => render('lift-freeform'),
            style: 'margin-top: 12px;',
          }, 'Log a lift'),
          el('button', {
            onclick: () => render('programs'),
            style: 'margin-top: 8px; background: var(--surface-2); color: var(--text); border: 1px solid var(--border);',
          }, 'Go to Programs'),
        ]));
        return;
      }

      // Always-available escape hatch to freestyle logging, even when a
      // program is loaded. Sits above the block/week/day selector so it's
      // discoverable but out of the way.
      app.appendChild(el('button', {
        style: 'margin-bottom: 12px; background: var(--surface-2); color: var(--text); border: 1px solid var(--border); font-size: 13px; padding: 8px 14px; width: auto;',
        onclick: () => render('lift-freeform'),
      }, '+ Log a lift outside this program'));

      // Initialize liftSelection. Default day suggests the NEXT letter after
      // the most recent lift session (so an A/B rotation cycles A → B → A
      // automatically). Block + week come from program metadata.
      if (!liftSelection) {
        const dayLetters = (prog && prog.dayLetters) || ['A', 'B', 'C'];
        let suggestedDay = await suggestNextLiftDay_(dayLetters).catch(() => dayLetters[0]);
        if (!dayLetters.includes(suggestedDay)) suggestedDay = dayLetters[0];

        // Block defaults: first block of the active program, current week within it.
        const firstBlock = (prog && prog.blocks && prog.blocks[0]) || null;
        const defaultBlock = (firstBlock && firstBlock.name) || today.blockName || 'Block 1';
        const defaultWeek  = (firstBlock && firstBlock.startWeek) || today.programWeek || 1;

        liftSelection = { block: defaultBlock, week: defaultWeek, day: suggestedDay };
      }

      // Selector card
      const selectorCard = el('div', { class: 'card', id: 'selectorCard' });
      app.appendChild(selectorCard);

      // Date picker — defaults to today, editable so back-logging works.
      // Lives outside fetchAndRenderExercises so changing Block/Week/Day
      // pills doesn't reset whatever date the user typed. Changing the date
      // re-triggers exercise fetch so prev-time prefill stays accurate.
      const dateInput = el('input', {
        id: 'liftDate',
        type: 'date',
        value: liftSelection.date || todayISO(),
        style: 'flex: 1; margin: 0;',
        onchange: () => {
          liftSelection.date = dateInput.value || todayISO();
          fetchAndRenderExercises();
        },
      });
      const dateCard = el('div', { class: 'card', style: 'padding: 12px 16px;' }, [
        el('div', { class: 'field', style: 'margin: 0; display: flex; align-items: center; gap: 12px;' }, [
          el('label', { for: 'liftDate', style: 'margin: 0; min-width: 70px;' }, 'Date'),
          dateInput,
        ]),
      ]);
      app.appendChild(dateCard);

      // Exercises container
      const exContainer = el('div', { id: 'exContainer' });
      app.appendChild(exContainer);

      function renderSelector() {
        selectorCard.innerHTML = '';
        selectorCard.appendChild(el('div', { class: 'selector-summary' }, [
          el('div', {}, [
            el('div', { class: 'label' }, 'Today\'s session'),
            el('div', { class: 'value' }, `${liftSelection.block} · Week ${liftSelection.week} · Day ${liftSelection.day}`),
            el('div', { class: 'muted' }, dayTitle(liftSelection.day)),
          ]),
          el('button', { class: 'edit', onclick: () => { selectorOpen = !selectorOpen; renderSelector(); } },
            selectorOpen ? 'Done' : 'Change'),
        ]));

        if (selectorOpen) {
          const body = el('div', { class: 'selector-body' });

          // Block row
          body.appendChild(el('div', { class: 'pill-row-label' }, 'Block'));
          const blockRow = el('div', { class: 'pill-row' });
          prog.blocks.forEach(b => {
            blockRow.appendChild(el('button', {
              class: 'pill-btn' + (b.name === liftSelection.block ? ' active' : ''),
              onclick: () => {
                liftSelection.block = b.name;
                // Snap week into the block's range if needed
                if (liftSelection.week < b.startWeek || liftSelection.week > b.endWeek) {
                  liftSelection.week = b.startWeek;
                }
                renderSelector();
                fetchAndRenderExercises();
              },
            }, b.name));
          });
          body.appendChild(blockRow);

          // Week row (constrained to current block)
          const block = prog.blocks.find(b => b.name === liftSelection.block);
          if (block) {
            body.appendChild(el('div', { class: 'pill-row-label' }, 'Week'));
            const weekRow = el('div', { class: 'pill-row' });
            for (let w = block.startWeek; w <= block.endWeek; w++) {
              weekRow.appendChild(el('button', {
                class: 'pill-btn' + (w === liftSelection.week ? ' active' : ''),
                onclick: () => { liftSelection.week = w; renderSelector(); fetchAndRenderExercises(); },
              }, 'W' + w));
            }
            body.appendChild(weekRow);
          }

          // Day row
          body.appendChild(el('div', { class: 'pill-row-label' }, 'Day'));
          const dayRow = el('div', { class: 'pill-row' });
          ['A', 'B', 'C'].forEach(d => {
            dayRow.appendChild(el('button', {
              class: 'pill-btn' + (d === liftSelection.day ? ' active' : ''),
              onclick: () => { liftSelection.day = d; renderSelector(); fetchAndRenderExercises(); },
            }, `Day ${d} — ${dayTitle(d)}`));
          });
          body.appendChild(dayRow);

          selectorCard.appendChild(body);
        }
      }

      async function fetchAndRenderExercises() {
        exContainer.innerHTML = '';
        const loading = el('div', { class: 'card' }, el('div', { class: 'skeleton', style: 'height: 200px;' }));
        exContainer.appendChild(loading);

        // Sync date input → liftSelection.date so the prev-time prefill uses
        // whatever date the user has chosen (back-logging support).
        const dateInp = $('#liftDate');
        if (dateInp && dateInp.value) liftSelection.date = dateInp.value;

        // v14+: read templates from the active Supabase program. Fall back to
        // Apps Script only if no active program is set (covers users who
        // haven't migrated yet).
        let tpl;
        try {
          tpl = await loadLiftTemplate_(liftSelection);
        } catch (e) {
          loading.remove();
          exContainer.appendChild(el('div', { class: 'card' }, 'Could not load template: ' + e.message));
          return;
        }
        loading.remove();

        if (tpl.source === 'none') {
          exContainer.appendChild(el('div', { class: 'card' }, [
            el('p', { class: 'muted', style: 'font-size: 14px;' },
              'No active program. Open the Programs tab and activate one to load exercise templates here.'),
            el('button', { onclick: () => render('programs'), style: 'margin-top: 12px;' }, 'Go to Programs'),
          ]));
          return;
        }

        if (!tpl.exercises.length) {
          exContainer.appendChild(el('div', { class: 'card' }, 'No exercises for this slot.'));
          return;
        }

        const form = el('div', { id: 'liftForm' });
        tpl.exercises.forEach((ex, idx) => {
          const card = el('div', { class: 'exercise', 'data-idx': idx }, [
            el('h3', {}, ex.name),
            el('div', { class: 'meta' }, [
              ex.category ? el('span', { class: 'pill ' + categoryClass(ex.category) }, ex.category) : null,
              el('span', {}, `${ex.sets} sets · ${ex.targetReps}`),
            ]),
            ex.notes ? el('div', { class: 'notes' }, ex.notes) : null,
            el('div', { class: 'field' }, [
              el('label', {}, 'Weight'),
              el('input', { class: 'inp-weight', type: 'text', placeholder: 'e.g. 50 or BW', value: ex.weight || '', inputmode: 'text' }),
            ]),
            (() => {
              const grid = el('div', { class: 'set-grid' });
              grid.appendChild(el('div', {
                style: 'font-size: 10px; color: var(--muted); text-align: right; padding-right: 4px; align-self: center; font-weight: 600;',
              }, 'REPS'));
              const prescribedSets = Math.min(4, Math.max(1, Number(ex.sets) || 4));
              ['Set 1', 'Set 2', 'Set 3', 'Set 4'].forEach((lab, i) => {
                const isActive = (i + 1) <= prescribedSets;
                const inpAttrs = {
                  class: 'inp-r' + (i + 1) + (isActive ? '' : ' inp-disabled'),
                  type: 'number', inputmode: 'numeric', pattern: '[0-9]*',
                  placeholder: isActive ? '—' : '',
                  value: isActive ? (ex['r' + (i + 1)] === '' ? '' : String(ex['r' + (i + 1)] || '')) : '',
                };
                if (!isActive) inpAttrs.disabled = 'disabled';
                grid.appendChild(el('div', {}, [
                  el('div', {
                    style: 'font-size: 10px; text-align: center; color: ' + (isActive ? 'var(--muted)' : '#3a3a3a') + '; margin-bottom: 4px;',
                  }, lab),
                  el('input', inpAttrs),
                ]));
              });
              return grid;
            })(),
            el('div', { class: 'field', style: 'margin-top: 10px; margin-bottom: 0;' }, [
              el('input', {
                class: 'inp-notes', type: 'text',
                placeholder: 'Per-exercise notes (optional)',
                value: ex.sessionNotes || '',
              }),
            ]),
            renderLastWeek_(ex),
          ]);
          form.appendChild(card);
        });
        exContainer.appendChild(form);

        exContainer.appendChild(el('div', { class: 'field', style: 'margin-top: 16px;' }, [
          el('label', {}, 'Session notes (optional)'),
          el('input', { id: 'liftSessionNotes', type: 'text', placeholder: 'how did it feel?' }),
        ]));

        exContainer.appendChild(el('button', {
          onclick: async () => {
            const entries = [];
            form.querySelectorAll('.exercise').forEach((card, i) => {
              const ex = tpl.exercises[i];
              const weight = card.querySelector('.inp-weight').value.trim();
              const r = [1, 2, 3, 4].map(n => {
                const v = card.querySelector('.inp-r' + n).value.trim();
                return v === '' ? '' : Number(v);
              });
              const notesInp = card.querySelector('.inp-notes');
              entries.push({
                name: ex.name, category: ex.category, weight,
                r1: r[0], r2: r[1], r3: r[2], r4: r[3],
                notes: notesInp ? notesInp.value.trim() : '',
              });
            });
            const dateInp = $('#liftDate');
            const meta = {
              date: (dateInp && dateInp.value) ? dateInp.value : todayISO(),
              block: liftSelection.block,
              week: liftSelection.week,
              day: liftSelection.day,
              notes: ($('#liftSessionNotes').value || '').trim(),
            };
            // Remember the chosen date on liftSelection so it survives a
            // re-render of the selector / exercises within this screen.
            liftSelection.date = meta.date;
            try {
              const res = await sbLogLift(entries, meta);
              if (res.duplicate) toast('Already logged this session');
              else toast('Saved to Lift Log');
              setTimeout(() => render('home'), 900);
            } catch (e) {
              toast('Could not save: ' + e.message, true);
            }
          },
        }, 'Save session'));
      }

      renderSelector();
      fetchAndRenderExercises();
    }

      ]));

      if (showDistance) {
        card.appendChild(el('div', { class: 'field' }, [

        el('label', {}, 'Time — optional'),

          el('div', {}, 'sec'),
        ]),

      // Intensity buttons — optional
      card.appendChild(el('div', { class: 'field' }, [
        el('label', {}, 'Intensity — optional'),
        el('div', { class: 'pill-row', id: 'actIntensityRow' },
          ['easy', 'moderate', 'hard', 'race'].map(lv => el('button', {
            class: 'pill-btn',
            'data-intensity': lv,
            onclick: (e) => {
              // toggle-select
              const btns = e.target.parentElement.querySelectorAll('button');
              btns.forEach(b => b.classList.remove('active'));
              e.target.classList.add('active');
            },
          }, lv.charAt(0).toUpperCase() + lv.slice(1))),
        ),

        el('label', {}, 'Notes — optional'),
        el('input', { id: 'actNotes', type: 'text', placeholder: type === 'yoga' ? 'Flow, restorative, hot, etc.' : 'How it felt, route, etc.' }),
      ]));

      card.appendChild(el('button', {
        onclick: async () => {
          const date = $('#actDate').value;
          if (!date) return toast('Date required', true);
          const minRaw = $('#actMin').value.trim();
          const secRaw = $('#actSec').value.trim();
          const durSecs = (Number(minRaw) || 0) * 60 + (Number(secRaw) || 0);
          const distance = showDistance ? Number($('#actDist').value) : null;
          const intensityBtn = document.querySelector('#actIntensityRow .pill-btn.active');
          const intensity = intensityBtn ? intensityBtn.getAttribute('data-intensity') : null;
          const notes = $('#actNotes').value.trim();

          if (!durSecs && !distance) {
            return toast('Add at least a time or a distance', true);
          }

          try {
            await sbLogActivity({
              type, date,
              duration_secs: durSecs || null,
              distance:      distance || null,
              intensity,
              notes,
            });
