<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Workouts" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <title>Workouts</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-2: #1d1d1d;
      --border: #2a2a2a;
      --text: #f5f5f5;
      --muted: #8a8a8a;
      --accent: #ff6b35;
      --success: #32d74b;
      --warn: #ff9f0a;
      --danger: #ff453a;
      --radius: 14px;
      --radius-lg: 20px;
      --shadow: 0 2px 14px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      font-size: 16px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: contain;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .app {
      flex: 1;
      max-width: 520px;
      margin: 0 auto;
      width: 100%;
      padding: 0 16px 88px 16px;
      padding-top: calc(env(safe-area-inset-top) + 12px);
    }
    header.top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 4px 0 16px 0;
    }
    header.top h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    header.top .date {
      color: var(--muted);
      font-size: 14px;
    }
    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .card h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .big {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .row { display: flex; gap: 12px; align-items: center; }
    .spaced { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .col { display: flex; flex-direction: column; gap: 2px; }
    .muted { color: var(--muted); font-size: 13px; }
    .pill {
      display: inline-block;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 10px;
      background: var(--surface-2);
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .pill.chest { background: #3a1f1a; color: #ff9b7a; }
    .pill.back  { background: #1a2a3a; color: #7ab7ff; }
    .pill.bicep, .pill.tricep { background: #3a2a1a; color: #ffc07a; }
    .pill.shoulder { background: #2a1a3a; color: #c07aff; }
    .pill.micro { background: #1a3a2a; color: #7affb7; }
    .pill.intensity { background: #3a1a1a; color: #ff7a7a; }
    .pill.core { background: #1a1a3a; color: #7a9bff; }

    /* ---- RUN PLANNER TAB ---- */
    .plan-dist-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 4px; }
    .plan-dist-btn { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 6px; text-align: center; cursor: pointer; color: var(--text); font-family: inherit; transition: border-color 0.15s, background 0.15s; }
    .plan-dist-btn.sel { border-color: var(--accent); background: rgba(255,107,53,0.12); }
    .plan-dist-icon { font-size: 18px; margin-bottom: 3px; }
    .plan-dist-name { font-size: 12px; font-weight: 700; display: block; }
    .plan-dist-sub { font-size: 10px; color: var(--muted); display: block; margin-top: 1px; }
    .plan-level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .plan-level-btn { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 6px; text-align: center; cursor: pointer; color: var(--text); font-family: inherit; transition: border-color 0.15s, background 0.15s; }
    .plan-level-btn.sel { border-color: var(--accent); background: rgba(255,107,53,0.12); }
    .plan-level-icon { font-size: 20px; margin-bottom: 4px; }
    .plan-level-name { font-size: 12px; font-weight: 700; display: block; }
    .plan-level-desc { font-size: 10px; color: var(--muted); display: block; margin-top: 2px; line-height: 1.3; }
    .plan-slider-row { margin-bottom: 16px; }
    .plan-slider-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .plan-slider-hdr label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .plan-slider-val { font-size: 22px; font-weight: 700; color: var(--accent); }
    .plan-slider-val span { font-size: 12px; color: var(--muted); font-weight: 500; }
    input.plan-range { -webkit-appearance: none; width: 100%; height: 4px; background: var(--border); border-radius: 2px; outline: none; cursor: pointer; border: none; padding: 0; }
    input.plan-range::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--accent); box-shadow: 0 2px 8px rgba(255,107,53,0.4); cursor: pointer; }
    .plan-slider-marks { display: flex; justify-content: space-between; margin-top: 4px; }
    .plan-slider-marks span { font-size: 10px; color: var(--muted); }
    .plan-optional { border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; background: var(--surface-2); }
    .plan-optional.active { border-color: var(--accent); }
    .plan-opt-text strong { font-size: 13px; color: var(--text); display: block; }
    .plan-opt-text small { font-size: 11px; color: var(--muted); }
    .plan-opt-arrow { margin-left: auto; color: var(--muted); font-size: 16px; transition: transform 0.2s; }
    .plan-optional.active .plan-opt-arrow { transform: rotate(90deg); }
    .plan-race-fields { display: none; gap: 10px; margin-bottom: 12px; }
    .plan-race-fields.vis { display: flex; }
    .plan-race-col { flex: 1; }
    .plan-race-col label { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 6px; display: block; }
    .plan-err { background: rgba(255,69,58,0.1); border: 1px solid rgba(255,69,58,0.3); border-radius: 10px; padding: 12px; font-size: 13px; color: #ff453a; margin-top: 10px; display: none; }
    .plan-err.vis { display: block; }
    .plan-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
    .plan-stat { background: var(--surface-2); border-radius: var(--radius); padding: 12px 8px; text-align: center; border: 1px solid var(--border); }
    .plan-stat .sv { font-size: 20px; font-weight: 700; color: var(--accent); }
    .plan-stat .sl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
    .effort-pill { display: flex; background: var(--surface-2); border-radius: 20px; padding: 3px; gap: 2px; border: 1px solid var(--border); }
    .effort-pill button { flex: 1; background: transparent; color: var(--muted); font-size: 12px; font-weight: 700; padding: 7px 10px; border-radius: 17px; width: auto; letter-spacing: 0; text-transform: none; }
    .effort-pill button.active { background: var(--accent); color: #fff; }
    .pace-guide-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; margin-bottom: 6px; }
    .pace-gdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .pace-glabel { flex: 1; }
    .pace-glabel strong { font-size: 13px; font-weight: 600; color: var(--text); display: block; }
    .pace-glabel small { font-size: 11px; color: var(--muted); }
    .pace-gval { font-size: 14px; font-weight: 700; color: var(--text); }
    .plan-expand-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .plan-expand-btn { font-size: 12px; font-weight: 600; color: var(--muted); background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; cursor: pointer; font-family: inherit; width: auto; }
    .plan-week-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 10px; overflow: hidden; }
    .plan-week-hdr { display: flex; align-items: center; padding: 13px 14px; cursor: pointer; gap: 10px; }
    .plan-wk-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; padding: 3px 9px; border-radius: 20px; flex-shrink: 0; text-transform: uppercase; }
    .plan-wk-badge.build { background: rgba(255,107,53,0.15); color: var(--accent); }
    .plan-wk-badge.deload { background: rgba(138,138,138,0.15); color: var(--muted); }
    .plan-wk-badge.taper { background: rgba(191,90,242,0.15); color: #bf5af2; }
    .plan-wk-badge.race-wk { background: rgba(255,69,58,0.15); color: #ff453a; }
    .plan-week-title { flex: 1; font-size: 14px; font-weight: 600; color: var(--text); min-width: 0; }
    .plan-week-meta { text-align: right; flex-shrink: 0; }
    .plan-week-mi { font-size: 15px; font-weight: 700; color: var(--text); }
    .plan-week-ct { font-size: 11px; color: var(--muted); }
    .plan-chevron { color: var(--muted); font-size: 12px; transition: transform 0.2s; flex-shrink: 0; }
    .plan-week-hdr.open .plan-chevron { transform: rotate(180deg); }
    .plan-workouts { display: none; padding: 0 12px 12px; gap: 8px; flex-direction: column; }
    .plan-workouts.open { display: flex; }
    .plan-wo-row { display: flex; gap: 10px; align-items: flex-start; padding: 11px; border-radius: var(--radius); border: 1px solid; }
    .plan-wo-row.easy { background: rgba(50,215,75,0.06); border-color: rgba(50,215,75,0.18); }
    .plan-wo-row.interval { background: rgba(255,69,58,0.06); border-color: rgba(255,69,58,0.18); }
    .plan-wo-row.tempo { background: rgba(255,159,10,0.06); border-color: rgba(255,159,10,0.18); }
    .plan-wo-row.longrun { background: rgba(191,90,242,0.06); border-color: rgba(191,90,242,0.18); }
    .plan-wo-row.timetrial { background: rgba(255,55,95,0.06); border-color: rgba(255,55,95,0.18); }
    .plan-wo-row.race { background: rgba(255,107,53,0.08); border-color: rgba(255,107,53,0.25); }
    .plan-wo-bar { width: 3px; border-radius: 2px; align-self: stretch; min-height: 36px; flex-shrink: 0; }
    .easy .plan-wo-bar { background: #32d74b; } .interval .plan-wo-bar { background: #ff453a; }
    .tempo .plan-wo-bar { background: #ff9f0a; } .longrun .plan-wo-bar { background: #bf5af2; }
    .timetrial .plan-wo-bar { background: #ff375f; } .race .plan-wo-bar { background: var(--accent); }
    .plan-wo-info { flex: 1; min-width: 0; }
    .plan-wo-type { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 2px; }
    .easy .plan-wo-type { color: #32d74b; } .interval .plan-wo-type { color: #ff453a; }
    .tempo .plan-wo-type { color: #ff9f0a; } .longrun .plan-wo-type { color: #bf5af2; }
    .timetrial .plan-wo-type { color: #ff375f; } .race .plan-wo-type { color: var(--accent); }
    .plan-wo-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .plan-wo-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .plan-wo-effort { font-size: 11px; color: var(--muted); margin-top: 4px; font-style: italic; }
    .plan-wo-dist { text-align: right; flex-shrink: 0; }
    .plan-wo-dist .mi { font-size: 16px; font-weight: 700; color: var(--text); }
    .plan-wo-dist .unit { font-size: 11px; color: var(--muted); }
    .plan-tip { background: rgba(50,215,75,0.05); border: 1px solid rgba(50,215,75,0.12); border-radius: var(--radius); padding: 14px; font-size: 12px; color: var(--muted); line-height: 1.6; margin-top: 10px; }
    .plan-tip strong { color: var(--text); }

    /* ---- Auth screen ---- */
    .auth-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:calc(100vh - 80px); padding:24px; gap:0; }
    .auth-logo { font-size:52px; margin-bottom:10px; }
    .auth-title { font-size:26px; font-weight:700; margin-bottom:4px; }
    .auth-sub { color:var(--muted); font-size:14px; text-align:center; margin-bottom:28px; }
    .auth-card { width:100%; max-width:360px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:24px; display:flex; flex-direction:column; gap:12px; }
    .auth-card input[type="email"] { width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:16px; padding:14px 16px; transition:border-color .15s; }
    .auth-card input[type="email"]::placeholder { color:var(--muted); }
    .auth-card input[type="email"]:focus { outline:none; border-color:var(--accent); }
    .auth-confirm { text-align:center; padding:8px 0; }
    .auth-confirm .auth-check { font-size:38px; margin-bottom:10px; }
    .auth-confirm p { color:var(--muted); font-size:14px; line-height:1.6; }
    .auth-confirm strong { color:var(--text); }

    button, .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: inherit;
      font-size: 17px;
      font-weight: 600;
      padding: 14px 16px;
      border-radius: var(--radius);
      width: 100%;
      cursor: pointer;
      transition: transform 0.08s ease;
      -webkit-appearance: none;
      appearance: none;
    }
    button:active, .btn:active { transform: scale(0.97); }
    button.secondary, .btn.secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    button.ghost { background: transparent; color: var(--accent); }
    button.danger { background: var(--danger); }

    input, select, textarea {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 16px;
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
    }
    input[inputmode="decimal"], input[inputmode="numeric"] { text-align: center; }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .field { margin-bottom: 12px; }

    nav.bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(20, 20, 20, 0.92);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-top: 1px solid var(--border);
      padding: 10px 0 calc(env(safe-area-inset-bottom) + 8px);
      display: flex;
      z-index: 100;
    }
    nav.bottom button {
      flex: 1;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 6px 4px;
      border-radius: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    nav.bottom button.active { color: var(--accent); }
    nav.bottom button svg { width: 22px; height: 22px; }

    .exercise {
      background: var(--surface-2);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
    }
    .exercise h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.25;
    }
    .exercise .meta {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .exercise .notes {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      font-style: italic;
      line-height: 1.4;
    }
    .set-grid {
      display: grid;
      grid-template-columns: 1.2fr repeat(4, 1fr);
      gap: 6px;
    }
    .set-grid input { padding: 8px 4px; font-size: 15px; }
    .prev {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      text-align: right;
    }
    .prev b { color: var(--text); }

    .set-grid-5 {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }
    .set-grid-5 input { padding: 10px 4px; font-size: 15px; }

    /* Block/Week/Day selector */
    .selector-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .selector-summary .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }
    .selector-summary .value { font-size: 18px; font-weight: 600; }
    .selector-summary .edit {
      background: var(--surface-2);
      color: var(--accent);
      font-size: 14px;
      padding: 8px 14px;
      width: auto;
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .selector-body { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 14px; }
    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .pill-row .pill-btn {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 9px 14px;
      border-radius: 10px;
      font-size: 14px;
      width: auto;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: none;
    }
    .pill-row .pill-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .pill-row-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .toast {
      position: fixed;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--success);
      color: #000;
      padding: 10px 18px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 200;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--danger); color: #fff; }

    .skeleton {
      background: linear-gradient(90deg, var(--surface) 0%, var(--surface-2) 50%, var(--surface) 100%);
      background-size: 200% 100%;
      animation: sk 1.4s infinite;
      border-radius: 10px;
      height: 80px;
    }
    @keyframes sk { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .hidden { display: none !important; }

    /* Greyed/disabled set input */
    input.inp-disabled {
      background: #0d0d0d;
      color: #444;
      border: 1px dashed #2a2a2a;
      pointer-events: none;
      background-image:
        linear-gradient(135deg, transparent 46%, #2a2a2a 47%, #2a2a2a 53%, transparent 54%);
    }

    /* Home action grid */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .action-tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      width: 100%;
    }
    .action-tile svg { width: 28px; height: 28px; color: var(--accent); }
    .action-tile.today { border-color: var(--accent); }
    .action-tile.today::after {
      content: 'TODAY';
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--accent);
      font-weight: 700;
    }

    /* Year filter segmented */
    .seg {
      display: flex;
      gap: 6px;
      background: var(--surface);
      padding: 4px;
      border-radius: 12px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .seg button {
      background: transparent;
      color: var(--muted);
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      width: auto;
      flex-shrink: 0;
      letter-spacing: 0;
      text-transform: none;
    }
    .seg button.active {
      background: var(--accent);
      color: #fff;
    }

    /* Calendar */
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .cal-header h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); text-transform: none; margin: 0; }
    .cal-nav-btn {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      width: 36px; height: 36px;
      padding: 0;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px;
      border-radius: var(--radius-lg);
    }
    .cal-dow {
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      padding: 4px 0;
    }
    .cal-day {
      aspect-ratio: 1 / 1;
      background: var(--surface-2);
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 4px;
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: stretch;
      cursor: pointer;
      width: 100%;
    }
    .cal-day.empty { background: transparent; pointer-events: none; }
    .cal-day.today { border-color: var(--accent); color: var(--accent); }
    .cal-day.has-activity { background: #1a1a1a; }
    .cal-day.selected { border-color: var(--accent); background: #2a1a10; }
    .cal-num { text-align: left; line-height: 1; }
    .cal-dots {
      display: flex;
      gap: 3px;
      justify-content: flex-end;
    }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; }
    .cal-dot.lift { background: #ff6b35; }
    .cal-dot.run  { background: #7ab7ff; }
    .cal-dot.pull { background: #7affb7; }

    .cal-detail {
      margin-top: 12px;
    }

    /* Profile - PR badges */
    .pr-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .pr-badge {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
    }
    .pr-badge .b-name { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 700; margin-bottom: 6px; }
    .pr-badge .b-pace { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .pr-badge .b-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* Profile - Shoes */
    .shoe-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 8px;
    }
    .shoe-name { font-weight: 600; font-size: 15px; }
    .shoe-brand { font-size: 12px; color: var(--muted); }
    .shoe-miles-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 6px; }
    .shoe-miles { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .shoe-miles.warn  { color: var(--warn); }
    .shoe-miles.danger { color: var(--danger); }
    .shoe-bar {
      height: 6px; background: #0d0d0d; border-radius: 3px; overflow: hidden;
      margin-top: 8px;
    }
    .shoe-bar-fill { height: 100%; background: var(--success); border-radius: 3px; }
    .shoe-bar-fill.warn  { background: var(--warn); }
    .shoe-bar-fill.danger { background: var(--danger); }

    /* Workout picker modal */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.18s;
      z-index: 150;
    }
    .modal-backdrop.show { opacity: 1; pointer-events: auto; }
    .modal-sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top-left-radius: 22px;
      border-top-right-radius: 22px;
      padding: 14px 16px calc(env(safe-area-inset-bottom) + 24px);
      transform: translateY(100%);
      transition: transform 0.22s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 160;
      border-top: 1px solid var(--border);
    }
    .modal-sheet.show { transform: translateY(0); }
    .modal-grabber {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 14px;
    }
    .modal-title {
      font-size: 14px; font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
      text-align: center;
    }
    .picker-options { display: flex; flex-direction: column; gap: 10px; }
    .picker-option {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 14px 16px;
      text-align: left;
      width: 100%;
      color: var(--text);
      font-size: 16px;
      border-radius: var(--radius);
    }
    .picker-option svg { width: 28px; height: 28px; color: var(--accent); flex-shrink: 0; }
    .picker-label { font-size: 17px; font-weight: 600; }
    .picker-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .picker-option > div { flex: 1; }

    /* Analytics monthly bar chart */
    .bar-row {
      display: grid;
      grid-template-columns: 36px 1fr 64px;
      gap: 10px;
      align-items: center;
      padding: 6px 0;
      font-size: 13px;
    }
    .bar-track {
      background: var(--surface-2);
      border-radius: 6px;
      height: 14px;
      overflow: hidden;
      position: relative;
    }
    .bar-fill {
      background: var(--accent);
      height: 100%;
      border-radius: 6px;
    }
    .bar-row .label { color: var(--muted); font-weight: 600; }
    .bar-row .val { text-align: right; color: var(--text); font-variant-numeric: tabular-nums; }
    .bar-row.zero .bar-fill { background: #2a2a2a; }
    .bar-row.zero .val { color: var(--muted); }

    /* Analytics best-efforts table */
    .pr-row {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr 0.9fr;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      align-items: center;
    }
    .pr-row:last-child { border-bottom: none; }
    .pr-row .bucket { font-weight: 600; }
    .pr-row .time { font-variant-numeric: tabular-nums; }
    .pr-row .pace { color: var(--accent); font-weight: 600; font-variant-numeric: tabular-nums; }
    .pr-row .date { color: var(--muted); font-size: 12px; text-align: right; }
    .pr-header {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr 0.9fr;
      gap: 8px;
      padding-bottom: 8px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    .pr-header .date { text-align: right; }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .stat-grid .card { margin: 0; }
    .stat-grid .big { font-size: 26px; }

    /* Run time MM:SS split input */
    .time-row {
      display: grid;
      grid-template-columns: 1fr 16px 1fr;
      gap: 6px;
      align-items: center;
    }
    .time-row input {
      text-align: center;
      font-size: 22px;
      padding: 12px 8px;
      font-variant-numeric: tabular-nums;
    }
    .time-row .sep {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: var(--muted);
      padding-bottom: 2px;
    }
    .time-sub {
      display: grid;
      grid-template-columns: 1fr 16px 1fr;
      gap: 6px;
      margin-top: 4px;
    }
    .time-sub div {
      font-size: 10px;
      text-align: center;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="app" id="app"></div>

  <nav class="bottom" id="nav">
    <button data-view="home" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10.5L12 3l9 7.5v10a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 20.5v-10z"/><path d="M9 21.5V13h6v8.5"/></svg>
      Home
    </button>
    <button data-view="calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 11h18"/></svg>
      Calendar
    </button>
    <button data-view="analytics">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V5M4 19h16M8 16V9M12 16v-4M16 16V7M20 19V5"/></svg>
      Analytics
    </button>
    <button data-view="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
      Profile
    </button>
    <button data-view="plan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 3a3 3 0 0 0 6 0"/><path d="M8 11h8M8 15h5"/></svg>
      Plan
    </button>
  </nav>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // -------- localStorage keys --------
    const CONFIG_KEY = 'workoutAppConfig_v1';
    const QUEUE_KEY  = 'workoutQueue_v1';
    const CACHE_KEY  = 'workoutCache_v1';
    const PROG_KEY   = 'workoutProgram_v1';

    function getConfig() {
      try { return JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}'); } catch (e) { return {}; }
    }
    function setConfig(c) { localStorage.setItem(CONFIG_KEY, JSON.stringify(c)); }

    // -------- API --------
    async function api(action, params = {}, body = null) {
      const cfg = getConfig();
      if (!cfg.scriptUrl || !cfg.token) throw new Error('not configured');
      const url = new URL(cfg.scriptUrl);
      url.searchParams.set('action', action);
      url.searchParams.set('token', cfg.token);
      Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));

      const opts = body
        ? { method: 'POST', body: JSON.stringify({ ...body, token: cfg.token, action }) }
        : { method: 'GET' };
      const res = await fetch(url.toString(), opts);
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'api error');
      return data.data;
    }

    // -------- Offline queue --------
    function queueRead() { try { return JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]'); } catch (e) { return []; } }
    function queueWrite(q) { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); }
    function queuePush(item) { const q = queueRead(); q.push(item); queueWrite(q); }
    async function flushQueue() {
      const q = queueRead();
      if (!q.length) return;
      const remaining = [];
      for (const item of q) {
        try { await api(item.action, {}, item.body); }
        catch (e) { remaining.push(item); }
      }
      queueWrite(remaining);
      if (remaining.length < q.length) {
        toast(`Synced ${q.length - remaining.length} offline entr${q.length - remaining.length === 1 ? 'y' : 'ies'}`);
      }
    }

    // -------- Supabase data helpers --------

    function weekBounds() {
      const now = new Date();
      const day = now.getDay(); // 0=Sun
      const monday = new Date(now);
      monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
      const sunday = new Date(monday);
      sunday.setDate(monday.getDate() + 6);
      const fmt = d => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      return { start: fmt(monday), end: fmt(sunday) };
    }

    function paceToSecs(p) {
      if (!p) return null;
      const parts = p.split(':').map(Number);
      if (parts.length !== 2 || parts.some(isNaN)) return null;
      return parts[0] * 60 + parts[1];
    }

    function secsToMMSS(s) {
      if (!s || s <= 0) return '—';
      const m = Math.floor(s / 60), sec = Math.round(s % 60);
      return `${m}:${String(sec).padStart(2, '0')}`;
    }

    async function sbStats() {
      const uid = currentUser.id;
      const now = new Date();
      const { start: weekStart, end: weekEnd } = weekBounds();
      const yearStart = `${now.getFullYear()}-01-01`;
      const monthStart = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
      const [weekRunsR, ytdRunsR, monthRunsR, weekLiftsR, weekPuR] = await Promise.all([
        _sb.from('runs').select('distance').eq('user_id', uid).gte('date', weekStart).lte('date', weekEnd),
        _sb.from('runs').select('distance').eq('user_id', uid).gte('date', yearStart),
        _sb.from('runs').select('distance').eq('user_id', uid).gte('date', monthStart),
        _sb.from('lift_sessions').select('id').eq('user_id', uid).gte('date', weekStart).lte('date', weekEnd),
        _sb.from('pullup_sessions').select('total_reps').eq('user_id', uid).gte('date', weekStart).lte('date', weekEnd),
      ]);
      const sumDist = arr => (arr || []).reduce((s, r) => s + Number(r.distance || 0), 0);
      return {
        runs: {
          week:      Math.round(sumDist(weekRunsR.data)  * 10) / 10,
          year:      Math.round(sumDist(ytdRunsR.data)   * 10) / 10,
          yearCount: (ytdRunsR.data  || []).length,
          month:     Math.round(sumDist(monthRunsR.data) * 10) / 10,
        },
        lifts:   { weekSessions: (weekLiftsR.data || []).length },
        pullups: {
          weekSessions: (weekPuR.data || []).length,
          weekReps:     (weekPuR.data || []).reduce((s, p) => s + (p.total_reps || 0), 0),
        },
      };
    }

    async function sbShoes() {
      const { data, error } = await _sb.from('shoe_mileage').select('*').eq('user_id', currentUser.id);
      if (error) throw new Error(error.message);
      return (data || []).map(s => ({
        id: s.id, name: s.name, active: s.active,
        totalMiles: Math.round(Number(s.total_miles) * 10) / 10,
        newMiles:   Math.round(Number(s.logged_miles) * 10) / 10,
      }));
    }

    async function sbLogRun(run) {
      const uid = currentUser.id;
      const parts = (run.time || '').split(':');
      const dur = (parseInt(parts[0]) || 0) * 60 + (parseInt(parts[1]) || 0);
      const pace = (dur > 0 && run.distance > 0) ? secsToMMSS(dur / run.distance) : null;
      let shoe_id = null;
      if (run.shoe) {
        const { data: sd } = await _sb.from('shoes').select('id').eq('user_id', uid).eq('name', run.shoe).maybeSingle();
        if (sd) shoe_id = sd.id;
      }
      const { data: dup } = await _sb.from('runs').select('id').eq('user_id', uid).eq('date', run.date).eq('distance', String(run.distance)).limit(1);
      if (dup && dup.length) return { duplicate: true, pace };
      const { error } = await _sb.from('runs').insert({ user_id: uid, date: run.date, distance: run.distance, duration_secs: dur || null, pace, notes: run.notes || null, shoe_id });
      if (error) throw new Error(error.message);
      return { duplicate: false, pace: pace || '?' };
    }

    async function sbLogWalk(walk) {
      const uid = currentUser.id;
      const parts = (walk.time || '').split(':');
      const dur = (parseInt(parts[0]) || 0) * 60 + (parseInt(parts[1]) || 0);
      const { data: dup } = await _sb.from('walks').select('id').eq('user_id', uid).eq('date', walk.date).eq('distance', String(walk.distance)).limit(1);
      if (dup && dup.length) return { duplicate: true };
      const { error } = await _sb.from('walks').insert({ user_id: uid, date: walk.date, distance: walk.distance, duration_secs: dur || null, notes: walk.notes || null });
      if (error) throw new Error(error.message);
      return { duplicate: false };
    }

    async function sbLogPullUps(session) {
      const uid = currentUser.id;
      const setsArr = [session.s1, session.s2, session.s3, session.s4, session.s5];
      const total = setsArr.filter(v => v !== '' && v != null).reduce((s, n) => s + (Number(n) || 0), 0);
      const { data: dup } = await _sb.from('pullup_sessions').select('id').eq('user_id', uid).eq('date', session.date).limit(1);
      if (dup && dup.length) return { duplicate: true, total };
      const { error } = await _sb.from('pullup_sessions').insert({ user_id: uid, date: session.date, sets: setsArr, total_reps: total, notes: session.notes || null });
      if (error) throw new Error(error.message);
      return { duplicate: false, total };
    }

    async function sbRecentPullUps(limit = 5) {
      const { data, error } = await _sb.from('pullup_sessions').select('date,sets,total_reps,notes').eq('user_id', currentUser.id).order('date', { ascending: false }).limit(limit);
      if (error) throw new Error(error.message);
      return (data || []).map(p => {
        const sets = Array.isArray(p.sets) ? p.sets : [];
        return { date: p.date, total: p.total_reps || 0, s1: sets[0], s2: sets[1], s3: sets[2], s4: sets[3], s5: sets[4], weight: 'BW', week: null };
      });
    }

    async function sbLogLift(entries, meta) {
      const uid = currentUser.id;
      const { data: dup } = await _sb.from('lift_sessions').select('id').eq('user_id', uid).eq('date', meta.date).eq('block_name', meta.block).eq('day', meta.day).limit(1);
      if (dup && dup.length) return { duplicate: true };
      const { error } = await _sb.from('lift_sessions').insert({ user_id: uid, date: meta.date, block_name: meta.block, week: meta.week, day: meta.day, exercises: entries, notes: meta.notes || null });
      if (error) throw new Error(error.message);
      return { duplicate: false };
    }

    async function sbAnalytics(yearFilter) {
      const uid = currentUser.id;
      let q = _sb.from('runs').select('date,distance,duration_secs,pace').eq('user_id', uid).order('date');
      if (yearFilter !== 'all') q = q.gte('date', `${yearFilter}-01-01`).lte('date', `${yearFilter}-12-31`);
      const { data, error } = await q;
      if (error) throw new Error(error.message);
      const runs = data || [];
      const totalMi = runs.reduce((s, r) => s + Number(r.distance), 0);
      const yearSet = new Set(runs.map(r => Number(r.date.slice(0, 4))));
      const availableYears = [...yearSet].sort((a, b) => b - a);
      const pRuns = runs.filter(r => r.pace);
      let avgPaceSecs = null;
      if (pRuns.length) {
        const td = pRuns.reduce((s, r) => s + Number(r.distance), 0);
        const wp = pRuns.reduce((s, r) => { const ps = paceToSecs(r.pace); return s + (ps ? ps * Number(r.distance) : 0); }, 0);
        avgPaceSecs = td > 0 ? wp / td : null;
      }
      const tRuns = runs.filter(r => r.duration_secs);
      const avgTimeMins = tRuns.length ? Math.round(tRuns.reduce((s, r) => s + r.duration_secs, 0) / tRuns.length / 60) : 0;
      const summary = {
        miles: Math.round(totalMi * 10) / 10,
        runs: runs.length,
        avgPace: avgPaceSecs ? secsToMMSS(avgPaceSecs) : '—',
        avgDistance: runs.length ? Math.round((totalMi / runs.length) * 100) / 100 : 0,
        avgTimeMinutes: avgTimeMins,
      };
      const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      let monthly = [];
      if (yearFilter !== 'all') {
        for (let m = 0; m < 12; m++) {
          const mr = runs.filter(r => Number(r.date.slice(5, 7)) - 1 === m);
          const mi = mr.reduce((s, r) => s + Number(r.distance), 0);
          const mpr = mr.filter(r => r.pace);
          let mAvgPace = null;
          if (mpr.length) {
            const md = mpr.reduce((s, r) => s + Number(r.distance), 0);
            const mwp = mpr.reduce((s, r) => { const ps = paceToSecs(r.pace); return s + (ps ? ps * Number(r.distance) : 0); }, 0);
            mAvgPace = md > 0 ? secsToMMSS(mwp / md) : null;
          }
          monthly.push({ label: monthNames[m], miles: Math.round(mi * 10) / 10, runs: mr.length, avgDistance: mr.length ? Math.round((mi / mr.length) * 100) / 100 : 0, avgPace: mAvgPace || '—' });
        }
      }
      const yearMap = {};
      runs.forEach(r => { const y = r.date.slice(0, 4); yearMap[y] = (yearMap[y] || 0) + Number(r.distance); });
      const yearly = Object.entries(yearMap).map(([year, miles]) => ({ year, miles: Math.round(miles * 10) / 10 })).sort((a, b) => Number(a.year) - Number(b.year));
      return { filter: yearFilter, availableYears, summary, monthly, yearly };
    }

    async function sbMonth(year, month) {
      const uid = currentUser.id;
      const pad = n => String(n).padStart(2, '0');
      const startDate = `${year}-${pad(month)}-01`;
      const lastDay = new Date(year, month, 0).getDate();
      const endDate = `${year}-${pad(month)}-${pad(lastDay)}`;
      const [runsR, liftsR, pullsR] = await Promise.all([
        _sb.from('runs').select('date,distance,duration_secs,pace').eq('user_id', uid).gte('date', startDate).lte('date', endDate),
        _sb.from('lift_sessions').select('date,block_name,week,day').eq('user_id', uid).gte('date', startDate).lte('date', endDate),
        _sb.from('pullup_sessions').select('date,total_reps').eq('user_id', uid).gte('date', startDate).lte('date', endDate),
      ]);
      const runByDate = {}; (runsR.data || []).forEach(r => { runByDate[r.date] = r; });
      const liftByDate = {}; (liftsR.data || []).forEach(l => { liftByDate[l.date] = l; });
      const pullByDate = {}; (pullsR.data || []).forEach(p => { pullByDate[p.date] = p; });
      const firstDayOfWeek = new Date(year, month - 1, 1).getDay();
      const wdays = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const days = [];
      for (let d = 1; d <= lastDay; d++) {
        const ds = `${year}-${pad(month)}-${pad(d)}`;
        const run = runByDate[ds], lift = liftByDate[ds], pull = pullByDate[ds];
        const dow = new Date(year, month - 1, d).getDay();
        days.push({
          date: ds, day: d, weekday: wdays[dow],
          run:    run  ? { distance: Math.round(Number(run.distance)*100)/100, time: run.duration_secs ? `${Math.floor(run.duration_secs/60)}:${String(run.duration_secs%60).padStart(2,'0')}:00` : '', pace: run.pace || '' } : null,
          lift:   lift ? { block: lift.block_name, week: lift.week, day: lift.day } : null,
          pullups:pull ? { total: pull.total_reps, weight: 'BW' } : null,
        });
      }
      const mNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      return { monthLabel: `${mNames[month-1]} ${year}`, firstDayOfWeek, days };
    }

    async function sbProfile() {
      const uid = currentUser.id;
      const [shoesR, runsR] = await Promise.all([
        _sb.from('shoe_mileage').select('*').eq('user_id', uid),
        _sb.from('runs').select('date,distance,duration_secs,pace').eq('user_id', uid).not('pace', 'is', null),
      ]);
      const shoes = (shoesR.data || []).map(s => ({ id: s.id, name: s.name, active: s.active, totalMiles: Math.round(Number(s.total_miles)*10)/10, newMiles: Math.round(Number(s.logged_miles)*10)/10 }));
      const buckets = [
        { label: '1 Mile',        min: 0.8,  max: 1.2  },
        { label: '5K',            min: 2.8,  max: 3.5  },
        { label: '4 Miles',       min: 3.5,  max: 4.5  },
        { label: '10K',           min: 5.5,  max: 7.0  },
        { label: '10 Miles',      min: 9.0,  max: 11.0 },
        { label: 'Half Marathon', min: 12.5, max: 13.8 },
      ];
      const runs = runsR.data || [];
      const bestEfforts = [];
      buckets.forEach(b => {
        const cands = runs.filter(r => Number(r.distance) >= b.min && Number(r.distance) <= b.max && r.pace);
        if (!cands.length) return;
        cands.sort((a, c) => (paceToSecs(a.pace) || 9999) - (paceToSecs(c.pace) || 9999));
        const best = cands[0];
        bestEfforts.push({ bucket: b.label, pace: best.pace, time: best.duration_secs ? `${Math.floor(best.duration_secs/60)}:${String(best.duration_secs%60).padStart(2,'0')}:00` : '', distance: Math.round(Number(best.distance)*100)/100, date: best.date });
      });
      return { shoes, bestEfforts };
    }

    function el(tag, attrs = {}, children = []) {
      const n = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'class') n.className = v;
        else if (k === 'style') n.style.cssText = v;
        else if (k.startsWith('on')) n.addEventListener(k.slice(2), v);
        else if (k === 'html') n.innerHTML = v;
        else n.setAttribute(k, v);
      }
      (Array.isArray(children) ? children : [children]).forEach(c => {
        if (c == null) return;
        n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      });
      return n;

    function phaseForWeek(w) {
      if (w <= 3) return 'Phase 1';
      if (w <= 6) return 'Phase 2';
      if (w <= 9) return 'Phase 3';
      return 'Phase 4';
    }

    function renderLastWeek_(ex) {
      // Compact "Last week" footer showing prior week's weight × total reps.
      const w = ex.prevWeight;
      const t = ex.prevTotal != null ? ex.prevTotal : ex.previous;
      const hasW = (w != null && w !== '' && w !== '—');
      const hasT = (t != null && t !== '' && t !== '—' && t !== 0 && t !== '0');
      if (!hasW && !hasT) {
        // Subtle hint so the user can tell "no data last week" from "feature broken".
        return el('div', { class: 'prev', style: 'color: #555;' }, 'Last week: no data');
      }
      const parts = [];
      if (hasW) parts.push(String(w) + (typeof w === 'number' ? ' lb' : ''));
      if (hasT) parts.push(String(t) + ' reps');
      return el('div', { class: 'prev' }, [
        el('span', {}, 'Last week: '),
        el('b', {}, parts.join(' · ')),
      ]);
    }

    function selectCalendarDay(day) {

      const btn = document.querySelector(`.cal-day[data-date="${day.date}"]`);
      if (btn) btn.classList.add('selected');

      const card = el('div', { class: 'card' }, [
        el('h2', {}, day.weekday + ' · ' + day.date),
      ]);
      const items = [];
      if (day.lift) {
        const liftDesc = `${day.lift.block || ''} · Week ${day.lift.week || ''} · Day ${day.lift.day || ''}`.trim();
        items.push(el('div', { style: 'padding: 8px 0; border-bottom: 1px solid var(--border);' }, [

      if (day.run) {
        items.push(el('div', { style: 'padding: 8px 0; border-bottom: 1px solid var(--border);' }, [
          el('div', { style: 'font-weight: 600; color: #7ab7ff;' }, 'Run'),

      } else {
        items.forEach(i => card.appendChild(i));
      }
      detail.appendChild(card);
      detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function prettyTime_(s) {
      // Convert "43:29:00" → "43:29" (drop the trailing :00 if zero).
      if (!s) return '';
      const m = String(s).match(/^(\d{1,2}):(\d{2}):(\d{2})$/);
      if (m && m[3] === '00') return `${m[1]}:${m[2]}`;
      return String(s);
    }

      // Weight placeholder

      app.appendChild(el('div', { class: 'card', style: 'margin-top: 4px;' }, [

    }

    // ======== RUN PLANNER ========
    const P_DISTS = {
      '1mi':  { label:'1 Mile',        miles:1.0,  peakLR:{beginner:4, intermediate:5,  advanced:5 } },
      '2mi':  { label:'2 Miles',       miles:2.0,  peakLR:{beginner:5, intermediate:6,  advanced:6 } },
      '5k':   { label:'5K',            miles:3.1,  peakLR:{beginner:6, intermediate:9,  advanced:10} },
      '4mi':  { label:'4 Miles',       miles:4.0,  peakLR:{beginner:6, intermediate:8,  advanced:9 } },
      '5mi':  { label:'5 Miles',       miles:5.0,  peakLR:{beginner:7, intermediate:9,  advanced:10} },
      '10k':  { label:'10K',           miles:6.2,  peakLR:{beginner:8, intermediate:11, advanced:12} },
      '15k':  { label:'15K',           miles:9.3,  peakLR:{beginner:9, intermediate:12, advanced:13} },
      '10mi': { label:'10 Miles',      miles:10.0, peakLR:{beginner:10,intermediate:13, advanced:14} },
      'hm':   { label:'Half Marathon', miles:13.1, peakLR:{beginner:10,intermediate:12, advanced:13} },
    };
    const P_START_LR = { beginner:1.5, intermediate:2.5, advanced:3.5 };
    const P_INTERVALS = [
      { name:'400m Repeats',      desc:'8×400m at hard effort. Rest: 90 sec standing/walking between each rep.',                                                              phase:'early' },
      { name:'Pyramid Intervals', desc:'200m–400m–800m–400m–200m. Rest: 60 sec after 200m, 90 sec after 400m, 2 min after the 800m.',                                        phase:'early' },
      { name:'Rolling 400s',      desc:'6×400m at controlled hard effort. Rest: 30 sec only — the short recovery is intentional.',                                           phase:'early' },
      { name:'Drop Set',          desc:'6×400m starting fast, easing back each rep. Rest: 60 sec between reps.',                                                             phase:'mid'   },
      { name:'Rolling 800s',      desc:'5×800m at tempo-to-hard effort. Rest: 90 sec rolling — not full recovery.',                                                          phase:'mid'   },
      { name:'1km Repeats',       desc:'5×1km at 5K effort. Rest: 90 sec between reps — quality over quantity.',                                                             phase:'mid'   },
      { name:'Mile Up & Overs',   desc:'Mile repeats alternating hard and easy. Rest: jog 400m easy between each mile rep.',                                                 phase:'mid'   },
      { name:'Broken Miles',      desc:'Each mile split into 200m–400m sections at hard effort. Rest: 30 sec between sections, 90 sec between miles.',                       phase:'late'  },
      { name:"1k into Broken K's",desc:'1km hard, then 600m as 3×200m bursts. Rest: 30 sec between 200m, 2 min between sets.',                                              phase:'late'  },
      { name:'Repeating Drop Set',desc:'Full 6×400m drop set repeated twice. Rest: 60 sec between reps, 3 min between the two sets.',                                        phase:'late'  },
    ];
    const P_TEMPOS = [
      { name:'Progression Run',    desc:'Continuous run — easy start, build to tempo over the final third. No rest.',                                                         phase:'early' },
      { name:'Rolling 400s Tempo', desc:"6×400m at tempo pace. Rest: 30 sec active recovery jog — keep moving, don't stop.",                                                 phase:'early' },
      { name:'Over & Unders 1km',  desc:'4×1km alternating slightly above/below threshold pace. Rest: 90 sec easy jog between reps.',                                        phase:'mid'   },
      { name:'Tempo 1200s',        desc:'4×1200m at comfortably hard (tempo) effort. Rest: 2 min easy jog between reps.',                                                    phase:'mid'   },
      { name:'On Off 200s',        desc:'200m hard, 200m easy — repeat 8–10 times continuously. No full rest stops.',                                                        phase:'mid'   },
      { name:'Steady into Tempo',  desc:'Continuous run — easy for the first half, building into 2+ miles of sustained tempo. No rest.',                                     phase:'late'  },
      { name:'Over & Unders Miles',desc:'Mile repeats alternating slightly above/below threshold. Rest: 90 sec easy jog between each mile.',                                 phase:'late'  },
    ];
    const P_LONG_RUNS = [
      { name:'Easy Long Run',               desc:'Steady easy effort — keep it conversational the whole way.',               phase:'early' },
      { name:'Block Long Run',              desc:'Middle miles at steady effort, easy warm-up and cool-down miles.',         phase:'early' },
      { name:'Progressive Long Run',        desc:'Last 2 miles at tempo effort after an easy start.',                       phase:'mid'   },
      { name:'Hotspot Long Run',            desc:'3–4 "hotspot" miles at steady/tempo effort within the long run.',         phase:'mid'   },
      { name:'Progressive Repeat Long Run', desc:'Multiple tempo segments throughout — advanced long run stimulus.',        phase:'late'  },
    ];
    const P_EASY_DESCS = [
      'Conversational pace — you should be able to talk in full sentences.',
      'Very easy effort, 5–6/10 RPE. Focus on form and recovery.',
      'Active recovery run. Go slower than you think you need to.',
      'Easy aerobic run. Keep your heart rate low and relaxed.',
    ];
    const P_EFFORT = {
      easy:      { rpe:'Effort: conversational, 5–6/10 RPE',      zone:'Zone 2 (60–70% max HR) — fully conversational.' },
      tempo:     { rpe:'Effort: comfortably hard, 7/10 RPE',      zone:'Zone 3–4 (80–90% max HR) — labored but controlled.' },
      interval:  { rpe:'Effort: hard, 8–9/10 RPE',               zone:'Zone 4–5 (85–95% max HR) — speaking is very difficult.' },
      longrun:   { rpe:'Effort: easy throughout, 5–6/10 RPE',    zone:'Zone 2 (60–70% max HR) — distance is the goal.' },
      timetrial: { rpe:'All-out effort — note your time.',         zone:'Zone 5 (95–100% max HR) — hold nothing back.' },
      race:      { rpe:'Run your race — trust your training.',     zone:'Start Zone 3–4, build to Zone 5 in the final push.' },
    };
    let planEffortMode = 'rpe';
    let planDistSel = null, planLevelSel = null;

    function pRound(n) { return Math.round(n * 4) / 4; }
    function pParseTime(s) {
      if (!s) return null;
      const parts = s.trim().split(':').map(Number);
      if (parts.some(isNaN)) return null;
      if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
      if (parts.length === 2) return parts[0]*60 + parts[1];
      return null;
    }
    function pSecsToMMSS(s) { s = Math.round(s); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
    function pDistMiles(k) { return ({  '1mi':1,'2mi':2,'5k':3.1,'4mi':4,'5mi':5,'10k':6.2,'hm':13.1 })[k]||null; }
    function pPaces(level, rDist, rTime) {
      if (!rDist || !rTime) return null;
      const secs = pParseTime(rTime), miles = pDistMiles(rDist);
      if (!secs || !miles) return null;
      const ppm = secs / miles;
      const eOff = {beginner:150,intermediate:105,advanced:75};
      const tOff = {beginner:45, intermediate:25, advanced:12};
      const iOff = {beginner:5,  intermediate:-10,advanced:-20};
      return {
        easy:     pSecsToMMSS(ppm + (eOff[level]||105)) + '/mi',
        tempo:    pSecsToMMSS(ppm + (tOff[level]||25))  + '/mi',
        interval: pSecsToMMSS(ppm + (iOff[level]||-10)) + '/mi',
      };
    }
    function pLRForBuildWeek(w, totalWeeks, startLR, peakLR) {
      const peak = totalWeeks - 3;
      if (w <= 1) return startLR;
      if (w >= peak) return peakLR;
      return startLR + (peakLR - startLR) * ((w-1)/(peak-1));
    }
    function pMakeEasy(dist)           { return { type:'easy',      typeLabel:'Easy Run',       name:'Easy Run',         dist:Math.max(1.0,pRound(dist)), desc:P_EASY_DESCS[Math.floor(Math.random()*P_EASY_DESCS.length)], effortType:'easy',      paceOverride:null }; }
    function pMakeInterval(dist,ph,isD,paces) {
      const pool = isD ? P_INTERVALS.filter(x=>x.phase==='early') : P_INTERVALS.filter(x=>ph<0.35?x.phase==='early':ph<0.65?x.phase!=='late':true);
      const w = pool[Math.floor(ph*pool.length)%pool.length];
      return { type:'interval', typeLabel:'Intervals', name:w.name, dist:Math.max(1.5,pRound(isD?dist*0.7:dist)), desc:w.desc, effortType:'interval', paceOverride:paces?`Target: ${paces.interval}`:null };
    }
    function pMakeTempo(dist,ph,isD,paces) {
      const pool = isD ? P_TEMPOS.filter(x=>x.phase==='early') : P_TEMPOS.filter(x=>ph<0.35?x.phase==='early':ph<0.65?x.phase!=='late':true);
      const w = pool[Math.floor(ph*pool.length)%pool.length];
      return { type:'tempo', typeLabel:'Tempo', name:w.name, dist:Math.max(1.5,pRound(isD?dist*0.7:dist)), desc:w.desc, effortType:'tempo', paceOverride:paces?`Target: ${paces.tempo}`:null };
    }
    function pMakeLR(dist,ph,isTaper,paces) {
      const pool = isTaper ? [P_LONG_RUNS[0]] : P_LONG_RUNS.filter(x=>ph<0.35?x.phase==='early':ph<0.65?x.phase!=='late':true);
      const lr = pool[Math.floor(ph*pool.length)%pool.length];
      return { type:'longrun', typeLabel:'Long Run', name:lr.name, dist:Math.max(1.5,pRound(dist)), desc:lr.desc, effortType:'longrun', paceOverride:paces?`Easy pace: ${paces.easy}`:null };
    }
    function pMakeTimeTrial() {
      return { type:'timetrial', typeLabel:'Time Trial', name:'2 Mile Time Trial', dist:3.0, desc:'A fitness check — run 2 miles at your best effort to track progress mid-plan.', effortType:'timetrial', paceOverride:null };
    }
    function pMakeTaper(dist,paces) {
      return { type:'interval', typeLabel:'Taper Intervals', name:'Taper 400s', dist:dist||3.0, desc:'6×400m at race pace. Rest: 2–3 min full standing recovery between each rep — the goal is freshness, not fatigue.', effortType:'interval', paceOverride:paces?`Race pace: ${paces.interval}`:null };
    }
    function pMakeRace(distObj) {
      return { type:'race', typeLabel:'Race Day', name:`🏁 ${distObj.label} Race`, dist:pRound(distObj.miles), desc:'Race day! Warm up 10–15 min easy, then trust your training and give it everything.', effortType:'race', paceOverride:null };
    }
    function pBuildWeek(wi, totalWeeks, days, level, peakLR, startLR, paces, distKey) {
      const w = wi+1, buildWeeks = totalWeeks-3;
      let wType = 'build';
      if (w===totalWeeks) wType='race';
      else if (w>=totalWeeks-1) wType='taper';
      else if (w%4===0 && w<totalWeeks-1) wType='deload';
      const ph = Math.min(1,(w-1)/Math.max(buildWeeks-1,1));
      const isD = wType==='deload', isT = wType==='taper', isR = wType==='race';
      let lr = w===1 ? startLR : isR ? null : isT ? pRound(peakLR*0.55) : isD ? pRound(pLRForBuildWeek(w-1,totalWeeks,startLR,peakLR)*0.65) : pRound(pLRForBuildWeek(w,totalWeeks,startLR,peakLR));
      const iDist=pRound(2.0+ph*2.5), tDist=pRound(2.0+ph*3.0), eDist=pRound((lr||0)*0.65), e2Dist=pRound((lr||0)*0.55);
      const wos = [];
      const isTT = !isD&&!isT&&!isR && w===Math.round(totalWeeks*0.55);
      if (w===1) {
        wos.push(pMakeEasy(lr));
      } else if (isR) {
        wos.push(pMakeTaper(null,paces));
        wos.push(pMakeRace(P_DISTS[distKey]));
      } else if (isT) {
        const ti=pRound(Math.max(2.5,peakLR*0.35));
        wos.push(pMakeTaper(ti,paces));
        if(days>=3) wos.push(pMakeEasy(pRound(lr*0.6)));
        wos.push(pMakeLR(lr,ph,true,paces));
      } else if (isTT) {
        const tt=pMakeTimeTrial();
        if(days===2) { wos.push(tt); wos.push(pMakeLR(lr,ph,false,paces)); }
        else if(days===3) { wos.push(tt); wos.push(pMakeEasy(eDist)); wos.push(pMakeLR(lr,ph,false,paces)); }
        else if(days===4) { wos.push(pMakeEasy(eDist)); wos.push(tt); wos.push(pMakeTempo(tDist,ph,isD,paces)); wos.push(pMakeLR(lr,ph,false,paces)); }
        else { wos.push(pMakeInterval(iDist,ph,isD,paces)); wos.push(pMakeEasy(eDist)); wos.push(tt); wos.push(pMakeLR(lr,ph,false,paces)); wos.push(pMakeEasy(e2Dist)); }
      } else {
        if(days===2) { wos.push(pMakeInterval(iDist,ph,isD,paces)); wos.push(pMakeLR(lr,ph,false,paces)); }
        else if(days===3) { wos.push(pMakeInterval(iDist,ph,isD,paces)); wos.push(pMakeEasy(eDist)); wos.push(pMakeLR(lr,ph,false,paces)); }
        else if(days===4) { wos.push(pMakeEasy(eDist)); wos.push(pMakeInterval(iDist,ph,isD,paces)); wos.push(pMakeTempo(tDist,ph,isD,paces)); wos.push(pMakeLR(lr,ph,false,paces)); }
        else { wos.push(pMakeInterval(iDist,ph,isD,paces)); wos.push(pMakeEasy(eDist)); wos.push(pMakeTempo(tDist,ph,isD,paces)); wos.push(pMakeLR(lr,ph,false,paces)); wos.push(pMakeEasy(e2Dist)); }
      }
      const total = pRound(wos.reduce((s,x)=>s+x.dist,0));
      return { wType, label: isR?'Race Week':isT?'Taper Week':isD?`Week ${w} — Recovery`:`Week ${w}`, wos, total };
    }
    function pEffortText(effortType, paceOverride) {
      if (paceOverride) return null; // handled separately
      return P_EFFORT[effortType]?.[planEffortMode] || '';
    }
    function pRenderWo(wo) {
      const effort = paceOverride => paceOverride
        ? `<div class="plan-wo-effort">${paceOverride}</div><div class="plan-wo-effort" data-rpe="${P_EFFORT[wo.effortType]?.rpe||''}" data-zone="${P_EFFORT[wo.effortType]?.zone||''}">${P_EFFORT[wo.effortType]?.[planEffortMode]||''}</div>`
        : `<div class="plan-wo-effort" data-rpe="${P_EFFORT[wo.effortType]?.rpe||''}" data-zone="${P_EFFORT[wo.effortType]?.zone||''}">${P_EFFORT[wo.effortType]?.[planEffortMode]||''}</div>`;
      return `<div class="plan-wo-row ${wo.type}">
        <div class="plan-wo-bar"></div>
        <div class="plan-wo-info">
          <div class="plan-wo-type">${wo.typeLabel}</div>
          <div class="plan-wo-name">${wo.name}</div>
          <div class="plan-wo-desc">${wo.desc}</div>
          ${effort(wo.paceOverride)}
        </div>
        <div class="plan-wo-dist"><div class="mi">${wo.dist}</div><div class="unit">mi</div></div>
      </div>`;
    }
    function pSetEffort(mode) {
      planEffortMode = mode;
      document.getElementById('pEffRPE')?.classList.toggle('active', mode==='rpe');
      document.getElementById('pEffZone')?.classList.toggle('active', mode==='zone');
      document.querySelectorAll('.plan-wo-effort[data-rpe]').forEach(el => { el.textContent = mode==='rpe' ? el.dataset.rpe : el.dataset.zone; });
    }
    function pToggleWeek(hdr) { hdr.classList.toggle('open'); hdr.nextElementSibling.classList.toggle('open'); }
    function pExpandAll()   { document.querySelectorAll('.plan-week-hdr').forEach(h=>{h.classList.add('open');h.nextElementSibling.classList.add('open');}); }
    function pCollapseAll() { document.querySelectorAll('.plan-week-hdr').forEach(h=>{h.classList.remove('open');h.nextElementSibling.classList.remove('open');}); }

    function renderPlan(app) {
      app.appendChild(el('header', { class:'top' }, [el('h1', {}, 'Run Planner')]));
      const root = el('div');
      app.appendChild(root);
      let savedState = {};
      try { savedState = JSON.parse(localStorage.getItem('runPlanState_v1') || '{}'); } catch(e) {}
      planDistSel  = savedState.dist  || null;
      planLevelSel = savedState.level || null;

      root.innerHTML = `
        <div class="card" id="pForm">
          <h2>TARGET DISTANCE</h2>
          <div class="plan-dist-grid" style="margin-bottom:20px">
            ${[['1mi','🏃','1 Mile','Speed'],['2mi','🏃','2 Miles','Speed-end.'],['5k','🎯','5K','3.1 mi'],['4mi','🏅','4 Miles','Road race'],['5mi','🏅','5 Miles','Road race'],['10k','⭐','10K','6.2 mi'],['15k','💪','15K','9.3 mi'],['10mi','💪','10 Miles','Road race'],['hm','🏆','Half Marathon','13.1 mi']].map(([k,ic,lb,sb])=>`
              <button class="plan-dist-btn${planDistSel===k?' sel':''}" onclick="planDistSel='${k}';document.querySelectorAll('.plan-dist-btn').forEach(b=>b.classList.remove('sel'));this.classList.add('sel')">
                <div class="plan-dist-icon">${ic}</div>
                <span class="plan-dist-name">${lb}</span>

          </div>
          <h2>FITNESS LEVEL</h2>
          <div class="plan-level-grid" style="margin-bottom:20px">
            ${[['beginner','🌱','Beginner','New to running or returning after a break'],['intermediate','🔥','Intermediate','Running regularly, some race experience'],['advanced','⚡','Advanced','Consistent training, chasing a PR']].map(([k,ic,lb,ds])=>`
              <button class="plan-level-btn${planLevelSel===k?' sel':''}" onclick="planLevelSel='${k}';document.querySelectorAll('.plan-level-btn').forEach(b=>b.classList.remove('sel'));this.classList.add('sel')">
                <div class="plan-level-icon">${ic}</div>
                <span class="plan-level-name">${lb}</span>
                <span class="plan-level-desc">${ds}</span>
              </button>`).join('')}
          </div>
          <div class="field">
            <label>Current weekly mileage (miles/week)</label>
            <input id="pMiles" type="number" inputmode="decimal" placeholder="e.g. 10" value="${savedState.miles||''}" style="text-align:left">

          <div class="plan-optional" id="pRaceToggle" onclick="this.classList.toggle('active');document.getElementById('pRaceFields').classList.toggle('vis')">
            <span style="font-size:18px">⏱️</span>
            <div class="plan-opt-text"><strong>Add a recent race time</strong><small>Unlocks personalized pace targets</small></div>
            <span class="plan-opt-arrow">›</span>
          </div>
          <div class="plan-race-fields" id="pRaceFields">
            <div class="plan-race-col">
              <label>Race distance</label>
              <select id="pRaceDist">
                <option value="">Select…</option>
                <option value="1mi">1 Mile</option><option value="2mi">2 Miles</option>
                <option value="5k">5K</option><option value="4mi">4 Miles</option>
                <option value="5mi">5 Miles</option><option value="10k">10K</option>
                <option value="hm">Half Marathon</option>
              </select>
            </div>
            <div class="plan-race-col">
              <label>Finish time (h:mm:ss)</label>
              <input id="pRaceTime" type="text" inputmode="text" placeholder="e.g. 28:40" value="${savedState.raceTime||''}">
            </div>
          </div>
          <div class="plan-slider-row">
            <div class="plan-slider-hdr">
              <label>Days per week</label>
              <div class="plan-slider-val" id="pDaysVal">3 <span>days</span></div>
            </div>
            <input type="range" class="plan-range" id="pDays" min="2" max="5" value="${savedState.days||3}" oninput="document.getElementById('pDaysVal').innerHTML=this.value+' <span>days</span>'">
            <div class="plan-slider-marks"><span>2</span><span>3</span><span>4</span><span>5</span></div>
          </div>
          <div class="plan-slider-row">
            <div class="plan-slider-hdr">
              <label>Program duration</label>
              <div class="plan-slider-val" id="pWeeksVal">12 <span>wks</span></div>
            </div>
            <input type="range" class="plan-range" id="pWeeks" min="8" max="16" value="${savedState.weeks||12}" oninput="document.getElementById('pWeeksVal').innerHTML=this.value+' <span>wks</span>'">
            <div class="plan-slider-marks"><span>8</span><span>10</span><span>12</span><span>14</span><span>16</span></div>
          </div>
          <div class="plan-err" id="pErr"></div>
          <button onclick="planGenerate()">▶  Generate My Plan</button>
        </div>
        <div id="pOutput" style="display:none"></div>
      `;

      // Restore slider display values
      const dv = savedState.days||3, wv = savedState.weeks||12;
      document.getElementById('pDaysVal').innerHTML  = `${dv} <span>days</span>`;
      document.getElementById('pWeeksVal').innerHTML = `${wv} <span>wks</span>`;

      // Restore race dist if saved
      if (savedState.raceDist) {
        const s = document.getElementById('pRaceDist');
        if (s) s.value = savedState.raceDist;
        if (savedState.raceTime) { document.getElementById('pRaceToggle').classList.add('active'); document.getElementById('pRaceFields').classList.add('vis'); }
      }

      // If there's a saved generated plan, show it
      if (savedState.weeks_data) pShowOutput(savedState);
    }

    function planGenerate() {
      const errEl = document.getElementById('pErr');
      errEl.classList.remove('vis');
      if (!planDistSel)  { errEl.textContent='Please select a target distance.'; errEl.classList.add('vis'); return; }
      if (!planLevelSel) { errEl.textContent='Please select your fitness level.'; errEl.classList.add('vis'); return; }
      const miles = parseFloat(document.getElementById('pMiles').value);
      if (isNaN(miles)||miles<0) { errEl.textContent='Please enter your current weekly mileage.'; errEl.classList.add('vis'); return; }
      const days  = parseInt(document.getElementById('pDays').value);
      const weeks = parseInt(document.getElementById('pWeeks').value);
      const raceDist = document.getElementById('pRaceDist').value;
      const raceTime = document.getElementById('pRaceTime').value.trim();
      const paces = pPaces(planLevelSel, raceDist, raceTime);
      const distData = P_DISTS[planDistSel];
      const peakLR = distData.peakLR[planLevelSel];
      const estLong = miles * 0.35;
      const startLR = pRound(Math.max(P_START_LR[planLevelSel], Math.min(estLong, peakLR * 0.4)));
      const weeksData = [];
      let totalMi = 0;
      for (let i=0; i<weeks; i++) {
        const wk = pBuildWeek(i, weeks, days, planLevelSel, peakLR, startLR, paces, planDistSel);
        weeksData.push(wk);
        totalMi += wk.total;
      }
      const state = { dist:planDistSel, level:planLevelSel, miles, days, weeks, raceDist, raceTime, paces, peakLR, weeks_data:weeksData, totalMi:Math.round(totalMi) };
      try { localStorage.setItem('runPlanState_v1', JSON.stringify(state)); } catch(e) {}
      pShowOutput(state);
    }

    function pShowOutput(state) {
      const out = document.getElementById('pOutput');
      if (!out) return;
      const levelNames = { beginner:'Beginner', intermediate:'Intermediate', advanced:'Advanced' };
      const dist = P_DISTS[state.dist];
      out.style.display = 'block';
      let paceGuideHTML = '';
      if (state.paces) {
        paceGuideHTML = `<div class="card" style="margin-bottom:12px">
          <h2>PACE TARGETS</h2>
          <div class="pace-guide-row" style="background:rgba(50,215,75,0.06);border-radius:10px">
            <div class="pace-gdot" style="background:#32d74b"></div>
            <div class="pace-glabel"><strong>Easy / Long Run</strong><small>Conversational — all easy &amp; long runs</small></div>
            <div class="pace-gval">${state.paces.easy}</div>
          </div>
          <div class="pace-guide-row" style="background:rgba(255,159,10,0.06);border-radius:10px">
            <div class="pace-gdot" style="background:#ff9f0a"></div>
            <div class="pace-glabel"><strong>Tempo</strong><small>Comfortably hard — tempo sessions</small></div>
            <div class="pace-gval">${state.paces.tempo}</div>
          </div>
          <div class="pace-guide-row" style="background:rgba(255,69,58,0.06);border-radius:10px">
            <div class="pace-gdot" style="background:#ff453a"></div>
            <div class="pace-glabel"><strong>Intervals</strong><small>Hard effort — speed sessions</small></div>
            <div class="pace-gval">${state.paces.interval}</div>
          </div>
        </div>`;
      }
      out.innerHTML = `
        <div class="card" style="margin-bottom:12px">
          <div style="font-size:20px;font-weight:800;letter-spacing:-0.02em;margin-bottom:2px">${dist.label} Training Plan</div>
          <div class="muted" style="font-size:13px;margin-bottom:16px">${levelNames[state.level]} · ${state.days} days/week</div>
          <div class="plan-stats">
            <div class="plan-stat"><div class="sv">${state.weeks}</div><div class="sl">Weeks</div></div>
            <div class="plan-stat"><div class="sv">${state.totalMi}</div><div class="sl">Total Miles</div></div>
            <div class="plan-stat"><div class="sv">${P_DISTS[state.dist].peakLR[state.level]}mi</div><div class="sl">Peak Long Run</div></div>
          </div>
        </div>
        ${paceGuideHTML}
        <div class="card" style="margin-bottom:12px">
          <div class="spaced" style="margin-bottom:0">
            <span style="font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em">Effort display</span>
            <div class="effort-pill">
              <button id="pEffRPE" class="${planEffortMode==='rpe'?'active':''}" onclick="pSetEffort('rpe')">RPE</button>
              <button id="pEffZone" class="${planEffortMode==='zone'?'active':''}" onclick="pSetEffort('zone')">HR Zones</button>
            </div>
          </div>
        </div>
        <div class="plan-expand-row">
          <button class="plan-expand-btn" onclick="pExpandAll()">Expand All</button>
          <button class="plan-expand-btn" onclick="pCollapseAll()">Collapse All</button>
        </div>
        ${(state.weeks_data||[]).map((wk,i) => {
          const badge = wk.wType==='deload'?'deload':wk.wType==='taper'?'taper':wk.wType==='race'?'race-wk':'build';
          const badgeText = wk.wType==='deload'?'Recovery':wk.wType==='taper'?'Taper':wk.wType==='race'?'Race':`Wk ${i+1}`;
          return `<div class="plan-week-card">
            <div class="plan-week-hdr" onclick="pToggleWeek(this)">
              <span class="plan-wk-badge ${badge}">${badgeText}</span>
              <span class="plan-week-title">${wk.label}</span>
              <div class="plan-week-meta"><div class="plan-week-mi">${wk.total} mi</div><div class="plan-week-ct">${wk.wos.length} run${wk.wos.length!==1?'s':''}</div></div>
              <span class="plan-chevron">▾</span>
            </div>
            <div class="plan-workouts">${wk.wos.map(pRenderWo).join('')}</div>
          </div>`;
        }).join('')}
        <div class="plan-tip"><strong>Warm-up &amp; cool-down:</strong> Easy/Long runs — start the first 5–10 min very easy; walk 3–5 min after. Intervals — 5–10 min easy jog + dynamic drills before, 5–10 min easy jog after. Tempo — 5–10 min easy + 2–3 short strides before, 5 min easy after. Static stretching always <em>after</em> your run, not before.<br><br><strong>General tips:</strong> Easy runs should feel fully conversational. Rest days are training — don't skip them. If you feel worn down, repeat a week rather than pushing through.</div>
        <div style="height:8px"></div>
      `;
      out.scrollIntoView({ behavior:'smooth', block:'start' });
    }

    // -------- Nav --------
    document.querySelectorAll('nav.bottom button').forEach(b => {
      b.addEventListener('click', () => render(b.dataset.view));
    });

    // -------- Init --------
    window.addEventListener('online', flushQueue);
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});

    // Guard to prevent double-render when both onAuthStateChange and getSession fire at startup
    let _startupRenderDone = false;

    // Auth state listener — fires on sign-in and sign-out
    _sb.auth.onAuthStateChange((event, session) => {
      const wasLoggedIn = !!currentUser;
      const user = session?.user ?? null;

      // Allowlist check — sign out anyone not on the list
      if (event === 'SIGNED_IN' && user && !ALLOWED_EMAILS.includes(user.email)) {
        _sb.auth.signOut();
        toast('This app is invite-only. Contact Jeff to get access.', true);
        return;
      }

      currentUser = user;
      if (event === 'SIGNED_IN' && !wasLoggedIn) {
        _startupRenderDone = true;
        render(currentView || 'home');
        flushQueue();
      }
      if (event === 'SIGNED_OUT') {
        todayCache = null;
        programCache = null;
        renderAuth($('#app'));
      }
    });

    // Check for existing session on load (handles returning users + magic link redirect)
    // Skip if onAuthStateChange already triggered a render (prevents double-render race condition)
    _sb.auth.getSession().then(({ data: { session } }) => {
      if (_startupRenderDone) return;
      currentUser = session?.user ?? null;
      render('home');
      if (currentUser) flushQueue();
    });
  </script>
</body>
</html>
