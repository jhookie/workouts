<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Workouts" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <title>Workouts</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-2: #1d1d1d;
      --border: #2a2a2a;
      --text: #f5f5f5;
      --muted: #8a8a8a;
      --accent: #ff6b35;
      --success: #32d74b;
      --warn: #ff9f0a;
      --danger: #ff453a;
      --radius: 14px;
      --radius-lg: 20px;
      --shadow: 0 2px 14px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      font-size: 16px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: contain;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .app {
      flex: 1;
      max-width: 520px;
      margin: 0 auto;
      width: 100%;
      padding: 0 16px 88px 16px;
      padding-top: calc(env(safe-area-inset-top) + 12px);
    }
    header.top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 4px 0 16px 0;
    }
    header.top h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    header.top .date {
      color: var(--muted);
      font-size: 14px;
    }
    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .card h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .big {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .row { display: flex; gap: 12px; align-items: center; }
    .spaced { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .col { display: flex; flex-direction: column; gap: 2px; }
    .muted { color: var(--muted); font-size: 13px; }
    .pill {
      display: inline-block;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 10px;
      background: var(--surface-2);
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .pill.chest { background: #3a1f1a; color: #ff9b7a; }
    .pill.back  { background: #1a2a3a; color: #7ab7ff; }
    .pill.bicep, .pill.tricep { background: #3a2a1a; color: #ffc07a; }
    .pill.shoulder { background: #2a1a3a; color: #c07aff; }
    .pill.micro { background: #1a3a2a; color: #7affb7; }
    .pill.intensity { background: #3a1a1a; color: #ff7a7a; }

    button, .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: inherit;
      font-size: 17px;
      font-weight: 600;
      padding: 14px 16px;
      border-radius: var(--radius);
      width: 100%;
      cursor: pointer;
      transition: transform 0.08s ease;
      -webkit-appearance: none;
      appearance: none;
    }
    button:active, .btn:active { transform: scale(0.97); }
    button.secondary, .btn.secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    button.ghost { background: transparent; color: var(--accent); }
    button.danger { background: var(--danger); }

    input, select, textarea {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 16px;
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
    }
    input[inputmode="decimal"], input[inputmode="numeric"] { text-align: center; }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .field { margin-bottom: 12px; }

    nav.bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(20, 20, 20, 0.92);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-top: 1px solid var(--border);
      padding: 10px 0 calc(env(safe-area-inset-bottom) + 8px);
      display: flex;
      z-index: 100;
    }
    nav.bottom button {
      flex: 1;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 6px 4px;
      border-radius: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    nav.bottom button.active { color: var(--accent); }
    nav.bottom button svg { width: 22px; height: 22px; }

    .exercise {
      background: var(--surface-2);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
    }
    .exercise h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.25;
    }
    .exercise .meta {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .exercise .notes {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      font-style: italic;
      line-height: 1.4;
    }
    .set-grid {
      display: grid;
      grid-template-columns: 1.2fr repeat(4, 1fr);
      gap: 6px;
    }
    .set-grid label { font-size: 10px; text-align: center; margin-bottom: 2px; }
    .set-grid input { padding: 8px 4px; font-size: 15px; }
    .prev {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      text-align: right;
    }
    .prev b { color: var(--text); }

    .toast {
      position: fixed;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--success);
      color: #000;
      padding: 10px 18px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 200;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--danger); color: #fff; }

    .skeleton {
      background: linear-gradient(90deg, var(--surface) 0%, var(--surface-2) 50%, var(--surface) 100%);
      background-size: 200% 100%;
      animation: sk 1.4s infinite;
      border-radius: 10px;
      height: 80px;
    }
    @keyframes sk { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .hidden { display: none !important; }

    .history-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .history-item:last-child { border-bottom: none; }
    .history-item .name { font-weight: 600; }
    .history-item .sub { color: var(--muted); font-size: 13px; }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .stat-grid .card { margin: 0; }
    .stat-grid .big { font-size: 26px; }

    .setup-banner {
      background: var(--warn);
      color: #000;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 12px;
    }
    .setup-banner button {
      background: #000;
      color: #fff;
      font-size: 13px;
      padding: 8px 12px;
      width: auto;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- views injected by JS -->
  </div>

  <nav class="bottom" id="nav">
    <button data-view="home" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10.5L12 3l9 7.5v10a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 20.5v-10z"/><path d="M9 21.5V13h6v8.5"/></svg>
      Home
    </button>
    <button data-view="lift">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 8v8M3 10v4M19 8v8M21 10v4M5 12h14"/></svg>
      Lift
    </button>
    <button data-view="run">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="13" cy="4" r="2"/><path d="M6 22l3-6 3 2 2-4 3 2M9 16l-1-5 4-3 3 3 2 2"/></svg>
      Run
    </button>
    <button data-view="history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      History
    </button>
  </nav>

  <div class="toast" id="toast"></div>

  <script>
    // -------- Config --------
    // First-run setup asks for these; they're stored in localStorage.
    const DEFAULT_CONFIG_KEY = 'workoutAppConfig_v1';
    const QUEUE_KEY = 'workoutQueue_v1';
    const CACHE_KEY = 'workoutCache_v1';

    function getConfig() {
      try { return JSON.parse(localStorage.getItem(DEFAULT_CONFIG_KEY) || '{}'); } catch (e) { return {}; }
    }
    function setConfig(c) { localStorage.setItem(DEFAULT_CONFIG_KEY, JSON.stringify(c)); }

    // -------- API --------
    async function api(action, params = {}, body = null) {
      const cfg = getConfig();
      if (!cfg.scriptUrl || !cfg.token) throw new Error('not configured');
      const url = new URL(cfg.scriptUrl);
      url.searchParams.set('action', action);
      url.searchParams.set('token', cfg.token);
      Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));

      const opts = body
        ? { method: 'POST', body: JSON.stringify({ ...body, token: cfg.token, action }) }
        : { method: 'GET' };
      // Note: Apps Script doesn't need a content-type header (and setting one
      // triggers a CORS preflight it can't answer). Leave it off.

      const res = await fetch(url.toString(), opts);
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'api error');
      return data.data;
    }

    // -------- Offline queue --------
    function queueRead() {
      try { return JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]'); } catch (e) { return []; }
    }
    function queueWrite(q) { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); }
    function queuePush(item) { const q = queueRead(); q.push(item); queueWrite(q); }
    async function flushQueue() {
      const q = queueRead();
      if (!q.length) return;
      const remaining = [];
      for (const item of q) {
        try {
          await api(item.action, {}, item.body);
        } catch (e) {
          remaining.push(item);
        }
      }
      queueWrite(remaining);
      if (remaining.length < q.length) {
        toast(`Synced ${q.length - remaining.length} offline entr${q.length - remaining.length === 1 ? 'y' : 'ies'}`);
      }
    }

    // -------- Helpers --------
    function $(sel, root = document) { return root.querySelector(sel); }
    function el(tag, attrs = {}, children = []) {
      const n = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'class') n.className = v;
        else if (k === 'style') n.style.cssText = v;
        else if (k.startsWith('on')) n.addEventListener(k.slice(2), v);
        else if (k === 'html') n.innerHTML = v;
        else n.setAttribute(k, v);
      }
      (Array.isArray(children) ? children : [children]).forEach(c => {
        if (c == null) return;
        n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      });
      return n;
    }
    function fmtDateLong(d) {
      const opts = { weekday: 'long', month: 'long', day: 'numeric' };
      return new Date(d).toLocaleDateString('en-US', opts);
    }
    function todayISO() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }
    function categoryClass(cat) {
      if (!cat) return '';
      const c = cat.toLowerCase();
      if (c.includes('chest') && c.includes('tri')) return 'chest';
      if (c.includes('chest')) return 'chest';
      if (c.includes('back')) return 'back';
      if (c.includes('bicep')) return 'bicep';
      if (c.includes('tricep')) return 'tricep';
      if (c.includes('shoulder')) return 'shoulder';
      if (c.includes('micro')) return 'micro';
      if (c.includes('intensity')) return 'intensity';
      return '';
    }
    let toastTimer;
    function toast(msg, isError = false) {
      const t = $('#toast');
      t.textContent = msg;
      t.classList.toggle('error', isError);
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
    }

    // -------- Views --------
    let currentView = 'home';
    let todayCache = null;

    async function render(view) {
      currentView = view;
      document.querySelectorAll('nav.bottom button').forEach(b => {
        b.classList.toggle('active', b.dataset.view === view);
      });
      const app = $('#app');
      app.innerHTML = '';

      if (!getConfig().scriptUrl || !getConfig().token) {
        return renderSetup(app);
      }

      if (view === 'home') await renderHome(app);
      else if (view === 'lift') await renderLift(app);
      else if (view === 'run') await renderRun(app);
      else if (view === 'history') await renderHistory(app);
    }

    function renderSetup(app) {
      const cfg = getConfig();
      app.appendChild(el('header', { class: 'top' }, [
        el('h1', {}, 'Setup'),
      ]));
      app.appendChild(el('div', { class: 'card' }, [
        el('p', { class: 'muted', style: 'margin-bottom: 16px; font-size: 14px;' },
          'Paste your Apps Script web app URL and your secret token. You\'ll get both after running Deploy in the Apps Script editor.'),
        el('div', { class: 'field' }, [
          el('label', {}, 'Apps Script /exec URL'),
          el('input', { id: 'cfgUrl', type: 'url', placeholder: 'https://script.google.com/macros/s/.../exec', value: cfg.scriptUrl || '' }),
        ]),
        el('div', { class: 'field' }, [
          el('label', {}, 'Secret token'),
          el('input', { id: 'cfgToken', type: 'text', placeholder: 'must match SECRET_TOKEN in Code.gs', value: cfg.token || '' }),
        ]),
        el('button', { onclick: async () => {
          const url = $('#cfgUrl').value.trim();
          const token = $('#cfgToken').value.trim();
          if (!url || !token) return toast('Both fields required', true);
          setConfig({ scriptUrl: url, token });
          try {
            await api('ping');
            toast('Connected');
            render('home');
          } catch (e) {
            toast('Could not reach script: ' + e.message, true);
          }
        }}, 'Save & test'),
      ]));
    }

    async function renderHome(app) {
      app.appendChild(el('header', { class: 'top' }, [
        el('h1', {}, 'Today'),
        el('span', { class: 'date' }, fmtDateLong(new Date())),
      ]));

      const skel = el('div', { class: 'card' }, el('div', { class: 'skeleton' }));
      app.appendChild(skel);

      let today;
      try {
        today = await api('today');
        todayCache = today;
        localStorage.setItem(CACHE_KEY, JSON.stringify({ today, savedAt: Date.now() }));
      } catch (e) {
        // fall back to cache
        try {
          const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
          if (cached) { today = cached.today; toast('Offline — using cached plan'); }
        } catch (_) {}
        if (!today) {
          skel.remove();
          app.appendChild(el('div', { class: 'card' }, [
            el('h2', {}, 'Offline'),
            el('p', { class: 'muted' }, 'Could not load today\'s plan. Logged entries will sync when you\'re back online.'),
          ]));
          return;
        }
      }
      skel.remove();

      // Today summary card
      if (today.sessionType === 'lift' && today.template) {
        app.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, `${today.block} · Week ${today.week} · Day ${today.liftDay}`),
          el('div', { class: 'big' }, dayTitle(today.liftDay)),
          el('div', { class: 'muted', style: 'margin-top: 6px;' },
            `${today.template.exercises.length} exercises`),
          el('button', { style: 'margin-top: 14px;', onclick: () => render('lift') }, 'Start lifting'),
        ]));
      } else if (today.sessionType === 'run') {
        app.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, 'Today'),
          el('div', { class: 'big' }, 'Run day'),
          el('div', { class: 'muted', style: 'margin-top: 6px;' }, 'Goal: 10–15 mi/week'),
          el('button', { style: 'margin-top: 14px;', onclick: () => render('run') }, 'Log a run'),
        ]));
      } else {
        app.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, 'Today'),
          el('div', { class: 'big' }, 'Rest day'),
        ]));
      }

      // Stats preview
      try {
        const stats = await api('stats');
        app.appendChild(el('div', { class: 'stat-grid' }, [
          el('div', { class: 'card' }, [
            el('h2', {}, 'Miles this week'),
            el('div', { class: 'big' }, String(stats.runs.week)),
          ]),
          el('div', { class: 'card' }, [
            el('h2', {}, 'Miles YTD'),
            el('div', { class: 'big' }, String(stats.runs.year)),
            el('div', { class: 'muted', style: 'margin-top: 4px;' }, `${stats.runs.yearCount} runs`),
          ]),
        ]));
        app.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, 'This month'),
          el('div', { class: 'spaced' }, [
            el('div', { class: 'col' }, [
              el('div', { class: 'big' }, String(stats.runs.month)),
              el('div', { class: 'muted' }, 'miles run'),
            ]),
            el('div', { class: 'col' }, [
              el('div', { class: 'big' }, String(stats.lifts.weekSessions)),
              el('div', { class: 'muted' }, 'lift sessions this week'),
            ]),
          ]),
        ]));
      } catch (e) { /* skip stats on error */ }
    }

    function dayTitle(d) {
      if (d === 'A') return 'Push Day';
      if (d === 'B') return 'Pull Day';
      if (d === 'C') return 'Full Upper';
      return 'Lift';
    }

    async function renderLift(app) {
      app.appendChild(el('header', { class: 'top' }, [
        el('h1', {}, 'Log Lift'),
        el('span', { class: 'date' }, fmtDateLong(new Date())),
      ]));

      const skel = el('div', { class: 'card' }, el('div', { class: 'skeleton', style: 'height: 240px;' }));
      app.appendChild(skel);

      let today = todayCache;
      if (!today) {
        try { today = await api('today'); todayCache = today; }
        catch (e) { skel.remove(); app.appendChild(el('div', { class: 'card' }, 'Offline — come back online to fetch today\'s template.')); return; }
      }

      if (today.sessionType !== 'lift') {
        skel.remove();
        app.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, 'Not a lift day'),
          el('div', { class: 'big' }, today.sessionType === 'run' ? 'Run day' : 'Rest'),
          el('div', { class: 'muted', style: 'margin-top: 8px;' }, 'Override and log anyway?'),
          el('button', {
            class: 'secondary',
            style: 'margin-top: 12px;',
            onclick: async () => {
              // Manual day pick
              const day = prompt('Which day template? A / B / C', 'A');
              if (!day) return;
              const week = Number(prompt('Which week? 1-5', '1')) || 1;
              try {
                const t = await api('template', { block: '', week, day: day.toUpperCase() });
                renderLiftForm(app, { block: 'Block 1', week, liftDay: day.toUpperCase(), template: t });
              } catch (e) { toast(e.message, true); }
            },
          }, 'Pick a template'),
        ]));
        return;
      }

      skel.remove();
      renderLiftForm(app, today);
    }

    function renderLiftForm(app, today) {
      const header = el('div', { class: 'card' }, [
        el('h2', {}, `${today.block} · Week ${today.week} · Day ${today.liftDay}`),
        el('div', { class: 'big' }, dayTitle(today.liftDay)),
      ]);
      app.appendChild(header);

      const form = el('div', { id: 'liftForm' });
      today.template.exercises.forEach((ex, idx) => {
        const card = el('div', { class: 'exercise', 'data-idx': idx }, [
          el('h3', {}, ex.name),
          el('div', { class: 'meta' }, [
            ex.category ? el('span', { class: 'pill ' + categoryClass(ex.category) }, ex.category) : null,
            el('span', {}, `${ex.sets} sets · ${ex.targetReps}`),
          ]),
          ex.notes ? el('div', { class: 'notes' }, ex.notes) : null,
          el('div', { class: 'field' }, [
            el('label', {}, 'Weight'),
            el('input', {
              class: 'inp-weight',
              type: 'text',
              placeholder: 'e.g. 50 or BW',
              value: ex.weight || '',
              inputmode: 'text',
            }),
          ]),
          (() => {
            const grid = el('div', { class: 'set-grid' });
            const labels = ['Set 1', 'Set 2', 'Set 3', 'Set 4'];
            grid.appendChild(el('div', {
              style: 'font-size: 10px; color: var(--muted); text-align: right; padding-right: 4px; align-self: center; font-weight: 600;',
            }, 'REPS'));
            labels.forEach((lab, i) => {
              grid.appendChild(el('div', {}, [
                el('div', { style: 'font-size: 10px; text-align: center; color: var(--muted); margin-bottom: 4px;' }, lab),
                el('input', {
                  class: 'inp-r' + (i + 1),
                  type: 'number',
                  inputmode: 'numeric',
                  pattern: '[0-9]*',
                  placeholder: '—',
                  value: ex['r' + (i + 1)] === '' ? '' : String(ex['r' + (i + 1)] || ''),
                }),
              ]));
            });
            return grid;
          })(),
          ex.previous != null && ex.previous !== '' && ex.previous !== 0
            ? el('div', { class: 'prev' }, [el('span', {}, 'Last week: '), el('b', {}, String(ex.previous))])
            : null,
        ]);
        form.appendChild(card);
      });
      app.appendChild(form);

      app.appendChild(el('div', { class: 'field', style: 'margin-top: 16px;' }, [
        el('label', {}, 'Session notes (optional)'),
        el('input', { id: 'liftNotes', type: 'text', placeholder: 'how did it feel?' }),
      ]));

      app.appendChild(el('button', {
        onclick: async () => {
          const entries = [];
          document.querySelectorAll('#liftForm .exercise').forEach((card, i) => {
            const ex = today.template.exercises[i];
            const weight = card.querySelector('.inp-weight').value.trim();
            const r = [1, 2, 3, 4].map(n => {
              const v = card.querySelector('.inp-r' + n).value.trim();
              return v === '' ? '' : Number(v);
            });
            entries.push({
              name: ex.name,
              category: ex.category,
              weight: weight,
              r1: r[0], r2: r[1], r3: r[2], r4: r[3],
              notes: '',
            });
          });
          const meta = {
            date: todayISO(),
            block: today.block,
            week: today.week,
            day: today.liftDay,
            notes: $('#liftNotes').value.trim(),
          };
          try {
            await api('logLift', {}, { entries, meta });
            toast('Saved to Lift Log');
            setTimeout(() => render('home'), 800);
          } catch (e) {
            queuePush({ action: 'logLift', body: { entries, meta } });
            toast('Saved offline — will sync later');
            setTimeout(() => render('home'), 800);
          }
        },
      }, 'Save session'));
    }

    async function renderRun(app) {
      app.appendChild(el('header', { class: 'top' }, [
        el('h1', {}, 'Log Run'),
        el('span', { class: 'date' }, fmtDateLong(new Date())),
      ]));

      app.appendChild(el('div', { class: 'card' }, [
        el('div', { class: 'field' }, [
          el('label', {}, 'Date'),
          el('input', { id: 'runDate', type: 'date', value: todayISO() }),
        ]),
        el('div', { class: 'field' }, [
          el('label', {}, 'Distance (mi)'),
          el('input', { id: 'runDist', type: 'number', step: '0.01', inputmode: 'decimal', placeholder: '3.1' }),
        ]),
        el('div', { class: 'field' }, [
          el('label', {}, 'Time (mm:ss or h:mm:ss)'),
          el('input', { id: 'runTime', type: 'text', inputmode: 'numeric', placeholder: '32:15' }),
        ]),
        el('div', { class: 'field' }, [
          el('label', {}, 'Notes (optional)'),
          el('input', { id: 'runNotes', type: 'text', placeholder: 'Outside, easy, etc.' }),
        ]),
        el('button', {
          onclick: async () => {
            const date = $('#runDate').value;
            const distance = Number($('#runDist').value);
            const time = $('#runTime').value.trim();
            const notes = $('#runNotes').value.trim();
            if (!date || !distance || !time) return toast('Date, distance, and time required', true);

            // Normalize time to the "MM:SS:00" convention the sheet uses.
            const parts = time.split(':').map(p => p.padStart(2, '0'));
            let normalized;
            if (parts.length === 2) normalized = parts[0] + ':' + parts[1] + ':00';
            else normalized = parts.join(':');

            try {
              const res = await api('logRun', {}, { run: { date, distance, time: normalized, notes } });
              toast('Logged · ' + res.pace + '/mi');
              setTimeout(() => render('home'), 800);
            } catch (e) {
              queuePush({ action: 'logRun', body: { run: { date, distance, time: normalized, notes } } });
              toast('Saved offline — will sync later');
              setTimeout(() => render('home'), 800);
            }
          },
        }, 'Log run'),
      ]));
    }

    async function renderHistory(app) {
      app.appendChild(el('header', { class: 'top' }, [
        el('h1', {}, 'History'),
      ]));
      const skel = el('div', { class: 'card' }, el('div', { class: 'skeleton' }));
      app.appendChild(skel);

      let data;
      try { data = await api('recent', { limit: 20 }); }
      catch (e) { skel.remove(); app.appendChild(el('div', { class: 'card' }, 'Offline.')); return; }
      skel.remove();

      if (data.runs && data.runs.length) {
        const list = el('div', { class: 'card' }, [el('h2', {}, 'Recent runs')]);
        data.runs.forEach(r => {
          list.appendChild(el('div', { class: 'history-item' }, [
            el('div', {}, [
              el('div', { class: 'name' }, `${r.distance} mi`),
              el('div', { class: 'sub' }, `${r.pace || ''} · ${r.notes || 'no notes'}`),
            ]),
            el('div', { class: 'sub' }, r.date),
          ]));
        });
        app.appendChild(list);
      }

      if (data.lifts && data.lifts.length) {
        const list = el('div', { class: 'card' }, [el('h2', {}, 'Recent lifts')]);
        data.lifts.forEach(s => {
          list.appendChild(el('div', { class: 'history-item' }, [
            el('div', {}, [
              el('div', { class: 'name' }, `${dayTitle(s.day)} · ${s.exercises.length} exercises`),
              el('div', { class: 'sub' }, `${s.block || ''} · Week ${s.week || ''}`),
            ]),
            el('div', { class: 'sub' }, s.date),
          ]));
        });
        app.appendChild(list);
      }

      if ((!data.runs || !data.runs.length) && (!data.lifts || !data.lifts.length)) {
        app.appendChild(el('div', { class: 'card' }, 'No history yet.'));
      }
    }

    // -------- Navigation --------
    document.querySelectorAll('nav.bottom button').forEach(b => {
      b.addEventListener('click', () => render(b.dataset.view));
    });

    // -------- Init --------
    window.addEventListener('online', flushQueue);
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
    render('home');
    flushQueue();
  </script>
</body>
</html>
