      let data;
      try {
        const filter = analyticsYearFilter || String(new Date().getFullYear());
        data = await sbAnalytics(filter);
        analyticsYearFilter = data.filter;
      } catch (e) {
        skel.remove();
        app.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, 'Could not load'),
          el('div', { class: 'muted', style: 'font-size: 14px; margin-top: 6px;' },
            'Analytics failed to load: ' + e.message),
        ]));
        return;
      }
      skel.remove();

      // Friendly empty state when there are no runs at all.
      if (!data.summary || !data.summary.runs) {
        app.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, 'Nothing to analyze yet'),
          el('p', { class: 'muted', style: 'font-size: 14px; margin-top: 6px; line-height: 1.5;' },
            'Analytics currently shows run history — total miles, pace trends, best efforts, and monthly breakdown. Log your first run to see it come alive.'),
          el('p', { class: 'muted', style: 'font-size: 13px; margin-top: 10px; line-height: 1.5;' },
            'Analytics for other modalities (strength volume, ride time, etc.) is on the roadmap.'),
          el('button', {
            style: 'margin-top: 16px;',
            onclick: () => render('run'),
          }, 'Log a run'),
        ]));
        return;
      }

      // Year filter segmented control
      const seg = el('div', { class: 'seg' });
      const years = (data.availableYears || []).slice();
      const thisYr = new Date().getFullYear();
      if (!years.includes(thisYr)) years.unshift(thisYr);
      years.sort((a, b) => b - a);
      const options = years.map(String).concat(['all']);
      options.forEach(opt => {

        seg.appendChild(el('button', {
          class: isActive ? 'active' : '',
          onclick: async () => {
            analyticsYearFilter = opt;
            render('analytics');

      // Summary stat grid

      app.appendChild(el('div', { class: 'stat-grid' }, [
        el('div', { class: 'card' }, [
          el('h2', {}, 'Total miles'),
          el('div', { class: 'big' }, String(s.miles)),
          el('div', { class: 'muted', style: 'margin-top: 4px;' }, `${s.runs} runs`),
        ]),
        el('div', { class: 'card' }, [
          el('h2', {}, 'Avg pace'),
          el('div', { class: 'big' }, s.avgPace || '—'),
          el('div', { class: 'muted', style: 'margin-top: 4px;' }, '/mi'),
        ]),
      ]));
      app.appendChild(el('div', { class: 'stat-grid' }, [
        el('div', { class: 'card' }, [
          el('h2', {}, 'Avg distance'),
          el('div', { class: 'big' }, String(s.avgDistance)),
          el('div', { class: 'muted', style: 'margin-top: 4px;' }, 'mi/run'),
        ]),
        el('div', { class: 'card' }, [
          el('h2', {}, 'Avg run time'),
          el('div', { class: 'big' }, String(s.avgTimeMinutes)),
          el('div', { class: 'muted', style: 'margin-top: 4px;' }, 'min'),
        ]),
      ]));

      // Monthly mileage (only for specific years)
      if (data.monthly && data.monthly.length) {
        const maxMi = Math.max(1, ...data.monthly.map(m => m.miles));
        const monthlyCard = el('div', { class: 'card' }, [el('h2', {}, 'Monthly mileage')]);
        data.monthly.forEach(m => {

          monthlyCard.appendChild(el('div', { style: 'padding: 8px 0; border-bottom: 1px solid var(--border);' }, [
            el('div', { class: 'bar-row' + (m.miles === 0 ? ' zero' : '') }, [

          ]));
        });
        app.appendChild(monthlyCard);
      }

      // Year over year (always shown, especially useful for All Time)
      if (data.yearly && data.yearly.length > 1) {
        const yoyCard = el('div', { class: 'card' }, [el('h2', {}, 'Year over year')]);
        const maxY = Math.max(1, ...data.yearly.map(y => y.miles));
        data.yearly.forEach(y => {
          const pct = (y.miles / maxY) * 100;

            el('div', { class: 'label' }, y.year),
            el('div', { class: 'bar-track' }, [el('div', { class: 'bar-fill', style: `width: ${Math.max(2, pct)}%;` })]),
            el('div', { class: 'val' }, y.miles ? String(y.miles) + ' mi' : '—'),
          ]));
        });
        app.appendChild(yoyCard);

    let calendarMonth = null; // { year, month }

    let _calendarView = 'cal'; // 'cal' | 'list'

    async function renderCalendar(app) {
      if (!calendarMonth) {
        const n = new Date();
        calendarMonth = { year: n.getFullYear(), month: n.getMonth() + 1 };
      }
      app.appendChild(el('header', { class: 'top' }, [
        el('h1', {}, _calendarView === 'list' ? 'History' : 'Calendar'),
      ]));

      // Cal / List toggle

      });

      if (_calendarView === 'list') {
        await renderHistoryList_(app);
        return;
      }

          else calendarMonth.month--;

        el('h2', { id: 'calMonthLabel' }, 'Loading…'),

          render('calendar');

        const hasRun = !!day.run;
        const hasPull = !!day.pullups;

    // List view: scrollable history of past lift sessions, newest first.
    // Tap a row → existing Session Detail screen.
    async function renderHistoryList_(app) {
      const skel = el('div', { class: 'card' }, el('div', { class: 'skeleton', style: 'height: 200px;' }));
      app.appendChild(skel);

      let sessions;
      try {
        const { data, error } = await _sb.from('lift_sessions')
          .select('date,block_name,week,day,exercises,notes')
          .eq('user_id', currentUser.id)
          .order('date', { ascending: false })
          .limit(200);
        if (error) throw new Error(error.message);
        sessions = data || [];
      } catch (e) {
        skel.remove();
        app.appendChild(el('div', { class: 'card' }, 'Could not load history: ' + e.message));
        return;
      }
      skel.remove();

      if (!sessions.length) {
        app.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, 'No lift sessions yet'),
          el('p', { class: 'muted', style: 'font-size: 14px; margin-top: 6px;' },
            'Once you log a few lifts, they\'ll appear here. Each row jumps to the full session detail.'),
        ]));
        return;
      }

      // Group by month for visual structure.
      const monthBuckets = {};
      sessions.forEach(s => {
        const ym = (s.date || '').slice(0, 7);
        (monthBuckets[ym] = monthBuckets[ym] || []).push(s);
      });
      const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

      Object.keys(monthBuckets).sort().reverse().forEach(ym => {
        const [y, m] = ym.split('-').map(Number);
        const label = `${monthNames[m - 1]} ${y}`;
        app.appendChild(el('h2', { class: 'section-h' }, label));
        const bucket = monthBuckets[ym];
        bucket.forEach(s => {
          const exArr = Array.isArray(s.exercises) ? s.exercises : [];
          const exCount = exArr.length;
          const totalReps = exArr.reduce((tot, ex) => {
            return tot + [ex.r1, ex.r2, ex.r3, ex.r4].reduce((sum, v) => sum + (Number(v) || 0), 0);
          }, 0);
          const wd = new Date(s.date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short' });
          const preview = exArr.slice(0, 3).map(ex => ex.name).join(' · ') + (exArr.length > 3 ? ` · +${exArr.length - 3} more` : '');
          app.appendChild(el('div', {
            class: 'card history-row',
            onclick: () => {
              _liftSessionRef = { date: s.date, day: s.day };
              render('lift-session');
            },
          }, [
            el('div', { class: 'history-head' }, [
              el('div', {}, [
                el('div', { class: 'history-date' }, `${wd} · ${s.date}`),
                el('div', { class: 'muted', style: 'font-size: 12px; margin-top: 2px;' },
                  `${s.block_name || '—'} · Wk ${s.week || '—'} · Day ${s.day || '—'}`),
              ]),
              el('div', { class: 'muted', style: 'font-size: 12px; text-align: right; white-space: nowrap;' },
                `${exCount} ex · ${totalReps} reps`),
            ]),
            preview ? el('div', { class: 'muted', style: 'font-size: 12px; margin-top: 8px;' }, preview) : null,
          ]));
        });
      });
    }

    function selectCalendarDay(day) {
      document.querySelectorAll('.cal-day.selected').forEach(n => n.classList.remove('selected'));
      const btn = document.querySelector(`.cal-day[data-date="${day.date}"]`);
      if (btn) btn.classList.add('selected');

      const detail = $('#calDetail');
      detail.innerHTML = '';
      const card = el('div', { class: 'card' }, [
        el('h2', {}, day.weekday + ' · ' + day.date),
      ]);
      const items = [];
      if (day.lift) {
        const liftDesc = `${day.lift.block || ''} · Week ${day.lift.week || ''} · Day ${day.lift.day || ''}`.trim();
        items.push(el('div', { style: 'padding: 8px 0; border-bottom: 1px solid var(--border);' }, [
          el('div', { style: 'font-weight: 600; color: #ff9b7a;' }, 'Lift'),
          el('div', { class: 'muted', style: 'font-size: 13px;' }, liftDesc),
          el('button', {
            style: 'margin-top: 8px; background: var(--surface-2); color: var(--text); border: 1px solid var(--border); padding: 6px 12px; font-size: 12px; width: auto;',
            onclick: () => {
              _liftSessionRef = { date: day.date, day: day.lift.day };
              render('lift-session');
            },
          }, 'View session →'),
        ]));
      }
      if (day.run) {
        items.push(el('div', { style: 'padding: 8px 0; border-bottom: 1px solid var(--border);' }, [
          el('div', { style: 'font-weight: 600; color: #7ab7ff;' }, 'Run'),
          el('div', { class: 'muted', style: 'font-size: 13px;' },
            `${day.run.distance} mi · ${prettyTime_(day.run.time)} · ${day.run.pace}${day.run.shoe ? ' · ' + day.run.shoe : ''}`),
        ]));
      }
      if (day.pullups) {
        items.push(el('div', { style: 'padding: 8px 0;' }, [
          el('div', { style: 'font-weight: 600; color: #7affb7;' }, 'Pull-Ups'),
          el('div', { class: 'muted', style: 'font-size: 13px;' },
            `${day.pullups.total} reps · ${day.pullups.weight || 'BW'}`),
        ]));
      }
      if (!items.length) {
        card.appendChild(el('div', { class: 'muted', style: 'font-size: 14px;' }, 'No activity logged.'));
      } else {
        items.forEach(i => card.appendChild(i));
      }
      detail.appendChild(card);
      detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function prettyTime_(s) {
      // Convert "43:29:00" → "43:29" (drop the trailing :00 if zero).
      if (!s) return '';
      const m = String(s).match(/^(\d{1,2}):(\d{2}):(\d{2})$/);
      if (m && m[3] === '00') return `${m[1]}:${m[2]}`;
      return String(s);
    }

    // Fetch every lift_sessions row that contains an exercise matching this
    // name (case + whitespace-insensitive). Returns one entry per session
    // with the matched exercise's weight + per-set reps.
    async function sbExerciseHistory(name) {
      const uid = currentUser.id;
      const { data, error } = await _sb.from('lift_sessions')
        .select('date,block_name,week,day,exercises,notes')
        .eq('user_id', uid)
        .order('date', { ascending: false })
        .limit(500);
      if (error) throw new Error(error.message);
      const wanted = normalizeExName_(name);
      const out = [];
      (data || []).forEach(s => {
        const arr = Array.isArray(s.exercises) ? s.exercises : [];
        const match = arr.find(ex => normalizeExName_(ex.name) === wanted);
        if (!match) return;
        const setReps = [match.r1, match.r2, match.r3, match.r4]
          .map(v => (v === '' || v == null) ? null : Number(v))
          .filter(v => v !== null);
        out.push({
          date:     s.date,
          block:    s.block_name,
          week:     s.week,
          day:      s.day,
          weight:   match.weight,
          setReps:  setReps,
          totalReps: setReps.reduce((a, b) => a + (b || 0), 0),
          notes:    match.notes || '',
        });
      });
      return out;
    }

    function parseWeightNumber_(w) {
      if (w == null || w === '') return null;
      // Pull the first number out of "135", "BW+25", "55 lb", etc.
      const m = String(w).match(/-?\d+(?:\.\d+)?/);
      return m ? Number(m[0]) : null;
    }

    // Tiny inline SVG line chart. Points: [{ date, weight }] in ascending
    // date order, length ≥ 2. Returns an SVG element sized to fit a card.
    function renderTrendLine_(points) {
      const W = 320, H = 100, PAD_X = 8, PAD_Y = 14;
      const weights = points.map(p => p.weight);
      const minW = Math.min(...weights);
      const maxW = Math.max(...weights);
      const span = (maxW - minW) || 1;
      const xStep = (W - PAD_X * 2) / (points.length - 1);
      const xy = points.map((p, i) => {
        const x = PAD_X + i * xStep;
        const y = PAD_Y + (1 - (p.weight - minW) / span) * (H - PAD_Y * 2);
        return [x, y];
      });
      const path = xy.map(([x, y], i) => (i === 0 ? `M${x},${y}` : `L${x},${y}`)).join(' ');
      const NS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(NS, 'svg');
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
      svg.setAttribute('preserveAspectRatio', 'none');
      svg.style.width = '100%';
      svg.style.height = '100px';
      svg.style.marginTop = '8px';

      // Grid: baseline + top
      const baseline = document.createElementNS(NS, 'line');
      baseline.setAttribute('x1', PAD_X); baseline.setAttribute('x2', W - PAD_X);
      baseline.setAttribute('y1', H - PAD_Y); baseline.setAttribute('y2', H - PAD_Y);
      baseline.setAttribute('stroke', '#333'); baseline.setAttribute('stroke-width', '0.5');
      svg.appendChild(baseline);

      // Line
      const line = document.createElementNS(NS, 'path');
      line.setAttribute('d', path);
      line.setAttribute('fill', 'none');
      line.setAttribute('stroke', 'var(--accent)');
      line.setAttribute('stroke-width', '2');
      line.setAttribute('stroke-linejoin', 'round');
      svg.appendChild(line);

      // Dots
      xy.forEach(([x, y]) => {
        const c = document.createElementNS(NS, 'circle');
        c.setAttribute('cx', x); c.setAttribute('cy', y);
        c.setAttribute('r', '2.5');
        c.setAttribute('fill', 'var(--accent)');
        svg.appendChild(c);
      });

      // Min / max labels
      const minLbl = document.createElementNS(NS, 'text');
      minLbl.textContent = String(minW);
      minLbl.setAttribute('x', PAD_X); minLbl.setAttribute('y', H - 2);
      minLbl.setAttribute('font-size', '9'); minLbl.setAttribute('fill', '#666');
      svg.appendChild(minLbl);
      const maxLbl = document.createElementNS(NS, 'text');
      maxLbl.textContent = String(maxW);
      maxLbl.setAttribute('x', PAD_X); maxLbl.setAttribute('y', 10);
      maxLbl.setAttribute('font-size', '9'); maxLbl.setAttribute('fill', '#666');
      svg.appendChild(maxLbl);

      return svg;
    }

    function programCard_(p) {
      const s = p.structure || {};
      const weeks = s.weeks_total || (s.weeks ? s.weeks.length : 0);
      const dayLetters = (s.day_letters || []).join('/');
      const exCount = (s.weeks || []).reduce((sum, w) =>
        sum + Object.values(w.days || {}).reduce((s2, arr) => s2 + (arr ? arr.length : 0), 0), 0);
      const meta = [
        weeks ? `${weeks} weeks` : '',
        dayLetters ? `Days ${dayLetters}` : '',
        exCount ? `${exCount} exercises` : '',
      ].filter(Boolean).join(' · ');

      return el('div', { class: 'card program-card', onclick: () => {
        _programsDetailId = p.id;
        render('programs');
      }}, [
        el('div', { class: 'program-row' }, [
          el('div', {}, [
            el('div', { class: 'program-name' }, p.name),
            el('div', { class: 'muted', style: 'font-size: 12px; margin-top: 2px;' }, meta || '—'),
            p.notes ? el('div', { class: 'muted', style: 'font-size: 12px; margin-top: 4px; font-style: italic;' }, p.notes) : null,
          ]),
          p.active ? el('span', { class: 'program-badge active' }, 'ACTIVE')

        onclick: () => { _programsDetailId = null; render('programs'); },
      }, '← All programs'));

      const s = p.structure || {};
      const weeks = s.weeks || [];
      const dayLetters = s.day_letters || [];
      const dayTitles = s.day_titles || {};
      const exCount = weeks.reduce((sum, w) =>
        sum + Object.values(w.days || {}).reduce((s2, arr) => s2 + (arr ? arr.length : 0), 0), 0);

      // Header card
      app.appendChild(el('div', { class: 'card' }, [
        el('div', { class: 'program-row' }, [

            p.notes ? el('div', { class: 'muted', style: 'font-size: 13px; margin-top: 6px;' }, p.notes) : null,
          ]),
          p.active ? el('span', { class: 'program-badge active' }, 'ACTIVE')
                   : (p.archived ? el('span', { class: 'program-badge archived' }, 'ARCHIVED') : null),
        ]),

        // Action buttons
        el('div', { style: 'display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap;' }, [
          !p.active ? el('button', {
            onclick: async () => {
              try {
                await sbActivateProgram(p.id);
                invalidateActiveProgramCache();
                toast('Activated');
                render('programs');
              } catch (e) { toast('Could not activate: ' + e.message, true); }
            },
            style: 'flex: 1;',
          }, 'Activate') : null,
          !p.archived ? el('button', {
            onclick: async () => {
              if (!confirm(`Archive "${p.name}"? You can reactivate it later.`)) return;
              try {
                await sbArchiveProgram(p.id);
                invalidateActiveProgramCache();
                toast('Archived');
                render('programs');
              } catch (e) { toast('Could not archive: ' + e.message, true); }
            },
            style: 'flex: 1; background: var(--surface-2); color: var(--text); border: 1px solid var(--border);',
          }, 'Archive') : null,
          el('button', {
            onclick: async () => {
              if (!confirm(`Delete "${p.name}" permanently? Lift sessions logged under it are kept, but the template is gone.`)) return;
              try {
                await sbDeleteProgram(p.id);
                invalidateActiveProgramCache();
                _programsDetailId = null;
                toast('Deleted');
                render('programs');
              } catch (e) { toast('Could not delete: ' + e.message, true); }
            },
            style: 'flex: 1; background: var(--surface-2); color: #d97a7a; border: 1px solid var(--border);',
          }, 'Delete'),
        ]),
      ]));

      // Per-week breakdown
      if (!weeks.length) {
        app.appendChild(el('div', { class: 'card' }, 'No weeks defined.'));
        return;
      }

      let openWeek = null;
      const weeksContainer = el('div');
      weeks.forEach(w => {
        const dayCount = Object.keys(w.days || {}).length;
        const exTotal = Object.values(w.days || {}).reduce((s, arr) => s + (arr ? arr.length : 0), 0);
        const card = el('div', { class: 'card week-card' });
        const headerEl = el('button', {
          class: 'week-header',
          onclick: () => {
            const isOpen = card.classList.contains('open');
            weeksContainer.querySelectorAll('.week-card.open').forEach(c => c.classList.remove('open'));
            if (!isOpen) card.classList.add('open');
          },
        }, [
          el('div', {}, [
            el('div', { class: 'week-num' }, `Week ${w.week}`),
            w.block_name ? el('div', { class: 'muted', style: 'font-size: 11px;' }, w.block_name) : null,
          ]),
          el('div', { class: 'muted', style: 'font-size: 12px;' }, `${dayCount} days · ${exTotal} exercises`),
        ]);
        card.appendChild(headerEl);

        const body = el('div', { class: 'week-body' });
        dayLetters.forEach(letter => {
          const exs = (w.days && w.days[letter]) || [];
          if (!exs.length) return;
          const dayTitle = dayTitles[letter] || `Day ${letter}`;
          body.appendChild(el('div', { class: 'day-block' }, [
            el('div', { class: 'day-title' }, `Day ${letter} — ${dayTitle}`),
            ...exs.map(ex => el('div', { class: 'ex-row' }, [
              el('div', { class: 'ex-name' }, ex.name),
              el('div', { class: 'muted', style: 'font-size: 12px;' },
                `${ex.sets || '?'} × ${ex.target_reps || '?'}${ex.category ? ' · ' + ex.category : ''}`),
              ex.notes ? el('div', { class: 'muted', style: 'font-size: 11px; font-style: italic;' }, ex.notes) : null,
            ])),
          ]));
        });
        card.appendChild(body);
        weeksContainer.appendChild(card);
      });
      app.appendChild(weeksContainer);
    }

    // -------- Modality catalog + profile helpers --------
    // Ordered so the checkbox grid is roughly primary → less primary.
    const MODALITIES = [
      { id: 'strength', label: 'Strength',  desc: 'Weights, bodyweight, lifting sessions',       icon: '🏋️' },
      { id: 'running',  label: 'Running',   desc: 'Road, trail, treadmill',                       icon: '🏃' },
      { id: 'cycling',  label: 'Cycling',   desc: 'Road, gravel, indoor trainer',                 icon: '🚴' },
      { id: 'swimming', label: 'Swimming',  desc: 'Pool, open water',                             icon: '🏊' },
      { id: 'hiking',   label: 'Hiking',    desc: 'Trails, day hikes, backpacking',               icon: '🥾' },
      { id: 'walking',  label: 'Walking',   desc: 'Recovery walks, Zone 2, rucking',              icon: '🚶' },
      { id: 'rowing',   label: 'Rowing',    desc: 'Water or erg',                                 icon: '🚣' },
      { id: 'yoga',     label: 'Yoga',      desc: 'Mobility, flexibility, mindfulness',           icon: '🧘' },
      { id: 'other',    label: 'Other',     desc: 'CrossFit, climbing, martial arts, everything else', icon: '⭐' },
    ];

    // Which loggers appear on Home for each modality. Pull-Ups are no longer
    // a top-level tile — most users treat pull-ups as an exercise inside a
    // Lift session. Users who want to log pure pull-up sessions can still
    // reach the screen by navigating directly to /?view=pullups.
    const MODALITY_TILES = {
      strength: [
        { view: 'lift', label: 'Lift', iconKey: 'lift' },
      ],
      running:  [{ view: 'run',                  label: 'Run',   iconKey: 'run' }],
      walking:  [{ view: 'walk',                 label: 'Walk',  iconKey: 'walk' }],
      cycling:  [{ view: 'activity-cycling',     label: 'Ride',  iconKey: 'bike' }],
      hiking:   [{ view: 'activity-hiking',      label: 'Hike',  iconKey: 'boot' }],
      swimming: [{ view: 'activity-swimming',    label: 'Swim',  iconKey: 'swim' }],
      rowing:   [{ view: 'activity-rowing',      label: 'Row',   iconKey: 'row'  }],
      yoga:     [{ view: 'activity-yoga',        label: 'Yoga',  iconKey: 'yoga' }],
      other:    [{ view: 'activity-other',       label: 'Other', iconKey: 'star' }],
    };

    function modalityLabel_(id) {
      const m = MODALITIES.find(x => x.id === id);
      return m ? m.label : id;
    }

    // Cache the profile row for the session.
    let _userProfileCache = null;

    async function sbLoadUserProfile(force = false) {
      if (!force && _userProfileCache) return _userProfileCache;
      const { data, error } = await _sb.from('user_profiles')
        .select('id,display_name,weekly_run_count_goal,weekly_lift_count_goal,modalities,dashboard_widgets,onboarded_at')
        .eq('id', currentUser.id).maybeSingle();
      if (error) { _userProfileCache = null; return null; }
      _userProfileCache = data;
      return data;
    }

    async function sbSaveOnboarding({ modalities, weeklyGoals }) {
      const patch = {
        id:            currentUser.id,
        modalities:    modalities || [],
        onboarded_at:  new Date().toISOString(),
      };
      if (weeklyGoals && typeof weeklyGoals.runs  === 'number') patch.weekly_run_count_goal  = weeklyGoals.runs;
      if (weeklyGoals && typeof weeklyGoals.lifts === 'number') patch.weekly_lift_count_goal = weeklyGoals.lifts;
      const { error } = await _sb.from('user_profiles').upsert(patch, { onConflict: 'id' });
      if (error) throw new Error(error.message);
      _userProfileCache = null;
    }

    function needsOnboarding_(profile) {
      // No profile row yet, or onboarded_at is null → show onboarding.
      // (Existing users pre-migration will have null modalities → also onboard.)
      return !profile || !profile.onboarded_at;
    }

    function userModalities_(profile) {
      const arr = (profile && Array.isArray(profile.modalities)) ? profile.modalities : [];
      return arr.length ? arr : ['strength', 'running']; // safe fallback for pre-onboarded users
    }

    // -------- Onboarding wizard --------
    // State survives step transitions but resets on view re-entry.
    let _onboardingState = null;

    async function renderOnboarding(app) {
      if (!_onboardingState) {
        _onboardingState = {
          step: 1,
          modalities: new Set(),         // no pre-selection — user picks intentionally
          weeklyGoals: { runs: 0, lifts: 0 }, // zero = "not set", user opts in
        };
      }
      const s = _onboardingState;

      // Header (compact — no bottom nav on onboarding for focus)
      app.appendChild(el('div', { class: 'onboard-progress' }, [
        el('div', { class: 'onboard-dot' + (s.step >= 1 ? ' on' : '') }),
        el('div', { class: 'onboard-dot' + (s.step >= 2 ? ' on' : '') }),
        el('div', { class: 'onboard-dot' + (s.step >= 3 ? ' on' : '') }),
        el('div', { class: 'onboard-dot' + (s.step >= 4 ? ' on' : '') }),
      ]));

      if      (s.step === 1) renderOnboardStep1_(app, s);
      else if (s.step === 2) renderOnboardStep2_(app, s);
      else if (s.step === 3) renderOnboardStep3_(app, s);
      else                    renderOnboardStep4_(app, s);
    }

    function renderOnboardStep1_(app, s) {
      app.appendChild(el('div', { class: 'onboard-body' }, [
        el('div', { class: 'onboard-emoji' }, '👋'),
        el('h1', { class: 'onboard-title' }, 'Welcome'),
        el('p', { class: 'onboard-sub' },
          "This is your training log — the one place that holds every session, every progression, every year of history. Whatever you train, however you train, it goes here."),
        el('p', { class: 'onboard-sub', style: 'margin-top: 20px; font-style: italic;' },
          "Takes about 30 seconds to set up. You can change anything later."),
      ]));
      app.appendChild(el('div', { class: 'onboard-actions' }, [
        el('button', {
          class: 'onboard-primary',
          onclick: () => { s.step = 2; render('onboarding'); },
        }, 'Get started →'),
      ]));
    }

    function renderOnboardStep2_(app, s) {
      app.appendChild(el('div', { class: 'onboard-body' }, [
        el('h1', { class: 'onboard-title' }, 'What do you train?'),
        el('p', { class: 'onboard-sub' },
          'Pick everything that applies. The app will show only what matters to you.'),
      ]));

      const grid = el('div', { class: 'modality-grid' });
      MODALITIES.forEach(m => {
        const isOn = s.modalities.has(m.id);
        const card = el('button', {
          class: 'modality-card' + (isOn ? ' on' : ''),
          onclick: () => {
            if (s.modalities.has(m.id)) s.modalities.delete(m.id);
            else s.modalities.add(m.id);
            render('onboarding');
          },
        }, [
          el('div', { class: 'modality-icon' }, m.icon),
          el('div', { class: 'modality-name' }, m.label),
          el('div', { class: 'modality-desc' }, m.desc),
        ]);
        grid.appendChild(card);
      });
      app.appendChild(grid);

      app.appendChild(el('div', { class: 'onboard-actions' }, [
        el('button', {
          class: 'onboard-secondary',
          onclick: () => { s.step = 1; render('onboarding'); },
        }, '← Back'),
        el('button', {
          class: 'onboard-primary',
          disabled: s.modalities.size === 0 ? 'disabled' : null,
          onclick: () => {
            if (s.modalities.size === 0) return;
            s.step = 3;
            render('onboarding');
          },
        }, s.modalities.size ? `Next (${s.modalities.size} picked) →` : 'Pick at least one →'),
      ]));
    }

    function renderOnboardStep3_(app, s) {
      // Only show weekly goal inputs for modalities that have goal columns
      // in the DB right now (runs + strength). Other picked modalities get
      // an "coming in the next update" note so users know why they're missing.
      const showRuns  = s.modalities.has('running');
      const showLifts = s.modalities.has('strength');
      const otherPicked = Array.from(s.modalities).filter(m => m !== 'running' && m !== 'strength');

      app.appendChild(el('div', { class: 'onboard-body' }, [
        el('h1', { class: 'onboard-title' }, 'Weekly goals?'),
        el('p', { class: 'onboard-sub' },
          'Optional. Leave blank and you can set them anytime by tapping the numbers on Home.'),
      ]));

      const form = el('div', { class: 'onboard-form' });
      if (showRuns) {
        form.appendChild(el('div', { class: 'onboard-field' }, [
          el('label', {}, 'Runs per week'),
          el('input', {
            id: 'onbRunGoal', type: 'number', min: '0', max: '99',
            inputmode: 'numeric', pattern: '[0-9]*',
            placeholder: 'e.g. 3',
            value: s.weeklyGoals.runs > 0 ? String(s.weeklyGoals.runs) : '',
            oninput: (e) => { s.weeklyGoals.runs = Number(e.target.value) || 0; },
          }),
        ]));
      }
      if (showLifts) {
        form.appendChild(el('div', { class: 'onboard-field' }, [
          el('label', {}, 'Lifts per week'),
          el('input', {
            id: 'onbLiftGoal', type: 'number', min: '0', max: '99',
            inputmode: 'numeric', pattern: '[0-9]*',
            placeholder: 'e.g. 3',
            value: s.weeklyGoals.lifts > 0 ? String(s.weeklyGoals.lifts) : '',
            oninput: (e) => { s.weeklyGoals.lifts = Number(e.target.value) || 0; },
          }),
        ]));
      }
      if (otherPicked.length) {
        const otherLabels = otherPicked
          .map(id => (MODALITIES.find(m => m.id === id) || {}).label || id)
          .join(', ');
        form.appendChild(el('div', {
          class: 'muted',
          style: 'font-size: 13px; margin-top: 16px; padding: 12px; background: var(--surface-2); border-radius: 8px; line-height: 1.5;',
        }, `Goal tracking for ${otherLabels} is coming soon. Log those sessions manually for now — they'll still show up on your Calendar and History.`));
      }
      if (!showRuns && !showLifts && !otherPicked.length) {
        form.appendChild(el('div', { class: 'muted', style: 'font-size: 14px;' },
          "You didn't pick any modalities. Go back and select at least one to continue."));
      }
      app.appendChild(form);

      app.appendChild(el('div', { class: 'onboard-actions' }, [
        el('button', {
          class: 'onboard-secondary',
          onclick: () => { s.step = 2; render('onboarding'); },
        }, '← Back'),
        el('button', {
          class: 'onboard-primary',
          onclick: () => { s.step = 4; render('onboarding'); },
        }, 'Next →'),
      ]));
    }

    function renderOnboardStep4_(app, s) {
      const picks = Array.from(s.modalities).map(id => {
        const m = MODALITIES.find(x => x.id === id);
        return m ? m.label : id;
      }).join(', ');

      app.appendChild(el('div', { class: 'onboard-body' }, [
        el('div', { class: 'onboard-emoji' }, '✅'),
        el('h1', { class: 'onboard-title' }, "You're ready"),
        el('p', { class: 'onboard-sub' },
          `We'll show you tiles for ${picks}. Weekly goals set. History starts today.`),
        el('p', { class: 'onboard-sub', style: 'margin-top: 20px;' },
          'Tap Finish, then start logging. Everything else you need is inside the app.'),
      ]));
      app.appendChild(el('div', { class: 'onboard-actions' }, [
        el('button', {
          class: 'onboard-secondary',
          onclick: () => { s.step = 3; render('onboarding'); },
        }, '← Back'),
        el('button', {
          class: 'onboard-primary',
          onclick: async () => {
            try {
              await sbSaveOnboarding({
                modalities: Array.from(s.modalities),
                weeklyGoals: s.weeklyGoals,
              });
              _onboardingState = null;
              toast('All set — welcome');
              render('home');
            } catch (e) {
              toast('Could not save: ' + e.message, true);
            }
          },
        }, 'Finish →'),
      ]));
    }

    async function renderStravaCard_(app) {
      const card = el('div', { class: 'card' }, [el('h2', {}, 'Strava')]);

      if (!stravaConfigured()) {
        card.appendChild(el('div', { class: 'muted', style: 'font-size: 13px; margin-top: 6px;' },
          'Strava integration is not configured in this build. Set STRAVA_CLIENT_ID in index.html and deploy the strava-oauth + strava-refresh Edge Functions to enable.'));
        app.appendChild(card);
        return;
      }

      let conn = null;
      try { conn = await sbStravaConnection(); }
      catch (e) {
        card.appendChild(el('div', { class: 'muted', style: 'font-size: 13px; margin-top: 6px;' },
          'Could not check Strava status: ' + e.message));
        app.appendChild(card);
        return;
      }

      if (!conn) {
        card.appendChild(el('div', { class: 'muted', style: 'font-size: 13px; margin-top: 4px; margin-bottom: 12px;' },
          'Auto-import your runs from Strava. Connecting lets the app pull each new Strava run as you finish it — distance, time, pace, all populated for you.'));
        card.appendChild(el('button', {
          onclick: () => { window.location.href = stravaAuthUrl(); },
        }, 'Connect Strava'));
        app.appendChild(card);
        return;
      }

      // Connected — show athlete, last sync, sync button, disconnect button
      const lastSync = conn.last_sync_at ? new Date(conn.last_sync_at).toLocaleString() : 'never';
      card.appendChild(el('div', { style: 'margin-top: 4px; margin-bottom: 12px;' }, [
        el('div', { style: 'font-size: 14px; color: var(--text);' },
          `Connected as ${conn.athlete_name || conn.athlete_username || 'Strava athlete'}`),
        el('div', { class: 'muted', style: 'font-size: 12px; margin-top: 4px;' },
          `Last sync: ${lastSync}`),
      ]));

      const syncBtn = el('button', {
        style: 'flex: 1;',
        onclick: async () => {
          syncBtn.disabled = true;
          syncBtn.textContent = 'Syncing…';
          try {
            const res = await sbStravaSync({ daysBack: 90 });
            toast(`Synced ${res.inserted} run${res.inserted === 1 ? '' : 's'} from Strava`);
            localStorage.setItem('stravaSyncedAt_v1', String(Date.now()));
            render('profile');
          } catch (e) {
            toast('Sync failed: ' + (e.message || e), true);
            syncBtn.disabled = false;
            syncBtn.textContent = 'Sync now';
          }
        },
      }, 'Sync now');

      const disconnectBtn = el('button', {
        style: 'flex: 1; background: var(--surface-2); color: var(--text); border: 1px solid var(--border);',
        onclick: async () => {
          if (!confirm("Disconnect Strava? Your existing imported runs stay; future runs won't auto-import until you reconnect.")) return;
          try {
            await sbStravaDisconnect();
            toast('Disconnected');
            render('profile');
          } catch (e) {
            toast('Could not disconnect: ' + (e.message || e), true);
          }
        },
      }, 'Disconnect');

      card.appendChild(el('div', { style: 'display: flex; gap: 8px;' }, [syncBtn, disconnectBtn]));
      app.appendChild(card);
    }

    async function renderProfile(app) {
      app.appendChild(el('header', { class: 'top' }, [el('h1', {}, 'Profile')]));

      const skel = el('div', { class: 'card' }, el('div', { class: 'skeleton' }));
      app.appendChild(skel);

      let prof;
      try { prof = await sbProfile(); }
      catch (e) { skel.remove(); app.appendChild(el('div', { class: 'card' }, 'Could not load profile: ' + e.message)); return; }
      skel.remove();

      // PR badges
      if (prof.bestEfforts && prof.bestEfforts.length) {
        const grid = el('div', { class: 'pr-grid' });
        prof.bestEfforts.forEach(pr => {
          grid.appendChild(el('div', { class: 'pr-badge' }, [
            el('div', { class: 'b-name' }, pr.bucket),
            el('div', { class: 'b-pace' }, pr.pace + '/mi'),
            el('div', { class: 'b-meta' }, `${prettyTime_(pr.time)} · ${pr.distance} mi · ${pr.date}`),
          ]));
        });
        app.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, 'Best efforts (all-time)'),
          el('div', { class: 'muted', style: 'font-size: 11px; margin-bottom: 12px; margin-top: -8px;' },
            'Fastest pace at each distance. Without GPS splits, these reflect your best run at ~that distance.'),
          grid,
        ]));
      }

      // Shoes — always render the card so the "Add shoe" button is reachable
      // even when no shoes exist yet.
      {
        const card = el('div', { class: 'card' }, [el('h2', {}, 'Shoes')]);
        const shoes = prof.shoes || [];
        const active = shoes.filter(s => s.active);
        const retired = shoes.filter(s => !s.active);

        if (active.length) {
          active.forEach(s => {
            const mi = s.totalMiles || 0;
            const cls = mi > 450 ? 'danger' : (mi > 300 ? 'warn' : '');
            const pct = Math.min(100, (mi / 500) * 100);
            card.appendChild(el('div', { class: 'shoe-card' }, [
              el('div', { class: 'shoe-name' }, s.name),
              el('div', { class: 'shoe-brand' }, s.brand || ''),
              el('div', { class: 'shoe-miles-row' }, [
                el('div', { class: 'shoe-miles ' + cls }, String(mi) + ' mi'),
                el('div', { class: 'muted', style: 'font-size: 11px;' },
                  `+${s.newMiles || 0} since start`),
              ]),
              el('div', { class: 'shoe-bar' }, [el('div', { class: 'shoe-bar-fill ' + cls, style: `width: ${pct}%;` })]),
            ]));
          });
        } else {
          card.appendChild(el('div', { class: 'muted', style: 'font-size: 13px; margin: 8px 0;' },
            'No active shoes yet. Add one below to start tracking mileage.'));
        }

        if (retired.length) {
          card.appendChild(el('div', { class: 'muted', style: 'font-size: 11px; margin-top: 10px;' },
            `Retired: ${retired.map(r => r.name).join(', ')}`));
        }

        // Add-shoe form (collapsed by default; expand on button tap)
        const formWrap = el('div', { id: 'addShoeForm', style: 'display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border);' });
        const nameI    = el('input', { id: 'newShoeName',   type: 'text',   placeholder: 'e.g. Nike Pegasus 41' });
        const milesI   = el('input', { id: 'newShoeMiles',  type: 'number', step: '1', inputmode: 'numeric', placeholder: '0', value: '0' });
        const activeCk = el('input', { id: 'newShoeActive', type: 'checkbox' });
        activeCk.checked = true;

        formWrap.appendChild(el('div', { class: 'field' }, [el('label', {}, 'Shoe name'),         nameI]));
        formWrap.appendChild(el('div', { class: 'field' }, [el('label', {}, 'Existing miles'),    milesI]));
        formWrap.appendChild(el('div', {
          class: 'field',
          style: 'display: flex; align-items: center; gap: 8px;',
        }, [
          activeCk,
          el('label', { for: 'newShoeActive', style: 'margin: 0; font-size: 14px;' }, 'Active (uncheck to add as retired)'),
        ]));
        formWrap.appendChild(el('button', {
          onclick: async () => {
            const name = nameI.value.trim();
            if (!name) return toast('Name required', true);
            const miles = Number(milesI.value) || 0;
            try {
              await sbAddShoe({ name, active: activeCk.checked, initialMiles: miles });
              toast('Shoe added');
              render('profile');
            } catch (e) {
              toast('Could not save: ' + e.message, true);
            }
          },
        }, 'Save shoe'));

        const addBtn = el('button', {
          style: 'margin-top: 12px; background: var(--surface-2); color: var(--text); border: 1px solid var(--border);',
          onclick: () => {
            const wrap = $('#addShoeForm');
            const show = wrap.style.display === 'none';
            wrap.style.display = show ? 'block' : 'none';
            addBtn.textContent = show ? 'Cancel' : '+ Add shoe';
            if (show) nameI.focus();
          },
        }, '+ Add shoe');

        card.appendChild(addBtn);
        card.appendChild(formWrap);
        app.appendChild(card);
      }

      // Strava connection
      await renderStravaCard_(app);

      // Weight placeholder
      app.appendChild(el('div', { class: 'card' }, [
        el('h2', {}, 'Body weight'),

      ]));
    }

    // ======== RUN PLANNER ========
    const P_DISTS = {
      '1mi':  { label:'1 Mile',        miles:1.0,  peakLR:{beginner:4, intermediate:5,  advanced:5 } },
      '2mi':  { label:'2 Miles',       miles:2.0,  peakLR:{beginner:5, intermediate:6,  advanced:6 } },
      '5k':   { label:'5K',            miles:3.1,  peakLR:{beginner:6, intermediate:9,  advanced:10} },
      '4mi':  { label:'4 Miles',       miles:4.0,  peakLR:{beginner:6, intermediate:8,  advanced:9 } },
      '5mi':  { label:'5 Miles',       miles:5.0,  peakLR:{beginner:7, intermediate:9,  advanced:10} },
      '10k':  { label:'10K',           miles:6.2,  peakLR:{beginner:8, intermediate:11, advanced:12} },
      '15k':  { label:'15K',           miles:9.3,  peakLR:{beginner:9, intermediate:12, advanced:13} },
      '10mi': { label:'10 Miles',      miles:10.0, peakLR:{beginner:10,intermediate:13, advanced:14} },
      'hm':   { label:'Half Marathon', miles:13.1, peakLR:{beginner:10,intermediate:12, advanced:13} },
    };
    const P_START_LR = { beginner:1.5, intermediate:2.5, advanced:3.5 };
    const P_INTERVALS = [
      { name:'400m Repeats',      desc:'8×400m at hard effort. Rest: 90 sec standing/walking between each rep.',                                                              phase:'early' },
      { name:'Pyramid Intervals', desc:'200m–400m–800m–400m–200m. Rest: 60 sec after 200m, 90 sec after 400m, 2 min after the 800m.',                                        phase:'early' },
      { name:'Rolling 400s',      desc:'6×400m at controlled hard effort. Rest: 30 sec only — the short recovery is intentional.',                                           phase:'early' },
      { name:'Drop Set',          desc:'6×400m starting fast, easing back each rep. Rest: 60 sec between reps.',                                                             phase:'mid'   },
      { name:'Rolling 800s',      desc:'5×800m at tempo-to-hard effort. Rest: 90 sec rolling — not full recovery.',                                                          phase:'mid'   },
      { name:'1km Repeats',       desc:'5×1km at 5K effort. Rest: 90 sec between reps — quality over quantity.',                                                             phase:'mid'   },
      { name:'Mile Up & Overs',   desc:'Mile repeats alternating hard and easy. Rest: jog 400m easy between each mile rep.',                                                 phase:'mid'   },
      { name:'Broken Miles',      desc:'Each mile split into 200m–400m sections at hard effort. Rest: 30 sec between sections, 90 sec between miles.',                       phase:'late'  },
      { name:"1k into Broken K's",desc:'1km hard, then 600m as 3×200m bursts. Rest: 30 sec between 200m, 2 min between sets.',                                              phase:'late'  },
      { name:'Repeating Drop Set',desc:'Full 6×400m drop set repeated twice. Rest: 60 sec between reps, 3 min between the two sets.',                                        phase:'late'  },
    ];
    const P_TEMPOS = [
      { name:'Progression Run',    desc:'Continuous run — easy start, build to tempo over the final third. No rest.',                                                         phase:'early' },
      { name:'Rolling 400s Tempo', desc:"6×400m at tempo pace. Rest: 30 sec active recovery jog — keep moving, don't stop.",                                                 phase:'early' },
      { name:'Over & Unders 1km',  desc:'4×1km alternating slightly above/below threshold pace. Rest: 90 sec easy jog between reps.',                                        phase:'mid'   },
      { name:'Tempo 1200s',        desc:'4×1200m at comfortably hard (tempo) effort. Rest: 2 min easy jog between reps.',                                                    phase:'mid'   },
      { name:'On Off 200s',        desc:'200m hard, 200m easy — repeat 8–10 times continuously. No full rest stops.',                                                        phase:'mid'   },
      { name:'Steady into Tempo',  desc:'Continuous run — easy for the first half, building into 2+ miles of sustained tempo. No rest.',                                     phase:'late'  },
      { name:'Over & Unders Miles',desc:'Mile repeats alternating slightly above/below threshold. Rest: 90 sec easy jog between each mile.',                                 phase:'late'  },
    ];
    const P_LONG_RUNS = [
      { name:'Easy Long Run',               desc:'Steady easy effort — keep it conversational the whole way.',               phase:'early' },
      { name:'Block Long Run',              desc:'Middle miles at steady effort, easy warm-up and cool-down miles.',         phase:'early' },
      { name:'Progressive Long Run',        desc:'Last 2 miles at tempo effort after an easy start.',                       phase:'mid'   },
      { name:'Hotspot Long Run',            desc:'3–4 "hotspot" miles at steady/tempo effort within the long run.',         phase:'mid'   },
      { name:'Progressive Repeat Long Run', desc:'Multiple tempo segments throughout — advanced long run stimulus.',        phase:'late'  },
    ];
    const P_EASY_DESCS = [
      'Conversational pace — you should be able to talk in full sentences.',
      'Very easy effort, 5–6/10 RPE. Focus on form and recovery.',
      'Active recovery run. Go slower than you think you need to.',
      'Easy aerobic run. Keep your heart rate low and relaxed.',
    ];
    const P_EFFORT = {
      easy:      { rpe:'Effort: conversational, 5–6/10 RPE',      zone:'Zone 2 (60–70% max HR) — fully conversational.' },
      tempo:     { rpe:'Effort: comfortably hard, 7/10 RPE',      zone:'Zone 3–4 (80–90% max HR) — labored but controlled.' },
      interval:  { rpe:'Effort: hard, 8–9/10 RPE',               zone:'Zone 4–5 (85–95% max HR) — speaking is very difficult.' },
      longrun:   { rpe:'Effort: easy throughout, 5–6/10 RPE',    zone:'Zone 2 (60–70% max HR) — distance is the goal.' },
      timetrial: { rpe:'All-out effort — note your time.',         zone:'Zone 5 (95–100% max HR) — hold nothing back.' },
      race:      { rpe:'Run your race — trust your training.',     zone:'Start Zone 3–4, build to Zone 5 in the final push.' },
    };
    let planEffortMode = 'rpe';
    let planDistSel = null, planLevelSel = null;

    function pRound(n) { return Math.round(n * 4) / 4; }
    function pParseTime(s) {
      if (!s) return null;
      const parts = s.trim().split(':').map(Number);
      if (parts.some(isNaN)) return null;
      if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
      if (parts.length === 2) return parts[0]*60 + parts[1];
      return null;
    }
    function pSecsToMMSS(s) { s = Math.round(s); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
    function pDistMiles(k) { return ({  '1mi':1,'2mi':2,'5k':3.1,'4mi':4,'5mi':5,'10k':6.2,'hm':13.1 })[k]||null; }
    function pPaces(level, rDist, rTime) {
      if (!rDist || !rTime) return null;
      const secs = pParseTime(rTime), miles = pDistMiles(rDist);
      if (!secs || !miles) return null;
      const ppm = secs / miles;
      const eOff = {beginner:150,intermediate:105,advanced:75};
      const tOff = {beginner:45, intermediate:25, advanced:12};
      const iOff = {beginner:5,  intermediate:-10,advanced:-20};
      return {
        easy:     pSecsToMMSS(ppm + (eOff[level]||105)) + '/mi',
        tempo:    pSecsToMMSS(ppm + (tOff[level]||25))  + '/mi',
        interval: pSecsToMMSS(ppm + (iOff[level]||-10)) + '/mi',
      };
    }
    function pLRForBuildWeek(w, totalWeeks, startLR, peakLR) {
      const peak = totalWeeks - 3;
      if (w <= 1) return startLR;
      if (w >= peak) return peakLR;
      return startLR + (peakLR - startLR) * ((w-1)/(peak-1));
    }
    function pMakeEasy(dist)           { return { type:'easy',      typeLabel:'Easy Run',       name:'Easy Run',         dist:Math.max(1.0,pRound(dist)), desc:P_EASY_DESCS[Math.floor(Math.random()*P_EASY_DESCS.length)], effortType:'easy',      paceOverride:null }; }
    function pMakeInterval(dist,ph,isD,paces) {
      const pool = isD ? P_INTERVALS.filter(x=>x.phase==='early') : P_INTERVALS.filter(x=>ph<0.35?x.phase==='early':ph<0.65?x.phase!=='late':true);
      const w = pool[Math.floor(ph*pool.length)%pool.length];
      return { type:'interval', typeLabel:'Intervals', name:w.name, dist:Math.max(1.5,pRound(isD?dist*0.7:dist)), desc:w.desc, effortType:'interval', paceOverride:paces?`Target: ${paces.interval}`:null };
    }
    function pMakeTempo(dist,ph,isD,paces) {
      const pool = isD ? P_TEMPOS.filter(x=>x.phase==='early') : P_TEMPOS.filter(x=>ph<0.35?x.phase==='early':ph<0.65?x.phase!=='late':true);
      const w = pool[Math.floor(ph*pool.length)%pool.length];
      return { type:'tempo', typeLabel:'Tempo', name:w.name, dist:Math.max(1.5,pRound(isD?dist*0.7:dist)), desc:w.desc, effortType:'tempo', paceOverride:paces?`Target: ${paces.tempo}`:null };
    }
    function pMakeLR(dist,ph,isTaper,paces) {
      const pool = isTaper ? [P_LONG_RUNS[0]] : P_LONG_RUNS.filter(x=>ph<0.35?x.phase==='early':ph<0.65?x.phase!=='late':true);
      const lr = pool[Math.floor(ph*pool.length)%pool.length];
      return { type:'longrun', typeLabel:'Long Run', name:lr.name, dist:Math.max(1.5,pRound(dist)), desc:lr.desc, effortType:'longrun', paceOverride:paces?`Easy pace: ${paces.easy}`:null };
    }
    function pMakeTimeTrial() {
      return { type:'timetrial', typeLabel:'Time Trial', name:'2 Mile Time Trial', dist:3.0, desc:'A fitness check — run 2 miles at your best effort to track progress mid-plan.', effortType:'timetrial', paceOverride:null };
    }
    function pMakeTaper(dist,paces) {
      return { type:'interval', typeLabel:'Taper Intervals', name:'Taper 400s', dist:dist||3.0, desc:'6×400m at race pace. Rest: 2–3 min full standing recovery between each rep — the goal is freshness, not fatigue.', effortType:'interval', paceOverride:paces?`Race pace: ${paces.interval}`:null };
    }
    function pMakeRace(distObj) {
      return { type:'race', typeLabel:'Race Day', name:`🏁 ${distObj.label} Race`, dist:pRound(distObj.miles), desc:'Race day! Warm up 10–15 min easy, then trust your training and give it everything.', effortType:'race', paceOverride:null };
    }
    function pBuildWeek(wi, totalWeeks, days, level, peakLR, startLR, paces, distKey) {
      const w = wi+1, buildWeeks = totalWeeks-3;
      let wType = 'build';
      if (w===totalWeeks) wType='race';
      else if (w>=totalWeeks-1) wType='taper';
      else if (w%4===0 && w<totalWeeks-1) wType='deload';
      const ph = Math.min(1,(w-1)/Math.max(buildWeeks-1,1));
      const isD = wType==='deload', isT = wType==='taper', isR = wType==='race';
      let lr = w===1 ? startLR : isR ? null : isT ? pRound(peakLR*0.55) : isD ? pRound(pLRForBuildWeek(w-1,totalWeeks,startLR,peakLR)*0.65) : pRound(pLRForBuildWeek(w,totalWeeks,startLR,peakLR));
      const iDist=pRound(2.0+ph*2.5), tDist=pRound(2.0+ph*3.0), eDist=pRound((lr||0)*0.65), e2Dist=pRound((lr||0)*0.55);
      const wos = [];
      const isTT = !isD&&!isT&&!isR && w===Math.round(totalWeeks*0.55);
      if (w===1) {
        wos.push(pMakeEasy(lr));
      } else if (isR) {
        wos.push(pMakeTaper(null,paces));
        wos.push(pMakeRace(P_DISTS[distKey]));
      } else if (isT) {
        const ti=pRound(Math.max(2.5,peakLR*0.35));
        wos.push(pMakeTaper(ti,paces));
        if(days>=3) wos.push(pMakeEasy(pRound(lr*0.6)));
        wos.push(pMakeLR(lr,ph,true,paces));
      } else if (isTT) {
        const tt=pMakeTimeTrial();
        if(days===2) { wos.push(tt); wos.push(pMakeLR(lr,ph,false,paces)); }
        else if(days===3) { wos.push(tt); wos.push(pMakeEasy(eDist)); wos.push(pMakeLR(lr,ph,false,paces)); }
        else if(days===4) { wos.push(pMakeEasy(eDist)); wos.push(tt); wos.push(pMakeTempo(tDist,ph,isD,paces)); wos.push(pMakeLR(lr,ph,false,paces)); }
        else { wos.push(pMakeInterval(iDist,ph,isD,paces)); wos.push(pMakeEasy(eDist)); wos.push(tt); wos.push(pMakeLR(lr,ph,false,paces)); wos.push(pMakeEasy(e2Dist)); }
      } else {
        if(days===2) { wos.push(pMakeInterval(iDist,ph,isD,paces)); wos.push(pMakeLR(lr,ph,false,paces)); }
        else if(days===3) { wos.push(pMakeInterval(iDist,ph,isD,paces)); wos.push(pMakeEasy(eDist)); wos.push(pMakeLR(lr,ph,false,paces)); }
        else if(days===4) { wos.push(pMakeEasy(eDist)); wos.push(pMakeInterval(iDist,ph,isD,paces)); wos.push(pMakeTempo(tDist,ph,isD,paces)); wos.push(pMakeLR(lr,ph,false,paces)); }
        else { wos.push(pMakeInterval(iDist,ph,isD,paces)); wos.push(pMakeEasy(eDist)); wos.push(pMakeTempo(tDist,ph,isD,paces)); wos.push(pMakeLR(lr,ph,false,paces)); wos.push(pMakeEasy(e2Dist)); }
      }
      const total = pRound(wos.reduce((s,x)=>s+x.dist,0));
      return { wType, label: isR?'Race Week':isT?'Taper Week':isD?`Week ${w} — Recovery`:`Week ${w}`, wos, total };
    }
    function pEffortText(effortType, paceOverride) {
      if (paceOverride) return null; // handled separately
      return P_EFFORT[effortType]?.[planEffortMode] || '';
    }
    function pRenderWo(wo) {
      const effort = paceOverride => paceOverride
        ? `<div class="plan-wo-effort">${paceOverride}</div><div class="plan-wo-effort" data-rpe="${P_EFFORT[wo.effortType]?.rpe||''}" data-zone="${P_EFFORT[wo.effortType]?.zone||''}">${P_EFFORT[wo.effortType]?.[planEffortMode]||''}</div>`
        : `<div class="plan-wo-effort" data-rpe="${P_EFFORT[wo.effortType]?.rpe||''}" data-zone="${P_EFFORT[wo.effortType]?.zone||''}">${P_EFFORT[wo.effortType]?.[planEffortMode]||''}</div>`;
      return `<div class="plan-wo-row ${wo.type}">
        <div class="plan-wo-bar"></div>
        <div class="plan-wo-info">
          <div class="plan-wo-type">${wo.typeLabel}</div>
          <div class="plan-wo-name">${wo.name}</div>
          <div class="plan-wo-desc">${wo.desc}</div>
          ${effort(wo.paceOverride)}
        </div>
        <div class="plan-wo-dist"><div class="mi">${wo.dist}</div><div class="unit">mi</div></div>
      </div>`;
    }
    function pSetEffort(mode) {
      planEffortMode = mode;
      document.getElementById('pEffRPE')?.classList.toggle('active', mode==='rpe');
      document.getElementById('pEffZone')?.classList.toggle('active', mode==='zone');
      document.querySelectorAll('.plan-wo-effort[data-rpe]').forEach(el => { el.textContent = mode==='rpe' ? el.dataset.rpe : el.dataset.zone; });
    }
    function pToggleWeek(hdr) { hdr.classList.toggle('open'); hdr.nextElementSibling.classList.toggle('open'); }
    function pExpandAll()   { document.querySelectorAll('.plan-week-hdr').forEach(h=>{h.classList.add('open');h.nextElementSibling.classList.add('open');}); }
    function pCollapseAll() { document.querySelectorAll('.plan-week-hdr').forEach(h=>{h.classList.remove('open');h.nextElementSibling.classList.remove('open');}); }

    function renderPlan(app) {
      app.appendChild(el('header', { class:'top' }, [el('h1', {}, 'Run Planner')]));
      const root = el('div');
      app.appendChild(root);
      let savedState = {};
      try { savedState = JSON.parse(localStorage.getItem('runPlanState_v1') || '{}'); } catch(e) {}
      planDistSel  = savedState.dist  || null;
      planLevelSel = savedState.level || null;

      root.innerHTML = `
        <div class="card" id="pForm">
          <h2>TARGET DISTANCE</h2>
          <div class="plan-dist-grid" style="margin-bottom:20px">
            ${[['1mi','🏃','1 Mile','Speed'],['2mi','🏃','2 Miles','Speed-end.'],['5k','🎯','5K','3.1 mi'],['4mi','🏅','4 Miles','Road race'],['5mi','🏅','5 Miles','Road race'],['10k','⭐','10K','6.2 mi'],['15k','💪','15K','9.3 mi'],['10mi','💪','10 Miles','Road race'],['hm','🏆','Half Marathon','13.1 mi']].map(([k,ic,lb,sb])=>`
              <button class="plan-dist-btn${planDistSel===k?' sel':''}" onclick="planDistSel='${k}';document.querySelectorAll('.plan-dist-btn').forEach(b=>b.classList.remove('sel'));this.classList.add('sel')">
                <div class="plan-dist-icon">${ic}</div>
                <span class="plan-dist-name">${lb}</span>
                <span class="plan-dist-sub">${sb}</span>
              </button>`).join('')}
          </div>
          <h2>FITNESS LEVEL</h2>
          <div class="plan-level-grid" style="margin-bottom:20px">
            ${[['beginner','🌱','Beginner','New to running or returning after a break'],['intermediate','🔥','Intermediate','Running regularly, some race experience'],['advanced','⚡','Advanced','Consistent training, chasing a PR']].map(([k,ic,lb,ds])=>`
              <button class="plan-level-btn${planLevelSel===k?' sel':''}" onclick="planLevelSel='${k}';document.querySelectorAll('.plan-level-btn').forEach(b=>b.classList.remove('sel'));this.classList.add('sel')">
                <div class="plan-level-icon">${ic}</div>
                <span class="plan-level-name">${lb}</span>
                <span class="plan-level-desc">${ds}</span>
              </button>`).join('')}
          </div>
          <div class="field">
            <label>Current weekly mileage (miles/week)</label>
            <input id="pMiles" type="number" inputmode="decimal" placeholder="e.g. 10" value="${savedState.miles||''}" style="text-align:left">
          </div>
          <div class="plan-optional" id="pRaceToggle" onclick="this.classList.toggle('active');document.getElementById('pRaceFields').classList.toggle('vis')">
            <span style="font-size:18px">⏱️</span>
            <div class="plan-opt-text"><strong>Add a recent race time</strong><small>Unlocks personalized pace targets</small></div>
            <span class="plan-opt-arrow">›</span>
          </div>
          <div class="plan-race-fields" id="pRaceFields">
            <div class="plan-race-col">
              <label>Race distance</label>
              <select id="pRaceDist">
                <option value="">Select…</option>
                <option value="1mi">1 Mile</option><option value="2mi">2 Miles</option>
                <option value="5k">5K</option><option value="4mi">4 Miles</option>
                <option value="5mi">5 Miles</option><option value="10k">10K</option>
                <option value="hm">Half Marathon</option>
              </select>
            </div>
            <div class="plan-race-col">
              <label>Finish time (h:mm:ss)</label>
              <input id="pRaceTime" type="text" inputmode="text" placeholder="e.g. 28:40" value="${savedState.raceTime||''}">
            </div>
          </div>
          <div class="plan-slider-row">
            <div class="plan-slider-hdr">
              <label>Days per week</label>
              <div class="plan-slider-val" id="pDaysVal">3 <span>days</span></div>
            </div>
            <input type="range" class="plan-range" id="pDays" min="2" max="5" value="${savedState.days||3}" oninput="document.getElementById('pDaysVal').innerHTML=this.value+' <span>days</span>'">
            <div class="plan-slider-marks"><span>2</span><span>3</span><span>4</span><span>5</span></div>
          </div>
          <div class="plan-slider-row">
            <div class="plan-slider-hdr">
              <label>Program duration</label>
              <div class="plan-slider-val" id="pWeeksVal">12 <span>wks</span></div>
            </div>
            <input type="range" class="plan-range" id="pWeeks" min="8" max="16" value="${savedState.weeks||12}" oninput="document.getElementById('pWeeksVal').innerHTML=this.value+' <span>wks</span>'">
            <div class="plan-slider-marks"><span>8</span><span>10</span><span>12</span><span>14</span><span>16</span></div>
          </div>
          <div class="plan-err" id="pErr"></div>
          <button onclick="planGenerate()">▶  Generate My Plan</button>
        </div>
        <div id="pOutput" style="display:none"></div>
      `;

      // Restore slider display values
      const dv = savedState.days||3, wv = savedState.weeks||12;
      document.getElementById('pDaysVal').innerHTML  = `${dv} <span>days</span>`;
      document.getElementById('pWeeksVal').innerHTML = `${wv} <span>wks</span>`;

      // Restore race dist if saved
      if (savedState.raceDist) {
        const s = document.getElementById('pRaceDist');
        if (s) s.value = savedState.raceDist;
        if (savedState.raceTime) { document.getElementById('pRaceToggle').classList.add('active'); document.getElementById('pRaceFields').classList.add('vis'); }
      }

      // If there's a saved generated plan, show it
      if (savedState.weeks_data) pShowOutput(savedState);
    }

    function planGenerate() {
      const errEl = document.getElementById('pErr');
      errEl.classList.remove('vis');
      if (!planDistSel)  { errEl.textContent='Please select a target distance.'; errEl.classList.add('vis'); return; }
      if (!planLevelSel) { errEl.textContent='Please select your fitness level.'; errEl.classList.add('vis'); return; }
      const miles = parseFloat(document.getElementById('pMiles').value);
      if (isNaN(miles)||miles<0) { errEl.textContent='Please enter your current weekly mileage.'; errEl.classList.add('vis'); return; }
      const days  = parseInt(document.getElementById('pDays').value);
      const weeks = parseInt(document.getElementById('pWeeks').value);
      const raceDist = document.getElementById('pRaceDist').value;
      const raceTime = document.getElementById('pRaceTime').value.trim();
      const paces = pPaces(planLevelSel, raceDist, raceTime);
      const distData = P_DISTS[planDistSel];
      const peakLR = distData.peakLR[planLevelSel];
      const estLong = miles * 0.35;
      const startLR = pRound(Math.max(P_START_LR[planLevelSel], Math.min(estLong, peakLR * 0.4)));
      const weeksData = [];
      let totalMi = 0;
      for (let i=0; i<weeks; i++) {
        const wk = pBuildWeek(i, weeks, days, planLevelSel, peakLR, startLR, paces, planDistSel);
        weeksData.push(wk);
        totalMi += wk.total;
      }
      const state = { dist:planDistSel, level:planLevelSel, miles, days, weeks, raceDist, raceTime, paces, peakLR, weeks_data:weeksData, totalMi:Math.round(totalMi) };
      try { localStorage.setItem('runPlanState_v1', JSON.stringify(state)); } catch(e) {}
      pShowOutput(state);
    }

    function pShowOutput(state) {
      const out = document.getElementById('pOutput');
      if (!out) return;
      const levelNames = { beginner:'Beginner', intermediate:'Intermediate', advanced:'Advanced' };
      const dist = P_DISTS[state.dist];
      out.style.display = 'block';
      let paceGuideHTML = '';
      if (state.paces) {
        paceGuideHTML = `<div class="card" style="margin-bottom:12px">
          <h2>PACE TARGETS</h2>
          <div class="pace-guide-row" style="background:rgba(50,215,75,0.06);border-radius:10px">
            <div class="pace-gdot" style="background:#32d74b"></div>
            <div class="pace-glabel"><strong>Easy / Long Run</strong><small>Conversational — all easy &amp; long runs</small></div>
            <div class="pace-gval">${state.paces.easy}</div>
          </div>
          <div class="pace-guide-row" style="background:rgba(255,159,10,0.06);border-radius:10px">
            <div class="pace-gdot" style="background:#ff9f0a"></div>
            <div class="pace-glabel"><strong>Tempo</strong><small>Comfortably hard — tempo sessions</small></div>
            <div class="pace-gval">${state.paces.tempo}</div>
          </div>
          <div class="pace-guide-row" style="background:rgba(255,69,58,0.06);border-radius:10px">
            <div class="pace-gdot" style="background:#ff453a"></div>
            <div class="pace-glabel"><strong>Intervals</strong><small>Hard effort — speed sessions</small></div>
            <div class="pace-gval">${state.paces.interval}</div>
          </div>
        </div>`;
      }
      out.innerHTML = `
        <div class="card" style="margin-bottom:12px">
          <div style="font-size:20px;font-weight:800;letter-spacing:-0.02em;margin-bottom:2px">${dist.label} Training Plan</div>
          <div class="muted" style="font-size:13px;margin-bottom:16px">${levelNames[state.level]} · ${state.days} days/week</div>
          <div class="plan-stats">
            <div class="plan-stat"><div class="sv">${state.weeks}</div><div class="sl">Weeks</div></div>
            <div class="plan-stat"><div class="sv">${state.totalMi}</div><div class="sl">Total Miles</div></div>
            <div class="plan-stat"><div class="sv">${P_DISTS[state.dist].peakLR[state.level]}mi</div><div class="sl">Peak Long Run</div></div>
          </div>
        </div>
        ${paceGuideHTML}
        <div class="card" style="margin-bottom:12px">
          <div class="spaced" style="margin-bottom:0">
            <span style="font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em">Effort display</span>
            <div class="effort-pill">
              <button id="pEffRPE" class="${planEffortMode==='rpe'?'active':''}" onclick="pSetEffort('rpe')">RPE</button>
              <button id="pEffZone" class="${planEffortMode==='zone'?'active':''}" onclick="pSetEffort('zone')">HR Zones</button>
            </div>
          </div>
        </div>
        <div class="plan-expand-row">
          <button class="plan-expand-btn" onclick="pExpandAll()">Expand All</button>
          <button class="plan-expand-btn" onclick="pCollapseAll()">Collapse All</button>
        </div>
        ${(state.weeks_data||[]).map((wk,i) => {
          const badge = wk.wType==='deload'?'deload':wk.wType==='taper'?'taper':wk.wType==='race'?'race-wk':'build';
          const badgeText = wk.wType==='deload'?'Recovery':wk.wType==='taper'?'Taper':wk.wType==='race'?'Race':`Wk ${i+1}`;
          return `<div class="plan-week-card">
            <div class="plan-week-hdr" onclick="pToggleWeek(this)">
              <span class="plan-wk-badge ${badge}">${badgeText}</span>
              <span class="plan-week-title">${wk.label}</span>
              <div class="plan-week-meta"><div class="plan-week-mi">${wk.total} mi</div><div class="plan-week-ct">${wk.wos.length} run${wk.wos.length!==1?'s':''}</div></div>
              <span class="plan-chevron">▾</span>
            </div>
            <div class="plan-workouts">${wk.wos.map(pRenderWo).join('')}</div>
          </div>`;
        }).join('')}
        <div class="plan-tip"><strong>Warm-up &amp; cool-down:</strong> Easy/Long runs — start the first 5–10 min very easy; walk 3–5 min after. Intervals — 5–10 min easy jog + dynamic drills before, 5–10 min easy jog after. Tempo — 5–10 min easy + 2–3 short strides before, 5 min easy after. Static stretching always <em>after</em> your run, not before.<br><br><strong>General tips:</strong> Easy runs should feel fully conversational. Rest days are training — don't skip them. If you feel worn down, repeat a week rather than pushing through.</div>
        <div style="height:8px"></div>
      `;
      out.scrollIntoView({ behavior:'smooth', block:'start' });
    }

    // -------- Nav --------
    document.querySelectorAll('nav.bottom button').forEach(b => {
      b.addEventListener('click', () => render(b.dataset.view));
    });

    // -------- Init --------
    window.addEventListener('online', flushQueue);
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});

    // Guard to prevent double-render when both onAuthStateChange and getSession fire at startup
    let _startupRenderDone = false;

    // Auth state listener — fires on sign-in and sign-out
    _sb.auth.onAuthStateChange((event, session) => {
      const wasLoggedIn = !!currentUser;
      const user = session?.user ?? null;

      // Allowlist check — sign out anyone not on the list
      if (event === 'SIGNED_IN' && user && !ALLOWED_EMAILS.includes(user.email)) {
        _sb.auth.signOut();
        toast('This app is invite-only. Contact Jeff to get access.', true);
        return;
      }

      currentUser = user;
      if (event === 'SIGNED_IN' && !wasLoggedIn) {
        _startupRenderDone = true;
        // If we landed here from a Strava OAuth redirect, finish that flow
        // BEFORE rendering so the Profile shows the connected state.
        handleStravaCallbackIfPresent_()
          .catch(() => {})
          .finally(async () => {
            const initial = await chooseInitialView_();
            render(initial);
            flushQueue();
            backgroundStravaSync_();
          });
      }
      if (event === 'SIGNED_OUT') {
        currentUser = null;             // <-- was missing; broke sign-out-then-in flow
        todayCache = null;
        programCache = null;
        _userProfileCache = null;
        _stravaAccess = null;
        _onboardingState = null;         // ensure fresh onboarding on next sign-in
        renderAuth($('#app'));
      }
    });

    // Check for existing session on load (handles returning users + magic link redirect)
    // Skip if onAuthStateChange already triggered a render (prevents double-render race condition)
    _sb.auth.getSession().then(async ({ data: { session } }) => {
      if (_startupRenderDone) return;
      currentUser = session?.user ?? null;
      if (!currentUser) { render('home'); return; }
      await handleStravaCallbackIfPresent_().catch(() => {});
      const initial = await chooseInitialView_();
      render(initial);
      flushQueue();
      backgroundStravaSync_();
    });

    // Post-signin routing: onboarding if not done, otherwise home (or whatever
    // view was in progress).
    async function chooseInitialView_() {
      try {
        const profile = await sbLoadUserProfile();
        if (needsOnboarding_(profile)) return 'onboarding';
      } catch (e) { /* fall through to home */ }
      return currentView || 'home';
    }

    // Best-effort: pull recent Strava runs in the background on app load.
    // Throttled to once per 30 minutes per session via localStorage so we
    // don't hammer the Strava API on every navigation.
    async function backgroundStravaSync_() {
      try {
        if (!stravaConfigured() || !currentUser) return;
        const conn = await sbStravaConnection().catch(() => null);
        if (!conn) return;
        const last = Number(localStorage.getItem('stravaSyncedAt_v1')) || 0;
        if (Date.now() - last < 30 * 60 * 1000) return;
        await sbStravaSync({ daysBack: 14 });
        localStorage.setItem('stravaSyncedAt_v1', String(Date.now()));
      } catch (e) {
        // Silent — the Profile tab has a manual Sync button if this fails.
      }
    }
  </script>
</body>
</html>
