<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Workouts" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <title>Workouts</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-2: #1d1d1d;
      --border: #2a2a2a;
      --text: #f5f5f5;
      --muted: #8a8a8a;
      --accent: #ff6b35;
      --success: #32d74b;
      --warn: #ff9f0a;
      --danger: #ff453a;
      --radius: 14px;
      --radius-lg: 20px;
      --shadow: 0 2px 14px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      font-size: 16px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: contain;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .app {
      flex: 1;
      max-width: 520px;
      margin: 0 auto;
      width: 100%;
      padding: 0 16px 88px 16px;
      padding-top: calc(env(safe-area-inset-top) + 12px);
    }
    header.top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 4px 0 16px 0;
    }
    header.top h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    header.top .date {
      color: var(--muted);
      font-size: 14px;
    }
    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .card h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .big {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .row { display: flex; gap: 12px; align-items: center; }
    .spaced { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .col { display: flex; flex-direction: column; gap: 2px; }
    .muted { color: var(--muted); font-size: 13px; }
    .pill {
      display: inline-block;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 10px;
      background: var(--surface-2);
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .pill.chest { background: #3a1f1a; color: #ff9b7a; }
    .pill.back  { background: #1a2a3a; color: #7ab7ff; }
    .pill.bicep, .pill.tricep { background: #3a2a1a; color: #ffc07a; }
    .pill.shoulder { background: #2a1a3a; color: #c07aff; }
    .pill.micro { background: #1a3a2a; color: #7affb7; }
    .pill.intensity { background: #3a1a1a; color: #ff7a7a; }
    .pill.core { background: #1a1a3a; color: #7a9bff; }

    /* ---- RUN PLANNER TAB ---- */
    .plan-dist-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 4px; }
    .plan-dist-btn { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 6px; text-align: center; cursor: pointer; color: var(--text); font-family: inherit; transition: border-color 0.15s, background 0.15s; }
    .plan-dist-btn.sel { border-color: var(--accent); background: rgba(255,107,53,0.12); }
    .plan-dist-icon { font-size: 18px; margin-bottom: 3px; }
    .plan-dist-name { font-size: 12px; font-weight: 700; display: block; }
    .plan-dist-sub { font-size: 10px; color: var(--muted); display: block; margin-top: 1px; }
    .plan-level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .plan-level-btn { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 6px; text-align: center; cursor: pointer; color: var(--text); font-family: inherit; transition: border-color 0.15s, background 0.15s; }
    .plan-level-btn.sel { border-color: var(--accent); background: rgba(255,107,53,0.12); }
    .plan-level-icon { font-size: 20px; margin-bottom: 4px; }
    .plan-level-name { font-size: 12px; font-weight: 700; display: block; }
    .plan-level-desc { font-size: 10px; color: var(--muted); display: block; margin-top: 2px; line-height: 1.3; }
    .plan-slider-row { margin-bottom: 16px; }
    .plan-slider-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .plan-slider-hdr label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .plan-slider-val { font-size: 22px; font-weight: 700; color: var(--accent); }
    .plan-slider-val span { font-size: 12px; color: var(--muted); font-weight: 500; }
    input.plan-range { -webkit-appearance: none; width: 100%; height: 4px; background: var(--border); border-radius: 2px; outline: none; cursor: pointer; border: none; padding: 0; }
    input.plan-range::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--accent); box-shadow: 0 2px 8px rgba(255,107,53,0.4); cursor: pointer; }
    .plan-slider-marks { display: flex; justify-content: space-between; margin-top: 4px; }
    .plan-slider-marks span { font-size: 10px; color: var(--muted); }
    .plan-optional { border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; background: var(--surface-2); }
    .plan-optional.active { border-color: var(--accent); }
    .plan-opt-text strong { font-size: 13px; color: var(--text); display: block; }
    .plan-opt-text small { font-size: 11px; color: var(--muted); }
    .plan-opt-arrow { margin-left: auto; color: var(--muted); font-size: 16px; transition: transform 0.2s; }
    .plan-optional.active .plan-opt-arrow { transform: rotate(90deg); }
    .plan-race-fields { display: none; gap: 10px; margin-bottom: 12px; }
    .plan-race-fields.vis { display: flex; }
    .plan-race-col { flex: 1; }
    .plan-race-col label { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 6px; display: block; }
    .plan-err { background: rgba(255,69,58,0.1); border: 1px solid rgba(255,69,58,0.3); border-radius: 10px; padding: 12px; font-size: 13px; color: #ff453a; margin-top: 10px; display: none; }
    .plan-err.vis { display: block; }
    .plan-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
    .plan-stat { background: var(--surface-2); border-radius: var(--radius); padding: 12px 8px; text-align: center; border: 1px solid var(--border); }
    .plan-stat .sv { font-size: 20px; font-weight: 700; color: var(--accent); }
    .plan-stat .sl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
    .effort-pill { display: flex; background: var(--surface-2); border-radius: 20px; padding: 3px; gap: 2px; border: 1px solid var(--border); }
    .effort-pill button { flex: 1; background: transparent; color: var(--muted); font-size: 12px; font-weight: 700; padding: 7px 10px; border-radius: 17px; width: auto; letter-spacing: 0; text-transform: none; }
    .effort-pill button.active { background: var(--accent); color: #fff; }
    .pace-guide-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; margin-bottom: 6px; }
    .pace-gdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .pace-glabel { flex: 1; }
    .pace-glabel strong { font-size: 13px; font-weight: 600; color: var(--text); display: block; }
    .pace-glabel small { font-size: 11px; color: var(--muted); }
    .pace-gval { font-size: 14px; font-weight: 700; color: var(--text); }
    .plan-expand-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .plan-expand-btn { font-size: 12px; font-weight: 600; color: var(--muted); background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; cursor: pointer; font-family: inherit; width: auto; }
    .plan-week-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 10px; overflow: hidden; }
    .plan-week-hdr { display: flex; align-items: center; padding: 13px 14px; cursor: pointer; gap: 10px; }
    .plan-wk-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; padding: 3px 9px; border-radius: 20px; flex-shrink: 0; text-transform: uppercase; }
    .plan-wk-badge.build { background: rgba(255,107,53,0.15); color: var(--accent); }
    .plan-wk-badge.deload { background: rgba(138,138,138,0.15); color: var(--muted); }
    .plan-wk-badge.taper { background: rgba(191,90,242,0.15); color: #bf5af2; }
    .plan-wk-badge.race-wk { background: rgba(255,69,58,0.15); color: #ff453a; }
    .plan-week-title { flex: 1; font-size: 14px; font-weight: 600; color: var(--text); min-width: 0; }
    .plan-week-meta { text-align: right; flex-shrink: 0; }
    .plan-week-mi { font-size: 15px; font-weight: 700; color: var(--text); }
    .plan-week-ct { font-size: 11px; color: var(--muted); }
    .plan-chevron { color: var(--muted); font-size: 12px; transition: transform 0.2s; flex-shrink: 0; }
    .plan-week-hdr.open .plan-chevron { transform: rotate(180deg); }
    .plan-workouts { display: none; padding: 0 12px 12px; gap: 8px; flex-direction: column; }
    .plan-workouts.open { display: flex; }
    .plan-wo-row { display: flex; gap: 10px; align-items: flex-start; padding: 11px; border-radius: var(--radius); border: 1px solid; }
    .plan-wo-row.easy { background: rgba(50,215,75,0.06); border-color: rgba(50,215,75,0.18); }
    .plan-wo-row.interval { background: rgba(255,69,58,0.06); border-color: rgba(255,69,58,0.18); }
    .plan-wo-row.tempo { background: rgba(255,159,10,0.06); border-color: rgba(255,159,10,0.18); }
    .plan-wo-row.longrun { background: rgba(191,90,242,0.06); border-color: rgba(191,90,242,0.18); }
    .plan-wo-row.timetrial { background: rgba(255,55,95,0.06); border-color: rgba(255,55,95,0.18); }
    .plan-wo-row.race { background: rgba(255,107,53,0.08); border-color: rgba(255,107,53,0.25); }
    .plan-wo-bar { width: 3px; border-radius: 2px; align-self: stretch; min-height: 36px; flex-shrink: 0; }
    .easy .plan-wo-bar { background: #32d74b; } .interval .plan-wo-bar { background: #ff453a; }
    .tempo .plan-wo-bar { background: #ff9f0a; } .longrun .plan-wo-bar { background: #bf5af2; }
    .timetrial .plan-wo-bar { background: #ff375f; } .race .plan-wo-bar { background: var(--accent); }
    .plan-wo-info { flex: 1; min-width: 0; }
    .plan-wo-type { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 2px; }
    .easy .plan-wo-type { color: #32d74b; } .interval .plan-wo-type { color: #ff453a; }
    .tempo .plan-wo-type { color: #ff9f0a; } .longrun .plan-wo-type { color: #bf5af2; }
    .timetrial .plan-wo-type { color: #ff375f; } .race .plan-wo-type { color: var(--accent); }
    .plan-wo-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .plan-wo-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .plan-wo-effort { font-size: 11px; color: var(--muted); margin-top: 4px; font-style: italic; }
    .plan-wo-dist { text-align: right; flex-shrink: 0; }
    .plan-wo-dist .mi { font-size: 16px; font-weight: 700; color: var(--text); }
    .plan-wo-dist .unit { font-size: 11px; color: var(--muted); }
    .plan-tip { background: rgba(50,215,75,0.05); border: 1px solid rgba(50,215,75,0.12); border-radius: var(--radius); padding: 14px; font-size: 12px; color: var(--muted); line-height: 1.6; margin-top: 10px; }
    .plan-tip strong { color: var(--text); }

    /* ---- Auth screen ---- */
    .auth-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:calc(100vh - 80px); padding:24px; gap:0; }
    .auth-logo { font-size:52px; margin-bottom:10px; }
    .auth-title { font-size:26px; font-weight:700; margin-bottom:4px; }
    .auth-sub { color:var(--muted); font-size:14px; text-align:center; margin-bottom:28px; }
    .auth-card { width:100%; max-width:360px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:24px; display:flex; flex-direction:column; gap:12px; }
    .auth-card input[type="email"] { width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:16px; padding:14px 16px; transition:border-color .15s; }
    .auth-card input[type="email"]::placeholder { color:var(--muted); }
    .auth-card input[type="email"]:focus { outline:none; border-color:var(--accent); }
    .auth-confirm { text-align:center; padding:8px 0; }
    .auth-confirm .auth-check { font-size:38px; margin-bottom:10px; }
    .auth-confirm p { color:var(--muted); font-size:14px; line-height:1.6; }
    .auth-confirm strong { color:var(--text); }

    button, .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: inherit;
      font-size: 17px;
      font-weight: 600;
      padding: 14px 16px;
      border-radius: var(--radius);
      width: 100%;
      cursor: pointer;
      transition: transform 0.08s ease;
      -webkit-appearance: none;
      appearance: none;
    }
    button:active, .btn:active { transform: scale(0.97); }
    button.secondary, .btn.secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    button.ghost { background: transparent; color: var(--accent); }
    button.danger { background: var(--danger); }

    input, select, textarea {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 16px;
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
    }
    input[inputmode="decimal"], input[inputmode="numeric"] { text-align: center; }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .field { margin-bottom: 12px; }

    nav.bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(20, 20, 20, 0.92);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-top: 1px solid var(--border);
      padding: 10px 0 calc(env(safe-area-inset-bottom) + 8px);
      display: flex;
      z-index: 100;
    }
    nav.bottom button {
      flex: 1;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 6px 4px;
      border-radius: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    nav.bottom button.active { color: var(--accent); }
    nav.bottom button svg { width: 22px; height: 22px; }

    .exercise {
      background: var(--surface-2);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
    }
    .exercise h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.25;
    }
    .exercise .meta {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .exercise .notes {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      font-style: italic;
      line-height: 1.4;
    }
    .set-grid {
      display: grid;
      grid-template-columns: 1.2fr repeat(4, 1fr);
      gap: 6px;
    }
    .set-grid input { padding: 8px 4px; font-size: 15px; }
    .prev {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      text-align: right;
    }
    .prev b { color: var(--text); }

    .set-grid-5 {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }
    .set-grid-5 input { padding: 10px 4px; font-size: 15px; }

    /* Block/Week/Day selector */
    .selector-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .selector-summary .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }
    .selector-summary .value { font-size: 18px; font-weight: 600; }
    .selector-summary .edit {
      background: var(--surface-2);
      color: var(--accent);
      font-size: 14px;
      padding: 8px 14px;
      width: auto;
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .selector-body { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 14px; }
    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .pill-row .pill-btn {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 9px 14px;
      border-radius: 10px;
      font-size: 14px;
      width: auto;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: none;
    }
    .pill-row .pill-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .pill-row-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .toast {
      position: fixed;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--success);
      color: #000;
      padding: 10px 18px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 200;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--danger); color: #fff; }

    .skeleton {
      background: linear-gradient(90deg, var(--surface) 0%, var(--surface-2) 50%, var(--surface) 100%);
      background-size: 200% 100%;
      animation: sk 1.4s infinite;
      border-radius: 10px;
      height: 80px;
    }
    @keyframes sk { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .hidden { display: none !important; }

    /* Greyed/disabled set input */
    input.inp-disabled {
      background: #0d0d0d;
      color: #444;
      border: 1px dashed #2a2a2a;
      pointer-events: none;
      background-image:
        linear-gradient(135deg, transparent 46%, #2a2a2a 47%, #2a2a2a 53%, transparent 54%);
    }

    /* Home action grid */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .action-tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      width: 100%;
    }
    .action-tile svg { width: 28px; height: 28px; color: var(--accent); }
    .action-tile.today { border-color: var(--accent); }
    .action-tile.today::after {
      content: 'TODAY';
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--accent);
      font-weight: 700;
    }

    /* Lift session detail */
    .session-ex {
      padding: 14px 16px;
    }
    .session-ex.progression-tap {
      cursor: pointer;
      transition: border-color 120ms ease;
    }
    .session-ex.progression-tap:active {
      border-color: var(--accent);
    }

    /* History list */
    .history-row {
      cursor: pointer;
      padding: 12px 16px;
      transition: border-color 120ms ease;
    }
    .history-row:active { border-color: var(--accent); }
    .history-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .history-date {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .session-ex-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .session-ex-name {
      font-size: 15px;
      font-weight: 600;

    .modality-grid {

    .onboard-field label {

    .onboard-field input {

    .onboard-actions {

    .onboard-primary {

    /* Programs tab */
    .section-h {

    .week-card { padding: 0 !important; overflow: hidden; }

    /* Analytics monthly bar chart */

    /* Analytics best-efforts table */

    .pr-row .date { color: var(--muted); font-size: 12px; text-align: right; }
    .pr-header {

<body>
  <div class="app" id="app"></div>

  <nav class="bottom" id="nav">
    <button data-view="home" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10.5L12 3l9 7.5v10a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 20.5v-10z"/><path d="M9 21.5V13h6v8.5"/></svg>
      Home
    </button>
    <button data-view="calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 11h18"/></svg>
      Calendar
    </button>
    <button data-view="analytics">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V5M4 19h16M8 16V9M12 16v-4M16 16V7M20 19V5"/></svg>
      Analytics
    </button>
    <button data-view="programs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v4H4zM4 12h16v4H4zM4 20h10v0"/><circle cx="18" cy="20" r="2"/></svg>
      Programs
    </button>
    <button data-view="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
      Profile
    </button>
    <button data-view="plan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 3a3 3 0 0 0 6 0"/><path d="M8 11h8M8 15h5"/></svg>
      Plan
    </button>
  </nav>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // -------- localStorage keys --------
    const CONFIG_KEY = 'workoutAppConfig_v1';
    const QUEUE_KEY  = 'workoutQueue_v1';
    const CACHE_KEY  = 'workoutCache_v1';
    const PROG_KEY   = 'workoutProgram_v1';

    function getConfig() {
      try { return JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}'); } catch (e) { return {}; }
    }
    function setConfig(c) { localStorage.setItem(CONFIG_KEY, JSON.stringify(c)); }

    // -------- API --------
    async function api(action, params = {}, body = null) {
      const cfg = getConfig();
      if (!cfg.scriptUrl || !cfg.token) throw new Error('not configured');
      const url = new URL(cfg.scriptUrl);
      url.searchParams.set('action', action);
      url.searchParams.set('token', cfg.token);
      Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));

      const opts = body
        ? { method: 'POST', body: JSON.stringify({ ...body, token: cfg.token, action }) }
        : { method: 'GET' };
      const res = await fetch(url.toString(), opts);
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'api error');
      return data.data;
    }

    // -------- Offline queue --------
    function queueRead() { try { return JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]'); } catch (e) { return []; } }
    function queueWrite(q) { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); }
    function queuePush(item) { const q = queueRead(); q.push(item); queueWrite(q); }
    async function flushQueue() {
      const q = queueRead();
      if (!q.length) return;
      const remaining = [];
      for (const item of q) {
        try { await api(item.action, {}, item.body); }
        catch (e) { remaining.push(item); }
      }
      queueWrite(remaining);
      if (remaining.length < q.length) {
        toast(`Synced ${q.length - remaining.length} offline entr${q.length - remaining.length === 1 ? 'y' : 'ies'}`);
      }
    }

    // -------- Supabase data helpers --------

    function weekBounds() {
      const now = new Date();
      const day = now.getDay(); // 0=Sun
      const monday = new Date(now);
      monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
      const sunday = new Date(monday);
      sunday.setDate(monday.getDate() + 6);
      const fmt = d => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      return { start: fmt(monday), end: fmt(sunday) };
    }

    function paceToSecs(p) {
      if (!p) return null;
      const parts = p.split(':').map(Number);
      if (parts.length !== 2 || parts.some(isNaN)) return null;
      return parts[0] * 60 + parts[1];
    }

    function secsToMMSS(s) {
      if (!s || s <= 0) return '—';
      const m = Math.floor(s / 60), sec = Math.round(s % 60);
      return `${m}:${String(sec).padStart(2, '0')}`;
    }

    async function sbStats() {
      const uid = currentUser.id;
      const now = new Date();
      const { start: weekStart, end: weekEnd } = weekBounds();
      const yearStart = `${now.getFullYear()}-01-01`;
      const monthStart = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
      const [
        weekRunsR, ytdRunsR, monthRunsR,
        weekLiftsR, weekPuR, weekWalksR, weekActivitiesR,
        profileR,
      ] = await Promise.all([
        _sb.from('runs').select('distance').eq('user_id', uid).gte('date', weekStart).lte('date', weekEnd),
        _sb.from('runs').select('distance').eq('user_id', uid).gte('date', yearStart),
        _sb.from('runs').select('distance').eq('user_id', uid).gte('date', monthStart),
        _sb.from('lift_sessions').select('id').eq('user_id', uid).gte('date', weekStart).lte('date', weekEnd),
        _sb.from('pullup_sessions').select('total_reps').eq('user_id', uid).gte('date', weekStart).lte('date', weekEnd),
        _sb.from('walks').select('id,distance').eq('user_id', uid).gte('date', weekStart).lte('date', weekEnd),
        _sb.from('activities').select('id,activity_type,distance').eq('user_id', uid).gte('date', weekStart).lte('date', weekEnd),
        _sb.from('user_profiles').select('weekly_run_count_goal,weekly_lift_count_goal,weekly_goals').eq('id', uid).maybeSingle(),
      ]);

      const sumDist = arr => (arr || []).reduce((s, r) => s + Number(r.distance || 0), 0);
      const profile = profileR.data || {};

      // Legacy → JSONB fallback: if weekly_goals is empty but the old columns
      // have values, treat those as the source of truth.
      const jsonGoals = (profile.weekly_goals && typeof profile.weekly_goals === 'object') ? profile.weekly_goals : {};
      const goals = { ...jsonGoals };
      if (goals.running == null && profile.weekly_run_count_goal)  goals.running  = profile.weekly_run_count_goal;
      if (goals.strength == null && profile.weekly_lift_count_goal) goals.strength = profile.weekly_lift_count_goal;

      // Count sessions per modality for this week.
      const liftCount   = (weekLiftsR.data || []).length;
      const puCount     = (weekPuR.data    || []).length;
      const runCount    = (weekRunsR.data  || []).length;
      const walkCount   = (weekWalksR.data || []).length;
      const activityByType = {};
      const activityDistByType = {};
      (weekActivitiesR.data || []).forEach(a => {
        const t = a.activity_type || 'other';
        activityByType[t] = (activityByType[t] || 0) + 1;
        const d = Number(a.distance) || 0;
        if (d > 0) activityDistByType[t] = (activityDistByType[t] || 0) + d;
      });
      const walkMiles = (weekWalksR.data || []).reduce((s, w) => s + (Number(w.distance) || 0), 0);
      const weekCounts = {
        strength: liftCount + puCount,
        running:  runCount,
        walking:  walkCount,
        cycling:  activityByType.cycling  || 0,
        hiking:   activityByType.hiking   || 0,
        swimming: activityByType.swimming || 0,
        rowing:   activityByType.rowing   || 0,
        yoga:     activityByType.yoga     || 0,
        other:    activityByType.other    || 0,
      };

      // Per-modality distance summary (miles unless noted).
      // Skip yoga/other/hiking-without-distance in the UI; here we just
      // compute totals and let renderHome decide what to show.
      const weekDistances = {
        walking:  Math.round(walkMiles * 10) / 10,
        cycling:  Math.round((activityDistByType.cycling  || 0) * 10) / 10,
        hiking:   Math.round((activityDistByType.hiking   || 0) * 10) / 10,
        swimming: Math.round((activityDistByType.swimming || 0) * 10) / 10,
        rowing:   Math.round((activityDistByType.rowing   || 0) * 10) / 10,
      };

      return {
        runs: {
          week:      Math.round(sumDist(weekRunsR.data)  * 10) / 10,
          weekCount: runCount,
          year:      Math.round(sumDist(ytdRunsR.data)   * 10) / 10,
          yearCount: (ytdRunsR.data  || []).length,
          month:     Math.round(sumDist(monthRunsR.data) * 10) / 10,
        },
        lifts:   { weekSessions: liftCount },
        pullups: {
          weekSessions: puCount,
          weekReps:     (weekPuR.data || []).reduce((s, p) => s + (p.total_reps || 0), 0),
        },
        weekCounts,
        weekDistances,
        goals,
      };
    }

    async function sbAnalytics(yearFilter) {
      const uid = currentUser.id;
      let q = _sb.from('runs').select('date,distance,duration_secs,pace').eq('user_id', uid).order('date');
      if (yearFilter !== 'all') q = q.gte('date', `${yearFilter}-01-01`).lte('date', `${yearFilter}-12-31`);
      const { data, error } = await q;
      if (error) throw new Error(error.message);
      const runs = data || [];
      const totalMi = runs.reduce((s, r) => s + Number(r.distance), 0);
      const yearSet = new Set(runs.map(r => Number(r.date.slice(0, 4))));
      const availableYears = [...yearSet].sort((a, b) => b - a);
      const pRuns = runs.filter(r => r.pace);
      let avgPaceSecs = null;
      if (pRuns.length) {
        const td = pRuns.reduce((s, r) => s + Number(r.distance), 0);
        const wp = pRuns.reduce((s, r) => { const ps = paceToSecs(r.pace); return s + (ps ? ps * Number(r.distance) : 0); }, 0);
        avgPaceSecs = td > 0 ? wp / td : null;
      }
      const tRuns = runs.filter(r => r.duration_secs);
      const avgTimeMins = tRuns.length ? Math.round(tRuns.reduce((s, r) => s + r.duration_secs, 0) / tRuns.length / 60) : 0;
      const summary = {
        miles: Math.round(totalMi * 10) / 10,
        runs: runs.length,
        avgPace: avgPaceSecs ? secsToMMSS(avgPaceSecs) : '—',
        avgDistance: runs.length ? Math.round((totalMi / runs.length) * 100) / 100 : 0,
        avgTimeMinutes: avgTimeMins,
      };
      const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      let monthly = [];
      if (yearFilter !== 'all') {
        for (let m = 0; m < 12; m++) {
          const mr = runs.filter(r => Number(r.date.slice(5, 7)) - 1 === m);
          const mi = mr.reduce((s, r) => s + Number(r.distance), 0);
          const mpr = mr.filter(r => r.pace);
          let mAvgPace = null;
          if (mpr.length) {
            const md = mpr.reduce((s, r) => s + Number(r.distance), 0);
            const mwp = mpr.reduce((s, r) => { const ps = paceToSecs(r.pace); return s + (ps ? ps * Number(r.distance) : 0); }, 0);
            mAvgPace = md > 0 ? secsToMMSS(mwp / md) : null;
          }
          monthly.push({ label: monthNames[m], miles: Math.round(mi * 10) / 10, runs: mr.length, avgDistance: mr.length ? Math.round((mi / mr.length) * 100) / 100 : 0, avgPace: mAvgPace || '—' });
        }
      }
      const yearMap = {};
      runs.forEach(r => { const y = r.date.slice(0, 4); yearMap[y] = (yearMap[y] || 0) + Number(r.distance); });
      const yearly = Object.entries(yearMap).map(([year, miles]) => ({ year, miles: Math.round(miles * 10) / 10 })).sort((a, b) => Number(a.year) - Number(b.year));
      return { filter: yearFilter, availableYears, summary, monthly, yearly };
    }

    async function sbMonth(year, month) {
      const uid = currentUser.id;
      const pad = n => String(n).padStart(2, '0');
      const startDate = `${year}-${pad(month)}-01`;
      const lastDay = new Date(year, month, 0).getDate();

      const [runsR, liftsR, pullsR] = await Promise.all([
        _sb.from('runs').select('date,distance,duration_secs,pace').eq('user_id', uid).gte('date', startDate).lte('date', endDate),

      ]);
      const runByDate = {}; (runsR.data || []).forEach(r => { runByDate[r.date] = r; });
      const liftByDate = {}; (liftsR.data || []).forEach(l => { liftByDate[l.date] = l; });
      const pullByDate = {}; (pullsR.data || []).forEach(p => { pullByDate[p.date] = p; });
      const firstDayOfWeek = new Date(year, month - 1, 1).getDay();
      const wdays = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const days = [];
      for (let d = 1; d <= lastDay; d++) {
        const ds = `${year}-${pad(month)}-${pad(d)}`;
        const run = runByDate[ds], lift = liftByDate[ds], pull = pullByDate[ds];
        const dow = new Date(year, month - 1, d).getDay();
        days.push({
          date: ds, day: d, weekday: wdays[dow],
          run:    run  ? { distance: Math.round(Number(run.distance)*100)/100, time: run.duration_secs ? `${Math.floor(run.duration_secs/60)}:${String(run.duration_secs%60).padStart(2,'0')}:00` : '', pace: run.pace || '' } : null,
          lift:   lift ? { block: lift.block_name, week: lift.week, day: lift.day } : null,
          pullups:pull ? { total: pull.total_reps, weight: 'BW' } : null,
        });
      }
      const mNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      return { monthLabel: `${mNames[month-1]} ${year}`, firstDayOfWeek, days };
    }

    async function sbProfile() {
      const uid = currentUser.id;
      const [shoesR, runsR] = await Promise.all([
        _sb.from('shoe_mileage').select('*').eq('user_id', uid),
        _sb.from('runs').select('date,distance,duration_secs,pace').eq('user_id', uid).not('pace', 'is', null),

      const shoes = (shoesR.data || []).map(s => ({ id: s.id, name: s.name, active: s.active, totalMiles: Math.round(Number(s.total_miles)*10)/10, newMiles: Math.round(Number(s.logged_miles)*10)/10 }));
      const buckets = [
        { label: '1 Mile',        min: 0.8,  max: 1.2  },
        { label: '5K',            min: 2.8,  max: 3.5  },
        { label: '4 Miles',       min: 3.5,  max: 4.5  },
        { label: '10K',           min: 5.5,  max: 7.0  },
        { label: '10 Miles',      min: 9.0,  max: 11.0 },
        { label: 'Half Marathon', min: 12.5, max: 13.8 },
      ];
      const runs = runsR.data || [];
      const bestEfforts = [];
      buckets.forEach(b => {
        const cands = runs.filter(r => Number(r.distance) >= b.min && Number(r.distance) <= b.max && r.pace);
        if (!cands.length) return;
        cands.sort((a, c) => (paceToSecs(a.pace) || 9999) - (paceToSecs(c.pace) || 9999));
        const best = cands[0];
        bestEfforts.push({ bucket: b.label, pace: best.pace, time: best.duration_secs ? `${Math.floor(best.duration_secs/60)}:${String(best.duration_secs%60).padStart(2,'0')}:00` : '', distance: Math.round(Number(best.distance)*100)/100, date: best.date });
      });
      return { shoes, bestEfforts };
    }

    // -------- DOM helpers --------
    function $(sel, root = document) { return root.querySelector(sel); }
    function el(tag, attrs = {}, children = []) {
      const n = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        // Skip null/undefined values so `disabled: null` doesn't become
        // `disabled="null"` (which browsers treat as disabled=true).
        if (v == null) continue;
        if (k === 'class') n.className = v;
        else if (k === 'style') n.style.cssText = v;
        else if (k.startsWith('on')) n.addEventListener(k.slice(2), v);
        else if (k === 'html') n.innerHTML = v;
        else if (v === false) continue; // also skip explicit false for boolean attrs
        else n.setAttribute(k, v);
      }
      (Array.isArray(children) ? children : [children]).forEach(c => {
        if (c == null) return;
        n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      });
      return n;
    }

      if (c.includes('micro')) return 'micro';
      if (c.includes('intensity')) return 'intensity';
      if (c.includes('core')) return 'core';
      return '';
    }

    function stravaConfigured() { return STRAVA_CLIENT_ID && Number(STRAVA_CLIENT_ID) > 0; }

    function stravaRedirectUri() {
      // Strip query/hash so we round-trip back to the same URL the user came from.
      const u = new URL(window.location.href);
      u.search = '';
      u.hash = '';
      return u.toString();
    }

    function stravaAuthUrl() {
      const params = new URLSearchParams({
        client_id:     String(STRAVA_CLIENT_ID),
        redirect_uri:  stravaRedirectUri(),
        response_type: 'code',
        approval_prompt: 'auto',
        scope:         'read,activity:read_all',
      });
      return `https://www.strava.com/oauth/authorize?${params.toString()}`;
    }

    // Short-lived access token cache (Strava tokens expire ~6h).
    let _stravaAccess = null; // { access_token, expires_at }

    async function stravaGetAccessToken() {
      const now = Math.floor(Date.now() / 1000);
      if (_stravaAccess && _stravaAccess.expires_at > now + 60) {
        return _stravaAccess.access_token;
      }
      // Need a fresh one — call the refresh Edge Function.
      const { data: { session } } = await _sb.auth.getSession();
      if (!session) throw new Error('not signed in');
      const res = await fetch(`${SUPABASE_URL}/functions/v1/strava-refresh`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${session.access_token}`,
          'apikey':        SUPABASE_ANON_KEY,
          'content-type':  'application/json',
        },
      });
      const body = await res.json();
      if (!res.ok || !body.access_token) {
        throw new Error(body.error || `strava refresh failed (${res.status})`);
      }
      _stravaAccess = { access_token: body.access_token, expires_at: body.expires_at };
      return body.access_token;
    }

    async function stravaExchangeCode(code) {
      const { data: { session } } = await _sb.auth.getSession();
      if (!session) throw new Error('not signed in');
      const res = await fetch(`${SUPABASE_URL}/functions/v1/strava-oauth`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${session.access_token}`,
          'apikey':        SUPABASE_ANON_KEY,
          'content-type':  'application/json',
        },
        body: JSON.stringify({ code }),
      });
      const body = await res.json();
      if (!res.ok || !body.access_token) {
        throw new Error(body.error || `strava connect failed (${res.status})`);
      }
      _stravaAccess = { access_token: body.access_token, expires_at: body.expires_at };
      return body;
    }

    async function sbStravaConnection() {
      const { data, error } = await _sb.from('strava_tokens')
        .select('athlete_id,athlete_name,athlete_username,scope,connected_at,last_sync_at')
        .eq('user_id', currentUser.id).maybeSingle();
      if (error) throw new Error(error.message);
      return data; // null if not connected
    }

    async function sbStravaDisconnect() {
      const { error } = await _sb.from('strava_tokens').delete()
        .eq('user_id', currentUser.id);
      if (error) throw new Error(error.message);
      _stravaAccess = null;
    }

    // ── Activity sync ─────────────────────────────────────
    // Pulls runs from Strava since last_sync_at (or last 30 days on first
    // run), maps each one to a runs row, upserts by strava_activity_id.
    // Returns { fetched, inserted, skipped } summary.
    async function sbStravaSync({ daysBack = 30 } = {}) {
      const conn = await sbStravaConnection();
      if (!conn) throw new Error('not connected to Strava');
      const accessToken = await stravaGetAccessToken();

      // Watermark: prefer last_sync_at, fall back to N days ago.
      let after = 0;
      if (conn.last_sync_at) {
        after = Math.floor(new Date(conn.last_sync_at).getTime() / 1000);
      } else {
        after = Math.floor(Date.now() / 1000) - daysBack * 86400;
      }

      // Paginate through activities. Strava caps page_size at 200.
      let page = 1;
      const activities = [];
      while (true) {
        const url = `https://www.strava.com/api/v3/athlete/activities?after=${after}&per_page=100&page=${page}`;
        const r = await fetch(url, { headers: { 'Authorization': `Bearer ${accessToken}` } });
        if (!r.ok) throw new Error(`strava /activities ${r.status}`);
        const batch = await r.json();
        if (!Array.isArray(batch) || batch.length === 0) break;
        activities.push(...batch);
        if (batch.length < 100) break;
        page += 1;
        if (page > 20) break; // safety
      }

      const RUN_TYPES = new Set(['Run', 'TrailRun', 'VirtualRun']);
      const runs = activities.filter(a => RUN_TYPES.has(a.type) || RUN_TYPES.has(a.sport_type));

      let inserted = 0, skipped = 0;
      for (const a of runs) {
        const dateISO = (a.start_date_local || a.start_date || '').slice(0, 10);
        if (!dateISO) { skipped++; continue; }
        const distMeters = Number(a.distance) || 0;
        const distMiles = Math.round((distMeters / 1609.344) * 100) / 100;
        if (distMiles <= 0) { skipped++; continue; }
        const durSecs = Number(a.moving_time) || Number(a.elapsed_time) || null;
        const pace = (durSecs && distMiles > 0) ? secsToMMSS(durSecs / distMiles) : null;

        const row = {
          user_id:            currentUser.id,
          date:               dateISO,
          distance:           distMiles,
          duration_secs:      durSecs,
          pace:               pace,
          notes:              a.name || null, // Strava activity title in notes
          strava_activity_id: a.id,
        };

        // Upsert: existing row with same (user_id, strava_activity_id) gets
        // updated; otherwise inserted.
        const { error } = await _sb.from('runs').upsert(row, {
          onConflict: 'user_id,strava_activity_id',
          ignoreDuplicates: false,
        });
        if (error) {
          console.error('strava upsert failed', a.id, error);
          skipped++;
        } else {
          inserted++;
        }
      }

      // Update watermark to now.
      await _sb.from('strava_tokens')
        .update({ last_sync_at: new Date().toISOString() })
        .eq('user_id', currentUser.id);

      return { fetched: runs.length, inserted, skipped };
    }

    // Run on app start: if URL has ?code= (Strava OAuth callback), exchange it.
    async function handleStravaCallbackIfPresent_() {
      const params = new URLSearchParams(window.location.search);
      const code  = params.get('code');
      const scope = params.get('scope');
      if (!code || !scope) return false; // not a strava callback
      // Wait for auth to land if we just got back from sign-in.
      try {
        await stravaExchangeCode(code);
        toast('Strava connected');
      } catch (e) {
        toast('Strava connect failed: ' + (e.message || e), true);
      }
      // Clean ?code= and friends out of the URL so a refresh doesn't re-trigger.
      const clean = stravaRedirectUri();
      window.history.replaceState({}, document.title, clean);
      return true;
    }

    async function loadProgram() {
      if (programCache) return programCache;

      // PREFERRED: derive blocks from the active program in the new Programs
      // tab. This is the path going forward (v14+); the rest are legacy.
      try {
        const ap = await sbActiveProgram();
        if (ap && ap.structure && Array.isArray(ap.structure.weeks)) {
          const cfg = deriveBlocksFromProgram_(ap);
          programCache = { ...cfg, fetchedAt: Date.now(), source: 'programs' };
          localStorage.setItem(PROG_KEY, JSON.stringify(programCache));
          return programCache;
        }
      } catch (e) { /* fall through */ }

      // Then localStorage cache (last good config)
      try {
        const stored = JSON.parse(localStorage.getItem(PROG_KEY) || 'null');
        if (stored && stored.blocks && stored.fetchedAt && (Date.now() - stored.fetchedAt < 86400000)) {
          programCache = stored;
          return stored;
        }
      } catch (e) {}

      // Legacy: Supabase program_config
      try {
        const { data, error } = await _sb.from('program_config').select('config').eq('user_id', currentUser.id).maybeSingle();
        if (!error && data && data.config && data.config.blocks) {
          programCache = { ...data.config, fetchedAt: Date.now(), source: 'program_config' };
          localStorage.setItem(PROG_KEY, JSON.stringify(programCache));
          return programCache;
        }
      } catch (e) {}

      // Legacy: Apps Script
      if (getConfig().scriptUrl && getConfig().token) {
        const cfg = await api('config');
        programCache = { ...cfg, fetchedAt: Date.now(), source: 'apps_script' };
        localStorage.setItem(PROG_KEY, JSON.stringify(programCache));
        return programCache;
      }
      throw new Error('Program config not available');
    }

    // Turn an active program's `structure.weeks` into the { blocks: [...] }
    // shape the lift selector UI expects. Groups consecutive weeks sharing a
    // block_name into a single block span. Falls back to one block named after
    // the program if no weeks have block_name set.
    function deriveBlocksFromProgram_(program) {
      const s = program.structure || {};
      const weeks = s.weeks || [];
      if (!weeks.length) {
        return { blocks: [{ name: program.name, startWeek: 1, endWeek: s.weeks_total || 1 }] };
      }
      const blocks = [];
      let cur = null;
      weeks.forEach(w => {
        const name = w.block_name || program.name;
        if (!cur || cur.name !== name) {
          if (cur) blocks.push(cur);
          cur = { name, startWeek: w.week, endWeek: w.week };
        } else {
          cur.endWeek = w.week;
        }
      });
      if (cur) blocks.push(cur);
      return {
        blocks,
        weeksTotal: s.weeks_total || weeks.length,
        dayLetters: s.day_letters || ['A', 'B', 'C'],
        dayTitles: s.day_titles || {},
      };
    }

    // Returns the exercise template for a given selection, plus prev-week
    // prefill from lift_sessions. Tries the new Programs system first, then
    // falls back to Apps Script if no program is active (transition aid).
    async function loadLiftTemplate_(sel) {
      // 1) Programs system
      let exercises = null;
      let source = 'none';
      try {
        const ap = await sbActiveProgram();
        if (ap && ap.structure && Array.isArray(ap.structure.weeks)) {
          const weekRow = ap.structure.weeks.find(w => Number(w.week) === Number(sel.week));
          if (weekRow && weekRow.days && Array.isArray(weekRow.days[sel.day])) {
            exercises = weekRow.days[sel.day].map(ex => ({
              name:        ex.name,
              sets:        ex.sets,
              targetReps:  ex.target_reps,
              category:    ex.category,
              notes:       ex.notes || '',
              sessionNotes: '',
              prevWeight:  null,
              prevTotal:   null,
            }));
            source = 'program';
          }
        }
      } catch (e) { /* fall through to legacy */ }

      // 2) Apps Script legacy (only if Programs path didn't produce a template)
      if (!exercises && getConfig().scriptUrl && getConfig().token) {
        try {
          const tpl = await api('template', { block: sel.block, week: sel.week, day: sel.day });
          if (tpl && Array.isArray(tpl.exercises)) {
            exercises = tpl.exercises.map(ex => ({
              name:        ex.name,
              sets:        ex.sets,
              targetReps:  ex.targetReps,
              category:    ex.category,
              notes:       ex.notes || '',
              sessionNotes: ex.sessionNotes || '',
              prevWeight:  ex.prevWeight != null ? ex.prevWeight : null,
              prevTotal:   ex.prevTotal  != null ? ex.prevTotal  : (ex.previous != null ? ex.previous : null),
            }));
            source = 'apps_script';
          }
        } catch (e) { /* fall through */ }
      }

      if (!exercises) return { source: 'none', exercises: [] };

      // Prev-time prefill: pull the most recent matching-day session
      // (regardless of week number) strictly before the session date being
      // logged. Works for week-numbered programs and free-form A/B rotations.
      try {
        const refDate = (sel.date && /^\d{4}-\d{2}-\d{2}/.test(sel.date)) ? sel.date : todayISO();
        const prev = await sbMostRecentSameDaySession_(sel.day, refDate);
        exercises.forEach(ex => {
          const match = prev[normalizeExName_(ex.name)];
          if (match) {
            ex.prevWeight = match.weight != null ? match.weight : ex.prevWeight;
            ex.prevTotal  = match.total  != null ? match.total  : ex.prevTotal;
          }
        });
      } catch (e) { /* prefill is best-effort */ }

      return { source, exercises };
    }

    function normalizeExName_(s) {
      return String(s || '').replace(/\s+/g, ' ').trim().toLowerCase();
    }

    // Look at the most recent lift session and return the NEXT day-letter
    // after it within the given dayLetters array (cycles back to the first
    // after the last). Returns dayLetters[0] if there's no history.
    async function suggestNextLiftDay_(dayLetters) {
      if (!Array.isArray(dayLetters) || !dayLetters.length) return 'A';
      const uid = currentUser.id;
      const { data, error } = await _sb.from('lift_sessions')
        .select('day,date')
        .eq('user_id', uid)
        .order('date', { ascending: false })
        .limit(1);
      if (error || !data || !data.length) return dayLetters[0];
      const lastDay = String(data[0].day || '').toUpperCase();
      const idx = dayLetters.indexOf(lastDay);
      if (idx === -1) return dayLetters[0];
      return dayLetters[(idx + 1) % dayLetters.length];
    }

    // Find the MOST RECENT matching-day session strictly before `beforeDate`
    // and return a map of exercise-name (normalized) → { weight, total }.
    //
    // Was previously keyed on `week = N-1` which assumed a calendar-week
    // structured program. For A/B-rotation programs where the same day
    // letter can recur multiple times in one week, that missed the
    // intra-week case. This is the right shape for both.
    async function sbMostRecentSameDaySession_(day, beforeDate) {
      const uid = currentUser.id;
      let q = _sb.from('lift_sessions')
        .select('date,exercises')
        .eq('user_id', uid).eq('day', day);
      if (beforeDate) q = q.lt('date', beforeDate);
      q = q.order('date', { ascending: false }).limit(1);
      const { data, error } = await q;
      if (error) throw new Error(error.message);
      const session = (data || [])[0];
      if (!session || !Array.isArray(session.exercises)) return {};
      const out = {};
      session.exercises.forEach(ex => {
        const r1 = Number(ex.r1) || 0;
        const r2 = Number(ex.r2) || 0;
        const r3 = Number(ex.r3) || 0;
        const r4 = Number(ex.r4) || 0;
        const total = r1 + r2 + r3 + r4;
        out[normalizeExName_(ex.name)] = {
          weight: (ex.weight === '' || ex.weight == null) ? null : ex.weight,
          total:  total > 0 ? total : null,
        };
      });
      return out;
    }

    async function authVerifyCode() {

        toast(error.message, true);

    }

          hiking:   { label: 'Hike',     unit: 'mi' },
          swimming: { label: 'Swim',     unit: 'yd' },
          rowing:   { label: 'Row',      unit: 'm'  },
        };
        ['walking','cycling','hiking','swimming','rowing'].forEach(mod => {
          if (!modalities.includes(mod)) return;
          const dist = stats.weekDistances[mod] || 0;
          if (dist <= 0) return; // only show if there's data
          const cfg = distanceLabels[mod];
          distanceCards.push(el('div', { class: 'card' }, [
            el('h2', {}, `${cfg.label} this week`),
            el('div', { class: 'big' }, String(dist)),
            el('div', { class: 'muted', style: 'margin-top: 4px;' }, cfg.unit),
          ]));
        });
        // Pair them into a stat-grid two at a time.
        for (let i = 0; i < distanceCards.length; i += 2) {
          const pair = distanceCards.slice(i, i + 2);
          if (pair.length === 2) {
            app.appendChild(el('div', { class: 'stat-grid' }, pair));
          } else {
            app.appendChild(pair[0]);
          }
        }

        // ── Cumulative running stat (YTD) ───────────────────
        // Only for runners. Standalone card since it's the single "big
        // picture" number for how the year is going.
        if (modalities.includes('running')) {
          app.appendChild(el('div', { class: 'card' }, [
            el('h2', {}, 'Miles YTD'),
            el('div', { class: 'big' }, String(stats.runs.year)),
            el('div', { class: 'muted', style: 'margin-top: 4px;' }, `${stats.runs.yearCount} runs`),
          ]));
        }
      } catch (e) {
        skel.remove();
      }
    }

    // Fallback weekly targets — used only if user_profiles row doesn't have
    // explicit values set yet. Editable from Home tap-to-edit (saves to
    // user_profiles.weekly_*_count_goal).
    const WEEKLY_RUN_GOAL_DEFAULT  = 4;
    const WEEKLY_LIFT_GOAL_DEFAULT = 3;

    // Renders a single modality's weekly goal row.
    // - kind: modality id ('running', 'strength', 'cycling', etc.)
    // - goal = 0 means "not set" — bar shows empty + target reads "—"
    function goalRow_(label, done, goal, kind) {
      const goalNum = Number(goal) || 0;
      const hasGoal = goalNum > 0;
      const pct = hasGoal ? Math.min(100, Math.round((done / goalNum) * 100)) : 0;
      const isHit = hasGoal && done >= goalNum;

      const countEl = el('span', { class: 'goal-count' + (isHit ? ' hit' : '') });
      const renderRead = () => {
        countEl.innerHTML = '';
        countEl.appendChild(document.createTextNode(`${done} / `));
        const goalSpan = el('span', {
          class: 'goal-target',
          title: hasGoal ? 'Tap to edit target' : 'Tap to set weekly target',
        }, hasGoal ? String(goalNum) : '—');
        goalSpan.addEventListener('click', startEdit);
        countEl.appendChild(goalSpan);
      };
      const startEdit = () => {
        countEl.innerHTML = '';
        countEl.appendChild(document.createTextNode(`${done} / `));
        const input = el('input', {
          type: 'number',
          inputmode: 'numeric',
          pattern: '[0-9]*',
          class: 'goal-edit-input',
          min: '0',
          max: '99',
          placeholder: hasGoal ? '' : 'e.g. 3',
          value: hasGoal ? String(goalNum) : '',
        });
        countEl.appendChild(input);
        input.focus();
        input.select();
        const commit = async () => {
          input.disabled = true;
          try {
            const newVal = await sbUpdateGoal(kind, input.value);
            toast(newVal > 0 ? `${label} goal: ${newVal}` : `${label} goal cleared`);
            render('home');
          } catch (e) {
            toast('Could not save: ' + e.message, true);
            renderRead();
          }
        };
        let committed = false;
        input.addEventListener('blur', () => { if (!committed) { committed = true; commit(); } });
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { committed = true; input.blur(); commit(); }
          if (e.key === 'Escape') { committed = true; renderRead(); }
        });
      };
      renderRead();

      return el('div', { class: 'goal-row' }, [
        el('div', { class: 'goal-head' }, [
          el('span', { class: 'goal-label' }, label),
          countEl,
        ]),
        el('div', { class: 'goal-bar' }, [
          el('div', { class: 'goal-fill' + (isHit ? ' hit' : ''), style: `width: ${pct}%;` }),
        ]),
      ]);
    }

    function dayTitle(d) {
      if (d === 'A') return 'Push Day';
      if (d === 'B') return 'Pull Day';
      if (d === 'C') return 'Full Upper';
      return 'Lift';
    }

    function actionTile_(view, label, iconKeyOrIsToday, maybeIsToday) {
      // Signature is a little permissive so old call-sites still work.
      // New: actionTile_('lift', 'Lift', 'lift', false)  → 4 args, iconKey given
      // Old: actionTile_('lift', 'Lift', false)          → 3 args, isToday given
      let iconKey, isToday;
      if (typeof iconKeyOrIsToday === 'string') {
        iconKey = iconKeyOrIsToday;
        isToday = !!maybeIsToday;
      } else {
        iconKey = view; // derive icon from view name (legacy)
        isToday = !!iconKeyOrIsToday;
      }
      const icons = {
        lift: '<path d="M5 8v8M3 10v4M19 8v8M21 10v4M5 12h14"/>',
        run: '<circle cx="13" cy="4" r="2"/><path d="M6 22l3-6 3 2 2-4 3 2M9 16l-1-5 4-3 3 3 2 2"/>',
        pullups: '<path d="M3 4h18M6 4v4a6 6 0 0 0 12 0V4"/><circle cx="12" cy="13" r="2"/><path d="M12 15v4M9 19h6"/>',
        walk: '<circle cx="13" cy="4" r="2"/><path d="M9 22l2-6 2.5 2 2-7M7.5 12.5l1.5-4 4 1 1.5 2.5 3-1"/>',
        bike: '<circle cx="6" cy="17" r="3"/><circle cx="18" cy="17" r="3"/><path d="M6 17l4-7h6l2 7M10 10l3-4h4M13 17h5"/>',
        boot: '<path d="M6 4v10M6 14h6l3 3v3H4v-6zM9 14v-4h3l2 2"/>',
        swim: '<path d="M2 10c2 0 3-2 5-2s3 2 5 2 3-2 5-2 3 2 5 2M2 16c2 0 3-2 5-2s3 2 5 2 3-2 5-2 3 2 5 2M2 22c2 0 3-2 5-2s3 2 5 2 3-2 5-2 3 2 5 2"/>',
        row: '<circle cx="12" cy="5" r="2"/><path d="M4 14l8-2 8 2M6 20l6-4 6 4"/>',
        yoga: '<circle cx="12" cy="5" r="2"/><path d="M12 7v6M6 13c2 0 4 2 6 2s4-2 6-2M8 21l4-6 4 6"/>',
        star: '<path d="M12 3l2.5 6 6.5.5-5 4.5 1.5 6.5L12 17l-5.5 3.5L8 14l-5-4.5 6.5-.5z"/>',
      };
      const iconMarkup = icons[iconKey] || icons.star;
      return el('button', {
        class: 'action-tile' + (isToday ? ' today' : ''),
        onclick: () => render(view),
        html: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${iconMarkup}</svg><span>${label}</span>`,
      });

    async function renderLift(app) {
      app.appendChild(el('header', { class: 'top' }, [
        el('h1', {}, 'Log Lift'),
        el('span', { class: 'date' }, fmtDateLong(new Date())),
      ]));

      const skel = el('div', { class: 'card' }, el('div', { class: 'skeleton', style: 'height: 80px;' }));
      app.appendChild(skel);

      // Load program config (cached) + today (for auto defaults)
      let prog = null;
      let today = { liftDay: 'A', blockName: null, programWeek: 1 };
      try { prog = await loadProgram(); } catch (e) {}
      try {
        if (!todayCache && getConfig().scriptUrl && getConfig().token) todayCache = await api('today');
        if (todayCache) today = todayCache;
      } catch (e) {}
      skel.remove();

      if (!prog) {
        app.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, 'No active program'),
          el('p', { class: 'muted', style: 'font-size: 14px;' },
            'Open the Programs tab and activate one to load exercise templates here.'),
          el('button', { onclick: () => render('programs'), style: 'margin-top: 12px;' },
            'Go to Programs'),
        ]));
        return;
      }

      // Initialize liftSelection. Default day suggests the NEXT letter after
      // the most recent lift session (so an A/B rotation cycles A → B → A
      // automatically). Block + week come from program metadata.
      if (!liftSelection) {
        const dayLetters = (prog && prog.dayLetters) || ['A', 'B', 'C'];
        let suggestedDay = await suggestNextLiftDay_(dayLetters).catch(() => dayLetters[0]);
        if (!dayLetters.includes(suggestedDay)) suggestedDay = dayLetters[0];

        // Block defaults: first block of the active program, current week within it.
        const firstBlock = (prog && prog.blocks && prog.blocks[0]) || null;
        const defaultBlock = (firstBlock && firstBlock.name) || today.blockName || 'Block 1';
        const defaultWeek  = (firstBlock && firstBlock.startWeek) || today.programWeek || 1;

        liftSelection = { block: defaultBlock, week: defaultWeek, day: suggestedDay };
      }

      // Selector card
      const selectorCard = el('div', { class: 'card', id: 'selectorCard' });
      app.appendChild(selectorCard);

      // Date picker — defaults to today, editable so back-logging works.
      // Lives outside fetchAndRenderExercises so changing Block/Week/Day
      // pills doesn't reset whatever date the user typed. Changing the date
      // re-triggers exercise fetch so prev-time prefill stays accurate.
      const dateInput = el('input', {
        id: 'liftDate',
        type: 'date',
        value: liftSelection.date || todayISO(),
        style: 'flex: 1; margin: 0;',
        onchange: () => {
          liftSelection.date = dateInput.value || todayISO();
          fetchAndRenderExercises();
        },
      });
      const dateCard = el('div', { class: 'card', style: 'padding: 12px 16px;' }, [
        el('div', { class: 'field', style: 'margin: 0; display: flex; align-items: center; gap: 12px;' }, [
          el('label', { for: 'liftDate', style: 'margin: 0; min-width: 70px;' }, 'Date'),
          dateInput,
        ]),
      ]);
      app.appendChild(dateCard);

      // Exercises container
      const exContainer = el('div', { id: 'exContainer' });
      app.appendChild(exContainer);

      function renderSelector() {
        selectorCard.innerHTML = '';
        selectorCard.appendChild(el('div', { class: 'selector-summary' }, [
          el('div', {}, [
            el('div', { class: 'label' }, 'Today\'s session'),
            el('div', { class: 'value' }, `${liftSelection.block} · Week ${liftSelection.week} · Day ${liftSelection.day}`),
            el('div', { class: 'muted' }, dayTitle(liftSelection.day)),
          ]),
          el('button', { class: 'edit', onclick: () => { selectorOpen = !selectorOpen; renderSelector(); } },
            selectorOpen ? 'Done' : 'Change'),
        ]));

        if (selectorOpen) {
          const body = el('div', { class: 'selector-body' });

          // Block row
          body.appendChild(el('div', { class: 'pill-row-label' }, 'Block'));
          const blockRow = el('div', { class: 'pill-row' });
          prog.blocks.forEach(b => {
            blockRow.appendChild(el('button', {
              class: 'pill-btn' + (b.name === liftSelection.block ? ' active' : ''),
              onclick: () => {
                liftSelection.block = b.name;
                // Snap week into the block's range if needed
                if (liftSelection.week < b.startWeek || liftSelection.week > b.endWeek) {
                  liftSelection.week = b.startWeek;
                }
                renderSelector();
                fetchAndRenderExercises();
              },
            }, b.name));
          });
          body.appendChild(blockRow);

          // Week row (constrained to current block)
          const block = prog.blocks.find(b => b.name === liftSelection.block);
          if (block) {
            body.appendChild(el('div', { class: 'pill-row-label' }, 'Week'));
            const weekRow = el('div', { class: 'pill-row' });
            for (let w = block.startWeek; w <= block.endWeek; w++) {
              weekRow.appendChild(el('button', {
                class: 'pill-btn' + (w === liftSelection.week ? ' active' : ''),
                onclick: () => { liftSelection.week = w; renderSelector(); fetchAndRenderExercises(); },
              }, 'W' + w));
            }
            body.appendChild(weekRow);
          }

          // Day row
          body.appendChild(el('div', { class: 'pill-row-label' }, 'Day'));
          const dayRow = el('div', { class: 'pill-row' });
          ['A', 'B', 'C'].forEach(d => {
            dayRow.appendChild(el('button', {
              class: 'pill-btn' + (d === liftSelection.day ? ' active' : ''),
              onclick: () => { liftSelection.day = d; renderSelector(); fetchAndRenderExercises(); },
            }, `Day ${d} — ${dayTitle(d)}`));
          });
          body.appendChild(dayRow);

          selectorCard.appendChild(body);
        }
      }

      async function fetchAndRenderExercises() {
        exContainer.innerHTML = '';
        const loading = el('div', { class: 'card' }, el('div', { class: 'skeleton', style: 'height: 200px;' }));
        exContainer.appendChild(loading);

        // Sync date input → liftSelection.date so the prev-time prefill uses
        // whatever date the user has chosen (back-logging support).
        const dateInp = $('#liftDate');
        if (dateInp && dateInp.value) liftSelection.date = dateInp.value;

        // v14+: read templates from the active Supabase program. Fall back to
        // Apps Script only if no active program is set (covers users who
        // haven't migrated yet).
        let tpl;
        try {
          tpl = await loadLiftTemplate_(liftSelection);
        } catch (e) {
          loading.remove();
          exContainer.appendChild(el('div', { class: 'card' }, 'Could not load template: ' + e.message));
          return;
        }
        loading.remove();

        if (tpl.source === 'none') {
          exContainer.appendChild(el('div', { class: 'card' }, [
            el('p', { class: 'muted', style: 'font-size: 14px;' },
              'No active program. Open the Programs tab and activate one to load exercise templates here.'),
            el('button', { onclick: () => render('programs'), style: 'margin-top: 12px;' }, 'Go to Programs'),
          ]));
          return;
        }

        if (!tpl.exercises.length) {
          exContainer.appendChild(el('div', { class: 'card' }, 'No exercises for this slot.'));
          return;
        }

        const form = el('div', { id: 'liftForm' });
        tpl.exercises.forEach((ex, idx) => {
          const card = el('div', { class: 'exercise', 'data-idx': idx }, [
            el('h3', {}, ex.name),
            el('div', { class: 'meta' }, [
              ex.category ? el('span', { class: 'pill ' + categoryClass(ex.category) }, ex.category) : null,
              el('span', {}, `${ex.sets} sets · ${ex.targetReps}`),
            ]),
            ex.notes ? el('div', { class: 'notes' }, ex.notes) : null,
            el('div', { class: 'field' }, [
              el('label', {}, 'Weight'),
              el('input', { class: 'inp-weight', type: 'text', placeholder: 'e.g. 50 or BW', value: ex.weight || '', inputmode: 'text' }),
            ]),
            (() => {
              const grid = el('div', { class: 'set-grid' });
              grid.appendChild(el('div', {
                style: 'font-size: 10px; color: var(--muted); text-align: right; padding-right: 4px; align-self: center; font-weight: 600;',
              }, 'REPS'));
              const prescribedSets = Math.min(4, Math.max(1, Number(ex.sets) || 4));
              ['Set 1', 'Set 2', 'Set 3', 'Set 4'].forEach((lab, i) => {
                const isActive = (i + 1) <= prescribedSets;
                const inpAttrs = {
                  class: 'inp-r' + (i + 1) + (isActive ? '' : ' inp-disabled'),
                  type: 'number', inputmode: 'numeric', pattern: '[0-9]*',
                  placeholder: isActive ? '—' : '',
                  value: isActive ? (ex['r' + (i + 1)] === '' ? '' : String(ex['r' + (i + 1)] || '')) : '',
                };
                if (!isActive) inpAttrs.disabled = 'disabled';
                grid.appendChild(el('div', {}, [
                  el('div', {
                    style: 'font-size: 10px; text-align: center; color: ' + (isActive ? 'var(--muted)' : '#3a3a3a') + '; margin-bottom: 4px;',
                  }, lab),
                  el('input', inpAttrs),
                ]));
              });
              return grid;
            })(),
            el('div', { class: 'field', style: 'margin-top: 10px; margin-bottom: 0;' }, [
              el('input', {
                class: 'inp-notes', type: 'text',
                placeholder: 'Per-exercise notes (optional)',
                value: ex.sessionNotes || '',
              }),
            ]),
            renderLastWeek_(ex),
          ]);
          form.appendChild(card);
        });
        exContainer.appendChild(form);

        exContainer.appendChild(el('div', { class: 'field', style: 'margin-top: 16px;' }, [
          el('label', {}, 'Session notes (optional)'),
          el('input', { id: 'liftSessionNotes', type: 'text', placeholder: 'how did it feel?' }),
        ]));

        exContainer.appendChild(el('button', {
          onclick: async () => {
            const entries = [];
            form.querySelectorAll('.exercise').forEach((card, i) => {
              const ex = tpl.exercises[i];
              const weight = card.querySelector('.inp-weight').value.trim();
              const r = [1, 2, 3, 4].map(n => {
                const v = card.querySelector('.inp-r' + n).value.trim();
                return v === '' ? '' : Number(v);
              });
              const notesInp = card.querySelector('.inp-notes');
              entries.push({
                name: ex.name, category: ex.category, weight,
                r1: r[0], r2: r[1], r3: r[2], r4: r[3],
                notes: notesInp ? notesInp.value.trim() : '',
              });
            });
            const dateInp = $('#liftDate');
            const meta = {
              date: (dateInp && dateInp.value) ? dateInp.value : todayISO(),
              block: liftSelection.block,
              week: liftSelection.week,
              day: liftSelection.day,
              notes: ($('#liftSessionNotes').value || '').trim(),
            };
            // Remember the chosen date on liftSelection so it survives a
            // re-render of the selector / exercises within this screen.
            liftSelection.date = meta.date;
            try {
              const res = await sbLogLift(entries, meta);
              if (res.duplicate) toast('Already logged this session');
              else toast('Saved to Lift Log');
              setTimeout(() => render('home'), 900);
            } catch (e) {
              toast('Could not save: ' + e.message, true);
            }
          },
        }, 'Save session'));
      }

      renderSelector();
      fetchAndRenderExercises();
    }

      if (showDistance) {
        card.appendChild(el('div', { class: 'field' }, [
          el('label', {}, `Distance (${distUnit}) — optional`),

              btns.forEach(b => b.classList.remove('active'));
              e.target.classList.add('active');

          }, lv.charAt(0).toUpperCase() + lv.slice(1))),

        el('input', { id: 'actNotes', type: 'text', placeholder: type === 'yoga' ? 'Flow, restorative, hot, etc.' : 'How it felt, route, etc.' }),
      ]));

      card.appendChild(el('button', {
        onclick: async () => {
          const date = $('#actDate').value;
          if (!date) return toast('Date required', true);
          const minRaw = $('#actMin').value.trim();
          const secRaw = $('#actSec').value.trim();
          const durSecs = (Number(minRaw) || 0) * 60 + (Number(secRaw) || 0);
          const distance = showDistance ? Number($('#actDist').value) : null;
          const intensityBtn = document.querySelector('#actIntensityRow .pill-btn.active');
          const intensity = intensityBtn ? intensityBtn.getAttribute('data-intensity') : null;
          const notes = $('#actNotes').value.trim();

          if (!durSecs && !distance) {
            return toast('Add at least a time or a distance', true);

              distance:      distance || null,
              intensity,
              notes,

            toast(`${label} logged!`);
            setTimeout(() => render('home'), 900);
          } catch (e) {
            toast('Could not save: ' + e.message, true);
          }
        },
      }, `Log ${label.toLowerCase()}`));

      app.appendChild(card);
    }

    async function renderPullUps(app) {
      app.appendChild(el('header', { class: 'top' }, [
        el('h1', {}, 'Pull-Ups'),
        el('span', { class: 'date' }, fmtDateLong(new Date())),
      ]));

      let prog = null;
      let today = { pullUpWeek: 1, pullUpPhase: null };
      try { prog = await loadProgram(); } catch (e) {}
      try {
        if (!todayCache && getConfig().scriptUrl && getConfig().token) todayCache = await api('today');
        if (todayCache) today = todayCache;
      } catch (e) {}

      const week = today.pullUpWeek || 1;
      const phase = today.pullUpPhase || phaseForWeek(week);
      const phaseInfo = (prog && prog.pullUpPhases) ? (prog.pullUpPhases.find(p => p.name === phase) || {}) : {};

      app.appendChild(el('div', { class: 'card' }, [
        el('h2', {}, `Week ${week} · ${phase}`),
        el('div', { class: 'muted', style: 'font-size: 14px;' },
          `${phaseInfo.workingReps || ''} per set · ${phaseInfo.sets || 5} sets/day · ${phaseInfo.weight || ''}`),
      ]));

      app.appendChild(el('div', { class: 'card' }, [
        el('div', { class: 'field' }, [el('label', {}, 'Date'), el('input', { id: 'puDate', type: 'date', value: todayISO() })]),
        el('div', { class: 'field' }, [
          el('label', {}, 'Program week (auto)'),
          el('input', { id: 'puWeek', type: 'number', inputmode: 'numeric', min: '1', max: '12', value: String(week) }),
        ]),
        el('div', { class: 'field' }, [
          el('label', {}, 'Reps per set (5 sets)'),
          (() => {
            const grid = el('div', { class: 'set-grid-5' });
            ['S1', 'S2', 'S3', 'S4', 'S5'].forEach((lab, i) => {
              grid.appendChild(el('div', {}, [
                el('div', { style: 'font-size: 10px; text-align: center; color: var(--muted); margin-bottom: 4px;' }, lab),
                el('input', { class: 'inp-s' + (i + 1), type: 'number', inputmode: 'numeric', placeholder: '—' }),
              ]));
            });
            return grid;
          })(),
        ]),
        el('div', { class: 'field' }, [
          el('label', {}, 'Weight (BW, BW+10, etc.)'),
          el('input', { id: 'puWeight', type: 'text', value: phaseInfo.weight || 'BW' }),
        ]),
        el('div', { class: 'field' }, [
          el('label', {}, 'Notes (optional)'),
          el('input', { id: 'puNotes', type: 'text', placeholder: 'felt strong / easy / spread across day' }),
        ]),
        el('button', {
          onclick: async () => {
            const date = $('#puDate').value;
            const weekVal = Number($('#puWeek').value) || week;
            const s = [1, 2, 3, 4, 5].map(n => {
              const v = $('.inp-s' + n, app).value.trim();
              return v === '' ? '' : Number(v);
            });
            const weight = $('#puWeight').value.trim();
            const notes = $('#puNotes').value.trim();
            if (s.every(v => v === '')) return toast('Enter at least one set', true);
            const session = {
              date, week: weekVal,
              s1: s[0], s2: s[1], s3: s[2], s4: s[3], s5: s[4],
              weight, notes,
            };
            try {
              const res = await sbLogPullUps(session);
              if (res.duplicate) toast('Already logged today');
              else toast(`Saved · ${res.total} total reps`);
              setTimeout(() => render('home'), 900);
            } catch (e) {
              toast('Could not save: ' + e.message, true);
            }
          },
        }, 'Save pull-up session'),
      ]));

      // Recent pull-up sessions
      try {
        const recentPullups = await sbRecentPullUps(5);
        if (recentPullups.length) {
          const list = el('div', { class: 'card' }, [el('h2', {}, 'Recent sessions')]);
          recentPullups.forEach(p => {
            list.appendChild(el('div', {
              style: 'padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;',
            }, [
              el('div', {}, [
                el('div', { style: 'font-weight: 600;' }, `${p.total || 0} reps · ${p.weight || 'BW'}`),
                el('div', { class: 'muted', style: 'font-size: 12px;' },

              ]),

            ]));
          });
          app.appendChild(list);
        }
      } catch (e) {}
    }

    function phaseForWeek(w) {
      if (w <= 3) return 'Phase 1';
      if (w <= 6) return 'Phase 2';
      if (w <= 9) return 'Phase 3';
      return 'Phase 4';
    }

    function renderLastWeek_(ex) {
      // Compact "Last time" footer showing the most recent same-day session's
      // weight × total reps for this exercise. (Was "Last week" — renamed
      // because for A/B-style rotations, "last time" can be in the same week.)
      const w = ex.prevWeight;
      const t = ex.prevTotal != null ? ex.prevTotal : ex.previous;
      const hasW = (w != null && w !== '' && w !== '—');
      const hasT = (t != null && t !== '' && t !== '—' && t !== 0 && t !== '0');
      if (!hasW && !hasT) {
        return el('div', { class: 'prev', style: 'color: #555;' }, 'Last time: no data');
      }
      const parts = [];
      if (hasW) parts.push(String(w) + (typeof w === 'number' ? ' lb' : ''));
      if (hasT) parts.push(String(t) + ' reps');
      return el('div', { class: 'prev' }, [
        el('span', {}, 'Last time: '),
        el('b', {}, parts.join(' · ')),
      ]);
    }

    let analyticsYearFilter = null; // persists across re-renders

    async function renderAnalytics(app) {
      app.appendChild(el('header', { class: 'top' }, [el('h1', {}, 'Analytics')]));

      const skel = el('div', { class: 'card' }, el('div', { class: 'skeleton', style: 'height: 100px;' }));
