    function renderLiftPlanner(app) {
      app.appendChild(el('header', { class: 'top' }, [el('h1', {}, 'Lifting Plan Generator')]));
      app.appendChild(el('button', {
        class: 'btn-link',
        style: 'background: transparent; color: var(--muted); border: none; padding: 0; margin-bottom: 8px; text-align: left; width: auto; font-size: 13px;',
        onclick: () => render('programs'),
      }, '← Back to Programs'));

      // Restore prior selections if any
      let saved = {};
      try { saved = JSON.parse(localStorage.getItem('liftPlanState_v1') || '{}'); } catch(e) {}

      const state = {
        templateId: saved.templateId || LIFT_TEMPLATES[0].id,
        days:       saved.days || 3,
        weeks:      saved.weeks || 8,
        equipment:  new Set(saved.equipment || ['barbell', 'rack', 'bench', 'dumbbells']),
        dows:       saved.dows || [],
      };

      const form = el('div');
      app.appendChild(form);

      // Template picker card
      const tmplCard = el('div', { class: 'card' });
      tmplCard.appendChild(el('h2', {}, 'PICK YOUR TEMPLATE'));
      LIFT_TEMPLATES.forEach(t => {
        const selected = state.templateId === t.id;
        const row = el('div', {
          class: 'card',
          style: 'cursor: pointer; padding: 12px; margin: 0 0 8px;'
               + (selected ? ' border-color: var(--primary); background: rgba(36,80,196,0.06);' : ''),
          onclick: () => {
            state.templateId = t.id;
            state.days = t.daysPerWeek;
            renderLiftPlanner(document.querySelector('.app')); // simple re-render
          },
        }, [
          el('div', { style: 'font-weight: 700; font-size: 15px;' }, t.name),
          el('div', { class: 'muted', style: 'font-size: 12px; margin-top: 4px; line-height: 1.4;' }, t.description),
          el('div', { class: 'muted', style: 'font-size: 11px; margin-top: 6px; letter-spacing: 0.06em; text-transform: uppercase;' },
            `${t.daysPerWeek} days / week · ${t.experience}`),
        ]);
        tmplCard.appendChild(row);
      });
      form.appendChild(tmplCard);

      // Days of week
      const dowCard = el('div', { class: 'card' });
      dowCard.appendChild(el('h2', {}, 'WHICH DAYS?'));
      dowCard.appendChild(el('div', { class: 'muted', style: 'font-size: 11px; margin-top: -8px; margin-bottom: 10px;' },
        'Optional — pick your training days. Skip and we\'ll spread them evenly.'));
      const dowRow = el('div', { class: 'plan-dow-row' });
      ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach((d, i) => {
        const on = state.dows.includes(i);
        const b = el('button', {
          type: 'button',
          class: 'plan-dow-btn' + (on ? ' sel' : ''),
          onclick: () => {
            const idx = state.dows.indexOf(i);
            if (idx > -1) state.dows.splice(idx, 1);
            else state.dows.push(i);
            b.classList.toggle('sel');
          },
        }, d);
        dowRow.appendChild(b);
      });
      dowCard.appendChild(dowRow);
      form.appendChild(dowCard);

      // Equipment checklist
      const eqCard = el('div', { class: 'card' });
      eqCard.appendChild(el('h2', {}, 'YOUR EQUIPMENT'));
      eqCard.appendChild(el('div', { class: 'muted', style: 'font-size: 11px; margin-top: -8px; margin-bottom: 10px;' },
        'Check what you have. Exercises get swapped based on your picks.'));
      LIFT_EQUIPMENT.forEach(e => {
        const on = state.equipment.has(e.id) || e.alwaysOn;
        const row = el('label', {
          style: 'display: flex; align-items: center; gap: 10px; padding: 8px 0; cursor: pointer; border-bottom: 1px solid var(--border);',
        }, [
          el('input', {
            type: 'checkbox',
            ...(on ? { checked: 'checked' } : {}),
            ...(e.alwaysOn ? { disabled: 'disabled' } : {}),
            onchange: (ev) => {
              if (ev.target.checked) state.equipment.add(e.id);
              else state.equipment.delete(e.id);
            },
          }),
          el('div', { style: 'font-size: 14px;' }, e.label),
        ]);
        eqCard.appendChild(row);
      });
      form.appendChild(eqCard);

      // Duration slider
      const durCard = el('div', { class: 'card' });
      durCard.appendChild(el('div', { class: 'plan-slider-hdr' }, [
        el('label', {}, 'Program duration'),
        el('div', { class: 'plan-slider-val', id: 'lpWksVal' }, [
          String(state.weeks) + ' ',
          el('span', {}, 'wks'),
        ]),
      ]));
      const wksInput = el('input', {
        type: 'range', class: 'plan-range', id: 'lpWks',
        min: '4', max: '16', value: String(state.weeks),
        oninput: (e) => {
          state.weeks = Number(e.target.value);
          document.getElementById('lpWksVal').innerHTML = `${state.weeks} <span>wks</span>`;
        },
      });
      durCard.appendChild(wksInput);
      durCard.appendChild(el('div', { class: 'plan-slider-marks' }, [
        el('span', {}, '4'), el('span', {}, '8'), el('span', {}, '12'), el('span', {}, '16'),
      ]));
      form.appendChild(durCard);

      // Generate button
      const genBtn = el('button', {
        style: 'margin-top: 8px; width: 100%;',
        onclick: () => {
          const cleanState = {
            templateId: state.templateId,
            days:       state.days,
            weeks:      state.weeks,
            equipment:  [...state.equipment],
            dows:       state.dows.slice(),
          };
          try { localStorage.setItem('liftPlanState_v1', JSON.stringify(cleanState)); } catch(e) {}
          renderLiftPlanOutput_(app, cleanState);
        },
      }, '▶  Generate My Plan');
      app.appendChild(genBtn);

      const outContainer = el('div', { id: 'lpOutput' });
      app.appendChild(outContainer);
    }

    function renderLiftPlanOutput_(app, state) {
      const gen = generateLiftPlan_(state);
      const out = document.getElementById('lpOutput') || app;
      out.innerHTML = '';
      const template = gen.template;

      out.appendChild(el('div', { class: 'card', style: 'margin-top: 16px;' }, [
        el('div', { style: 'font-size: 20px; font-weight: 800; letter-spacing: -0.02em;' }, template.name),
        el('div', { class: 'muted', style: 'font-size: 13px; margin-top: 4px;' },
          `${state.weeks} weeks · ${template.daysPerWeek} sessions / week`),
      ]));

      // Session cards
      gen.sessionsBuilt.forEach((sess, i) => {
        const card = el('div', { class: 'card' }, [
          el('div', { style: 'font-size: 14px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px;' },
            sess.name),
        ]);
        sess.exercises.forEach(ex => {
          card.appendChild(el('div', {
            style: 'display: flex; justify-content: space-between; padding: 8px 0; border-top: 1px solid var(--border); font-size: 13px;',
          }, [
            el('div', {}, [
              el('div', { style: 'font-weight: 600;' }, ex.name),
              el('div', { class: 'muted', style: 'font-size: 11px; margin-top: 2px;' }, ex.muscle || ''),
            ]),
            el('div', { style: 'font-weight: 600; white-space: nowrap; align-self: center;' },
              `${ex.sets} × ${ex.reps}`),
          ]));
        });
        out.appendChild(card);
      });

      out.appendChild(el('div', { class: 'card', style: 'font-size: 12px; line-height: 1.5;' }, [
        el('strong', {}, 'Progression:'),
        el('span', {}, ' Linear. Week 1 baseline. Each following week add 5 lb or +1 rep on compounds; +1 rep on accessories. Every 4th week is a deload (drop weight ~15%, focus on form and recovery). Then repeat with a slightly heavier baseline.'),
      ]));

      // Save section
      out.appendChild(el('div', { class: 'card', style: 'margin-top: 8px;' }, [
        el('div', { style: 'font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px;' },
          'Save this plan'),
        el('div', { class: 'field' }, [
          el('label', { for: 'lpSaveName' }, 'Plan name'),
          el('input', { id: 'lpSaveName', type: 'text', placeholder: 'e.g. Push/Pull/Legs Q4 2026', value: template.name }),
        ]),
        el('div', { class: 'field' }, [
          el('label', { for: 'lpSaveDate' }, 'Start date'),
          el('input', { id: 'lpSaveDate', type: 'date', value: todayISO() }),
        ]),
        el('div', { style: 'display: flex; gap: 8px; margin-top: 12px;' }, [
          el('button', { style: 'flex: 1;', onclick: () => lpSaveActivate(state) }, 'Save & Activate'),
          el('button', {
            style: 'flex: 1; background: var(--surface-2); color: var(--text); border: 1px solid var(--border);',
            onclick: () => lpSaveLibrary(state),
          }, 'Save to Library'),
        ]),
      ]));

      out.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    async function lpSaveActivate(state) {
      const name = (document.getElementById('lpSaveName')?.value || '').trim();
      const start = (document.getElementById('lpSaveDate')?.value || '').trim() || todayISO();
      if (!name) return toast('Give the plan a name first', true);
      try {
        const conflicts = await conflictingActivesFor_('lift', null, 'training_plans');
        if (conflicts.length) {
          const names = conflicts.map(c => `"${c.name}"`).join(', ');
          const msg = `Activate "${name}"?\n\nThis will deactivate ${names} because ${conflicts.length === 1 ? 'it conflicts' : 'they conflict'} with a lift plan. You can reactivate ${conflicts.length === 1 ? 'it' : 'them'} anytime.`;
          if (!confirm(msg)) return;
        }
        const structure = convertLiftPlanToTrainingPlan_(state, name, start);
        await sbSaveTrainingPlan({ name, structure, activate: true, planType: 'lift' });
        toast(`"${name}" is now your active lift plan`);
        setTimeout(() => render('training-plan'), 700);
      } catch (e) {
        toast('Could not save: ' + (e.message || e), true);
      }
    }
    async function lpSaveLibrary(state) {
      const name = (document.getElementById('lpSaveName')?.value || '').trim();
      const start = (document.getElementById('lpSaveDate')?.value || '').trim() || todayISO();
      if (!name) return toast('Give the plan a name first', true);
      try {
        const structure = convertLiftPlanToTrainingPlan_(state, name, start);
        await sbSaveTrainingPlan({ name, structure, activate: false, planType: 'lift' });
        toast(`Saved "${name}" to your library`);
        setTimeout(() => render('programs'), 700);
      } catch (e) {
        toast('Could not save: ' + (e.message || e), true);
      }
    }

    // ========== end v33 Lifting Plan Generator ==========

    // -------- Nav --------
    document.querySelectorAll('nav.bottom button').forEach(b => {
      b.addEventListener('click', () => render(b.dataset.view));
    });

    // -------- Init --------
    window.addEventListener('online', flushQueue);
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});

    // Guard to prevent double-render when both onAuthStateChange and getSession fire at startup
    let _startupRenderDone = false;

    // Auth state listener — fires on sign-in and sign-out
    _sb.auth.onAuthStateChange((event, session) => {
      const wasLoggedIn = !!currentUser;
      const user = session?.user ?? null;

      // Allowlist check — sign out anyone not on the list
      if (event === 'SIGNED_IN' && user && !ALLOWED_EMAILS.includes(user.email)) {
        _sb.auth.signOut();
        toast('This app is invite-only. Contact Jeff to get access.', true);
        return;
      }

      currentUser = user;
      if (event === 'SIGNED_IN' && !wasLoggedIn) {
        _startupRenderDone = true;
        // If we landed here from a Strava OAuth redirect, finish that flow
        // BEFORE rendering so the Profile shows the connected state.
        handleStravaCallbackIfPresent_()
          .catch(() => {})
          .finally(async () => {
            const initial = await chooseInitialView_();
            render(initial);
            flushQueue();
            backgroundStravaSync_();
          });
      }
      if (event === 'SIGNED_OUT') {
        currentUser = null;             // <-- was missing; broke sign-out-then-in flow
        todayCache = null;
        programCache = null;
        _userProfileCache = null;
        _stravaAccess = null;
        _onboardingState = null;         // ensure fresh onboarding on next sign-in
        renderAuth($('#app'));
      }
    });

    // Check for existing session on load (handles returning users + magic link redirect)
    // Skip if onAuthStateChange already triggered a render (prevents double-render race condition)
    _sb.auth.getSession().then(async ({ data: { session } }) => {
      if (_startupRenderDone) return;
      currentUser = session?.user ?? null;
      if (!currentUser) { render('home'); return; }
      await handleStravaCallbackIfPresent_().catch(() => {});
      const initial = await chooseInitialView_();
      render(initial);
      flushQueue();
      backgroundStravaSync_();
    });

    // Post-signin routing: onboarding if not done, otherwise home (or whatever
    // view was in progress).
    async function chooseInitialView_() {
      try {
        const profile = await sbLoadUserProfile();
        if (needsOnboarding_(profile)) return 'onboarding';
      } catch (e) { /* fall through to home */ }
      return currentView || 'home';
    }

    // Best-effort: pull recent Strava runs in the background on app load.
    // Throttled to once per 30 minutes per session via localStorage so we
    // don't hammer the Strava API on every navigation.
    async function backgroundStravaSync_() {
      try {
        if (!stravaConfigured() || !currentUser) return;
        const conn = await sbStravaConnection().catch(() => null);
        if (!conn) return;
        const last = Number(localStorage.getItem('stravaSyncedAt_v1')) || 0;
        if (Date.now() - last < 30 * 60 * 1000) return;
        await sbStravaSync({ daysBack: 14 });
        localStorage.setItem('stravaSyncedAt_v1', String(Date.now()));
      } catch (e) {
        // Silent — the Profile tab has a manual Sync button if this fails.
      }
    }
  </script>
</body>
</html>
