<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#F4F7FF" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Loggbok" />
  <meta name="description" content="Your canonical training record. Multi-modal logging for runs, lifts, walks, rides, hikes, swims, and everything in between." />
  <meta property="og:title" content="Loggbok" />
  <meta property="og:description" content="Your canonical training record." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://loggbok.co" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <title>Loggbok</title>
  <style>
    /* Loggbok brand tokens — light theme. Palette + type from the brand
       style guide. Dark theme is preserved conceptually via a data-theme
       attribute hook we can flip later if we build a light/dark toggle. */
    :root {
      /* Canvas + surfaces */
      --bg: #F4F7FF;          /* soft blue-white page background */
      --surface: #FFFFFF;      /* card surface */
      --surface-2: #EEF1F9;    /* subtle raised / hover surface */
      --border: #E4E9F5;       /* card / input border */

      /* Ink */
      --text: #1A1A1A;         /* primary text */
      --muted: #7a7568;        /* warm gray — brand muted */
      --muted-cool: #9aa3ba;   /* cool blue-gray — used on blue surfaces */

      /* Brand */
      --primary: #2450C4;      /* deep blue — primary brand */
      --primary-dark: #1E3F9E;
      --primary-ink: #0d1d47;  /* deepest brand ink for hero areas */
      --accent: #F4622C;       /* warm orange — action accent */
      --accent-dark: #D93A2B;

      /* Semantic */
      --success: #8CC63F;
      --warn: #B08D57;
      --danger: #D93A2B;

      /* Shape */
      --radius: 12px;
      --radius-lg: 16px;
      --radius-pill: 22px;
      --shadow: 0 1px 3px rgba(15, 25, 60, 0.06), 0 2px 12px rgba(15, 25, 60, 0.05);
      --shadow-hover: 0 2px 6px rgba(15, 25, 60, 0.08), 0 4px 20px rgba(15, 25, 60, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: contain;
    }
    /* Bitter serif for headings — brand voice */
    h1, h2, h3, h4, .brand-heading, .auth-title {
      font-family: 'Bitter', Georgia, 'Times New Roman', serif;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    h1 { letter-spacing: -0.02em; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .app {
      flex: 1;
      max-width: 520px;
      margin: 0 auto;
      width: 100%;
      padding: 0 16px 88px 16px;
      padding-top: calc(env(safe-area-inset-top) + 12px);
    }
    header.top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 4px 0 16px 0;
    }
    header.top h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    header.top .date {
      color: var(--muted);
      font-size: 14px;
    }
    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    /* Section eyebrow (uppercase small label at top of a card). */
    .card h2 {
      font-family: 'Work Sans', -apple-system, sans-serif;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .big {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .row { display: flex; gap: 12px; align-items: center; }
    .spaced { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .col { display: flex; flex-direction: column; gap: 2px; }
    .muted { color: var(--muted); font-size: 13px; }
    .pill {
      display: inline-block;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 10px;
      background: var(--surface-2);
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    /* Muscle-group + intensity pills — soft tinted backgrounds with rich
       readable ink for light theme. */
    .pill.chest { background: #FCE7DE; color: #B04A1E; }
    .pill.back  { background: #E4EAFA; color: #1E3F9E; }
    .pill.bicep, .pill.tricep { background: #FCF0DA; color: #8A5A1E; }
    .pill.shoulder { background: #EFE4FA; color: #5B2E9E; }
    .pill.micro { background: #E4F5E4; color: #2E7A2E; }
    .pill.intensity { background: #FADCDC; color: #A83030; }
    .pill.core { background: #E4E9F5; color: #2450C4; }

    /* ---- RUN PLANNER TAB ---- */
    .plan-dist-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 4px; }
    .plan-dist-btn { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 6px; text-align: center; cursor: pointer; color: var(--text); font-family: inherit; transition: border-color 0.15s, background 0.15s; }
    .plan-dist-btn.sel { border-color: var(--accent); background: rgba(255,107,53,0.12); }
    /* Day-of-week picker for Run Planner (v32) — pick which days
       generated plan sessions should slot into. */
    .plan-dow-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 8px; }
    .plan-dow-btn { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 0; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; font-family: inherit; transition: border-color 0.15s, background 0.15s, color 0.15s; }
    .plan-dow-btn.sel { border-color: var(--primary); background: rgba(36,80,196,0.10); color: var(--primary); }
    /* Checkbox row used inside plan-slider-row (Run Planner options).
       Custom on/off state — native accent-color isn't reliably rendered
       on iOS Safari, so we draw the checkmark ourselves. Whole row
       highlights blue when checked, no highlight when off. */
    .plan-checkbox-row {
      display: flex; align-items: flex-start; gap: 12px; cursor: pointer;
      padding: 12px 14px; border: 2px solid var(--border);
      border-radius: 10px; background: var(--surface);
      transition: border-color 0.15s, background 0.15s;
    }
    .plan-checkbox-row:has(input:checked) {
      border-color: var(--primary);
      background: rgba(36, 80, 196, 0.06);
    }
    .plan-checkbox-row input[type="checkbox"] {
      -webkit-appearance: none; appearance: none;
      width: 22px; height: 22px; margin: 1px 0 0 0; flex-shrink: 0;
      border: 2px solid var(--border); border-radius: 5px;
      background: #FFFFFF; cursor: pointer; position: relative;
      transition: border-color 0.15s, background 0.15s;
      padding: 0;
    }
    .plan-checkbox-row input[type="checkbox"]:checked {
      background: var(--primary); border-color: var(--primary);
    }
    .plan-checkbox-row input[type="checkbox"]:checked::after {
      content: ''; position: absolute;
      left: 6px; top: 2px; width: 6px; height: 11px;
      border: solid #FFFFFF; border-width: 0 2.5px 2.5px 0;
      transform: rotate(45deg);
    }
    .plan-checkbox-body { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .plan-checkbox-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .plan-checkbox-sub { font-size: 12px; color: var(--muted); line-height: 1.4; }
    .plan-dist-icon { font-size: 18px; margin-bottom: 3px; }
    .plan-dist-name { font-size: 12px; font-weight: 700; display: block; }
    .plan-dist-sub { font-size: 10px; color: var(--muted); display: block; margin-top: 1px; }
    .plan-level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .plan-level-btn { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 6px; text-align: center; cursor: pointer; color: var(--text); font-family: inherit; transition: border-color 0.15s, background 0.15s; }
    .plan-level-btn.sel { border-color: var(--accent); background: rgba(255,107,53,0.12); }
    .plan-level-icon { font-size: 20px; margin-bottom: 4px; }
    .plan-level-name { font-size: 12px; font-weight: 700; display: block; }
    .plan-level-desc { font-size: 10px; color: var(--muted); display: block; margin-top: 2px; line-height: 1.3; }
    .plan-slider-row { margin-bottom: 16px; }
    .plan-slider-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .plan-slider-hdr label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .plan-slider-val { font-size: 22px; font-weight: 700; color: var(--accent); }
    .plan-slider-val span { font-size: 12px; color: var(--muted); font-weight: 500; }
    input.plan-range { -webkit-appearance: none; width: 100%; height: 4px; background: var(--border); border-radius: 2px; outline: none; cursor: pointer; border: none; padding: 0; }
    input.plan-range::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--accent); box-shadow: 0 2px 8px rgba(255,107,53,0.4); cursor: pointer; }
    .plan-slider-marks { display: flex; justify-content: space-between; margin-top: 4px; }
    .plan-slider-marks span { font-size: 10px; color: var(--muted); }
    .plan-optional { border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; background: var(--surface-2); }
    .plan-optional.active { border-color: var(--accent); }
    .plan-opt-text strong { font-size: 13px; color: var(--text); display: block; }
    .plan-opt-text small { font-size: 11px; color: var(--muted); }
    .plan-opt-arrow { margin-left: auto; color: var(--muted); font-size: 16px; transition: transform 0.2s; }
    .plan-optional.active .plan-opt-arrow { transform: rotate(90deg); }
    .plan-race-fields { display: none; gap: 10px; margin-bottom: 12px; }
    .plan-race-fields.vis { display: flex; }
    .plan-race-col { flex: 1; }
    .plan-race-col label { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 6px; display: block; }
    .plan-err { background: rgba(255,69,58,0.1); border: 1px solid rgba(255,69,58,0.3); border-radius: 10px; padding: 12px; font-size: 13px; color: #ff453a; margin-top: 10px; display: none; }
    .plan-err.vis { display: block; }
    .plan-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
    .plan-stat { background: var(--surface-2); border-radius: var(--radius); padding: 12px 8px; text-align: center; border: 1px solid var(--border); }
    .plan-stat .sv { font-size: 20px; font-weight: 700; color: var(--accent); }
    .plan-stat .sl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
    .effort-pill { display: flex; background: var(--surface-2); border-radius: 20px; padding: 3px; gap: 2px; border: 1px solid var(--border); }
    .effort-pill button { flex: 1; background: transparent; color: var(--muted); font-size: 12px; font-weight: 700; padding: 7px 10px; border-radius: 17px; width: auto; letter-spacing: 0; text-transform: none; }
    .effort-pill button.active { background: var(--accent); color: #fff; }
    .pace-guide-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; margin-bottom: 6px; }
    .pace-gdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .pace-glabel { flex: 1; }
    .pace-glabel strong { font-size: 13px; font-weight: 600; color: var(--text); display: block; }
    .pace-glabel small { font-size: 11px; color: var(--muted); }
    .pace-gval { font-size: 14px; font-weight: 700; color: var(--text); }
    .plan-expand-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .plan-expand-btn { font-size: 12px; font-weight: 600; color: var(--muted); background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; cursor: pointer; font-family: inherit; width: auto; }
    .plan-week-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 10px; overflow: hidden; }
    .plan-week-hdr { display: flex; align-items: center; padding: 13px 14px; cursor: pointer; gap: 10px; }
    .plan-wk-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; padding: 3px 9px; border-radius: 20px; flex-shrink: 0; text-transform: uppercase; }
    .plan-wk-badge.build { background: rgba(255,107,53,0.15); color: var(--accent); }
    .plan-wk-badge.deload { background: rgba(138,138,138,0.15); color: var(--muted); }
    .plan-wk-badge.taper { background: rgba(191,90,242,0.15); color: #bf5af2; }
    .plan-wk-badge.race-wk { background: rgba(255,69,58,0.15); color: #ff453a; }
    .plan-week-title { flex: 1; font-size: 14px; font-weight: 600; color: var(--text); min-width: 0; }
    .plan-week-meta { text-align: right; flex-shrink: 0; }
    .plan-week-mi { font-size: 15px; font-weight: 700; color: var(--text); }
    .plan-week-ct { font-size: 11px; color: var(--muted); }
    .plan-chevron { color: var(--muted); font-size: 12px; transition: transform 0.2s; flex-shrink: 0; }
    .plan-week-hdr.open .plan-chevron { transform: rotate(180deg); }
    .plan-workouts { display: none; padding: 0 12px 12px; gap: 8px; flex-direction: column; }
    .plan-workouts.open { display: flex; }
    .plan-wo-row { display: flex; gap: 10px; align-items: flex-start; padding: 11px; border-radius: var(--radius); border: 1px solid; }
    .plan-wo-row.easy { background: rgba(50,215,75,0.06); border-color: rgba(50,215,75,0.18); }
    .plan-wo-row.interval { background: rgba(255,69,58,0.06); border-color: rgba(255,69,58,0.18); }
    .plan-wo-row.tempo { background: rgba(255,159,10,0.06); border-color: rgba(255,159,10,0.18); }
    .plan-wo-row.longrun { background: rgba(191,90,242,0.06); border-color: rgba(191,90,242,0.18); }
    .plan-wo-row.timetrial { background: rgba(255,55,95,0.06); border-color: rgba(255,55,95,0.18); }
    .plan-wo-row.race { background: rgba(255,107,53,0.08); border-color: rgba(255,107,53,0.25); }
    .plan-wo-bar { width: 3px; border-radius: 2px; align-self: stretch; min-height: 36px; flex-shrink: 0; }
    .easy .plan-wo-bar { background: #32d74b; } .interval .plan-wo-bar { background: #ff453a; }
    .tempo .plan-wo-bar { background: #ff9f0a; } .longrun .plan-wo-bar { background: #bf5af2; }
    .timetrial .plan-wo-bar { background: #ff375f; } .race .plan-wo-bar { background: var(--accent); }
    .plan-wo-info { flex: 1; min-width: 0; }
    .plan-wo-type { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 2px; }
    .easy .plan-wo-type { color: #32d74b; } .interval .plan-wo-type { color: #ff453a; }
    .tempo .plan-wo-type { color: #ff9f0a; } .longrun .plan-wo-type { color: #bf5af2; }
    .timetrial .plan-wo-type { color: #ff375f; } .race .plan-wo-type { color: var(--accent); }
    .plan-wo-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .plan-wo-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .plan-wo-effort { font-size: 11px; color: var(--muted); margin-top: 4px; font-style: italic; }
    .plan-wo-dist { text-align: right; flex-shrink: 0; }
    .plan-wo-dist .mi { font-size: 16px; font-weight: 700; color: var(--text); }
    .plan-wo-dist .unit { font-size: 11px; color: var(--muted); }
    .plan-tip { background: rgba(50,215,75,0.05); border: 1px solid rgba(50,215,75,0.12); border-radius: var(--radius); padding: 14px; font-size: 12px; color: var(--muted); line-height: 1.6; margin-top: 10px; }
    .plan-tip strong { color: var(--text); }

    /* ---- Auth screen ---- */
    .auth-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:calc(100vh - 80px); padding:24px; gap:0; }
    .auth-logo { font-size:52px; margin-bottom:10px; }
    .auth-title { font-size:44px; font-weight:700; margin-bottom:6px; letter-spacing:-0.02em; color:var(--primary-ink); }
    .auth-sub { color:var(--muted); font-size:15px; text-align:center; margin-bottom:28px; font-style:italic; }
    .auth-card { width:100%; max-width:360px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:24px; display:flex; flex-direction:column; gap:12px; box-shadow:var(--shadow); }
    .auth-card input[type="email"] { width:100%; background:#FFF; border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:16px; padding:14px 16px; transition:border-color .15s; font-family:'Work Sans',sans-serif; }
    .auth-card input[type="email"]::placeholder { color:var(--muted); }
    .auth-card input[type="email"]:focus { outline:none; border-color:var(--primary); }
    .auth-confirm { text-align:center; padding:8px 0; }
    .auth-confirm .auth-check { font-size:38px; margin-bottom:10px; }
    .auth-confirm p { color:var(--muted); font-size:14px; line-height:1.6; }
    .auth-confirm strong { color:var(--text); }

    button, .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: inherit;
      font-size: 17px;
      font-weight: 600;
      padding: 14px 16px;
      border-radius: var(--radius);
      width: 100%;
      cursor: pointer;
      transition: transform 0.08s ease;
      -webkit-appearance: none;
      appearance: none;
    }
    button:active, .btn:active { transform: scale(0.97); }
    button.secondary, .btn.secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    button.ghost { background: transparent; color: var(--accent); }
    button.danger { background: var(--danger); }

    input, select, textarea {
      background: #FFFFFF;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-family: 'Work Sans', -apple-system, sans-serif;
      font-size: 16px;
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
    }
    input[inputmode="decimal"], input[inputmode="numeric"] { text-align: center; }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(36, 80, 196, 0.12);
    }
    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .field { margin-bottom: 12px; }

    nav.bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(20, 20, 20, 0.92);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-top: 1px solid var(--border);
      padding: 10px 0 calc(env(safe-area-inset-bottom) + 8px);
      display: flex;
      z-index: 100;
    }
    nav.bottom button {
      flex: 1;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 6px 4px;
      border-radius: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    nav.bottom button.active { color: var(--accent); }
    nav.bottom button svg { width: 22px; height: 22px; }

    .exercise {
      background: var(--surface-2);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
    }
    .exercise h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.25;
    }
    .exercise .meta {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .exercise .notes {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      font-style: italic;
      line-height: 1.4;
    }
    .set-grid {
      display: grid;
      grid-template-columns: 1.2fr repeat(4, 1fr);
      gap: 6px;
    }
    .set-grid input { padding: 8px 4px; font-size: 15px; }
    .prev {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      text-align: right;
    }
    .prev b { color: var(--text); }

    .set-grid-5 {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }
    .set-grid-5 input { padding: 10px 4px; font-size: 15px; }

    /* Block/Week/Day selector */
    .selector-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .selector-summary .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }
    .selector-summary .value { font-size: 18px; font-weight: 600; }
    .selector-summary .edit {
      background: var(--surface-2);
      color: var(--accent);
      font-size: 14px;
      padding: 8px 14px;
      width: auto;
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .selector-body { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 14px; }
    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .pill-row .pill-btn {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 9px 14px;
      border-radius: 10px;
      font-size: 14px;
      width: auto;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: none;
    }
    .pill-row .pill-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .pill-row-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .toast {
      position: fixed;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--success);
      color: #000;
      padding: 10px 18px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 200;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--danger); color: #fff; }

    .skeleton {
      background: linear-gradient(90deg, var(--surface) 0%, var(--surface-2) 50%, var(--surface) 100%);
      background-size: 200% 100%;
      animation: sk 1.4s infinite;
      border-radius: 10px;
      height: 80px;
    }
    @keyframes sk { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .hidden { display: none !important; }

    /* Greyed/disabled set input */
    input.inp-disabled {
      background: #0d0d0d;
      color: #444;
      border: 1px dashed #2a2a2a;
      pointer-events: none;
      background-image:
        linear-gradient(135deg, transparent 46%, #2a2a2a 47%, #2a2a2a 53%, transparent 54%);
    }

    /* Home action grid */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .action-tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      width: 100%;
    }
    .action-tile svg { width: 28px; height: 28px; color: var(--accent); }
    .action-tile.today { border-color: var(--accent); }
    .action-tile.today::after {
      content: 'TODAY';
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--accent);
      font-weight: 700;
    }

    /* Lift session detail */
    .session-ex {
      padding: 14px 16px;
    }
    .session-ex.progression-tap {
      cursor: pointer;
      transition: border-color 120ms ease;
    }
    .session-ex.progression-tap:active {
      border-color: var(--accent);
    }

    /* History list */
    .history-row {
      padding: 12px 16px;
      transition: border-color 120ms ease;
    }
    .history-row.clickable {
      cursor: pointer;
    }
    .history-row.clickable:active { border-color: var(--accent); }
    .history-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .history-date {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .history-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 2px 6px;
      border-radius: 4px;
      margin-right: 6px;
      vertical-align: middle;
      background: var(--surface-2);
      color: var(--muted);
    }
    /* History type tags — light-theme tinted backgrounds keyed off the
       calendar-dot colors. */
    .history-tag.tag-lift     { background: #FCE7DE; color: #B04A1E; }
    .history-tag.tag-run      { background: #E4EAFA; color: #1E3F9E; }
    .history-tag.tag-walk     { background: #E4F5E4; color: #2E7A2E; }
    .history-tag.tag-pullups  { background: #F5EDD8; color: #8A6E1E; }
    .history-tag.tag-activity { background: #EFE4FA; color: #5B2E9E; }
    .session-ex-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .session-ex-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .session-ex-stats {
      display: grid;
      grid-template-columns: 1fr 1.4fr 0.8fr;
      gap: 12px;
    }
    .session-stat-val {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-top: 4px;
      font-variant-numeric: tabular-nums;
    }

    /* Plan-based lift logger */
    .plan-log-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .plan-log-row:last-of-type { border-bottom: none; }
    .plan-log-label {
      flex: 1;
      min-width: 0;
    }
    .plan-log-inputs {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .plan-log-field {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .plan-log-field label {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }
    .plan-log-field input {
      text-align: center;
      padding: 6px 4px;
      font-size: 15px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    /* Training plan viewer */
    .plan-exercise {
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .plan-exercise:last-child { border-bottom: none; }
    .plan-exercise-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }
    .plan-sets {
      padding-left: 4px;
    }

    /* Widget editor rows */
    .widget-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .widget-row:last-child { border-bottom: none; }
    .widget-actions {
      display: flex;
      gap: 4px;
    }
    .widget-icon-btn {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      width: 32px;
      height: 32px;
      padding: 0;
      border-radius: 6px;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
    }
    .widget-icon-btn:disabled {
      color: #444;
      cursor: default;
    }
    .widget-icon-btn.add {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .widget-icon-btn.danger {
      color: #d97a7a;
    }

    /* Feedback rating stars */
    .feedback-rating {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .feedback-star {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 44px;
      height: 44px;
      border-radius: 8px;
      font-size: 22px;
      padding: 0;
      cursor: pointer;
      transition: color 120ms ease, border-color 120ms ease;
    }
    .feedback-star.on {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Onboarding */
    body.no-nav nav.bottom { display: none; }
    body.no-nav #app { padding-bottom: 24px; }

    .onboard-progress {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 20px 0 32px;
    }
    .onboard-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: background 200ms ease;
    }
    .onboard-dot.on { background: var(--accent); }

    .onboard-body {
      max-width: 480px;
      margin: 0 auto;
      text-align: center;
      padding: 0 12px;
    }
    .onboard-emoji {
      font-size: 56px;
      margin-bottom: 20px;
    }
    .onboard-title {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 12px;
      color: var(--text);
    }
    .onboard-sub {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.5;
      margin: 0;
    }

    .modality-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 24px 0;
    }
    .modality-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 12px;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: border-color 150ms ease, background 150ms ease;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .modality-card.on {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, var(--surface));
    }
    .modality-icon {
      font-size: 24px;
      line-height: 1;
      margin-bottom: 4px;
    }
    .modality-name {
      font-weight: 700;
      font-size: 15px;
    }
    .modality-desc {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.35;
    }

    .onboard-form {
      max-width: 400px;
      margin: 24px auto;
    }
    .onboard-field {
      margin-bottom: 16px;
      text-align: left;
    }
    .onboard-field label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .onboard-field input {
      width: 100%;
      padding: 12px 14px;
      font-size: 20px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-variant-numeric: tabular-nums;
    }

    .onboard-actions {
      max-width: 480px;
      margin: 32px auto 0;
      padding: 0 12px;
      display: flex;
      gap: 10px;
    }
    .onboard-primary {
      flex: 2;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 600;
      border-radius: var(--radius-md);
      cursor: pointer;
    }
    .onboard-primary:disabled {
      background: var(--surface-2);
      color: var(--muted);
    }
    .onboard-secondary {
      flex: 1;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 500;
      border-radius: var(--radius-md);
      cursor: pointer;
    }

    /* Programs tab */
    .section-h {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 18px 0 8px 4px;
    }
    .section-h:first-child { margin-top: 6px; }
    .program-card {
      cursor: pointer;
      transition: border-color 120ms ease;
    }
    .program-card:active { border-color: var(--accent); }
    .program-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .program-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .program-badge {
      font-size: 10px;
      letter-spacing: 0.1em;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 6px;
      white-space: nowrap;
    }
    .program-badge.active {
      background: var(--accent);
      color: #fff;
    }
    .program-badge.archived {
      background: var(--surface-2);
      color: var(--muted);
    }
    .week-card { padding: 0 !important; overflow: hidden; }
    .week-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 14px 16px;
      background: transparent;
      color: var(--text);
      border: none;
      text-align: left;
      cursor: pointer;
    }
    .week-num {
      font-size: 14px;
      font-weight: 600;
    }
    .week-body {
      display: none;
      padding: 0 16px 14px;
      border-top: 1px solid var(--border);
    }
    .week-card.open .week-body { display: block; }
    .day-block { margin-top: 14px; }
    .day-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .ex-row {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .ex-row:last-child { border-bottom: none; }
    .ex-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    /* Weekly goals card */
    .goal-row {
      margin-top: 14px;
    }
    .goal-row:first-of-type { margin-top: 10px; }
    .goal-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }
    .goal-label {
      font-size: 14px;
      color: var(--text);
      font-weight: 600;
    }
    .goal-count {
      font-size: 13px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .goal-count.hit {
      color: var(--accent);
      font-weight: 700;
    }
    .goal-target {
      cursor: pointer;
      border-bottom: 1px dashed var(--muted);
      padding-bottom: 1px;
    }
    .goal-edit-input {
      width: 44px;
      padding: 1px 4px;
      font-size: 13px;
      font-weight: 600;
      background: var(--surface-2);
      border: 1px solid var(--accent);
      border-radius: 4px;
      color: var(--text);
      text-align: center;
      font-variant-numeric: tabular-nums;
      -moz-appearance: textfield;
    }
    .goal-edit-input::-webkit-outer-spin-button,
    .goal-edit-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .goal-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .goal-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 240ms ease;
    }
    .goal-fill.hit {
      background: linear-gradient(90deg, var(--accent), #7affb7);
    }

    /* Year filter segmented */
    .seg {
      display: flex;
      gap: 6px;
      background: var(--surface);
      padding: 4px;
      border-radius: 12px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .seg button {
      background: transparent;
      color: var(--muted);
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      width: auto;
      flex-shrink: 0;
      letter-spacing: 0;
      text-transform: none;
    }
    .seg button.active {
      background: var(--accent);
      color: #fff;
    }

    /* Calendar */
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .cal-header h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); text-transform: none; margin: 0; }
    .cal-nav-btn {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      width: 36px; height: 36px;
      padding: 0;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px;
      border-radius: var(--radius-lg);
    }
    .cal-dow {
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      padding: 4px 0;
    }
    .cal-day {
      aspect-ratio: 1 / 1;
      background: var(--surface-2);
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 4px;
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: stretch;
      cursor: pointer;
      width: 100%;
    }
    .cal-day.empty { background: transparent; pointer-events: none; }
    .cal-day.today { border-color: var(--primary); color: var(--primary); font-weight: 700; }
    .cal-day.has-activity { background: var(--surface-2); }
    .cal-day.selected { border-color: var(--accent); background: #FDECE3; }
    .cal-num { text-align: left; line-height: 1; }
    .cal-dots {
      display: flex;
      gap: 3px;
      justify-content: flex-end;
    }
    /* Dot colors are CSS variables so users can customize them at runtime
       via Profile → Calendar colors. Defaults set here to work on the
       light Loggbok canvas; overrides applied on :root by setDotColors_()
       from localStorage. */
    :root {
      --dot-lift:     #F4622C;   /* brand orange */
      --dot-run:      #2450C4;   /* brand blue */
      --dot-walk:     #4A8B2E;   /* rich green — readable on light bg */
      --dot-pull:     #B08D57;   /* brand tan */
      --dot-activity: #7B3FD1;   /* rich purple */
    }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; }
    .cal-dot.lift     { background: var(--dot-lift); }
    .cal-dot.run      { background: var(--dot-run); }
    .cal-dot.walk     { background: var(--dot-walk); }
    .cal-dot.pull     { background: var(--dot-pull); }
    .cal-dot.activity { background: var(--dot-activity); }

    .cal-detail {
      margin-top: 12px;
    }

    /* Profile - PR badges */
    .pr-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .pr-badge {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
    }
    .pr-badge .b-name { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 700; margin-bottom: 6px; }
    .pr-badge .b-pace { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .pr-badge .b-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* Profile - Shoes */
    .shoe-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 8px;
    }
    .shoe-name { font-weight: 600; font-size: 15px; }
    .shoe-brand { font-size: 12px; color: var(--muted); }
    .shoe-miles-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 6px; }
    .shoe-miles { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .shoe-miles.warn  { color: var(--warn); }
    .shoe-miles.danger { color: var(--danger); }
    .shoe-bar {
      height: 6px; background: var(--surface-2); border-radius: 3px; overflow: hidden;
      margin-top: 8px;
    }
    .shoe-bar-fill { height: 100%; background: var(--success); border-radius: 3px; }
    .shoe-bar-fill.warn  { background: var(--warn); }
    .shoe-bar-fill.danger { background: var(--danger); }

    /* Workout picker modal */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.18s;
      z-index: 150;
    }
    .modal-backdrop.show { opacity: 1; pointer-events: auto; }
    .modal-sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top-left-radius: 22px;
      border-top-right-radius: 22px;
      padding: 14px 16px calc(env(safe-area-inset-bottom) + 24px);
      transform: translateY(100%);
      transition: transform 0.22s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 160;
      border-top: 1px solid var(--border);
    }
    .modal-sheet.show { transform: translateY(0); }
    .modal-grabber {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 14px;
    }
    .modal-title {
      font-size: 14px; font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
      text-align: center;
    }
    .picker-options { display: flex; flex-direction: column; gap: 10px; }
    .picker-option {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 14px 16px;
      text-align: left;
      width: 100%;
      color: var(--text);
      font-size: 16px;
      border-radius: var(--radius);
    }
    .picker-option svg { width: 28px; height: 28px; color: var(--accent); flex-shrink: 0; }
    .picker-label { font-size: 17px; font-weight: 600; }
    .picker-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .picker-option > div { flex: 1; }

    /* Analytics monthly bar chart */
    .bar-row {
      display: grid;
      grid-template-columns: 36px 1fr 64px;
      gap: 10px;
      align-items: center;
      padding: 6px 0;
      font-size: 13px;
    }
    .bar-track {
      background: var(--surface-2);
      border-radius: 6px;
      height: 14px;
      overflow: hidden;
      position: relative;
    }
    .bar-fill {
      background: var(--accent);
      height: 100%;
      border-radius: 6px;
    }
    .bar-row .label { color: var(--muted); font-weight: 600; }
    .bar-row .val { text-align: right; color: var(--text); font-variant-numeric: tabular-nums; }
    .bar-row.zero .bar-fill { background: var(--border); }
    .bar-row.zero .val { color: var(--muted); }

    /* Analytics best-efforts table */
    .pr-row {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr 0.9fr;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      align-items: center;
    }
    .pr-row:last-child { border-bottom: none; }
    .pr-row .bucket { font-weight: 600; }
    .pr-row .time { font-variant-numeric: tabular-nums; }
    .pr-row .pace { color: var(--accent); font-weight: 600; font-variant-numeric: tabular-nums; }
    .pr-row .date { color: var(--muted); font-size: 12px; text-align: right; }
    .pr-header {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr 0.9fr;
      gap: 8px;
      padding-bottom: 8px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    .pr-header .date { text-align: right; }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .stat-grid .card { margin: 0; }
    .stat-grid .big { font-size: 26px; }

    /* Run time MM:SS split input */
    .time-row {
      display: grid;
      grid-template-columns: 1fr 16px 1fr;
      gap: 6px;
      align-items: center;
    }
    .time-row input {
      text-align: center;
      font-size: 22px;
      padding: 12px 8px;
      font-variant-numeric: tabular-nums;
    }
    .time-row .sep {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: var(--muted);
      padding-bottom: 2px;
    }
    .time-sub {
      display: grid;
      grid-template-columns: 1fr 16px 1fr;
      gap: 6px;
      margin-top: 4px;
    }
    .time-sub div {
      font-size: 10px;
      text-align: center;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="app" id="app"></div>

  <nav class="bottom" id="nav">
    <button data-view="home" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10.5L12 3l9 7.5v10a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 20.5v-10z"/><path d="M9 21.5V13h6v8.5"/></svg>
      Home
    </button>
    <button data-view="calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 11h18"/></svg>
      Calendar
    </button>
    <button data-view="analytics">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V5M4 19h16M8 16V9M12 16v-4M16 16V7M20 19V5"/></svg>
      Analytics
    </button>
    <button data-view="programs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v4H4zM4 12h16v4H4zM4 20h10v0"/><circle cx="18" cy="20" r="2"/></svg>
      Programs
    </button>
    <button data-view="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
      Profile
    </button>
  </nav>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script>
    // -------- localStorage keys --------
    const CONFIG_KEY = 'workoutAppConfig_v1';
    const QUEUE_KEY  = 'workoutQueue_v1';
    const CACHE_KEY  = 'workoutCache_v1';
    const PROG_KEY   = 'workoutProgram_v1';

    function getConfig() {
      try { return JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}'); } catch (e) { return {}; }
    }
    function setConfig(c) { localStorage.setItem(CONFIG_KEY, JSON.stringify(c)); }

    // -------- API --------
    async function api(action, params = {}, body = null) {
      const cfg = getConfig();
      if (!cfg.scriptUrl || !cfg.token) throw new Error('not configured');
      const url = new URL(cfg.scriptUrl);
      url.searchParams.set('action', action);
      url.searchParams.set('token', cfg.token);
      Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));

      const opts = body
        ? { method: 'POST', body: JSON.stringify({ ...body, token: cfg.token, action }) }
        : { method: 'GET' };
      const res = await fetch(url.toString(), opts);
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'api error');
      return data.data;
    }

    // -------- Offline queue --------
    function queueRead() { try { return JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]'); } catch (e) { return []; } }
    function queueWrite(q) { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); }
    function queuePush(item) { const q = queueRead(); q.push(item); queueWrite(q); }
    async function flushQueue() {
      const q = queueRead();
      if (!q.length) return;
      const remaining = [];
      for (const item of q) {
        try { await api(item.action, {}, item.body); }
        catch (e) { remaining.push(item); }
      }
      queueWrite(remaining);
      if (remaining.length < q.length) {
        toast(`Synced ${q.length - remaining.length} offline entr${q.length - remaining.length === 1 ? 'y' : 'ies'}`);
      }
    }

    // -------- Supabase data helpers --------

    function weekBounds() {
      const now = new Date();
      const day = now.getDay(); // 0=Sun
      const monday = new Date(now);
      monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
      const sunday = new Date(monday);
      sunday.setDate(monday.getDate() + 6);
      const fmt = d => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      return { start: fmt(monday), end: fmt(sunday) };
    }

    function paceToSecs(p) {
      if (!p) return null;
      const parts = p.split(':').map(Number);
      if (parts.length !== 2 || parts.some(isNaN)) return null;
      return parts[0] * 60 + parts[1];
    }

    function secsToMMSS(s) {
      if (!s || s <= 0) return '—';
      const m = Math.floor(s / 60), sec = Math.round(s % 60);
      return `${m}:${String(sec).padStart(2, '0')}`;
    }

    async function sbStats() {
      const uid = currentUser.id;
      const now = new Date();
      const { start: weekStart, end: weekEnd } = weekBounds();
      const yearStart = `${now.getFullYear()}-01-01`;
      const monthStart = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
      const [
        weekRunsR, ytdRunsR, monthRunsR,
        weekLiftsR, weekPuR, weekWalksR, weekActivitiesR,
        ytdWalksR, ytdActivitiesR,
        profileR,
      ] = await Promise.all([
        _sb.from('runs').select('distance').eq('user_id', uid).gte('date', weekStart).lte('date', weekEnd),
        _sb.from('runs').select('distance').eq('user_id', uid).gte('date', yearStart),
        _sb.from('runs').select('distance').eq('user_id', uid).gte('date', monthStart),
        _sb.from('lift_sessions').select('id').eq('user_id', uid).gte('date', weekStart).lte('date', weekEnd),
        _sb.from('pullup_sessions').select('total_reps').eq('user_id', uid).gte('date', weekStart).lte('date', weekEnd),
        _sb.from('walks').select('id,distance').eq('user_id', uid).gte('date', weekStart).lte('date', weekEnd),
        _sb.from('activities').select('id,activity_type,distance').eq('user_id', uid).gte('date', weekStart).lte('date', weekEnd),
        _sb.from('walks').select('distance').eq('user_id', uid).gte('date', yearStart),
        _sb.from('activities').select('activity_type,distance').eq('user_id', uid).gte('date', yearStart),
        _sb.from('user_profiles').select('weekly_run_count_goal,weekly_lift_count_goal,weekly_goals').eq('id', uid).maybeSingle(),
      ]);

      const sumDist = arr => (arr || []).reduce((s, r) => s + Number(r.distance || 0), 0);
      const profile = profileR.data || {};

      // Legacy → JSONB fallback: if weekly_goals is empty but the old columns
      // have values, treat those as the source of truth.
      const jsonGoals = (profile.weekly_goals && typeof profile.weekly_goals === 'object') ? profile.weekly_goals : {};
      const goals = { ...jsonGoals };
      if (goals.running == null && profile.weekly_run_count_goal)  goals.running  = profile.weekly_run_count_goal;
      if (goals.strength == null && profile.weekly_lift_count_goal) goals.strength = profile.weekly_lift_count_goal;

      // Count sessions per modality for this week.
      const liftCount   = (weekLiftsR.data || []).length;
      const puCount     = (weekPuR.data    || []).length;
      const runCount    = (weekRunsR.data  || []).length;
      const walkCount   = (weekWalksR.data || []).length;
      const activityByType = {};
      const activityDistByType = {};
      (weekActivitiesR.data || []).forEach(a => {
        const t = a.activity_type || 'other';
        activityByType[t] = (activityByType[t] || 0) + 1;
        const d = Number(a.distance) || 0;
        if (d > 0) activityDistByType[t] = (activityDistByType[t] || 0) + d;
      });
      const walkMiles = (weekWalksR.data || []).reduce((s, w) => s + (Number(w.distance) || 0), 0);
      const weekCounts = {
        strength: liftCount + puCount,
        running:  runCount,
        walking:  walkCount,
        cycling:  activityByType.cycling  || 0,
        hiking:   activityByType.hiking   || 0,
        swimming: activityByType.swimming || 0,
        rowing:   activityByType.rowing   || 0,
        yoga:     activityByType.yoga     || 0,
        other:    activityByType.other    || 0,
      };

      // Per-modality distance summary (miles unless noted).
      // Skip yoga/other/hiking-without-distance in the UI; here we just
      // compute totals and let renderHome decide what to show.
      const weekDistances = {
        walking:  Math.round(walkMiles * 10) / 10,
        cycling:  Math.round((activityDistByType.cycling  || 0) * 10) / 10,
        hiking:   Math.round((activityDistByType.hiking   || 0) * 10) / 10,
        swimming: Math.round((activityDistByType.swimming || 0) * 10) / 10,
        rowing:   Math.round((activityDistByType.rowing   || 0) * 10) / 10,
      };

      // YTD per-modality distance + count for the segmented filter on the
      // Miles YTD card.
      const ytdWalkMiles = (ytdWalksR.data || []).reduce((s, w) => s + (Number(w.distance) || 0), 0);
      const ytdActByType = {};
      const ytdActCounts = {};
      (ytdActivitiesR.data || []).forEach(a => {
        const t = a.activity_type || 'other';
        const d = Number(a.distance) || 0;
        if (d > 0) ytdActByType[t] = (ytdActByType[t] || 0) + d;
        ytdActCounts[t] = (ytdActCounts[t] || 0) + 1;
      });
      const yearDistances = {
        running:  Math.round(sumDist(ytdRunsR.data) * 10) / 10,
        walking:  Math.round(ytdWalkMiles * 10) / 10,
        cycling:  Math.round((ytdActByType.cycling  || 0) * 10) / 10,
        hiking:   Math.round((ytdActByType.hiking   || 0) * 10) / 10,
        swimming: Math.round((ytdActByType.swimming || 0) * 10) / 10,
        rowing:   Math.round((ytdActByType.rowing   || 0) * 10) / 10,
      };
      const yearCounts = {
        running:  (ytdRunsR.data  || []).length,
        walking:  (ytdWalksR.data || []).length,
        cycling:  ytdActCounts.cycling  || 0,
        hiking:   ytdActCounts.hiking   || 0,
        swimming: ytdActCounts.swimming || 0,
        rowing:   ytdActCounts.rowing   || 0,
      };

      return {
        runs: {
          week:      Math.round(sumDist(weekRunsR.data)  * 10) / 10,
          weekCount: runCount,
          year:      Math.round(sumDist(ytdRunsR.data)   * 10) / 10,
          yearCount: (ytdRunsR.data  || []).length,
          month:     Math.round(sumDist(monthRunsR.data) * 10) / 10,
        },
        lifts:   { weekSessions: liftCount },
        pullups: {
          weekSessions: puCount,
          weekReps:     (weekPuR.data || []).reduce((s, p) => s + (p.total_reps || 0), 0),
        },
        weekCounts,
        weekDistances,
        yearDistances,
        yearCounts,
        goals,
      };
    }

    // Update the goal for a single modality. modalityId is a modality slug
    // (e.g. 'running', 'strength', 'cycling') matching MODALITIES.
    async function sbUpdateGoal(modalityId, value) {
      const v = Math.max(0, Math.min(99, Math.round(Number(value) || 0)));
      // Load current goals, mutate the one key, upsert the whole JSONB.
      const profile = await sbLoadUserProfile();
      const current = (profile && profile.weekly_goals) || {};
      const next = { ...current };
      if (v > 0) next[modalityId] = v;
      else       delete next[modalityId];
      // Legacy column parity so old code paths still see reasonable values.
      const patch = { id: currentUser.id, weekly_goals: next };
      if (modalityId === 'running')  patch.weekly_run_count_goal  = v;
      if (modalityId === 'strength') patch.weekly_lift_count_goal = v;
      const { error } = await _sb.from('user_profiles').upsert(patch, { onConflict: 'id' });
      if (error) throw new Error(error.message);
      _userProfileCache = null;
      return v;
    }

    // v32.5: update the user's modalities list. Used by the Modalities
    // & Weekly Goals editor. Preserves other user_profiles fields.
    async function sbUpdateModalities(modalityIds) {
      const clean = Array.isArray(modalityIds) ? [...new Set(modalityIds)] : [];
      const { error } = await _sb.from('user_profiles').upsert({
        id: currentUser.id,
        modalities: clean,
      }, { onConflict: 'id' });
      if (error) throw new Error(error.message);
      _userProfileCache = null;
    }

    async function sbShoes() {
      const { data, error } = await _sb.from('shoe_mileage').select('*').eq('user_id', currentUser.id);
      if (error) throw new Error(error.message);
      return (data || []).map(s => ({
        id: s.id, name: s.name, active: s.active,
        totalMiles: Math.round(Number(s.total_miles) * 10) / 10,
        newMiles:   Math.round(Number(s.logged_miles) * 10) / 10,
      }));
    }

    async function sbAddShoe({ name, active, initialMiles }) {
      const uid = currentUser.id;
      const { error } = await _sb.from('shoes').insert({
        user_id:       uid,
        name:          name,
        active:        !!active,
        initial_miles: Number(initialMiles) || 0,
      });
      if (error) throw new Error(error.message);
      return { ok: true };
    }

    // -------- Programs --------
    async function sbListPrograms() {
      const uid = currentUser.id;
      const { data, error } = await _sb
        .from('programs')
        .select('id,name,notes,active,archived_at,structure,plan_type,created_at')
        .eq('user_id', uid)
        .order('active', { ascending: false })
        .order('archived_at', { ascending: true, nullsFirst: true })
        .order('created_at', { ascending: false });
      if (error) throw new Error(error.message);
      return (data || []).map(p => ({
        id: p.id,
        name: p.name,
        notes: p.notes,
        active: !!p.active,
        archived: !!p.archived_at,
        archivedAt: p.archived_at,
        createdAt: p.created_at,
        structure: p.structure,
        plan_type: p.plan_type || 'lift',
      }));
    }

    // --- v32.3 Multi-active plan helpers ---
    // A plan/program's plan_type determines what can coexist:
    //   'run' | 'lift' | 'cycle' — specific modality; can coexist with any
    //     OTHER specific modality (a run plan + a lift program is fine).
    //   'general' — multi-modal / hybrid; activating one deactivates every
    //     other active row across both training_plans + programs.
    // Same-type CANNOT coexist (one run plan at a time).

    // Return the set of plan_types that MUST be deactivated when the given
    // activating type comes online. `general` displaces everything;
    // specific types displace themselves + general.
    function typesToDeactivateFor_(activatingType) {
      if (activatingType === 'general') return ['run', 'lift', 'cycle', 'general'];
      return [activatingType, 'general'];
    }

    // Runs the deactivation across both tables. Skips the row being
    // activated (identified by exceptId + exceptTable).
    async function deactivateConflictingActives_(activatingType, exceptId, exceptTable) {
      const uid = currentUser.id;
      const types = typesToDeactivateFor_(activatingType);
      const runQuery = async (table) => {
        let q = _sb.from(table).update({ active: false })
          .eq('user_id', uid).eq('active', true).is('archived_at', null)
          .in('plan_type', types);
        if (exceptTable === table && exceptId) q = q.neq('id', exceptId);
        const { error } = await q;
        if (error) throw new Error(error.message);
      };
      await runQuery('training_plans');
      await runQuery('programs');
      invalidateActiveTrainingPlanCache();
      invalidateActiveProgramCache();
    }

    // Fetch every active row across both tables. Returns a list of
    // { source, id, name, plan_type, structure, ... } for display.
    async function sbListActiveWorkoutItems() {
      const uid = currentUser.id;
      const [tp, pr] = await Promise.all([
        _sb.from('training_plans')
          .select('id,name,plan_type,start_date,end_date,structure,notes')
          .eq('user_id', uid).eq('active', true).is('archived_at', null),
        _sb.from('programs')
          .select('id,name,plan_type,structure,notes')
          .eq('user_id', uid).eq('active', true).is('archived_at', null),
      ]);
      if (tp.error) throw new Error(tp.error.message);
      if (pr.error) throw new Error(pr.error.message);
      const items = [];
      (tp.data || []).forEach(p => items.push({ ...p, source: 'training_plan' }));
      (pr.data || []).forEach(p => items.push({ ...p, source: 'program' }));
      return items;
    }

    // Compute the list of currently-active rows that would be deactivated
    // if we activated a row of the given type. Used to build the confirm
    // prompt so users know exactly what's being displaced.
    async function conflictingActivesFor_(activatingType, exceptId, exceptTable) {
      const items = await sbListActiveWorkoutItems();
      const types = typesToDeactivateFor_(activatingType);
      return items.filter(it => {
        if (!types.includes(it.plan_type || 'lift')) return false;
        if (it.source === exceptTable && it.id === exceptId) return false;
        // Programs table uses source 'program'; be forgiving on the
        // check by normalizing.
        if (exceptTable === 'programs' && it.source === 'program' && it.id === exceptId) return false;
        if (exceptTable === 'training_plans' && it.source === 'training_plan' && it.id === exceptId) return false;
        return true;
      });
    }

    async function sbGetProgram(id) {
      const { data, error } = await _sb
        .from('programs').select('*').eq('id', id).single();
      if (error) throw new Error(error.message);
      return data;
    }

    async function sbActivateProgram(id) {
      // Fetch this program's plan_type so we know what to deactivate.
      const { data: p, error: gErr } = await _sb.from('programs')
        .select('plan_type').eq('id', id).maybeSingle();
      if (gErr) throw new Error(gErr.message);
      const type = (p && p.plan_type) || 'lift';
      // v32.3: type-aware deactivation across both tables.
      await deactivateConflictingActives_(type, id, 'programs');
      // Activate this one (and un-archive if archived)
      const { error } = await _sb.from('programs').update({ active: true, archived_at: null })
        .eq('id', id);
      if (error) throw new Error(error.message);
      return { ok: true };
    }

    async function sbArchiveProgram(id) {
      const { error } = await _sb.from('programs')
        .update({ active: false, archived_at: new Date().toISOString() })
        .eq('id', id);
      if (error) throw new Error(error.message);
      return { ok: true };
    }

    async function sbDeleteProgram(id) {
      const { error } = await _sb.from('programs').delete().eq('id', id);
      if (error) throw new Error(error.message);
      return { ok: true };
    }

    // Returns the currently active program for the lift logger to render from.
    // Cached locally so the logger doesn't re-fetch on every open.
    let _activeProgramCache = null;
    let _activeProgramCacheAt = 0;
    const ACTIVE_PROGRAM_TTL_MS = 5 * 60 * 1000; // 5 minutes

    async function sbActiveProgram(force = false) {
      if (!force && _activeProgramCache && (Date.now() - _activeProgramCacheAt) < ACTIVE_PROGRAM_TTL_MS) {
        return _activeProgramCache;
      }
      const uid = currentUser.id;
      // v32.3 fix: multiple programs may be active simultaneously (one per
      // modality). Fetch as array to avoid .maybeSingle() throwing when
      // more than one row matches. Return the first (which the lift
      // logger uses as the "primary" active program).
      const { data, error } = await _sb.from('programs')
        .select('*').eq('user_id', uid).eq('active', true).is('archived_at', null)
        .order('plan_type', { ascending: true })
        .limit(1);
      if (error) throw new Error(error.message);
      _activeProgramCache = (data && data[0]) || null;
      _activeProgramCacheAt = Date.now();
      return _activeProgramCache;
    }

    function invalidateActiveProgramCache() {
      _activeProgramCache = null;
      _activeProgramCacheAt = 0;
    }

    async function sbLogRun(run) {
      const uid = currentUser.id;
      const parts = (run.time || '').split(':');
      const dur = (parseInt(parts[0]) || 0) * 60 + (parseInt(parts[1]) || 0);
      const pace = (dur > 0 && run.distance > 0) ? secsToMMSS(dur / run.distance) : null;
      let shoe_id = null;
      if (run.shoe) {
        const { data: sd } = await _sb.from('shoes').select('id').eq('user_id', uid).eq('name', run.shoe).maybeSingle();
        if (sd) shoe_id = sd.id;
      }
      const { data: dup } = await _sb.from('runs').select('id').eq('user_id', uid).eq('date', run.date).eq('distance', String(run.distance)).limit(1);
      if (dup && dup.length) return { duplicate: true, pace };

    // -------- CSV import (v28.b.2) --------
    // Client-side parsing via Papa Parse (loaded from CDN in <head>).
    // Two upload types supported here: programs and cardio history. Lift
    // history + training plans defer to v28.b.3.

    // Parse a File object as CSV. Returns { rows, errors, meta }.
    function parseCsvFile_(file) {
      return new Promise((resolve, reject) => {
        if (typeof Papa === 'undefined') {
          reject(new Error('CSV parser (Papa Parse) not loaded. Refresh and try again.'));
          return;
        }
        Papa.parse(file, {
          header: true,
          skipEmptyLines: true,
          transformHeader: h => (h || '').trim(),
          complete: (results) => resolve(results),
          error: (err) => reject(err),
        });
      });
    }

    // Download an arbitrary string as a file (used for CSV templates).
    function downloadFile_(filename, content, mimeType) {
      const blob = new Blob([content], { type: (mimeType || 'text/plain') + ';charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 100);
    }

    // Build the programs.structure JSONB from parsed CSV rows. Mirrors the
    // Python import_program.py parse_csv logic so both paths produce
    // identical shapes. Throws with a user-friendly message on bad input.
    const PROGRAM_HEADER_ALIASES = {
      block:       ['block', 'block name', 'block_name', 'phase'],
      week:        ['week', 'wk'],
      day:         ['day'],
      exercise:    ['exercise', 'name', 'exercise name'],
      category:    ['category', 'muscle', 'group'],
      sets:        ['sets', 'num sets', '# sets'],
      target_reps: ['target reps', 'target', 'reps', 'rep range'],
      notes:       ['notes', 'exercise notes', 'comment'],
    };

    function programStructureFromRows_(rows, dayTitlesArg) {
      if (!Array.isArray(rows) || !rows.length) throw new Error('CSV had no data rows.');

      // Papa's header:true gives us row objects. Match aliases against the
      // actual header names (case-insensitive).
      const headers = Object.keys(rows[0] || {});
      const headersLower = headers.map(h => h.toLowerCase().trim());
      const colMap = {};
      for (const [canon, aliases] of Object.entries(PROGRAM_HEADER_ALIASES)) {
        for (const alias of aliases) {
          const i = headersLower.indexOf(alias);
          if (i !== -1) { colMap[canon] = headers[i]; break; }
        }
      }
      const missing = ['week', 'day', 'exercise'].filter(k => !colMap[k]);
      if (missing.length) {
        throw new Error(`CSV missing required column(s): ${missing.join(', ')}. Headers found: ${headers.join(', ')}`);
      }

      const cell = (row, canon) => {
        const key = colMap[canon];
        return key ? String(row[key] == null ? '' : row[key]).trim() : '';
      };
      const numOrNone = (s) => {
        s = (s || '').trim();
        if (!s) return null;
        const n = Number(s);
        return Number.isFinite(n) ? n : null;
      };

      const weeksMap = {}; // week → { block_name, days: { A: [...], ... } }
      const daysSeen = new Set();
      const weeksSeen = new Set();

      rows.forEach(row => {
        const week = numOrNone(cell(row, 'week'));
        if (week == null) return;
        const day = cell(row, 'day').toUpperCase();
        if (!day) return;
        const exname = cell(row, 'exercise');
        if (!exname) return;
        const block = cell(row, 'block') || null;

        weeksSeen.add(week);
        daysSeen.add(day);
        if (!weeksMap[week]) weeksMap[week] = { block_name: block, days: {} };
        if (block && !weeksMap[week].block_name) weeksMap[week].block_name = block;
        if (!weeksMap[week].days[day]) weeksMap[week].days[day] = [];
        weeksMap[week].days[day].push({
          name:        exname,
          category:    cell(row, 'category') || null,
          sets:        numOrNone(cell(row, 'sets')),
          target_reps: cell(row, 'target_reps') || null,
          notes:       cell(row, 'notes') || null,
        });
      });

      if (!Object.keys(weeksMap).length) throw new Error('No usable rows found in the CSV. Check that Week, Day, and Exercise are filled in.');

      const weeksSorted = [...weeksSeen].sort((a, b) => a - b);
      const dayTitles = {};
      if (dayTitlesArg) {
        dayTitlesArg.split(',').forEach(chunk => {
          if (chunk.includes('=')) {
            const [k, v] = chunk.split('=');
            dayTitles[k.trim().toUpperCase()] = v.trim();
          }
        });
      }
      const weeksOut = weeksSorted.map(w => ({
        week: w,
        block_name: weeksMap[w].block_name,
        days: weeksMap[w].days,
      }));

      return {
        weeks_total: Math.max(...weeksSeen),
        day_letters: [...daysSeen].sort(),
        day_titles:  dayTitles,
        weeks:       weeksOut,
      };
    }

    // Upsert a program: update-if-same-name, else insert. Mirrors the
    // Python script's behavior so re-importing with the same name updates.
    async function sbUpsertProgramFromCsv(name, structure, notes) {
      const uid = currentUser.id;
      const { data: existing, error: findErr } = await _sb.from('programs')
        .select('id').eq('user_id', uid).eq('name', name).limit(1);
      if (findErr) throw new Error(findErr.message);

      if (existing && existing.length) {
        const patch = { structure };
        if (notes !== undefined && notes !== null) patch.notes = notes;
        const { error } = await _sb.from('programs').update(patch).eq('id', existing[0].id);
        if (error) throw new Error(error.message);
        return { id: existing[0].id, updated: true };
      }
      const { data, error } = await _sb.from('programs').insert({
        user_id: uid,
        name,
        notes: notes || null,
        active: false,
        structure,
      }).select('id').single();
      if (error) throw new Error(error.message);
      return { id: data.id, updated: false };
    }

    // Cardio history CSV: covers runs, walks, and generic activities
    // (rides, hikes, swims, etc.). Single CSV with a Type column.
    //
    // Headers: Type, Date, Distance, Duration, Pace, Notes, Activity Type
    //  - Type: run | walk | activity
    //  - Date: YYYY-MM-DD (or common variants — Papa Parse handles quoting)
    //  - Distance: number (mi for run/walk/most activities, yd for swim, m for row)
    //  - Duration: mm:ss or hh:mm:ss
    //  - Pace: mm:ss (mostly relevant for runs)
    //  - Activity Type: cycling | hiking | swimming | rowing | yoga | other
    //                   (required when Type=activity)
    const HISTORY_HEADER_ALIASES = {
      type:          ['type', 'kind'],
      date:          ['date'],
      distance:      ['distance', 'miles', 'dist'],
      duration:      ['duration', 'time'],
      pace:          ['pace'],
      notes:         ['notes', 'comment'],
      activity_type: ['activity type', 'activity_type', 'sport', 'subtype'],
    };

    function parseDurationSecs_(str) {
      if (str == null) return null;
      const s = String(str).trim();
      if (!s) return null;
      const parts = s.split(':').map(p => Number(p.trim()));
      if (parts.some(n => !Number.isFinite(n))) return null;
      if (parts.length === 2) return parts[0] * 60 + parts[1];
      if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
      if (parts.length === 1) return Math.round(parts[0] * 60); // treat bare number as minutes
      return null;
    }

    // Bulk insert cardio history from parsed CSV rows. Returns
    // { runs, walks, activities, skipped } counts.
    async function sbBulkInsertCardioHistory(rows) {
      const uid = currentUser.id;
      if (!rows || !rows.length) throw new Error('CSV had no data rows.');

      // Header alias resolution
      const headers = Object.keys(rows[0] || {});
      const headersLower = headers.map(h => h.toLowerCase().trim());
      const colMap = {};
      for (const [canon, aliases] of Object.entries(HISTORY_HEADER_ALIASES)) {
        for (const alias of aliases) {
          const i = headersLower.indexOf(alias);
          if (i !== -1) { colMap[canon] = headers[i]; break; }
        }
      }
      if (!colMap.type || !colMap.date) {
        throw new Error(`CSV missing required column(s): Type, Date. Headers found: ${headers.join(', ')}`);
      }
      const cell = (row, canon) => {
        const key = colMap[canon];
        return key ? String(row[key] == null ? '' : row[key]).trim() : '';
      };
      const numOrNull = (s) => {
        s = (s || '').trim();
        if (!s) return null;
        const n = Number(s);
        return Number.isFinite(n) ? n : null;
      };

      const runs = [], walks = [], activities = [];
      let skipped = 0;

      rows.forEach(row => {
        const type = cell(row, 'type').toLowerCase();
        const date = cell(row, 'date');
        if (!type || !date) { skipped++; return; }
        const distance = numOrNull(cell(row, 'distance'));
        const durationSecs = parseDurationSecs_(cell(row, 'duration'));
        const notes = cell(row, 'notes') || null;

        if (type === 'run') {
          const pace = cell(row, 'pace') || null;
          runs.push({ user_id: uid, date, distance, duration_secs: durationSecs, pace, notes });
        } else if (type === 'walk') {
          walks.push({ user_id: uid, date, distance, duration_secs: durationSecs, notes });
        } else if (type === 'activity') {
          const activity_type = (cell(row, 'activity_type') || 'other').toLowerCase();
          activities.push({
            user_id: uid, date, activity_type,
            distance, duration_secs: durationSecs, notes,
          });
        } else {
          skipped++;
        }
      });

      const results = { runs: 0, walks: 0, activities: 0, skipped };
      if (runs.length) {
        const { error } = await _sb.from('runs').insert(runs);
        if (error) throw new Error('Runs insert failed: ' + error.message);
        results.runs = runs.length;
      }
      if (walks.length) {
        const { error } = await _sb.from('walks').insert(walks);
        if (error) throw new Error('Walks insert failed: ' + error.message);
        results.walks = walks.length;
      }
      if (activities.length) {
        const { error } = await _sb.from('activities').insert(activities);
        if (error) throw new Error('Activities insert failed: ' + error.message);
        results.activities = activities.length;
      }
      return results;
    }
