<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Workouts" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <title>Workouts</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-2: #1d1d1d;
      --border: #2a2a2a;
      --text: #f5f5f5;
      --muted: #8a8a8a;
      --accent: #ff6b35;
      --success: #32d74b;
      --warn: #ff9f0a;
      --danger: #ff453a;
      --radius: 14px;
      --radius-lg: 20px;
      --shadow: 0 2px 14px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      font-size: 16px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: contain;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .app {
      flex: 1;
      max-width: 520px;
      margin: 0 auto;
      width: 100%;
      padding: 0 16px 88px 16px;
      padding-top: calc(env(safe-area-inset-top) + 12px);
    }
    header.top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 4px 0 16px 0;
    }
    header.top h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    header.top .date {
      color: var(--muted);
      font-size: 14px;
    }
    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .card h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .big {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .row { display: flex; gap: 12px; align-items: center; }
    .spaced { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .col { display: flex; flex-direction: column; gap: 2px; }
    .muted { color: var(--muted); font-size: 13px; }
    .pill {
      display: inline-block;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 10px;
      background: var(--surface-2);
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .pill.chest { background: #3a1f1a; color: #ff9b7a; }
    .pill.back  { background: #1a2a3a; color: #7ab7ff; }
    .pill.bicep, .pill.tricep { background: #3a2a1a; color: #ffc07a; }
    .pill.shoulder { background: #2a1a3a; color: #c07aff; }
    .pill.micro { background: #1a3a2a; color: #7affb7; }
    .pill.intensity { background: #3a1a1a; color: #ff7a7a; }
    .pill.core { background: #1a1a3a; color: #7a9bff; }

    button, .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: inherit;
      font-size: 17px;
      font-weight: 600;
      padding: 14px 16px;
      border-radius: var(--radius);
      width: 100%;
      cursor: pointer;
      transition: transform 0.08s ease;
      -webkit-appearance: none;
      appearance: none;
    }
    button:active, .btn:active { transform: scale(0.97); }
    button.secondary, .btn.secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    button.ghost { background: transparent; color: var(--accent); }
    button.danger { background: var(--danger); }

    input, select, textarea {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 16px;
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
    }
    input[inputmode="decimal"], input[inputmode="numeric"] { text-align: center; }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .field { margin-bottom: 12px; }

    nav.bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(20, 20, 20, 0.92);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-top: 1px solid var(--border);
      padding: 10px 0 calc(env(safe-area-inset-bottom) + 8px);
      display: flex;
      z-index: 100;
    }
    nav.bottom button {
      flex: 1;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 6px 4px;
      border-radius: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    nav.bottom button.active { color: var(--accent); }
    nav.bottom button svg { width: 22px; height: 22px; }

    .exercise {
      background: var(--surface-2);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
    }
    .exercise h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.25;
    }
    .exercise .meta {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .exercise .notes {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      font-style: italic;
      line-height: 1.4;
    }
    .set-grid {
      display: grid;
      grid-template-columns: 1.2fr repeat(4, 1fr);
      gap: 6px;
    }
    .set-grid input { padding: 8px 4px; font-size: 15px; }
    .prev {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      text-align: right;
    }
    .prev b { color: var(--text); }

    .set-grid-5 {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }
    .set-grid-5 input { padding: 10px 4px; font-size: 15px; }

    /* Block/Week/Day selector */
    .selector-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .selector-summary .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }
    .selector-summary .value { font-size: 18px; font-weight: 600; }
    .selector-summary .edit {
      background: var(--surface-2);
      color: var(--accent);
      font-size: 14px;
      padding: 8px 14px;
      width: auto;
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .selector-body { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 14px; }
    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .pill-row .pill-btn {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 9px 14px;
      border-radius: 10px;
      font-size: 14px;
      width: auto;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: none;
    }
    .pill-row .pill-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .pill-row-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .toast {
      position: fixed;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--success);
      color: #000;
      padding: 10px 18px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 200;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--danger); color: #fff; }

    .skeleton {
      background: linear-gradient(90deg, var(--surface) 0%, var(--surface-2) 50%, var(--surface) 100%);
      background-size: 200% 100%;
      animation: sk 1.4s infinite;
      border-radius: 10px;
      height: 80px;
    }
    @keyframes sk { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .hidden { display: none !important; }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .stat-grid .card { margin: 0; }
    .stat-grid .big { font-size: 26px; }

    /* Run time MM:SS split input */
    .time-row {
      display: grid;
      grid-template-columns: 1fr 16px 1fr;
      gap: 6px;
      align-items: center;
    }
    .time-row input {
      text-align: center;
      font-size: 22px;
      padding: 12px 8px;
      font-variant-numeric: tabular-nums;
    }
    .time-row .sep {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: var(--muted);
      padding-bottom: 2px;
    }
    .time-sub {
      display: grid;
      grid-template-columns: 1fr 16px 1fr;
      gap: 6px;
      margin-top: 4px;
    }
    .time-sub div {
      font-size: 10px;
      text-align: center;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="app" id="app"></div>

  <nav class="bottom" id="nav">
    <button data-view="home" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10.5L12 3l9 7.5v10a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 20.5v-10z"/><path d="M9 21.5V13h6v8.5"/></svg>
      Home
    </button>
    <button data-view="lift">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 8v8M3 10v4M19 8v8M21 10v4M5 12h14"/></svg>
      Lift
    </button>
    <button data-view="run">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="13" cy="4" r="2"/><path d="M6 22l3-6 3 2 2-4 3 2M9 16l-1-5 4-3 3 3 2 2"/></svg>
      Run
    </button>
    <button data-view="pullups">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 4h18M6 4v4a6 6 0 0 0 12 0V4"/><circle cx="12" cy="13" r="2"/><path d="M12 15v4M9 19h6"/></svg>
      Pull-Ups
    </button>
  </nav>

  <div class="toast" id="toast"></div>

  <script>
    // -------- localStorage keys --------
    const CONFIG_KEY = 'workoutAppConfig_v1';
    const QUEUE_KEY  = 'workoutQueue_v1';
    const CACHE_KEY  = 'workoutCache_v1';
    const PROG_KEY   = 'workoutProgram_v1';

    function getConfig() {
      try { return JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}'); } catch (e) { return {}; }
    }
    function setConfig(c) { localStorage.setItem(CONFIG_KEY, JSON.stringify(c)); }

    // -------- API --------
    async function api(action, params = {}, body = null) {
      const cfg = getConfig();
      if (!cfg.scriptUrl || !cfg.token) throw new Error('not configured');
      const url = new URL(cfg.scriptUrl);
      url.searchParams.set('action', action);
      url.searchParams.set('token', cfg.token);
      Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));

      const opts = body
        ? { method: 'POST', body: JSON.stringify({ ...body, token: cfg.token, action }) }
        : { method: 'GET' };
      const res = await fetch(url.toString(), opts);
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'api error');
      return data.data;
    }

    // -------- Offline queue --------
    function queueRead() { try { return JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]'); } catch (e) { return []; } }
    function queueWrite(q) { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); }
    function queuePush(item) { const q = queueRead(); q.push(item); queueWrite(q); }
    async function flushQueue() {
      const q = queueRead();
      if (!q.length) return;
      const remaining = [];
      for (const item of q) {
        try { await api(item.action, {}, item.body); }
        catch (e) { remaining.push(item); }
      }
      queueWrite(remaining);
      if (remaining.length < q.length) {
        toast(`Synced ${q.length - remaining.length} offline entr${q.length - remaining.length === 1 ? 'y' : 'ies'}`);
      }
    }

    // -------- DOM helpers --------
    function $(sel, root = document) { return root.querySelector(sel); }
    function el(tag, attrs = {}, children = []) {
      const n = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'class') n.className = v;
        else if (k === 'style') n.style.cssText = v;
        else if (k.startsWith('on')) n.addEventListener(k.slice(2), v);
        else if (k === 'html') n.innerHTML = v;
        else n.setAttribute(k, v);
      }
      (Array.isArray(children) ? children : [children]).forEach(c => {
        if (c == null) return;
        n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      });
      return n;
    }
    function fmtDateLong(d) {
      return new Date(d).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }
    function todayISO() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }
    function categoryClass(cat) {
      if (!cat) return '';
      const c = cat.toLowerCase();
      if (c.includes('chest')) return 'chest';
      if (c.includes('back')) return 'back';
      if (c.includes('bicep')) return 'bicep';
      if (c.includes('tricep')) return 'tricep';
      if (c.includes('shoulder')) return 'shoulder';
      if (c.includes('micro')) return 'micro';
      if (c.includes('intensity')) return 'intensity';
      if (c.includes('core')) return 'core';
      return '';
    }
    let toastTimer;
    function toast(msg, isError = false) {
      const t = $('#toast');
      t.textContent = msg;
      t.classList.toggle('error', isError);
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
    }

    // -------- App state --------
    let currentView = 'home';
    let todayCache = null;
    let programCache = null; // BLOCKS array + phases from /config
    let liftSelection = null; // { block: 'Block 1', week: 4, day: 'A' }
    let selectorOpen = false;

    async function loadProgram() {
      if (programCache) return programCache;
      try {
        const stored = JSON.parse(localStorage.getItem(PROG_KEY) || 'null');
        if (stored && stored.blocks && stored.fetchedAt && (Date.now() - stored.fetchedAt < 86400000)) {
          programCache = stored;
          return stored;
        }
      } catch (e) {}
      const cfg = await api('config');
      programCache = { ...cfg, fetchedAt: Date.now() };
      localStorage.setItem(PROG_KEY, JSON.stringify(programCache));
      return programCache;
    }

    // -------- Render --------
    async function render(view) {
      currentView = view;
      document.querySelectorAll('nav.bottom button').forEach(b => {
        b.classList.toggle('active', b.dataset.view === view);
      });
      const app = $('#app');
      app.innerHTML = '';
      selectorOpen = false;

      if (!getConfig().scriptUrl || !getConfig().token) return renderSetup(app);

      if (view === 'home') await renderHome(app);
      else if (view === 'lift') await renderLift(app);
      else if (view === 'run') await renderRun(app);
      else if (view === 'pullups') await renderPullUps(app);
    }

    function renderSetup(app) {
      const cfg = getConfig();
      app.appendChild(el('header', { class: 'top' }, [el('h1', {}, 'Setup')]));
      app.appendChild(el('div', { class: 'card' }, [
        el('p', { class: 'muted', style: 'margin-bottom: 16px; font-size: 14px;' },
          "Paste your Apps Script web app URL and your secret token. You'll get both after running Deploy in the Apps Script editor."),
        el('div', { class: 'field' }, [
          el('label', {}, 'Apps Script /exec URL'),
          el('input', { id: 'cfgUrl', type: 'url', placeholder: 'https://script.google.com/macros/s/.../exec', value: cfg.scriptUrl || '' }),
        ]),
        el('div', { class: 'field' }, [
          el('label', {}, 'Secret token'),
          el('input', { id: 'cfgToken', type: 'text', placeholder: 'must match SECRET_TOKEN in Code.gs', value: cfg.token || '' }),
        ]),
        el('button', { onclick: async () => {
          const url = $('#cfgUrl').value.trim();
          const token = $('#cfgToken').value.trim();
          if (!url || !token) return toast('Both fields required', true);
          setConfig({ scriptUrl: url, token });
          try { await api('ping'); toast('Connected'); render('home'); }
          catch (e) { toast('Could not reach script: ' + e.message, true); }
        }}, 'Save & test'),
      ]));
    }

    async function renderHome(app) {
      app.appendChild(el('header', { class: 'top' }, [
        el('h1', {}, 'Today'),
        el('span', { class: 'date' }, fmtDateLong(new Date())),
      ]));

      const skel = el('div', { class: 'card' }, el('div', { class: 'skeleton' }));
      app.appendChild(skel);

      let today;
      try {
        today = await api('today');
        todayCache = today;
        localStorage.setItem(CACHE_KEY, JSON.stringify({ today, savedAt: Date.now() }));
      } catch (e) {
        try {
          const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
          if (cached) { today = cached.today; toast('Offline — using cached plan'); }
        } catch (_) {}
        if (!today) {
          skel.remove();
          app.appendChild(el('div', { class: 'card' }, [
            el('h2', {}, 'Offline'),
            el('p', { class: 'muted' }, "Could not load today's plan. Logged entries will sync when you're back online."),
          ]));
          return;
        }
      }
      skel.remove();

      if (today.sessionType === 'lift') {
        const card = el('div', { class: 'card' }, [
          el('h2', {}, `${today.blockName || 'Lift'} · Week ${today.programWeek || '?'} · Day ${today.liftDay || ''}`),
          el('div', { class: 'big' }, dayTitle(today.liftDay)),
        ]);
        if (today.template && today.template.exercises) {
          card.appendChild(el('div', { class: 'muted', style: 'margin-top: 6px;' },
            `${today.template.exercises.length} exercises`));
        } else if (today.templateError) {
          card.appendChild(el('div', { style: 'margin-top: 8px; font-size: 13px; color: var(--warn);' },
            'Could not load template: ' + today.templateError));
          card.appendChild(el('div', { class: 'muted', style: 'margin-top: 4px; font-size: 12px;' },
            'Likely cause: BLOCKS tab names in Code.gs don\'t match your sheet exactly (en-dash vs hyphen).'));
        }
        card.appendChild(el('button', { style: 'margin-top: 14px;', onclick: () => render('lift') }, 'Start lifting'));
        app.appendChild(card);
      } else if (today.sessionType === 'run') {
        app.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, 'Today'),
          el('div', { class: 'big' }, 'Run day'),
          el('div', { class: 'muted', style: 'margin-top: 6px;' }, 'Goal: 10–15 mi/week'),
          el('button', { style: 'margin-top: 14px;', onclick: () => render('run') }, 'Log a run'),
        ]));
      } else {
        app.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, 'Today'),
          el('div', { class: 'big' }, 'Rest day'),
        ]));
      }

      try {
        const stats = await api('stats');
        app.appendChild(el('div', { class: 'stat-grid' }, [
          el('div', { class: 'card' }, [el('h2', {}, 'Miles this week'), el('div', { class: 'big' }, String(stats.runs.week))]),
          el('div', { class: 'card' }, [
            el('h2', {}, 'Miles YTD'),
            el('div', { class: 'big' }, String(stats.runs.year)),
            el('div', { class: 'muted', style: 'margin-top: 4px;' }, `${stats.runs.yearCount} runs`),
          ]),
        ]));
        const liftWk = stats.lifts ? stats.lifts.weekSessions : 0;
        const puWk = stats.pullups ? stats.pullups.weekSessions : 0;
        const puReps = stats.pullups ? stats.pullups.weekReps : 0;
        app.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, 'This week (Mon–Sun)'),
          el('div', { class: 'spaced' }, [
            el('div', { class: 'col' }, [
              el('div', { class: 'big' }, String(liftWk)),
              el('div', { class: 'muted' }, 'lift sessions'),
            ]),
            el('div', { class: 'col' }, [
              el('div', { class: 'big' }, String(puReps)),
              el('div', { class: 'muted' }, `pull-ups (${puWk} sess)`),
            ]),
          ]),
        ]));
        app.appendChild(el('div', { class: 'card' }, [
          el('h2', {}, 'This month'),
          el('div', { class: 'big' }, String(stats.runs.month)),
          el('div', { class: 'muted' }, 'miles run'),
        ]));
      } catch (e) {}
    }

    function dayTitle(d) {
      if (d === 'A') return 'Push Day';
      if (d === 'B') return 'Pull Day';
      if (d === 'C') return 'Full Upper';
      return 'Lift';
    }

    async function renderLift(app) {
      app.appendChild(el('header', { class: 'top' }, [
        el('h1', {}, 'Log Lift'),
        el('span', { class: 'date' }, fmtDateLong(new Date())),
      ]));

      const skel = el('div', { class: 'card' }, el('div', { class: 'skeleton', style: 'height: 80px;' }));
      app.appendChild(skel);

      // Load program config (cached) + today (for auto defaults)
      let prog, today;
      try {
        [prog, today] = await Promise.all([loadProgram(), todayCache ? Promise.resolve(todayCache) : api('today')]);
        todayCache = today;
      } catch (e) {
        skel.remove();
        app.appendChild(el('div', { class: 'card' }, 'Offline — need network to fetch program / template.'));
        return;
      }
      skel.remove();

      // Initialize liftSelection from today's auto-detected slot if not set.
      if (!liftSelection) {
        const defaultDay = today.liftDay || 'A';
        const defaultBlock = today.blockName || 'Block 1';
        const defaultWeek = today.programWeek || 1;
        liftSelection = { block: defaultBlock, week: defaultWeek, day: defaultDay };
      }

      // Selector card
      const selectorCard = el('div', { class: 'card', id: 'selectorCard' });
      app.appendChild(selectorCard);

      // Exercises container
      const exContainer = el('div', { id: 'exContainer' });
      app.appendChild(exContainer);

      function renderSelector() {
        selectorCard.innerHTML = '';
        selectorCard.appendChild(el('div', { class: 'selector-summary' }, [
          el('div', {}, [
            el('div', { class: 'label' }, 'Today\'s session'),
            el('div', { class: 'value' }, `${liftSelection.block} · Week ${liftSelection.week} · Day ${liftSelection.day}`),
            el('div', { class: 'muted' }, dayTitle(liftSelection.day)),
          ]),
          el('button', { class: 'edit', onclick: () => { selectorOpen = !selectorOpen; renderSelector(); } },
            selectorOpen ? 'Done' : 'Change'),
        ]));

        if (selectorOpen) {
          const body = el('div', { class: 'selector-body' });

          // Block row
          body.appendChild(el('div', { class: 'pill-row-label' }, 'Block'));
          const blockRow = el('div', { class: 'pill-row' });
          prog.blocks.forEach(b => {
            blockRow.appendChild(el('button', {
              class: 'pill-btn' + (b.name === liftSelection.block ? ' active' : ''),
              onclick: () => {
                liftSelection.block = b.name;
                // Snap week into the block's range if needed
                if (liftSelection.week < b.startWeek || liftSelection.week > b.endWeek) {
                  liftSelection.week = b.startWeek;
                }
                renderSelector();
                fetchAndRenderExercises();
              },
            }, b.name));
          });
          body.appendChild(blockRow);

          // Week row (constrained to current block)
          const block = prog.blocks.find(b => b.name === liftSelection.block);
          if (block) {
            body.appendChild(el('div', { class: 'pill-row-label' }, 'Week'));
            const weekRow = el('div', { class: 'pill-row' });
            for (let w = block.startWeek; w <= block.endWeek; w++) {
              weekRow.appendChild(el('button', {
                class: 'pill-btn' + (w === liftSelection.week ? ' active' : ''),
                onclick: () => { liftSelection.week = w; renderSelector(); fetchAndRenderExercises(); },
              }, 'W' + w));
            }
            body.appendChild(weekRow);
          }

          // Day row
          body.appendChild(el('div', { class: 'pill-row-label' }, 'Day'));
          const dayRow = el('div', { class: 'pill-row' });
          ['A', 'B', 'C'].forEach(d => {
            dayRow.appendChild(el('button', {
              class: 'pill-btn' + (d === liftSelection.day ? ' active' : ''),
              onclick: () => { liftSelection.day = d; renderSelector(); fetchAndRenderExercises(); },
            }, `Day ${d} — ${dayTitle(d)}`));
          });
          body.appendChild(dayRow);

          selectorCard.appendChild(body);
        }
      }

      async function fetchAndRenderExercises() {
        exContainer.innerHTML = '';
        const loading = el('div', { class: 'card' }, el('div', { class: 'skeleton', style: 'height: 200px;' }));
        exContainer.appendChild(loading);
        let tpl;
        try {
          tpl = await api('template', { block: liftSelection.block, week: liftSelection.week, day: liftSelection.day });
        } catch (e) {
          loading.remove();
          exContainer.appendChild(el('div', { class: 'card' }, 'Could not load template: ' + e.message));
          return;
        }
        loading.remove();

        if (!tpl.exercises.length) {
          exContainer.appendChild(el('div', { class: 'card' }, 'No exercises for this slot.'));
          return;
        }

        const form = el('div', { id: 'liftForm' });
        tpl.exercises.forEach((ex, idx) => {
          const card = el('div', { class: 'exercise', 'data-idx': idx }, [
            el('h3', {}, ex.name),
            el('div', { class: 'meta' }, [
              ex.category ? el('span', { class: 'pill ' + categoryClass(ex.category) }, ex.category) : null,
              el('span', {}, `${ex.sets} sets · ${ex.targetReps}`),
            ]),
            ex.notes ? el('div', { class: 'notes' }, ex.notes) : null,
            el('div', { class: 'field' }, [
              el('label', {}, 'Weight'),
              el('input', { class: 'inp-weight', type: 'text', placeholder: 'e.g. 50 or BW', value: ex.weight || '', inputmode: 'text' }),
            ]),
            (() => {
              const grid = el('div', { class: 'set-grid' });
              grid.appendChild(el('div', {
                style: 'font-size: 10px; color: var(--muted); text-align: right; padding-right: 4px; align-self: center; font-weight: 600;',
              }, 'REPS'));
              ['Set 1', 'Set 2', 'Set 3', 'Set 4'].forEach((lab, i) => {
                grid.appendChild(el('div', {}, [
                  el('div', { style: 'font-size: 10px; text-align: center; color: var(--muted); margin-bottom: 4px;' }, lab),
                  el('input', {
                    class: 'inp-r' + (i + 1),
                    type: 'number', inputmode: 'numeric', pattern: '[0-9]*', placeholder: '—',
                    value: ex['r' + (i + 1)] === '' ? '' : String(ex['r' + (i + 1)] || ''),
                  }),
                ]));
              });
              return grid;
            })(),
            el('div', { class: 'field', style: 'margin-top: 10px; margin-bottom: 0;' }, [
              el('input', {
                class: 'inp-notes', type: 'text',
                placeholder: 'Per-exercise notes (optional)',
                value: ex.sessionNotes || '',
              }),
            ]),
            (ex.previous != null && ex.previous !== '' && ex.previous !== 0 && ex.previous !== '—')
              ? el('div', { class: 'prev' }, [el('span', {}, 'Last week: '), el('b', {}, String(ex.previous))])
              : null,
          ]);
          form.appendChild(card);
        });
        exContainer.appendChild(form);

        exContainer.appendChild(el('div', { class: 'field', style: 'margin-top: 16px;' }, [
          el('label', {}, 'Session notes (optional)'),
          el('input', { id: 'liftSessionNotes', type: 'text', placeholder: 'how did it feel?' }),
        ]));

        exContainer.appendChild(el('button', {
          onclick: async () => {
            const entries = [];
            form.querySelectorAll('.exercise').forEach((card, i) => {
              const ex = tpl.exercises[i];
              const weight = card.querySelector('.inp-weight').value.trim();
              const r = [1, 2, 3, 4].map(n => {
                const v = card.querySelector('.inp-r' + n).value.trim();
                return v === '' ? '' : Number(v);
              });
              const notesInp = card.querySelector('.inp-notes');
              entries.push({
                name: ex.name, category: ex.category, weight,
                r1: r[0], r2: r[1], r3: r[2], r4: r[3],
                notes: notesInp ? notesInp.value.trim() : '',
              });
            });
            const meta = {
              date: todayISO(),
              block: liftSelection.block,
              week: liftSelection.week,
              day: liftSelection.day,
              notes: ($('#liftSessionNotes').value || '').trim(),
            };
            try {
              const res = await api('logLift', {}, { entries, meta });
              if (res.duplicate) toast('Already logged this session');
              else toast('Saved to Lift Log');
              setTimeout(() => render('home'), 900);
            } catch (e) {
              queuePush({ action: 'logLift', body: { entries, meta } });
              toast('Saved offline — will sync later');
              setTimeout(() => render('home'), 900);
            }
          },
        }, 'Save session'));
      }

      renderSelector();
      fetchAndRenderExercises();
    }

    async function renderRun(app) {
      app.appendChild(el('header', { class: 'top' }, [
        el('h1', {}, 'Log Run'),
        el('span', { class: 'date' }, fmtDateLong(new Date())),
      ]));

      app.appendChild(el('div', { class: 'card' }, [
        el('div', { class: 'field' }, [el('label', {}, 'Date'), el('input', { id: 'runDate', type: 'date', value: todayISO() })]),
        el('div', { class: 'field' }, [el('label', {}, 'Distance (mi)'), el('input', { id: 'runDist', type: 'number', step: '0.01', inputmode: 'decimal', placeholder: '3.1' })]),
        el('div', { class: 'field' }, [
          el('label', {}, 'Time'),
          el('div', { class: 'time-row' }, [
            el('input', { id: 'runMin', type: 'number', inputmode: 'numeric', pattern: '[0-9]*', placeholder: '00', min: '0', max: '999' }),
            el('div', { class: 'sep' }, ':'),
            el('input', { id: 'runSec', type: 'number', inputmode: 'numeric', pattern: '[0-9]*', placeholder: '00', min: '0', max: '59' }),
          ]),
          el('div', { class: 'time-sub' }, [
            el('div', {}, 'min'),
            el('div', {}, ''),
            el('div', {}, 'sec'),
          ]),
        ]),
        el('div', { class: 'field' }, [el('label', {}, 'Notes (optional)'), el('input', { id: 'runNotes', type: 'text', placeholder: 'Outside, easy, etc.' })]),
        el('button', {
          onclick: async () => {
            const date = $('#runDate').value;
            const distance = Number($('#runDist').value);
            const minRaw = $('#runMin').value.trim();
            const secRaw = $('#runSec').value.trim();
            const notes = $('#runNotes').value.trim();
            if (!date || !distance || (minRaw === '' && secRaw === '')) {
              return toast('Date, distance, and time required', true);
            }
            const mm = String(Number(minRaw) || 0).padStart(2, '0');
            const ss = String(Number(secRaw) || 0).padStart(2, '0');
            const normalized = `${mm}:${ss}:00`;
            try {
              const res = await api('logRun', {}, { run: { date, distance, time: normalized, notes } });
              if (res.duplicate) toast('Already logged — no duplicate added');
              else toast('Logged · ' + res.pace + '/mi');
              setTimeout(() => render('home'), 900);
            } catch (e) {
              queuePush({ action: 'logRun', body: { run: { date, distance, time: normalized, notes } } });
              toast('Saved offline — will sync later');
              setTimeout(() => render('home'), 900);
            }
          },
        }, 'Log run'),
      ]));
    }

    async function renderPullUps(app) {
      app.appendChild(el('header', { class: 'top' }, [
        el('h1', {}, 'Pull-Ups'),
        el('span', { class: 'date' }, fmtDateLong(new Date())),
      ]));

      let prog, today;
      try {
        [prog, today] = await Promise.all([loadProgram(), todayCache ? Promise.resolve(todayCache) : api('today')]);
        todayCache = today;
      } catch (e) {
        app.appendChild(el('div', { class: 'card' }, 'Offline — pull-up logging needs network for now.'));
        return;
      }

      const week = today.pullUpWeek || 1;
      const phase = today.pullUpPhase || phaseForWeek(week);
      const phaseInfo = prog.pullUpPhases.find(p => p.name === phase) || {};

      app.appendChild(el('div', { class: 'card' }, [
        el('h2', {}, `Week ${week} · ${phase}`),
        el('div', { class: 'muted', style: 'font-size: 14px;' },
          `${phaseInfo.workingReps || ''} per set · ${phaseInfo.sets || 5} sets/day · ${phaseInfo.weight || ''}`),
      ]));

      app.appendChild(el('div', { class: 'card' }, [
        el('div', { class: 'field' }, [el('label', {}, 'Date'), el('input', { id: 'puDate', type: 'date', value: todayISO() })]),
        el('div', { class: 'field' }, [
          el('label', {}, 'Program week (auto)'),
          el('input', { id: 'puWeek', type: 'number', inputmode: 'numeric', min: '1', max: '12', value: String(week) }),
        ]),
        el('div', { class: 'field' }, [
          el('label', {}, 'Reps per set (5 sets)'),
          (() => {
            const grid = el('div', { class: 'set-grid-5' });
            ['S1', 'S2', 'S3', 'S4', 'S5'].forEach((lab, i) => {
              grid.appendChild(el('div', {}, [
                el('div', { style: 'font-size: 10px; text-align: center; color: var(--muted); margin-bottom: 4px;' }, lab),
                el('input', { class: 'inp-s' + (i + 1), type: 'number', inputmode: 'numeric', placeholder: '—' }),
              ]));
            });
            return grid;
          })(),
        ]),
        el('div', { class: 'field' }, [
          el('label', {}, 'Weight (BW, BW+10, etc.)'),
          el('input', { id: 'puWeight', type: 'text', value: phaseInfo.weight || 'BW' }),
        ]),
        el('div', { class: 'field' }, [
          el('label', {}, 'Notes (optional)'),
          el('input', { id: 'puNotes', type: 'text', placeholder: 'felt strong / easy / spread across day' }),
        ]),
        el('button', {
          onclick: async () => {
            const date = $('#puDate').value;
            const weekVal = Number($('#puWeek').value) || week;
            const s = [1, 2, 3, 4, 5].map(n => {
              const v = $('.inp-s' + n, app).value.trim();
              return v === '' ? '' : Number(v);
            });
            const weight = $('#puWeight').value.trim();
            const notes = $('#puNotes').value.trim();
            if (s.every(v => v === '')) return toast('Enter at least one set', true);
            const session = {
              date, week: weekVal,
              s1: s[0], s2: s[1], s3: s[2], s4: s[3], s5: s[4],
              weight, notes,
            };
            try {
              const res = await api('logPullUps', {}, { session });
              if (res.duplicate) toast('Already logged today');
              else toast(`Saved · ${res.total} total reps`);
              setTimeout(() => render('home'), 900);
            } catch (e) {
              queuePush({ action: 'logPullUps', body: { session } });
              toast('Saved offline — will sync later');
              setTimeout(() => render('home'), 900);
            }
          },
        }, 'Save pull-up session'),
      ]));

      // Recent pull-up sessions
      try {
        const recent = await api('recent', { limit: 5 });
        if (recent.pullups && recent.pullups.length) {
          const list = el('div', { class: 'card' }, [el('h2', {}, 'Recent sessions')]);
          recent.pullups.forEach(p => {
            list.appendChild(el('div', {
              style: 'padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;',
            }, [
              el('div', {}, [
                el('div', { style: 'font-weight: 600;' }, `${p.total || 0} reps · ${p.weight || 'BW'}`),
                el('div', { class: 'muted', style: 'font-size: 12px;' },
                  `${[p.s1, p.s2, p.s3, p.s4, p.s5].filter(x => x !== '' && x != null).join('/')}`),
              ]),
              el('div', { class: 'muted', style: 'font-size: 13px;' }, `${p.date} · W${p.week}`),
            ]));
          });
          app.appendChild(list);
        }
      } catch (e) {}
    }

    function phaseForWeek(w) {
      if (w <= 3) return 'Phase 1';
      if (w <= 6) return 'Phase 2';
      if (w <= 9) return 'Phase 3';
      return 'Phase 4';
    }

    // -------- Nav --------
    document.querySelectorAll('nav.bottom button').forEach(b => {
      b.addEventListener('click', () => render(b.dataset.view));
    });

    // -------- Init --------
    window.addEventListener('online', flushQueue);
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
    render('home');
    flushQueue();
  </script>
</body>
</html>
